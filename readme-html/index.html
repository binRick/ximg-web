<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="README — ximg-web — interactive educational app on ximg.app">
  <title>README — ximg-web</title>
  <link rel="icon" href="/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    #content {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Typography ── */
    h1, h2, h3, h4, h5, h6 {
      color: #e6edf3;
      font-weight: 600;
      line-height: 1.25;
      margin-top: 2rem;
      margin-bottom: .75rem;
    }
    h1 { font-size: 2rem; padding-bottom: .5rem; border-bottom: 1px solid #21262d; margin-top: .5rem; }
    h2 { font-size: 1.4rem; padding-bottom: .4rem; border-bottom: 1px solid #21262d; }
    h3 { font-size: 1.1rem; }

    p { margin-bottom: 1rem; }

    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Code ── */
    code {
      font-family: 'Courier New', Courier, monospace;
      font-size: .875em;
      background: #161b22;
      color: #e6edf3;
      padding: .15em .35em;
      border-radius: 4px;
      border: 1px solid #30363d;
    }

    pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: .85rem;
      color: #e6edf3;
    }

    /* ── Tables ── */
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 1rem;
      font-size: .9rem;
    }
    th {
      background: #161b22;
      color: #8b949e;
      font-weight: 600;
      text-align: left;
      padding: .5rem .75rem;
      border: 1px solid #30363d;
    }
    td {
      padding: .45rem .75rem;
      border: 1px solid #30363d;
      vertical-align: top;
    }
    tr:nth-child(even) td { background: #0d1117; }
    tr:nth-child(odd)  td { background: #161b22; }
    tr:hover td { background: #21262d; }

    /* ── Lists ── */
    ul, ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    li { margin-bottom: .25rem; }
    li > ul, li > ol { margin-bottom: 0; margin-top: .25rem; }

    /* ── Blockquote ── */
    blockquote {
      border-left: 3px solid #30363d;
      margin: 0 0 1rem;
      padding: .5rem 1rem;
      color: #8b949e;
    }

    /* ── HR ── */
    hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 2rem 0;
    }

    /* ── Loading / error states ── */
    #loading {
      display: flex;
      align-items: center;
      gap: .75rem;
      color: #8b949e;
      font-family: 'Courier New', monospace;
      padding: 3rem 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      color: #f85149;
      padding: 2rem 0;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>

<div id="content">
  <div id="loading"><div class="spinner"></div> Loading README.md…</div>
  <div id="error"></div>
  <div id="md-output"></div>
</div>

<script>
// Minimal Markdown → HTML renderer (vanilla JS, no dependencies)
function renderMarkdown(md) {
  var lines = md.split('\n');
  var html = '';
  var i = 0;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inlineCode(s) {
    return s.replace(/`([^`]+)`/g, function(_,c){ return '<code>' + escHtml(c) + '</code>'; });
  }

  function inlineFormat(s) {
    s = inlineCode(s);
    // bold+italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // bold
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // italic
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // links [text](url)
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    // autolink bare https?://
    s = s.replace(/(?<![">])(https?:\/\/[^\s<>"]+)/g, '<a href="$1">$1</a>');
    return s;
  }

  function isBlank(line) { return /^\s*$/.test(line); }
  function isFence(line) { return /^```/.test(line); }
  function isHr(line) { return /^(-{3,}|\*{3,}|_{3,})\s*$/.test(line); }
  function isHeading(line) { return /^#{1,6}\s/.test(line); }
  function isBlockquote(line) { return /^\s*>/.test(line); }
  function isList(line) { return /^(\s*[-*+]|\s*\d+\.)\s/.test(line); }
  function isTableRow(line) { return /^\|/.test(line.trim()); }

  function parseFencedBlock() {
    var lang = lines[i].replace(/^```/, '').trim();
    i++;
    var code = '';
    while (i < lines.length && !isFence(lines[i])) {
      code += escHtml(lines[i]) + '\n';
      i++;
    }
    i++; // skip closing ```
    return '<pre><code' + (lang ? ' class="lang-'+lang+'"' : '') + '>' + code + '</code></pre>\n';
  }

  function parseHeading(line) {
    var m = line.match(/^(#{1,6})\s+(.+)/);
    var level = m[1].length;
    var text = inlineFormat(escHtml(m[2]));
    return '<h' + level + '>' + text + '</h' + level + '>\n';
  }

  function parseBlockquote() {
    var bq = '';
    while (i < lines.length && isBlockquote(lines[i])) {
      bq += inlineFormat(escHtml(lines[i].replace(/^\s*>\s?/, ''))) + ' ';
      i++;
    }
    return '<blockquote><p>' + bq.trim() + '</p></blockquote>\n';
  }

  function parseList() {
    var baseIndent = lines[i].match(/^(\s*)/)[1].length;
    var isOrdered = /^\s*\d+\./.test(lines[i]);
    var tag = isOrdered ? 'ol' : 'ul';
    var out = '<' + tag + '>\n';
    while (i < lines.length) {
      var line = lines[i];
      if (isBlank(line)) { i++; break; }
      var indent = line.match(/^(\s*)/)[1].length;
      if (indent < baseIndent && !isList(line)) break;
      if (!isList(line) && indent <= baseIndent) break;
      var text = line.replace(/^\s*[-*+]\s+/, '').replace(/^\s*\d+\.\s+/, '');
      out += '<li>' + inlineFormat(escHtml(text)) + '</li>\n';
      i++;
    }
    out += '</' + tag + '>\n';
    return out;
  }

  function parseTable() {
    // read header row
    var header = lines[i].split('|').filter(function(c,j,a){ return j>0 && j<a.length-1; });
    i++;
    // separator row
    i++;
    // data rows
    var out = '<table>\n<thead><tr>';
    header.forEach(function(h){
      out += '<th>' + inlineFormat(escHtml(h.trim())) + '</th>';
    });
    out += '</tr></thead>\n<tbody>\n';
    while (i < lines.length && isTableRow(lines[i])) {
      var cells = lines[i].split('|').filter(function(c,j,a){ return j>0 && j<a.length-1; });
      out += '<tr>';
      cells.forEach(function(c){ out += '<td>' + inlineFormat(escHtml(c.trim())) + '</td>'; });
      out += '</tr>\n';
      i++;
    }
    out += '</tbody></table>\n';
    return out;
  }

  function parseParagraph() {
    var text = '';
    while (i < lines.length && !isBlank(lines[i]) && !isHeading(lines[i]) &&
           !isFence(lines[i]) && !isHr(lines[i]) && !isList(lines[i]) &&
           !isBlockquote(lines[i]) && !isTableRow(lines[i])) {
      text += lines[i] + ' ';
      i++;
    }
    return '<p>' + inlineFormat(escHtml(text.trim())) + '</p>\n';
  }

  while (i < lines.length) {
    var line = lines[i];
    if (isBlank(line))          { i++; continue; }
    if (isHr(line))             { html += '<hr>\n'; i++; continue; }
    if (isFence(line))          { html += parseFencedBlock(); continue; }
    if (isHeading(line))        { html += parseHeading(line); i++; continue; }
    if (isBlockquote(line))     { html += parseBlockquote(); continue; }
    if (isTableRow(line))       { html += parseTable(); continue; }
    if (isList(line))           { html += parseList(); continue; }
    html += parseParagraph();
  }
  return html;
}

fetch('/README.md')
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(function(md) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('md-output').innerHTML = renderMarkdown(md);
  })
  .catch(function(err) {
    document.getElementById('loading').style.display = 'none';
    var el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = 'Failed to load README.md: ' + err.message;
  });
</script>

<script src="/shared/nav.js?v=4"></script>
</body>
</html>
