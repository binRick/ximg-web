  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☪️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #03020a; --deep: #080514; --crimson: #8b0a1a; --teal: #0a5a6b; --gold: #c8902c; --amber: #e0aa50; --purple: #5a1a8b; --text: #c8c0d8; --muted: #403858; --card: rgba(3,2,10,.94); --border: rgba(200,144,44,.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(139,10,26,.15) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(10,90,107,.1) 0%, transparent 60%), linear-gradient(180deg, #03020a 0%, #010108 100%); }
    #ottoman-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(200,144,44,.5)); }
    .hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; color: var(--amber); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(200,144,44,.1); border: 1px solid var(--border); border-radius: 6px; padding: .35rem 1rem; font-size: .85rem; color: var(--gold); letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 110px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--crimson); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    #dome-canvas { width: 100%; height: 220px; border: 1px solid var(--border); border-radius: 10px; background: rgba(3,2,10,.8); cursor: pointer; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(3,2,10,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(200,144,44,.07); }
    .sub-nav a img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; vertical-align: middle; margin-right: 6px; opacity: 0.8; transition: opacity .2s; display: inline-block; }
    .sub-nav a:hover img, .sub-nav a.active img { opacity: 1; }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } }
  </style>

<div class="wrap">
<section id="constantinople">
<div class="section-title">Constantinople / Istanbul — City of the World's Desire</div>
    <canvas id="dome-canvas"></canvas>
    <div class="canvas-label">Click to call to prayer — the minarets of Istanbul at the meeting of Europe and Asia</div>
</section>
</div>
<script>
(function(){
  const c = document.getElementById('ottoman-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const stars = Array.from({length:100}, () => ({ x: Math.random(), y: Math.random()*0.55, r: Math.random()*1.2+.3, a: Math.random()*Math.PI*2 }));
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.006;
    stars.forEach(s => {
      s.a += 0.004;
      ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,180,240,${0.2+0.15*Math.sin(s.a)})`; ctx.fill();
    });
    // Crescent moon
    ctx.beginPath(); ctx.arc(W*0.8, H*0.12, 22, 0, Math.PI*2); ctx.fillStyle = 'rgba(200,160,60,.3)'; ctx.fill();
    ctx.beginPath(); ctx.arc(W*0.8+8, H*0.12-4, 17, 0, Math.PI*2); ctx.fillStyle = 'rgba(3,2,10,.8)'; ctx.fill();
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script>
(function(){
  const c = document.getElementById('dome-canvas');
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 220;
  const W = c.width, H = c.height;
  let t = 0, prayerWaves = [];
  c.addEventListener('click', e => {
    prayerWaves.push({ x: e.clientX - c.getBoundingClientRect().left, y: e.clientY - c.getBoundingClientRect().top, r: 0, alpha: 1 });
  });
  function drawMosque(cx, scale){
    ctx.save(); ctx.translate(cx, H*0.85); ctx.scale(scale, scale);
    // Main dome
    ctx.fillStyle = '#3a2060'; ctx.fillRect(-40,-60,80,60);
    ctx.beginPath(); ctx.arc(0,-60,42,Math.PI,0); ctx.fillStyle = '#4a2880'; ctx.fill();
    ctx.beginPath(); ctx.arc(0,-60,35,Math.PI,0); ctx.fillStyle = '#5a3090'; ctx.fill();
    ctx.strokeStyle = 'rgba(200,144,44,.4)'; ctx.lineWidth = 1; ctx.stroke();
    // Minarets
    [-60,60].forEach(mx => {
      ctx.fillStyle = '#3a2060'; ctx.fillRect(mx-6,0,12,-90);
      ctx.beginPath(); ctx.moveTo(mx-7,-90); ctx.lineTo(mx,-(90+25)); ctx.lineTo(mx+7,-90); ctx.closePath();
      ctx.fillStyle = '#5a3090'; ctx.fill();
      // Balcony
      ctx.fillStyle = 'rgba(200,144,44,.5)'; ctx.fillRect(mx-9,-55,18,4);
    });
    // Crescent on dome
    ctx.fillStyle = 'rgba(200,144,44,.8)';
    ctx.beginPath(); ctx.arc(0,-105,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a2060';
    ctx.beginPath(); ctx.arc(3,-107,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.016;
    // Sky
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'rgba(3,2,10,1)'); sky.addColorStop(1,'rgba(10,5,20,1)');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);
    // Bosphorus
    ctx.fillStyle = 'rgba(10,40,80,.5)'; ctx.fillRect(0,H*0.7,W,H*0.3);
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.moveTo(0,H*0.72+i*H*0.06);
      for(let x=0;x<=W;x+=6) ctx.lineTo(x,H*0.72+i*H*0.06+Math.sin(x/50+t+i)*2);
      ctx.strokeStyle = `rgba(100,160,220,${0.06-i*0.01})`; ctx.lineWidth = 1; ctx.stroke();
    }
    // Stars
    for(let i=0;i<40;i++){
      const sx=(i*137.5%100)/100*W, sy=(i*71.3%50)/100*H*0.6;
      ctx.beginPath(); ctx.arc(sx,sy,0.7,0,Math.PI*2);
      ctx.fillStyle = `rgba(200,180,240,${0.35+0.2*Math.sin(t+i)})`; ctx.fill();
    }
    // Crescent moon
    ctx.beginPath(); ctx.arc(W*0.82,H*0.1,18,0,Math.PI*2); ctx.fillStyle='rgba(200,160,60,.5)'; ctx.fill();
    ctx.beginPath(); ctx.arc(W*0.82+7,H*0.1-3,13,0,Math.PI*2); ctx.fillStyle='rgba(3,2,10,.85)'; ctx.fill();
    // Mosques
    drawMosque(W/2, 1.0);
    drawMosque(W*0.25, 0.65);
    drawMosque(W*0.75, 0.65);
    // Prayer waves
    prayerWaves = prayerWaves.filter(w => w.alpha > 0);
    prayerWaves.forEach(w => {
      w.r += 3; w.alpha -= 0.02;
      ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(200,144,44,${w.alpha})`; ctx.lineWidth = 1.5; ctx.stroke();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
