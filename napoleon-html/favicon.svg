<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a1a"/>
  <!-- Bicorne hat (Napoleon's iconic hat) -->
  <!-- Hat brim -->
  <ellipse cx="16" cy="22" rx="13" ry="3" fill="#1f2937"/>
  <!-- Hat body (bicorne - wide side facing viewer) -->
  <path d="M5 22 Q5 10 16 10 Q27 10 27 22 Z" fill="#111827"/>
  <!-- Hat outline -->
  <path d="M5 22 Q5 10 16 10 Q27 10 27 22" fill="none" stroke="#374151" stroke-width="1"/>
  <!-- Cockade (rosette) -->
  <circle cx="16" cy="17" r="3" fill="#002395"/>
  <circle cx="16" cy="17" r="2" fill="white"/>
  <circle cx="16" cy="17" r="1" fill="#ED2939"/>
</svg>
