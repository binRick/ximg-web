const TYPE_LABELS = {
  desktop: 'Desktop',
  server:  'Server',
  minimal: 'Minimal',
  security:'Security',
  live:    'Live',
};

let activeFilter = 'all';
let searchQuery  = '';

function renderCards() {
  const grid = document.getElementById('grid');
  const q = searchQuery.toLowerCase();

  const visible = ISOS.filter(iso => {
    const matchFilter = activeFilter === 'all' || iso.type === activeFilter;
    const matchSearch = !q ||
      iso.name.toLowerCase().includes(q) ||
      iso.sub.toLowerCase().includes(q) ||
      iso.desc.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  if (visible.length === 0) {
    grid.innerHTML = '<p class="empty-msg">No ISOs match your search.</p>';
    return;
  }

  grid.innerHTML = visible.map(iso => `
    <div class="card" data-type="${iso.type}">
      <div class="card-header">
        <div class="distro-badge" style="background:${iso.bg}">${iso.emoji}</div>
        <div class="card-title">
          <h2>${iso.name}</h2>
          <div class="version">${iso.sub}</div>
        </div>
        <span class="type-badge type-${iso.type}">${TYPE_LABELS[iso.type]}</span>
      </div>
      <div class="card-body">
        <p>${iso.desc}</p>
        <div class="meta">
          <span>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M2 1.5A1.5 1.5 0 013.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 010-1.5H12V1.5H3.5A.5.5 0 003 2v10.5H4a.75.75 0 010 1.5H2.5a.5.5 0 01-.5-.5V1.5z"/>
            </svg>
            ${iso.size}
          </span>
          <span>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M1.5 1.75a.75.75 0 00-1.5 0v12.5c0 .414.336.75.75.75h14.5a.75.75 0 000-1.5H1.5V1.75z"/><path d="M6 9.25a.75.75 0 01.75-.75h5a.75.75 0 010 1.5h-5A.75.75 0 016 9.25zm-2-4a.75.75 0 01.75-.75h7a.75.75 0 010 1.5h-7A.75.75 0 014 5.25z"/>
            </svg>
            ${iso.arch}
          </span>
        </div>
      </div>
      <div class="card-footer">
        <a class="btn btn-primary" href="${iso.url}" download>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M7.47 10.78a.75.75 0 001.06 0l3.75-3.75a.75.75 0 00-1.06-1.06L8.75 8.44V1.75a.75.75 0 00-1.5 0v6.69L4.78 5.97a.75.75 0 00-1.06 1.06l3.75 3.75z"/>
            <path d="M3.75 13a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z"/>
          </svg>
          Download ISO
        </a>
        ${iso.torrent ? `<a class="btn btn-torrent" href="${iso.torrent}" title="Download via torrent">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0a8 8 0 110 16A8 8 0 018 0zm0 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zm0 2a4.5 4.5 0 110 9 4.5 4.5 0 010-9zm0 2a2.5 2.5 0 100 5 2.5 2.5 0 000-5z"/>
          </svg>
          Torrent
        </a>` : ''}
        <a class="btn btn-secondary" href="${iso.sha256}" target="_blank" rel="noopener" title="Verify checksum">SHA256</a>
        <a class="btn btn-secondary" href="${iso.homepage}" target="_blank" rel="noopener">🌐</a>
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCards();
});

renderCards();
</script>
