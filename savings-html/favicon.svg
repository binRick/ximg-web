<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f1a0f"/>
  <!-- Jar / savings container -->
  <rect x="8" y="12" width="16" height="16" rx="2" fill="#1e3a1e"/>
  <rect x="8" y="12" width="16" height="16" rx="2" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Lid -->
  <rect x="7" y="9" width="18" height="4" rx="2" fill="#16a34a"/>
  <!-- Growing bar inside jar -->
  <rect x="11" y="20" width="4" height="6" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="17" y="16" width="4" height="10" rx="1" fill="#22c55e"/>
  <!-- Coin slot on lid -->
  <rect x="14" y="9" width="4" height="1.5" rx="0.5" fill="#0f1a0f"/>
  <!-- Upward arrow -->
  <polygon points="23,6 26,10 24,10 24,14 22,14 22,10 20,10" fill="#4ade80"/>
</svg>
