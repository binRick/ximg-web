<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortal Kombat — kombat.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080505;
      --panel:   #120808;
      --crimson: #b01010;
      --blood:   #7a0000;
      --gold:    #c8960c;
      --steel:   #8090a0;
      --text:    #e8d8d0;
      --muted:   #806870;
      --card:    rgba(22,5,5,.8);
      --border:  rgba(176,16,16,.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 120% 60% at 50% 0%, #2a0505 0%, transparent 65%),
        radial-gradient(ellipse 80% 40% at 80% 100%, #1a0303 0%, transparent 60%),
        linear-gradient(180deg, #080505 0%, #040202 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,   rgba(176,16,16,.02) 0, rgba(176,16,16,.02) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(90deg,  rgba(176,16,16,.015) 0, rgba(176,16,16,.015) 1px, transparent 1px, transparent 80px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2.5rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 18px rgba(176,16,16,.8)); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #e02020 0%, #ff6040 35%, #c80000 70%, #ff2020 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em; text-transform: uppercase;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic; letter-spacing: .04em;
      max-width: 480px; line-height: 1.6;
    }
    .hero-divider {
      width: 120px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--crimson), transparent);
    }

    /* ── Sub-nav ── */
    .subnav {
      display: flex; gap: .5rem;
      border-bottom: 1px solid var(--border); padding-bottom: .6rem;
    }
    .snav-btn {
      font-size: .8rem; padding: .35rem 1.1rem; border-radius: 4px; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; transition: all .2s;
    }
    .snav-btn.active { color: var(--crimson); border-color: rgba(176,16,16,.5); background: rgba(176,16,16,.08); }
    .snav-btn:hover:not(.active) { color: var(--text); border-color: rgba(176,16,16,.25); }

    /* ── Section toggle ── */
    .mk-section { display: flex; flex-direction: column; gap: 1.75rem; }
    .mk-section.hidden { display: none; }

    /* ── Game grid ── */
    .games { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 1.5rem; }
    @media(max-width: 520px) { .games { grid-template-columns: 1fr; } }

    /* ── Game card ── */
    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .game-card:hover {
      border-color: rgba(176,16,16,.5);
      box-shadow: 0 8px 40px rgba(176,16,16,.15);
      transform: translateY(-3px);
    }

    .game-img-wrap {
      position: relative; aspect-ratio: 16/9;
      background: var(--panel); overflow: hidden;
    }
    .game-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      display: block; transition: opacity .4s;
    }
    .game-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .5rem;
    }
    .game-img-placeholder .ph-num { font-size: 3.5rem; font-weight: 900; color: rgba(176,16,16,.2); line-height: 1; }
    .game-img-placeholder .ph-icon { font-size: 2rem; opacity: .2; }

    .game-num-badge {
      position: absolute; top: .75rem; left: .75rem;
      background: rgba(0,0,0,.75); border: 1px solid rgba(176,16,16,.5);
      color: var(--crimson); font-size: .65rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 99px; letter-spacing: .08em;
      font-family: 'Segoe UI', system-ui, sans-serif; backdrop-filter: blur(4px);
      text-transform: uppercase;
    }
    .game-year-badge {
      position: absolute; top: .75rem; right: .75rem;
      background: rgba(122,0,0,.85); border: 1px solid rgba(200,150,12,.3);
      color: #f0c080; font-size: .65rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 99px; letter-spacing: .06em;
      font-family: 'Segoe UI', system-ui, sans-serif; backdrop-filter: blur(4px);
    }

    .game-body { padding: 1.25rem 1.4rem; display: flex; flex-direction: column; gap: 1rem; flex: 1; }
    .game-title { font-size: 1.15rem; font-weight: 800; line-height: 1.2; color: var(--text); }
    .game-dev   { font-size: .72rem; color: var(--muted); margin-top: .2rem;
                  font-family: 'Segoe UI', system-ui, sans-serif; }

    .game-stats { display: flex; flex-wrap: wrap; gap: .5rem; font-family: 'Segoe UI', system-ui, sans-serif; }
    .stat-chip {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px; padding: .35rem .7rem; min-width: 72px;
    }
    .stat-label { font-size: .55rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .stat-val   { font-size: .85rem; font-weight: 700; color: var(--gold); margin-top: .1rem; }

    .platforms { display: flex; flex-wrap: wrap; gap: .3rem; }
    .plat-tag {
      font-size: .62rem; padding: .18rem .55rem; border-radius: 99px;
      border: 1px solid rgba(176,16,16,.3); background: rgba(176,16,16,.08);
      color: #e08080; font-family: 'Segoe UI', system-ui, sans-serif; white-space: nowrap;
    }

    .facts-label {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; margin-bottom: .35rem;
    }
    .facts-list { display: flex; flex-direction: column; gap: .5rem; }
    .fact {
      display: flex; gap: .6rem; align-items: flex-start;
      font-size: .78rem; line-height: 1.55; color: #c0a8a0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .fact-icon { flex-shrink: 0; font-size: .8rem; margin-top: .05rem; opacity: .75; }

    /* ── Fatalities section ── */
    .fat-controls {
      display: flex; gap: .75rem; flex-wrap: wrap; align-items: center;
    }
    .fat-select, .fat-search {
      background: rgba(22,5,5,.9); border: 1px solid var(--border); color: var(--text);
      padding: .45rem .85rem; border-radius: 6px; font-size: .8rem;
      font-family: 'Segoe UI', system-ui, sans-serif; outline: none;
      transition: border-color .2s;
    }
    .fat-select:focus, .fat-search:focus { border-color: rgba(176,16,16,.5); }
    .fat-search { flex: 1; min-width: 180px; max-width: 300px; }
    .fat-select option { background: #120808; }
    .fat-count {
      margin-left: auto; font-size: .72rem; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .fat-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table {
      width: 100%; border-collapse: collapse;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: .82rem;
    }
    thead th {
      background: rgba(122,0,0,.35); color: var(--gold);
      padding: .6rem 1rem; text-align: left;
      font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 700;
      border-bottom: 1px solid rgba(176,16,16,.3); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid rgba(176,16,16,.06); transition: background .15s; }
    tbody tr:hover { background: rgba(176,16,16,.06); }
    tbody tr.char-start { border-top: 1px solid rgba(176,16,16,.18); }
    td { padding: .45rem 1rem; vertical-align: middle; }
    td.td-char {
      white-space: nowrap; font-weight: 700; color: var(--text);
      min-width: 150px;
    }
    td.td-game {
      white-space: nowrap; color: var(--gold); font-size: .75rem; font-weight: 600;
      min-width: 140px;
    }
    td.td-name { color: #e06060; font-weight: 700; white-space: nowrap; min-width: 160px; }
    td.td-desc { color: #c0a8a0; line-height: 1.45; }
    .char-icon { margin-right: .4rem; }

    .no-results {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-style: italic;
    }

    /* ── Character cards ── */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    @media(max-width:520px){ .char-grid { grid-template-columns: 1fr; } }

    .char-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
      backdrop-filter: blur(12px);
      transition: border-color .25s, box-shadow .25s, transform .2s;
    }
    .char-card:hover {
      border-color: rgba(176,16,16,.5);
      box-shadow: 0 6px 32px rgba(176,16,16,.14);
      transform: translateY(-2px);
    }
    .char-img-wrap {
      position: relative; aspect-ratio: 3/4; background: var(--panel); overflow: hidden;
    }
    .char-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
      display: block; opacity: 0; transition: opacity .4s; position: relative; z-index: 1;
    }
    .char-img-wrap img.loaded { opacity: 1; }
    .char-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: .4rem;
    }
    .char-ph-icon { font-size: 3rem; opacity: .12; }
    .char-ph-name { font-size: .7rem; font-weight: 700; color: rgba(176,16,16,.25);
      letter-spacing: .1em; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; }
    .char-debut-badge {
      position: absolute; top: .65rem; left: .65rem; z-index: 2;
      background: rgba(0,0,0,.78); border: 1px solid rgba(176,16,16,.5);
      color: var(--crimson); font-size: .6rem; font-weight: 700;
      padding: .18rem .55rem; border-radius: 99px; letter-spacing: .07em;
      font-family: 'Segoe UI', sans-serif; text-transform: uppercase;
    }
    .char-games-badge {
      position: absolute; top: .65rem; right: .65rem; z-index: 2;
      background: rgba(122,0,0,.85); border: 1px solid rgba(200,150,12,.3);
      color: #f0c080; font-size: .6rem; font-weight: 700;
      padding: .18rem .55rem; border-radius: 99px; letter-spacing: .05em;
      font-family: 'Segoe UI', sans-serif;
    }
    .char-body { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: .7rem; flex: 1; }
    .char-name { font-size: 1.05rem; font-weight: 800; color: var(--text); line-height: 1.2; }
    .char-origin { font-size: .72rem; color: var(--muted); font-family: 'Segoe UI', sans-serif; margin-top: .1rem; }
    .char-styles { display: flex; flex-wrap: wrap; gap: .3rem; }
    .char-style-tag {
      font-size: .6rem; padding: .15rem .5rem; border-radius: 99px;
      border: 1px solid rgba(176,16,16,.3); background: rgba(176,16,16,.07);
      color: #e08080; font-family: 'Segoe UI', sans-serif; font-weight: 600;
    }
    .char-weapon { font-size: .72rem; color: var(--gold); font-family: 'Segoe UI', sans-serif; }
    .char-weapon strong { color: rgba(200,150,12,.6); font-size: .6rem; text-transform: uppercase; letter-spacing: .08em; margin-right: .3rem; }
    .char-section-label {
      font-size: .58rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); font-family: 'Segoe UI', sans-serif; margin-bottom: .25rem; font-weight: 700;
    }
    .char-moves { display: flex; flex-direction: column; gap: .2rem; }
    .char-move { font-size: .72rem; color: #c0a8a0; font-family: 'Segoe UI', sans-serif;
      padding-left: .6rem; position: relative; line-height: 1.4; }
    .char-move::before { content:'›'; position: absolute; left: 0; color: var(--crimson); }
    .char-combos { display: flex; flex-direction: column; gap: .25rem; }
    .char-combo {
      font-size: .68rem; color: #a89090; font-family: 'Courier New', monospace;
      background: rgba(176,16,16,.05); border: 1px solid rgba(176,16,16,.1);
      border-radius: 4px; padding: .2rem .5rem; line-height: 1.45;
    }
    .char-bio {
      font-size: .72rem; color: #a09090; font-family: 'Segoe UI', sans-serif;
      line-height: 1.5; font-style: italic; border-top: 1px solid rgba(176,16,16,.08);
      padding-top: .6rem;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .hero { animation: fadeUp .7s ease both; }
    .games { animation: fadeUp .7s ease both .15s; }
  </style>
</head>

  <script src="/shared/nav.js?v=3"></script>

  <div class="wrap">

<script>
/* ─── Sub-nav ─────────────────────────────────────────────── */
function switchTab(name) {
  document.querySelectorAll('.snav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.getElementById('section-games').classList.toggle('hidden', name !== 'games');
  document.getElementById('section-fatalities').classList.toggle('hidden', name !== 'fatalities');
  document.getElementById('section-characters').classList.toggle('hidden', name !== 'characters');
  localStorage.setItem('kombat_tab', name);
}
document.querySelectorAll('.snav-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

/* ─── Games data & render ──────────────────────────────────── */

async function fetchWikiThumb(wiki, imgEl, placeholderEl) {
  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wiki}`);
    const data = await res.json();
    if (data.thumbnail && data.thumbnail.source) {
      const src = data.thumbnail.source.replace(/\/\d+px-/, '/640px-');
      imgEl.src = src;
      imgEl.style.opacity = '0';
      imgEl.onload = () => { imgEl.style.transition = 'opacity .4s'; imgEl.style.opacity = '1'; placeholderEl.style.display = 'none'; };
      imgEl.onerror = () => {};
    }
  } catch(e) {}
}

function buildGames() {
  const container = document.getElementById('games');
  GAMES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card';
    const statsHtml  = g.stats.map(s => `<div class="stat-chip"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`).join('');
    const platsHtml  = g.platforms.map(p => `<span class="plat-tag">${p}</span>`).join('');
    const factsHtml  = g.facts.map(f => `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`).join('');
    card.innerHTML = `
      <div class="game-img-wrap">
        <div class="game-img-placeholder"><div class="ph-num">${g.num}</div><div class="ph-icon">🐉</div></div>
        <img src="" alt="${g.title}" style="opacity:0;position:relative;z-index:1">
        <div class="game-num-badge">MK ${g.num}</div>
        <div class="game-year-badge">${g.month}</div>
      </div>
      <div class="game-body">
        <div><div class="game-title">${g.title}</div><div class="game-dev">${g.dev}</div></div>
        <div class="game-stats">${statsHtml}</div>
        <div class="platforms">${platsHtml}</div>
        <div><div class="facts-label">&#9760; Notable Facts</div><div class="facts-list">${factsHtml}</div></div>
      </div>`;
    container.appendChild(card);
    fetchWikiThumb(g.wiki, card.querySelector('img'), card.querySelector('.game-img-placeholder'));
  });
}

/* ─── Fatalities table render & filter ────────────────────── */
let fatBuilt = false;

function buildFatalities() {
  if (fatBuilt) return;
  fatBuilt = true;
  renderFatTable();

  document.getElementById('fat-game-filter').addEventListener('change', renderFatTable);
  document.getElementById('fat-char-search').addEventListener('input', renderFatTable);
}

function renderFatTable() {
  const gameFilter = document.getElementById('fat-game-filter').value;
  const charSearch = document.getElementById('fat-char-search').value.trim().toLowerCase();
  const tbody = document.getElementById('fat-tbody');
  tbody.innerHTML = '';

  const filtered = FATALITIES.filter(f => {
    if (gameFilter && f.gameKey !== gameFilter) return false;
    if (charSearch && !f.char.toLowerCase().includes(charSearch)) return false;
    return true;
  });

  document.getElementById('fat-count').textContent = `${filtered.length} fatalities`;
  document.getElementById('fat-no-results').classList.toggle('hidden', filtered.length > 0);

  let lastChar = null;
  filtered.forEach(f => {
    const tr = document.createElement('tr');
    if (f.char !== lastChar) tr.classList.add('char-start');
    lastChar = f.char;
    tr.innerHTML = `
      <td class="td-char"><span class="char-icon">${f.icon}</span>${f.char}</td>
      <td class="td-game">${f.game}</td>
      <td class="td-name">${f.name}</td>
      <td class="td-desc">${f.desc}</td>`;
    tbody.appendChild(tr);
  });
}

/* ─── Characters render ───────────────────────────────────── */
let charsBuilt = false;

function buildCharacters() {
  if (charsBuilt) return;
  charsBuilt = true;
  renderCharGrid();
  document.getElementById('char-game-filter').addEventListener('change', renderCharGrid);
  document.getElementById('char-search').addEventListener('input', renderCharGrid);
}

function setCharImg(img, card, src) {
  img.src = src;
  img.onload  = () => { img.classList.add('loaded'); card.querySelector('.char-placeholder').style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none'; };
}

function renderCharGrid() {
  const gameFilter = document.getElementById('char-game-filter').value;
  const search     = document.getElementById('char-search').value.trim().toLowerCase();
  const grid       = document.getElementById('char-grid');
  grid.innerHTML   = '';

  const filtered = CHARACTERS.filter(c => {
    if (gameFilter && !c.games.includes(gameFilter)) return false;
    if (search && !c.name.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('char-count').textContent = `${filtered.length} characters`;
  document.getElementById('char-no-results').classList.toggle('hidden', filtered.length > 0);

  const entries = [];

  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';

    const stylesHtml = c.styles.map(s => `<span class="char-style-tag">${s}</span>`).join('');
    const movesHtml  = c.moves.map(m => `<div class="char-move">${m}</div>`).join('');
    const combosHtml = c.combos.map(k => `<div class="char-combo">${k}</div>`).join('');

    card.innerHTML = `
      <div class="char-img-wrap">
        <div class="char-placeholder">
          <div class="char-ph-icon">🐉</div>
          <div class="char-ph-name">${c.name}</div>
        </div>
        <img data-wiki="${c.wiki}" alt="${c.name}">
        <div class="char-debut-badge">${c.debut}</div>
        <div class="char-games-badge">${c.games.length} game${c.games.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="char-body">
        <div>
          <div class="char-name">${c.name}</div>
          <div class="char-origin">${c.realm} &nbsp;·&nbsp; ${c.species}</div>
        </div>
        <div>
          <div class="char-section-label">Fighting Styles</div>
          <div class="char-styles">${stylesHtml}</div>
        </div>
        <div class="char-weapon"><strong>Weapon</strong>${c.weapon}</div>
        <div>
          <div class="char-section-label">Signature Moves</div>
          <div class="char-moves">${movesHtml}</div>
        </div>
        <div>
          <div class="char-section-label">Common Combos</div>
          <div class="char-combos">${combosHtml}</div>
        </div>
        <div class="char-bio">${c.bio}</div>
      </div>`;

    grid.appendChild(card);
    entries.push({ c, img: card.querySelector('img'), card });
  });

  // Phase 1: Wikipedia — parallel fetches for all characters
  // Phase 2: Single batched Fandom request for those that need it
  (async () => {
    const needFandom = (await Promise.all(entries.map(async ({c, img, card}) => {
      const firstName = c.name.toLowerCase().split(/[\s\/]+/)[0];
      try {
        const wikiKey = c.wiki.replace(/%27/g, "'");
        const res  = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiKey)}`);
        const data = await res.json();
        if (data.thumbnail?.source && data.title?.toLowerCase().includes(firstName)) {
          setCharImg(img, card, data.thumbnail.source);
          return null;
        }
      } catch(e) {}
      return { c, img, card };
    }))).filter(Boolean);

    if (!needFandom.length) return;

    // Batch up to 50 titles per Fandom API request
    for (let i = 0; i < needFandom.length; i += 50) {
      const batch = needFandom.slice(i, i + 50);
      try {
        // Build titles param: encode each title individually, join with literal |
        const titlesParam = batch
          .map(({c}) => encodeURIComponent(decodeURIComponent(c.fandom || c.name.replace(/\s+/g, '_'))))
          .join('|');
        const fres  = await fetch(
          `https://mortalkombat.fandom.com/api.php?action=query&titles=${titlesParam}&prop=pageimages&format=json&pithumbsize=400&origin=*`
        );
        const fdata = await fres.json();

        // Build lookup: lowercase title → thumbnail src
        const thumbMap = {};
        for (const page of Object.values(fdata?.query?.pages || {})) {
          if (page.thumbnail?.source) thumbMap[page.title.toLowerCase()] = page.thumbnail.source;
        }
        // Apply MediaWiki normalizations (underscores ↔ spaces)
        for (const {from, to} of (fdata?.query?.normalized || [])) {
          const src = thumbMap[to.toLowerCase()];
          if (src) { thumbMap[from.toLowerCase()] = src; thumbMap[from.toLowerCase().replace(/_/g, ' ')] = src; }
        }

        for (const {c, img, card} of batch) {
          const rawTitle = decodeURIComponent(c.fandom || c.name.replace(/\s+/g, '_'));
          const src = thumbMap[rawTitle.toLowerCase()] || thumbMap[rawTitle.toLowerCase().replace(/_/g, ' ')];
          if (src) setCharImg(img, card, src);
        }
      } catch(e) {}
    }
  })();
}

/* ─── Init ────────────────────────────────────────────────── */
buildGames();
const savedTab = localStorage.getItem('kombat_tab') || 'games';
if (savedTab === 'fatalities') {
  switchTab('fatalities');
  buildFatalities();
} else if (savedTab === 'characters') {
  switchTab('characters');
  buildCharacters();
} else {
  switchTab('games');
}

document.querySelector('[data-tab="fatalities"]').addEventListener('click', buildFatalities, { once: true });
document.querySelector('[data-tab="characters"]').addEventListener('click', buildCharacters, { once: true });
</script>
