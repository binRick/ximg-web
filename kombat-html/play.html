<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Three decades of brutal combat — from the arcades of 1992 to the realms of 2023. Finish him.">
  <title>Mortal Kombat — kombat.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080505;
      --panel:   #120808;
      --crimson: #b01010;
      --blood:   #7a0000;
      --gold:    #c8960c;
      --steel:   #8090a0;
      --text:    #e8d8d0;
      --muted:   #806870;
      --card:    rgba(22,5,5,.8);
      --border:  rgba(176,16,16,.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 120% 60% at 50% 0%, #2a0505 0%, transparent 65%),
        radial-gradient(ellipse 80% 40% at 80% 100%, #1a0303 0%, transparent 60%),
        linear-gradient(180deg, #080505 0%, #040202 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,   rgba(176,16,16,.02) 0, rgba(176,16,16,.02) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(90deg,  rgba(176,16,16,.015) 0, rgba(176,16,16,.015) 1px, transparent 1px, transparent 80px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2.5rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 18px rgba(176,16,16,.8)); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #e02020 0%, #ff6040 35%, #c80000 70%, #ff2020 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em; text-transform: uppercase;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic; letter-spacing: .04em;
      max-width: 480px; line-height: 1.6;
    }
    .hero-divider {
      width: 120px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--crimson), transparent);
    }

    /* ── Sub-nav ── */
    .subnav {
      display: flex; justify-content: center; gap: .5rem;
      border-bottom: 1px solid var(--border); padding-bottom: .6rem;
    }
    .snav-btn {
      font-size: .8rem; padding: .35rem 1.1rem; border-radius: 4px; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; transition: all .2s;
    }
    .snav-btn.active { color: var(--crimson); border-color: rgba(176,16,16,.5); background: rgba(176,16,16,.08); }
    .snav-btn:hover:not(.active) { color: var(--text); border-color: rgba(176,16,16,.25); }
    kbd {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.18);
      border-radius: 3px; padding: .1rem .38rem; font-size: .68rem;
      font-family: 'Courier New', monospace; color: var(--text);
    }

    /* ── Section toggle ── */
    .mk-section { display: flex; flex-direction: column; gap: 1.75rem; }
    .mk-section

    /* ── Game grid ── */
    .games { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 1.5rem; }
    @media(max-width: 520px) { .games { grid-template-columns: 1fr; } }

    /* ── Game card ── */
    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .game-card:hover {
      border-color: rgba(176,16,16,.5);
      box-shadow: 0 8px 40px rgba(176,16,16,.15);
      transform: translateY(-3px);
    }

    .game-img-wrap {
      position: relative; aspect-ratio: 16/9;
      background: var(--panel); overflow: hidden;
    }
    .game-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      display: block; transition: opacity .4s;
    }
    .game-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .5rem;
    }
    .game-img-placeholder .ph-num { font-size: 3.5rem; font-weight: 900; color: rgba(176,16,16,.2); line-height: 1; }
    .game-img-placeholder .ph-icon { font-size: 2rem; opacity: .2; }

    .game-num-badge {
      position: absolute; top: .75rem; left: .75rem;
      background: rgba(0,0,0,.75); border: 1px solid rgba(176,16,16,.5);
      color: var(--crimson); font-size: .65rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 99px; letter-spacing: .08em;
      font-family: 'Segoe UI', system-ui, sans-serif; backdrop-filter: blur(4px);
      text-transform: uppercase;
    }
    .game-year-badge {
      position: absolute; top: .75rem; right: .75rem;
      background: rgba(122,0,0,.85); border: 1px solid rgba(200,150,12,.3);
      color: #f0c080; font-size: .65rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 99px; letter-spacing: .06em;
      font-family: 'Segoe UI', system-ui, sans-serif; backdrop-filter: blur(4px);
    }

    .game-body { padding: 1.25rem 1.4rem; display: flex; flex-direction: column; gap: 1rem; flex: 1; }
    .game-title { font-size: 1.15rem; font-weight: 800; line-height: 1.2; color: var(--text); }
    .game-dev   { font-size: .72rem; color: var(--muted); margin-top: .2rem;
                  font-family: 'Segoe UI', system-ui, sans-serif; }

    .game-stats { display: flex; flex-wrap: wrap; gap: .5rem; font-family: 'Segoe UI', system-ui, sans-serif; }
    .stat-chip {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px; padding: .35rem .7rem; min-width: 72px;
    }
    .stat-label { font-size: .55rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .stat-val   { font-size: .85rem; font-weight: 700; color: var(--gold); margin-top: .1rem; }

    .platforms { display: flex; flex-wrap: wrap; gap: .3rem; }
    .plat-tag {
      font-size: .62rem; padding: .18rem .55rem; border-radius: 99px;
      border: 1px solid rgba(176,16,16,.3); background: rgba(176,16,16,.08);
      color: #e08080; font-family: 'Segoe UI', system-ui, sans-serif; white-space: nowrap;
    }

    .facts-label {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; margin-bottom: .35rem;
    }
    .facts-list { display: flex; flex-direction: column; gap: .5rem; }
    .fact {
      display: flex; gap: .6rem; align-items: flex-start;
      font-size: .78rem; line-height: 1.55; color: #c0a8a0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .fact-icon { flex-shrink: 0; font-size: .8rem; margin-top: .05rem; opacity: .75; }

    /* ── Fatalities section ── */
    .fat-controls {
      display: flex; gap: .75rem; flex-wrap: wrap; align-items: center;
    }
    .fat-select, .fat-search {
      background: rgba(22,5,5,.9); border: 1px solid var(--border); color: var(--text);
      padding: .45rem .85rem; border-radius: 6px; font-size: .8rem;
      font-family: 'Segoe UI', system-ui, sans-serif; outline: none;
      transition: border-color .2s;
    }
    .fat-select:focus, .fat-search:focus { border-color: rgba(176,16,16,.5); }
    .fat-search { flex: 1; min-width: 180px; max-width: 300px; }
    .fat-select option { background: #120808; }
    .fat-count {
      margin-left: auto; font-size: .72rem; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .fat-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table {
      width: 100%; border-collapse: collapse;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: .82rem;
    }
    thead th {
      background: rgba(122,0,0,.35); color: var(--gold);
      padding: .6rem 1rem; text-align: left;
      font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 700;
      border-bottom: 1px solid rgba(176,16,16,.3); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid rgba(176,16,16,.06); transition: background .15s; }
    tbody tr:hover { background: rgba(176,16,16,.06); }
    tbody tr.char-start { border-top: 1px solid rgba(176,16,16,.18); }
    td { padding: .45rem 1rem; vertical-align: middle; }
    td.td-char {
      white-space: nowrap; font-weight: 700; color: var(--text);
      min-width: 150px;
    }
    td.td-game {
      white-space: nowrap; color: var(--gold); font-size: .75rem; font-weight: 600;
      min-width: 140px;
    }
    td.td-name { color: #e06060; font-weight: 700; white-space: nowrap; min-width: 160px; }
    td.td-desc { color: #c0a8a0; line-height: 1.45; }
    .char-icon { margin-right: .4rem; }

    .no-results {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-style: italic;
    }

    /* ── History timeline ── */
    .hist-timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
    .hist-timeline::before {
      content: ''; position: absolute; left: 68px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, transparent, rgba(176,16,16,.4) 6%, rgba(176,16,16,.4) 94%, transparent);
    }
    @media(max-width:520px){ .hist-timeline::before { left: 44px; } }

    .ht-item { display: flex; gap: 0; align-items: flex-start; padding-bottom: 2rem; }
    .ht-year {
      flex-shrink: 0; width: 68px; text-align: right; padding-right: 1rem;
      font-size: .7rem; font-weight: 800; color: var(--crimson); line-height: 1;
      padding-top: .9rem; letter-spacing: .02em;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    @media(max-width:520px){ .ht-year { width: 44px; padding-right: .65rem; font-size: .6rem; } }

    .ht-dot {
      flex-shrink: 0; width: 12px; height: 12px; border-radius: 50%;
      background: var(--crimson); border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px rgba(176,16,16,.45);
      margin-top: .82rem; position: relative; z-index: 1;
    }
    .ht-dot.major {
      width: 16px; height: 16px; margin-top: .65rem;
      background: var(--gold); box-shadow: 0 0 10px rgba(200,150,12,.6), 0 0 0 3px rgba(200,150,12,.2);
    }

    .ht-card {
      flex: 1; margin-left: 1rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      display: flex; flex-direction: column; gap: 0;
      transition: border-color .2s, box-shadow .2s;
    }
    .ht-img-wrap {
      position: relative; height: 180px; overflow: hidden;
      background: var(--panel);
    }
    .ht-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      display: block; opacity: 0; transition: opacity .4s, transform .4s;
    }
    .ht-card:hover .ht-img-wrap img { transform: scale(1.04); }
    .ht-img-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; font-size: 2.5rem; opacity: .1;
    }
    .ht-card-body {
      padding: .95rem 1.15rem; display: flex; flex-direction: column; gap: .5rem;
    }
    .ht-card:hover { border-color: rgba(176,16,16,.45); box-shadow: 0 4px 24px rgba(176,16,16,.1); }
    .ht-header { display: flex; align-items: flex-start; gap: .65rem; flex-wrap: wrap; margin-bottom: 0; }
    .ht-era {
      font-size: .54rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
      padding: .17rem .52rem; border-radius: 99px; white-space: nowrap; flex-shrink: 0; margin-top: .1rem;
      border: 1px solid rgba(200,150,12,.3); background: rgba(200,150,12,.07); color: var(--gold);
    }
    .ht-title { font-size: .95rem; font-weight: 800; color: var(--text); line-height: 1.2; }
    .ht-sub   { font-size: .67rem; color: var(--muted); font-style: italic; margin-top: .1rem; }
    .ht-desc  {
      font-size: .78rem; line-height: 1.7; color: #c0a8a0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .ht-desc em     { color: var(--gold); font-style: normal; font-weight: 600; }
    .ht-desc strong { color: var(--text); }
    .ht-pills { display: flex; flex-wrap: wrap; gap: .28rem; margin-top: .1rem; }
    .ht-pill {
      font-size: .59rem; padding: .14rem .48rem; border-radius: 99px;
      border: 1px solid rgba(176,16,16,.3); background: rgba(176,16,16,.07);
      color: #e08080; font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Character cards ── */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    @media(max-width:520px){ .char-grid { grid-template-columns: 1fr; } }

    .char-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
      backdrop-filter: blur(12px);
      transition: border-color .25s, box-shadow .25s, transform .2s;
    }
    .char-card:hover {
      border-color: rgba(176,16,16,.5);
      box-shadow: 0 6px 32px rgba(176,16,16,.14);
      transform: translateY(-2px);
    }
    .char-img-wrap {
      position: relative; aspect-ratio: 3/4; background: var(--panel); overflow: hidden;
    }
    .char-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: top center;
      display: block; opacity: 0; transition: opacity .4s; position: relative; z-index: 1;
    }
    .char-img-wrap img.loaded { opacity: 1; }
    .char-placeholder {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: .4rem;
    }
    .char-ph-icon { font-size: 3rem; opacity: .12; }
    .char-ph-name { font-size: .7rem; font-weight: 700; color: rgba(176,16,16,.25);
      letter-spacing: .1em; text-transform: uppercase; font-family: 'Segoe UI', sans-serif; }
    .char-debut-badge {
      position: absolute; top: .65rem; left: .65rem; z-index: 2;
      background: rgba(0,0,0,.78); border: 1px solid rgba(176,16,16,.5);
      color: var(--crimson); font-size: .6rem; font-weight: 700;
      padding: .18rem .55rem; border-radius: 99px; letter-spacing: .07em;
      font-family: 'Segoe UI', sans-serif; text-transform: uppercase;
    }
    .char-games-badge {
      position: absolute; top: .65rem; right: .65rem; z-index: 2;
      background: rgba(122,0,0,.85); border: 1px solid rgba(200,150,12,.3);
      color: #f0c080; font-size: .6rem; font-weight: 700;
      padding: .18rem .55rem; border-radius: 99px; letter-spacing: .05em;
      font-family: 'Segoe UI', sans-serif;
    }
    .char-body { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: .7rem; flex: 1; }
    .char-name { font-size: 1.05rem; font-weight: 800; color: var(--text); line-height: 1.2; }
    .char-origin { font-size: .72rem; color: var(--muted); font-family: 'Segoe UI', sans-serif; margin-top: .1rem; }
    .char-styles { display: flex; flex-wrap: wrap; gap: .3rem; }
    .char-style-tag {
      font-size: .6rem; padding: .15rem .5rem; border-radius: 99px;
      border: 1px solid rgba(176,16,16,.3); background: rgba(176,16,16,.07);
      color: #e08080; font-family: 'Segoe UI', sans-serif; font-weight: 600;
    }
    .char-weapon { font-size: .72rem; color: var(--gold); font-family: 'Segoe UI', sans-serif; }
    .char-weapon strong { color: rgba(200,150,12,.6); font-size: .6rem; text-transform: uppercase; letter-spacing: .08em; margin-right: .3rem; }
    .char-section-label {
      font-size: .58rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); font-family: 'Segoe UI', sans-serif; margin-bottom: .25rem; font-weight: 700;
    }
    .char-moves { display: flex; flex-direction: column; gap: .2rem; }
    .char-move { font-size: .72rem; color: #c0a8a0; font-family: 'Segoe UI', sans-serif;
      padding-left: .6rem; position: relative; line-height: 1.4; }
    .char-move::before { content:'›'; position: absolute; left: 0; color: var(--crimson); }
    .char-combos { display: flex; flex-direction: column; gap: .25rem; }
    .char-combo {
      font-size: .68rem; color: #a89090; font-family: 'Courier New', monospace;
      background: rgba(176,16,16,.05); border: 1px solid rgba(176,16,16,.1);
      border-radius: 4px; padding: .2rem .5rem; line-height: 1.45;
    }
    .char-bio {
      font-size: .72rem; color: #a09090; font-family: 'Segoe UI', sans-serif;
      line-height: 1.5; font-style: italic; border-top: 1px solid rgba(176,16,16,.08);
      padding-top: .6rem;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .hero { animation: fadeUp .7s ease both; }
    .games { animation: fadeUp .7s ease both .15s; }

    /* ── Scores section ── */
    .mk-scores-wrap {
      max-width: 760px; margin: 0 auto; width: 100%;
      padding: 1.5rem 0 3rem;
      display: flex; flex-direction: column; gap: 1.75rem;
    }
    .mk-scores-title {
      font-size: 1.1rem; font-weight: 900; text-align: center; text-transform: uppercase;
      letter-spacing: .1em; color: var(--crimson);
      text-shadow: 0 0 20px rgba(176,16,16,.5);
    }
    .mk-scores-table {
      width: 100%; border-collapse: collapse;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .mk-scores-table thead th {
      background: rgba(122,0,0,.35); color: var(--gold);
      padding: .55rem 1rem; text-align: left;
      font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 700;
      border-bottom: 1px solid rgba(176,16,16,.3);
    }
    .mk-scores-table tbody tr {
      border-bottom: 1px solid rgba(176,16,16,.06); transition: background .15s;
    }
    .mk-scores-table tbody tr:hover { background: rgba(176,16,16,.06); }
    .mk-scores-table tbody td { padding: .45rem 1rem; font-size: .82rem; color: var(--text); vertical-align: middle; }
    .mk-scores-table .rank-gold   { color: var(--gold); font-weight: 800; }
    .mk-scores-table .rank-silver { color: #bbb; font-weight: 700; }
    .mk-scores-table .rank-bronze { color: #cd7f32; font-weight: 700; }
    .mk-scores-table .rank-normal { color: var(--muted); }
    .mk-scores-empty {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-style: italic; font-size: .85rem;
    }
    .mk-scores-table-wrap {
      border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
      background: var(--card);
    }
    .mk-scores-actions {
      display: flex; justify-content: center;
    }
    .mk-scores-clear {
      background: transparent; border: 1px solid rgba(176,16,16,.3); color: var(--muted);
      padding: .4rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: .72rem;
      font-family: 'Segoe UI', system-ui, sans-serif; transition: all .2s;
    }
    .mk-scores-clear:hover { border-color: rgba(176,16,16,.6); color: #e08080; background: rgba(176,16,16,.07); }
    .mk-scores-note {
      text-align: center; font-size: .72rem; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-style: italic; line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="subnav">
      <a class="snav-btn " href="index.html">Games</a>
      <a class="snav-btn" href="fatalities.html">Fatalities</a>
      <a class="snav-btn" href="characters.html">Characters</a>
      <a class="snav-btn" href="history.html">History</a>
      <a class="snav-btn" href="play.html">⚔️ Play</a>
      <a class="snav-btn" href="scores.html">🏆 Scores</a>
    </div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/kombat') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="play">
