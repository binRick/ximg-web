<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#012169"/>
  <!-- Union Jack -->
  <!-- White diagonals -->
  <line x1="0" y1="0" x2="32" y2="32" stroke="white" stroke-width="6"/>
  <line x1="32" y1="0" x2="0" y2="32" stroke="white" stroke-width="6"/>
  <!-- Red diagonals -->
  <line x1="0" y1="0" x2="32" y2="32" stroke="#C8102E" stroke-width="3"/>
  <line x1="32" y1="0" x2="0" y2="32" stroke="#C8102E" stroke-width="3"/>
  <!-- White cross -->
  <rect x="0" y="12" width="32" height="8" fill="white"/>
  <rect x="12" y="0" width="8" height="32" fill="white"/>
  <!-- Red cross -->
  <rect x="0" y="13.5" width="32" height="5" fill="#C8102E"/>
  <rect x="13.5" y="0" width="5" height="32" fill="#C8102E"/>
  <!-- Corner clip -->
  <rect width="32" height="32" rx="6" fill="none"/>
</svg>
