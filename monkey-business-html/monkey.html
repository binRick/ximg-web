<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The career of a single dart-throwing monkey: every pick, every round, every dollar.">
  <title>Monkey — monkey-business.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --panel: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
      --text: #f1f5f9; --muted: #64748b; --accent: #7c3aed; --accent2: #06b6d4;
      --gain: #22c55e; --loss: #ef4444; --gold: #facc15;
      --mono: ui-monospace, 'SFMono-Regular', 'Menlo', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; position: relative; overflow-x: hidden; }
    body::before { content:''; position: fixed; inset: 0; background-image: linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px); background-size: 48px 48px; animation: gridMove 30s linear infinite; z-index: 0; pointer-events: none; }
    @keyframes gridMove { 0%{transform:translateY(0)} 100%{transform:translateY(48px)} }
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.18; z-index: 0; pointer-events: none; }
    .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -150px; }

    #subnav { position: sticky; top: 52px; z-index: 150; background: rgba(8,11,14,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,.07); display: flex; justify-content: center; flex-wrap: wrap; gap: .2rem; padding: .4rem 1rem; }
    #subnav a { font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: #5a6070; padding: .3rem .65rem; border-radius: 3px; text-decoration: none; transition: color .2s, background .2s; font-family: var(--mono); }
    #subnav a:hover, #subnav a.active { color: var(--accent2); background: rgba(255,255,255,.06); }

    main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 1.4rem 1.4rem 4rem; }

    .picker { display: flex; gap: .8rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .picker label { font-family: var(--mono); font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .15em; }
    .picker select { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: .45rem .8rem; border-radius: 6px; font-family: var(--mono); font-size: .85rem; }
    .picker .nav { display: flex; gap: .4rem; }
    .picker .nav a { font-family: var(--mono); font-size: .75rem; color: var(--muted); border: 1px solid var(--border); padding: .4rem .6rem; border-radius: 6px; text-decoration: none; }
    .picker .nav a:hover { color: var(--accent2); border-color: var(--accent2); }

    .head-card {
      display: grid; grid-template-columns: 80px 1fr; gap: 1.2rem;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.2rem 1.4rem; margin-bottom: 1rem; backdrop-filter: blur(10px);
    }
    .avatar { width: 80px; height: 80px; border-radius: 12px; }
    .head-card h1 { font-size: 1.4rem; font-weight: 300; }
    .head-card .id { font-family: var(--mono); color: var(--muted); font-size: .75rem; margin-top: .2rem; letter-spacing: .12em; }

    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: .7rem; margin-bottom: 1rem; }
    .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: .65rem .8rem; backdrop-filter: blur(10px); }
    .stat .lbl { font-family: var(--mono); font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
    .stat .val { font-family: var(--mono); font-size: 1.25rem; margin-top: .15rem; }
    .stat .val.gain { color: var(--gain); } .stat .val.loss { color: var(--loss); }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; backdrop-filter: blur(10px); }

    canvas#spark { display: block; width: 100%; aspect-ratio: 16/5; margin-bottom: 1rem; }

    table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: .82rem; }
    th, td { padding: .45rem .8rem; text-align: right; border-bottom: 1px solid var(--border); }
    th { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
    th:first-child, td:first-child { text-align: center; }
    th:nth-child(3), td:nth-child(3) { text-align: left; }
    .gain { color: var(--gain); } .loss { color: var(--loss); }

    .empty { text-align: center; padding: 2rem; color: var(--muted); font-family: var(--mono); font-size: .8rem; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav id="subnav">
    <a href="index.html">Arena</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="history.html">History</a>
    <a href="monkey.html">Monkey</a>
    <a href="about.html">About</a>
  </nav>

  <main>
    <div class="picker">
      <label for="select-monkey">Choose a monkey</label>
      <select id="select-monkey"></select>
      <div class="nav">
        <a href="#" id="prev">← Prev</a>
        <a href="#" id="next">Next →</a>
        <a href="#" id="rand">Random</a>
      </div>
    </div>

    <div id="page" style="display:none;">
      <div class="head-card">
        <svg class="avatar" id="avatar" viewBox="0 0 80 80"></svg>
        <div>
          <h1 id="m-name">—</h1>
          <div class="id" id="m-id">—</div>
        </div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="panel">
        <canvas id="spark"></canvas>
        <table>
          <thead>
            <tr><th>Round</th><th>Time</th><th>Ticker</th><th>Entry</th><th>Exit</th><th>P&amp;L</th><th>Market</th><th>vs</th></tr>
          </thead>
          <tbody id="picks"></tbody>
        </table>
      </div>
    </div>

    <div id="loading" class="empty">loading…</div>
  </main>

  <script type="module">
    import { getHistory, getLeaderboard } from './api.js';

    function pct(x, d=2) {
      if (x===null || x===undefined || !Number.isFinite(x)) return '—';
      return (x>=0?'+':'') + (x*100).toFixed(d) + '%';
    }
    function cls(x) { return x>0?'gain':x<0?'loss':''; }
    function fmtTime(ts) { return new Date(ts).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
    function hue(id) { return ((id * 137.508) | 0) % 360; }

    function drawAvatar(id) {
      const h = hue(id);
      const fur  = `hsl(${h}, 35%, 28%)`;
      const face = `hsl(${h}, 25%, 50%)`;
      const dark = `hsl(${h}, 30%, 18%)`;
      document.getElementById('avatar').innerHTML = `
        <rect width="80" height="80" rx="12" fill="rgba(255,255,255,0.04)"/>
        <ellipse cx="40" cy="58" rx="20" ry="16" fill="${fur}"/>
        <ellipse cx="18" cy="40" rx="9" ry="10" fill="${fur}"/>
        <ellipse cx="62" cy="40" rx="9" ry="10" fill="${fur}"/>
        <ellipse cx="40" cy="40" rx="20" ry="22" fill="${fur}"/>
        <ellipse cx="40" cy="44" rx="13" ry="15" fill="${face}"/>
        <ellipse cx="34" cy="42" rx="2.4" ry="3" fill="${dark}"/>
        <ellipse cx="46" cy="42" rx="2.4" ry="3" fill="${dark}"/>
      `;
    }

    let monkeyMap = new Map();
    let allMonkeys = []; // for select
    async function loadMonkeyList() {
      try {
        const r = await getLeaderboard();
        allMonkeys = [...r.monkeys].sort((a,b) => a.id - b.id);
        const sel = document.getElementById('select-monkey');
        sel.innerHTML = allMonkeys.map(m => `<option value="${m.id}">#${String(m.id).padStart(3,' ')} — ${m.name}</option>`).join('');
        for (const m of r.monkeys) monkeyMap.set(m.id, m);
      } catch (e) { console.warn(e); }
    }

    function currentId() {
      const q = new URLSearchParams(location.search);
      const id = +q.get('id');
      return (id >= 1 && id <= 100) ? id : null;
    }

    function go(id) {
      const u = new URL(location.href);
      u.searchParams.set('id', id);
      history.pushState(null, '', u);
      load();
    }
    document.getElementById('prev').addEventListener('click', e => { e.preventDefault(); const id = currentId() || 1; go(id > 1 ? id-1 : 100); });
    document.getElementById('next').addEventListener('click', e => { e.preventDefault(); const id = currentId() || 0; go(id < 100 ? id+1 : 1); });
    document.getElementById('rand').addEventListener('click', e => { e.preventDefault(); go(1 + ((Math.random()*100)|0)); });
    document.getElementById('select-monkey').addEventListener('change', e => go(+e.target.value));

    async function load() {
      const id = currentId();
      if (!id) {
        // pick a random one if none specified
        const r = 1 + ((Math.random()*100)|0);
        const u = new URL(location.href); u.searchParams.set('id', r);
        history.replaceState(null, '', u);
        return load();
      }
      document.getElementById('select-monkey').value = String(id);

      document.getElementById('loading').style.display = 'block';
      document.getElementById('page').style.display = 'none';

      try {
        const r = await getHistory(id, 500);
        const m = r.monkey;
        const meta = monkeyMap.get(id);
        document.getElementById('m-name').textContent = m.name;
        document.getElementById('m-id').textContent = `MONKEY #${id} · ${r.picks.length} picks recorded`;
        drawAvatar(id);

        const stats = document.getElementById('stats');
        if (meta) {
          stats.innerHTML = `
            <div class="stat"><div class="lbl">Cumulative</div><div class="val ${cls(meta.cumPct)}">${pct(meta.cumPct, 2)}</div></div>
            <div class="stat"><div class="lbl">Mean / round</div><div class="val ${cls(meta.meanPct)}">${pct(meta.meanPct, 3)}</div></div>
            <div class="stat"><div class="lbl">Stdev</div><div class="val">${(meta.stdev*100).toFixed(2)}%</div></div>
            <div class="stat"><div class="lbl">Mean / σ</div><div class="val">${meta.sharpeish.toFixed(3)}</div></div>
            <div class="stat"><div class="lbl">Beat market</div><div class="val">${(meta.winRate*100).toFixed(0)}%</div></div>
          `;
        }

        // Sparkline of cumulative pnl over time
        const settled = [...r.picks].filter(p => p.pnlPct != null).reverse(); // oldest -> newest
        let cum = 0; const series = settled.map(p => (cum += p.pnlPct, cum));
        drawSpark(series);

        const tbody = document.getElementById('picks');
        if (r.picks.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="empty">no picks yet</td></tr>';
        } else {
          tbody.innerHTML = r.picks.map(p => {
            const vs = (p.pnlPct != null && p.marketPct != null) ? p.pnlPct - p.marketPct : null;
            return `<tr>
              <td>#${p.roundId}</td>
              <td>${fmtTime(p.startedAt)}</td>
              <td><b>${p.ticker}</b></td>
              <td>${p.entryPrice?.toFixed(2) ?? '—'}</td>
              <td>${p.exitPrice?.toFixed(2) ?? '—'}</td>
              <td class="${cls(p.pnlPct)}">${pct(p.pnlPct, 3)}</td>
              <td>${pct(p.marketPct, 3)}</td>
              <td class="${cls(vs)}">${pct(vs, 3)}</td>
            </tr>`;
          }).join('');
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('page').style.display = '';
      } catch (e) {
        document.getElementById('loading').textContent = 'failed to load: ' + e.message;
      }
    }

    function drawSpark(series) {
      const c = document.getElementById('spark');
      const dpr = window.devicePixelRatio || 1;
      const r = c.getBoundingClientRect();
      c.width = r.width * dpr; c.height = r.height * dpr;
      const ctx = c.getContext('2d');
      const W = c.width, H = c.height;
      ctx.clearRect(0, 0, W, H);
      if (series.length < 2) {
        ctx.fillStyle = '#64748b';
        ctx.font = `${12*dpr}px ui-monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('not enough settled rounds yet', W/2, H/2);
        return;
      }
      const padL = 50*dpr, padR = 16*dpr, padT = 12*dpr, padB = 22*dpr;
      const pw = W-padL-padR, ph = H-padT-padB;
      const ymin = Math.min(0, ...series), ymax = Math.max(0, ...series);
      const span = (ymax - ymin) || 0.01;
      const yLo = ymin - span*0.1, yHi = ymax + span*0.1;
      const xToPx = i => padL + (i/(series.length-1))*pw;
      const yToPx = v => padT + (1 - (v - yLo)/(yHi - yLo))*ph;
      // zero
      if (yLo < 0 && yHi > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        const y0 = yToPx(0);
        ctx.beginPath(); ctx.moveTo(padL, y0); ctx.lineTo(W-padR, y0); ctx.stroke();
      }
      // line
      const last = series[series.length-1];
      const color = last >= 0 ? '#22c55e' : '#ef4444';
      ctx.strokeStyle = color; ctx.lineWidth = 2*dpr;
      ctx.beginPath();
      for (let i = 0; i < series.length; i++) {
        const x = xToPx(i), y = yToPx(series[i]);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      // label endpoints
      ctx.fillStyle = '#64748b'; ctx.font = `${11*dpr}px ui-monospace`;
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(((last)*100).toFixed(2)+'%', W-padR, yToPx(last));
      ctx.textAlign = 'left';
      ctx.fillText('cumulative pnl', padL, padT-2);
    }

    document.querySelectorAll('#subnav a').forEach(a => {
      const href = a.getAttribute('href'); if (location.pathname.endsWith(href)) a.classList.add('active');
    });

    (async () => {
      await loadMonkeyList();
      await load();
    })();
    window.addEventListener('popstate', load);
  </script>

  <script src="/shared/nav.js?v=5"></script>
</body>
</html>
