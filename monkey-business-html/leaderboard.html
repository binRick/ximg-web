<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Full leaderboard of all 100 monkeys: cumulative return, win rate vs market, mean, stdev, Sharpe-ish.">
  <title>Leaderboard — monkey-business.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --panel: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
      --text: #f1f5f9; --muted: #64748b; --accent: #7c3aed; --accent2: #06b6d4;
      --gain: #22c55e; --loss: #ef4444; --gold: #facc15;
      --mono: ui-monospace, 'SFMono-Regular', 'Menlo', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; position: relative; overflow-x: hidden; }
    body::before { content:''; position: fixed; inset: 0; background-image: linear-gradient(rgba(124,58,237,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.05) 1px, transparent 1px); background-size: 48px 48px; animation: gridMove 30s linear infinite; z-index: 0; pointer-events: none; }
    @keyframes gridMove { 0%{transform:translateY(0)} 100%{transform:translateY(48px)} }
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.18; z-index: 0; pointer-events: none; }
    .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -150px; }

    #subnav { position: sticky; top: 52px; z-index: 150; background: rgba(8,11,14,.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,.07); display: flex; justify-content: center; flex-wrap: wrap; gap: .2rem; padding: .4rem 1rem; }
    #subnav a { font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: #5a6070; padding: .3rem .65rem; border-radius: 3px; text-decoration: none; transition: color .2s, background .2s; font-family: var(--mono); }
    #subnav a:hover, #subnav a.active { color: var(--accent2); background: rgba(255,255,255,.06); }

    main { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 1.4rem 1.4rem 4rem; }
    h1 { font-size: 1.6rem; font-weight: 200; letter-spacing: .02em; }
    h1 b { font-weight: 600; background: linear-gradient(120deg, var(--accent2), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sub { color: var(--muted); font-size: .85rem; margin-top: .2rem; margin-bottom: 1.2rem; }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; backdrop-filter: blur(10px); padding: .5rem; }

    table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: .85rem; }
    th, td { padding: .55rem .8rem; text-align: right; border-bottom: 1px solid var(--border); }
    th { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); font-weight: 500; cursor: pointer; user-select: none; position: sticky; top: 0; background: rgba(8,11,14,.96); }
    th:first-child, td:first-child { text-align: center; width: 50px; }
    th:nth-child(2), td:nth-child(2) { text-align: left; }
    th.spark-h, td.spark-c { text-align: center; width: 92px; padding-left: 0; padding-right: 0; }
    .lb-row-spark { width: 84px; height: 22px; display: inline-block; vertical-align: middle; }
    .lb-row-spark.gain path { stroke: var(--gain); }
    .lb-row-spark.loss path { stroke: var(--loss); }
    .lb-row-spark.flat path { stroke: var(--muted); }
    .lb-row-spark path { fill: none; stroke-width: 1.4; stroke-linejoin: round; stroke-linecap: round; }
    .lb-row-spark .pending { stroke: var(--muted); opacity: .35; }
    th.sorted-asc::after  { content: ' ↑'; color: var(--accent2); }
    th.sorted-desc::after { content: ' ↓'; color: var(--accent2); }
    tr:hover td { background: rgba(255,255,255,0.025); }
    a.monkey-link { color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: .6rem; }
    a.monkey-link:hover { color: var(--accent2); }
    a.monkey-link small { color: var(--muted); margin-left: .4rem; font-size: .7rem; }
    .lb-avatar {
      display: inline-block; width: 32px; height: 32px;
      background-color: rgba(255,255,255,0.04);
      background-image: url('monkey-sprites.png');
      background-size: 320px 320px; /* native 32px cells, no scaling */
      background-repeat: no-repeat;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .gain { color: var(--gain); }
    .loss { color: var(--loss); }
    .rank-1 { color: var(--gold); font-weight: 600; }
    .rank-2 { color: #cbd5e1; }
    .rank-3 { color: #d97706; }
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    .cohort-bar { display: flex; gap: .4rem; margin-bottom: .9rem; align-items: center; flex-wrap: wrap; }
    .cohort-bar .lbl { font-family: var(--mono); font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-right: .2rem; }
    .cohort-bar button {
      font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted);
      padding: .35rem .7rem; border-radius: 4px; cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
    }
    .cohort-bar button:hover { color: var(--text); }
    .cohort-bar button.active { color: var(--accent2); border-color: rgba(6,182,212,.5); background: rgba(6,182,212,.08); }
    .cohort-bar .summary { margin-left: auto; font-family: var(--mono); font-size: .72rem; color: var(--muted); }
    .cohort-bar .summary .gain { color: var(--gain); }
    .cohort-bar .summary .loss { color: var(--loss); }
    .cohort-cell { font-family: var(--mono); font-size: .65rem; letter-spacing: .1em; text-align: center; }
    .cohort-cell .pill {
      display: inline-block; padding: .08rem .45rem; border-radius: 3px;
      border: 1px solid; line-height: 1.4;
    }
    .cohort-cell .pill.random  { color: var(--gold);   border-color: rgba(250,204,21,.4); background: rgba(250,204,21,.06); }
    .cohort-cell .pill.persona { color: var(--accent); border-color: rgba(124,58,237,.45); background: rgba(124,58,237,.08); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav id="subnav">
    <a href="index.html">Arena</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="market.html">Market</a>
    <a href="winners.html">Market Performers</a>
    <a href="history.html">History</a>
    <a href="distribution.html">Distribution</a>
    <a href="monkey.html">Monkeys</a>
    <a href="status.html">Status</a>
    <a href="about.html">About</a>
  </nav>

  <main>
    <h1>The <b>Leaderboard</b></h1>
    <div class="sub">Every monkey, every metric. Click a column to re-sort.</div>

    <div class="cohort-bar">
      <span class="lbl">Filter</span>
      <button data-cohort="all"     class="active">All 100</button>
      <button data-cohort="random">🎲 Random Cohort (1–50)</button>
      <button data-cohort="persona">🎯 Persona Cohort (51–100)</button>
      <span class="summary" id="cohort-summary">—</span>
    </div>

    <div class="panel">
      <table id="lb">
        <thead>
          <tr>
            <th data-key="rank" class="sorted-asc">#</th>
            <th data-key="name">Monkey</th>
            <th>Cohort</th>
            <th class="spark-h">Trend</th>
            <th data-key="rounds">Rounds</th>
            <th data-key="cumPct">Cumulative</th>
            <th data-key="meanPct">Mean / round</th>
            <th data-key="stdev">Stdev</th>
            <th data-key="sharpeish">Mean / σ</th>
            <th data-key="winRate">Beat market</th>
          </tr>
        </thead>
        <tbody><tr><td class="empty" colspan="10">loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { getLeaderboard, getSparks } from './api.js';
    import { cohort } from './persona.js';

    let sparkData = new Map();
    function buildRowSpark(rec) {
      const W = 84, H = 22, padY = 2;
      if (!rec || !rec.rounds || !rec.points || rec.points.length < 2) {
        return `<svg class="lb-row-spark flat" viewBox="0 0 ${W} ${H}"><line x1="2" y1="${H/2}" x2="${W-2}" y2="${H/2}" class="pending" stroke-dasharray="2,2"></line></svg>`;
      }
      const pts = rec.points;
      const last = pts[pts.length - 1];
      const cls = last > 0.0005 ? 'gain' : last < -0.0005 ? 'loss' : 'flat';
      let lo = Math.min(...pts, 0), hi = Math.max(...pts, 0);
      if (hi - lo < 1e-6) { hi += 1e-6; lo -= 1e-6; }
      const dx = (W - 4) / (pts.length - 1);
      const yOf = v => padY + (1 - (v - lo) / (hi - lo)) * (H - padY * 2);
      let d = `M 2 ${yOf(pts[0]).toFixed(2)}`;
      for (let i = 1; i < pts.length; i++) d += ` L ${(2 + i * dx).toFixed(2)} ${yOf(pts[i]).toFixed(2)}`;
      return `<svg class="lb-row-spark ${cls}" viewBox="0 0 ${W} ${H}"><path d="${d}"></path></svg>`;
    }

    function pct(x, d=2) {
      if (x===null || x===undefined || !Number.isFinite(x)) return '—';
      return (x>=0?'+':'') + (x*100).toFixed(d) + '%';
    }
    function num(x, d=3) {
      if (x===null || x===undefined || !Number.isFinite(x)) return '—';
      return x.toFixed(d);
    }
    function cls(x) { return x>0?'gain':x<0?'loss':''; }

    let monkeys = [];
    let sortKey = 'cumPct';
    let sortAsc = false;
    let cohortFilter = 'all';

    function render() {
      const filtered = cohortFilter === 'all'
        ? monkeys
        : monkeys.filter(m => cohort(m.id) === cohortFilter);
      const sorted = [...filtered].sort((a,b) => {
        const av = a[sortKey], bv = b[sortKey];
        if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
        return sortAsc ? av - bv : bv - av;
      });
      renderCohortSummary();
      const tbody = document.querySelector('#lb tbody');
      if (sorted.length === 0) {
        tbody.innerHTML = '<tr><td class="empty" colspan="10">No data yet — the first round may still be in flight.</td></tr>';
        return;
      }
      tbody.innerHTML = sorted.map((m, i) => {
        const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
        const idx = m.id - 1;
        const sx = (idx % 10) * 32, sy = ((idx / 10) | 0) * 32;
        const c = cohort(m.id);
        const cohortLabel = c === 'random' ? '🎲 R' : '🎯 P';
        return `<tr>
          <td class="${rankCls}">${i+1}</td>
          <td><a class="monkey-link" href="monkey.html?id=${m.id}"><span class="lb-avatar" style="background-position:-${sx}px -${sy}px;"></span><span>${m.name}<small>#${m.id}</small></span></a></td>
          <td class="cohort-cell"><span class="pill ${c}">${cohortLabel}</span></td>
          <td class="spark-c">${buildRowSpark(sparkData.get(m.id))}</td>
          <td>${m.rounds}</td>
          <td class="${cls(m.cumPct)}">${pct(m.cumPct,2)}</td>
          <td class="${cls(m.meanPct)}">${pct(m.meanPct,3)}</td>
          <td>${num(m.stdev*100,2)}%</td>
          <td>${num(m.sharpeish,3)}</td>
          <td>${(m.winRate*100).toFixed(0)}%</td>
        </tr>`;
      }).join('');
      document.querySelectorAll('th[data-key]').forEach(th => {
        th.classList.remove('sorted-asc','sorted-desc');
        if (th.dataset.key === sortKey) th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
      });
    }

    document.querySelectorAll('th[data-key]').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.dataset.key;
        if (k === 'rank') return;
        if (k === sortKey) sortAsc = !sortAsc; else { sortKey = k; sortAsc = (k === 'name'); }
        render();
      });
    });

    document.querySelectorAll('.cohort-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        cohortFilter = btn.dataset.cohort;
        document.querySelectorAll('.cohort-bar button').forEach(b => b.classList.toggle('active', b === btn));
        render();
      });
    });

    function fmtPct(x) { return (x>=0?'+':'') + (x*100).toFixed(2) + '%'; }
    function renderCohortSummary() {
      if (!monkeys.length) return;
      const r = monkeys.filter(m => cohort(m.id) === 'random');
      const p = monkeys.filter(m => cohort(m.id) === 'persona');
      const avg = arr => arr.reduce((s, m) => s + (m.cumPct || 0), 0) / Math.max(1, arr.length);
      const rA = avg(r), pA = avg(p);
      const rCls = rA >= 0 ? 'gain' : 'loss';
      const pCls = pA >= 0 ? 'gain' : 'loss';
      const lead = pA > rA ? 'Persona' : pA < rA ? 'Random' : 'Tied';
      const gap  = Math.abs(pA - rA);
      document.getElementById('cohort-summary').innerHTML =
        `Random avg <span class="${rCls}">${fmtPct(rA)}</span> · ` +
        `Persona avg <span class="${pCls}">${fmtPct(pA)}</span> · ` +
        `<b>${lead}</b> ahead by ${(gap*100).toFixed(2)}%`;
    }

    document.querySelectorAll('#subnav a').forEach(a => {
      const href = a.getAttribute('href');
      const path = location.pathname;
      if (path.endsWith(href)) a.classList.add('active');
    });

    async function refresh() {
      try {
        const [lb, sp] = await Promise.all([getLeaderboard(), getSparks().catch(() => null)]);
        monkeys = lb.monkeys;
        if (sp && sp.monkeys) sparkData = new Map(sp.monkeys.map(m => [m.id, m]));
        render();
      } catch (e) { console.warn(e); }
    }
    refresh();
    setInterval(refresh, 30_000);
  </script>

  <script src="nav-sound.js"></script>
  <script src="/shared/nav.js?v=5"></script>
</body>
</html>
