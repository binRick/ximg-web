<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0f1a"/>
  <!-- Options payoff chart (hockey stick) -->
  <line x1="4" y1="28" x2="28" y2="28" stroke="#4b5563" stroke-width="1"/>
  <line x1="4" y1="4" x2="4" y2="28" stroke="#4b5563" stroke-width="1"/>
  <!-- Call option payoff line -->
  <polyline points="4,22 16,22 28,10" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Strike price marker -->
  <line x1="16" y1="26" x2="16" y2="28" stroke="#f59e0b" stroke-width="2"/>
</svg>
