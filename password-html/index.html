/* Generator */

<!-- GENERATOR -->
<div id="generator" class="tab-panel active">

<script>
// ── TAB SWITCHING ──────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ── GENERATOR ─────────────────────────────────────────────────
const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LOWER = 'abcdefghijklmnopqrstuvwxyz';
const NUMS  = '0123456789';
const SYMS  = '!@#$%^&*-+=<>?';
const SYMS_FULL = '!@#$%^&*-+=<>?,./;:~';
const SIMILAR = '0O1lI';
const AMBIG = '{}[]()\/\'"\\|';

function buildCharset() {
  let cs = '';
  if (document.getElementById('useUpper').checked) cs += UPPER;
  if (document.getElementById('useLower').checked) cs += LOWER;
  if (document.getElementById('useNums').checked)  cs += NUMS;
  if (document.getElementById('useSyms').checked)  cs += SYMS_FULL;
  if (document.getElementById('exclSimilar').checked) cs = cs.split('').filter(c=>!SIMILAR.includes(c)).join('');
  if (document.getElementById('exclAmbig').checked)   cs = cs.split('').filter(c=>!AMBIG.includes(c)).join('');
  return cs || LOWER;
}

function genPassword(len, charset) {
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, v => charset[v % charset.length]).join('');
}

let regenTimer;
function schedRegen() { clearTimeout(regenTimer); regenTimer = setTimeout(regenAll, 80); }

function regenAll() {
  const len = parseInt(document.getElementById('pwLen').value);
  const qty = Math.max(1,Math.min(20,parseInt(document.getElementById('pwQty').value)||5));
  const charset = buildCharset();
  const passwords = Array.from({length:qty},()=>genPassword(len,charset));
  const list = document.getElementById('pwList');
  list.innerHTML = passwords.map((pw,i)=>`
    <div class="pw-item" id="pwitem${i}">
      <div class="pw-text" id="pwtext${i}">${escH(pw)}</div>
      <button class="pw-copy" onclick="copyPW(${i},this)">Copy</button>
    </div>`).join('');
  // store
  list._passwords = passwords;
}

function copyPW(i, btn) {
  const pw = document.getElementById('pwList')._passwords[i];
  navigator.clipboard.writeText(pw).then(()=>{
    const orig = btn.textContent; btn.textContent='Copied!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copied'); },1500);
  });
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── STRENGTH ───────────────────────────────────────────────────
function toggleShow() {
  const inp = document.getElementById('strengthInput');
  const btn = inp.nextElementSibling;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}

const COMMON_PATTERNS = [
  [/(.)\1{2,}/,'Repeated character(s)'],
  [/(?:012|123|234|345|456|567|678|789|890|987|876|765|654|543|432|321|210)/i,'Sequential numbers'],
  [/(?:abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz)/i,'Sequential letters'],
  [/(?:qwerty|asdfg|zxcvb|qweasd|uiop|hjkl)/i,'Keyboard walk detected'],
  [/^[a-zA-Z]+$/, 'Only letters — no numbers or symbols'],
  [/^[0-9]+$/, 'Only numbers'],
  [/password|passwd|letmein|welcome|admin|login|qwerty|abc123|111111|iloveyou|sunshine|princess|monkey|dragon/i,'Common password pattern detected'],
];

function calcEntropy(pw) {
  let cs = 0;
  if (/[a-z]/.test(pw)) cs += 26;
  if (/[A-Z]/.test(pw)) cs += 26;
  if (/[0-9]/.test(pw)) cs += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) cs += 32;
  return pw.length * Math.log2(Math.max(cs, 2));
}

function formatTime(seconds) {
  if (seconds < 1e-6) return 'Instant';
  if (seconds < 1) return `${(seconds*1000).toFixed(1)} ms`;
  if (seconds < 60) return `${seconds.toFixed(1)} s`;
  if (seconds < 3600) return `${(seconds/60).toFixed(1)} min`;
  if (seconds < 86400) return `${(seconds/3600).toFixed(1)} hr`;
  if (seconds < 86400*365) return `${(seconds/86400).toFixed(0)} days`;
  if (seconds < 86400*365*1000) return `${(seconds/(86400*365)).toFixed(0)} years`;
  if (seconds < 86400*365*1e9) return `${(seconds/(86400*365*1e6)).toFixed(1)} million years`;
  return `${(seconds/(86400*365*1e12)).toFixed(1)} trillion years`;
}

function analyzeStrength() {
  const pw = document.getElementById('strengthInput').value;
  const meter = document.getElementById('strengthMeter');
  if (!pw) { meter.style.display='none'; return; }
  meter.style.display='block';

  const entropy = calcEntropy(pw);
  let cs = 0;
  if (/[a-z]/.test(pw)) cs += 26;
  if (/[A-Z]/.test(pw)) cs += 26;
  if (/[0-9]/.test(pw)) cs += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) cs += 32;

  // Strength label
  let label, color, pct;
  if (entropy < 28)      { label='Very Weak'; color='#ef4444'; pct=10; }
  else if (entropy < 40) { label='Weak';      color='#f97316'; pct=25; }
  else if (entropy < 60) { label='Fair';      color='#eab308'; pct=50; }
  else if (entropy < 80) { label='Strong';    color='#22c55e'; pct=75; }
  else                   { label='Very Strong'; color='#22d3ee'; pct=100; }

  document.getElementById('strengthLabel').innerHTML = `<span style="color:${color}">${label}</span>`;
  const fill = document.getElementById('meterFill');
  fill.style.width = pct+'%'; fill.style.background = color;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-item"><div class="stat-label">Length</div><div class="stat-val">${pw.length}</div></div>
    <div class="stat-item"><div class="stat-label">Entropy</div><div class="stat-val">${entropy.toFixed(1)} bits</div></div>
    <div class="stat-item"><div class="stat-label">Charset size</div><div class="stat-val">${cs}</div></div>
    <div class="stat-item"><div class="stat-label">Possible combos</div><div class="stat-val">10<sup>${(entropy/3.32).toFixed(0)}</sup></div></div>
  `;

  const attacks = [
    ['Online (throttled)', 100, '100 guesses/sec'],
    ['Online (fast)', 10000, '10K guesses/sec'],
    ['Offline (bcrypt)', 1e6, '1M guesses/sec'],
    ['Offline (MD5/fast)', 1e10, '10B guesses/sec'],
    ['Offline (GPU cluster)', 1e12, '1T guesses/sec'],
  ];
  const guesses = Math.pow(2, entropy);
  document.getElementById('crackTable').innerHTML = attacks.map(([name,gps,desc])=>{
    const secs = guesses/gps;
    const rowColor = secs < 3600 ? '#f87171' : secs < 86400*365 ? '#fbbf24' : '#86efac';
    return `<tr><td>${name}<br><span style="font-size:.75rem;color:#64748b">${desc}</span></td><td style="color:#64748b">${gps.toLocaleString()}</td><td style="color:${rowColor};font-weight:600">${formatTime(secs)}</td></tr>`;
  }).join('');

  const patternEl = document.getElementById('patternList');
  const detected = COMMON_PATTERNS.filter(([rx])=>rx.test(pw));
  if (detected.length) {
    patternEl.innerHTML = '<h3 style="margin-bottom:.5rem;color:#f59e0b">Patterns Detected:</h3>' +
      detected.map(([,msg])=>`<div class="pattern-item">${msg}</div>`).join('');
  } else {
    patternEl.innerHTML = '<div class="pattern-item ok">No common patterns detected.</div>';
  }
}

];

function genPassphrase() {
  const count = parseInt(document.getElementById('ppCount').value);
  const sep = document.getElementById('ppSep').value;
  const cap = document.getElementById('ppCapitalize').checked;
  const num = document.getElementById('ppNumber').checked;

  const arr = new Uint32Array(count);
  crypto.getRandomValues(arr);
  const words = Array.from(arr, v => {
    let w = WORDLIST[v % WORDLIST.length];
    return cap ? w[0].toUpperCase() + w.slice(1) : w;
  });

  let numSuffix = '';
  if (num) {
    const n = new Uint32Array(1); crypto.getRandomValues(n);
    numSuffix = sep + (n[0] % 9000 + 1000);
  }

  const phrase = words.join(sep) + numSuffix;
  document.getElementById('ppDisplay').textContent = phrase;

  // Entropy: log2(WORDLIST.length ^ count) + extras
  const entropy = count * Math.log2(WORDLIST.length) + (num ? Math.log2(9000) : 0);
  document.getElementById('ppEntropy').textContent = `Entropy: ~${entropy.toFixed(1)} bits — wordlist: ${WORDLIST.length} words`;
}

function copyPhrase() {
  const phrase = document.getElementById('ppDisplay').textContent;
  if (!phrase) return;
  navigator.clipboard.writeText(phrase).then(()=>{
    const btn = event.target;
    const orig = btn.textContent; btn.textContent='Copied!';
    setTimeout(()=>btn.textContent=orig, 1500);
  });
}

// Init
regenAll();
genPassphrase();
</script>
