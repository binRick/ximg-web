    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }

    .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--amber); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }

    .timeline { display: flex; flex-direction: column; gap: .75rem; }

    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--crimson); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    .rev1917-list { display: flex; flex-direction: column; gap: .6rem; }
    .rev1917-item { display: grid; grid-template-columns: 90px 1fr; gap: .75rem; align-items: start; }
    .rev1917-date { font-size: .82rem; font-weight: 700; color: var(--bright-red); padding-top: .15rem; text-align: right; white-space: nowrap; }
    .rev1917-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--bright-red); border-radius: 0 8px 8px 0; padding: .55rem .8rem; font-size: .82rem; color: var(--text); line-height: 1.45; }
    .rev1917-body strong { color: var(--amber); }
    #star-canvas { width: 100%; height: 320px; border: 1px solid var(--border); border-radius: 10px; background: rgba(3,3,5,.9); display: block; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(3,3,5,.93); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(192,57,43,.08); }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } .rev1917-item { grid-template-columns: 70px 1fr; } }
    .card-img { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 6px; margin-bottom: .75rem; filter: sepia(30%) brightness(.82); transition: filter .3s; display: block; }
    .card-img:hover { filter: sepia(8%) brightness(1); }
    .tl-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 4px; margin-top: .65rem; filter: sepia(30%) brightness(.85); transition: filter .3s; display: block; }
    .tl-img:hover { filter: sepia(8%) brightness(1); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .gallery-card:hover { border-color: var(--bright-red); transform: translateY(-2px); }
    .gallery-img { width: 100%; height: 220px; object-fit: cover; display: block; filter: sepia(25%) brightness(.85); transition: filter .3s; }
    .gallery-img:hover { filter: sepia(5%) brightness(1.05); }
    .gallery-info { padding: .6rem .85rem .8rem; }

<script>
(function(){
  const c = document.getElementById('rev-canvas');
  const ctx = c.getContext('2d');
  let W, H;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const PARTICLE_COUNT = 40;
  const particles = [];
  for(let i = 0; i < PARTICLE_COUNT; i++){
    particles.push({
      x: Math.random() * 1000,
      y: Math.random() * 1000,
      r: 0.5 + Math.random() * 2.5,
      speed: 0.3 + Math.random() * 0.7,
      drift: (Math.random() - 0.5) * 0.3,
      alpha: 0.3 + Math.random() * 0.7
    });
  }

  function frame(){
    ctx.clearRect(0, 0, W, H);
    for(let p of particles){
      p.y += p.speed;
      p.x += p.drift;
      if(p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
      if(p.x > W + 10) { p.x = -10; }
      if(p.x < -10) { p.x = W + 10; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  // Initialize particle positions using canvas dimensions
  for(let p of particles){
    p.x = Math.random() * window.innerWidth;
    p.y = Math.random() * window.innerHeight;
  }
  frame();
})();
</script>

// Red Star interactive canvas
</script>
<script>
(function(){
  const c = document.getElementById('star-canvas');
  const ctx = c.getContext('2d');

  function resize(){
    c.width = c.offsetWidth;
    c.height = 320;
  }
  resize();
  window.addEventListener('resize', function(){
    resize();
  });

  let angle = 0;
  let pulse = 0;

  function drawStar(ctx, cx, cy, outerR, innerR, points, rot){
    ctx.beginPath();
    for(let i = 0; i < points * 2; i++){
      const r = (i % 2 === 0) ? outerR : innerR;
      const a = rot + (i * Math.PI / points);
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function drawHammerSickle(ctx, cx, cy, scale, rot){
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.scale(scale, scale);

    // Sickle — arc representing the blade
    ctx.beginPath();
    ctx.arc(10, -8, 18, Math.PI * 1.1, Math.PI * 1.85);
    ctx.strokeStyle = 'rgba(200,160,44,0.85)';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Sickle handle
    ctx.beginPath();
    ctx.moveTo(10 + Math.cos(Math.PI * 1.85) * 18, -8 + Math.sin(Math.PI * 1.85) * 18);
    ctx.lineTo(22, 8);
    ctx.strokeStyle = 'rgba(200,160,44,0.85)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Hammer head
    ctx.fillStyle = 'rgba(200,160,44,0.85)';
    ctx.fillRect(-22, -16, 10, 7);

    // Hammer handle
    ctx.beginPath();
    ctx.moveTo(-12, -12);
    ctx.lineTo(6, 10);
    ctx.strokeStyle = 'rgba(200,160,44,0.85)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.restore();
  }

  function frame(){
    const W = c.width, H = c.height;
    const cx = W / 2, cy = H / 2;
    ctx.clearRect(0, 0, W, H);

    angle += 0.008;
    pulse += 0.04;
    const glowSize = 60 + Math.sin(pulse) * 12;
    const starR = Math.min(W, H) * 0.32;
    const innerR = starR * 0.38;

    // Outer glow rings
    for(let ring = 4; ring >= 1; ring--){
      const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize * ring * 0.55);
      rg.addColorStop(0, `rgba(192,57,43,${0.06 / ring})`);
      rg.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(cx, cy, glowSize * ring * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = rg;
      ctx.fill();
    }

    // Rotating light rays
    for(let i = 0; i < 10; i++){
      const a = angle + (i * Math.PI * 2 / 10);
      const rayLen = starR * 1.6;
      const g = ctx.createLinearGradient(cx, cy, cx + Math.cos(a) * rayLen, cy + Math.sin(a) * rayLen);
      g.addColorStop(0, 'rgba(192,57,43,0.15)');
      g.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a) * rayLen, cy + Math.sin(a) * rayLen);
      ctx.strokeStyle = g;
      ctx.lineWidth = 8;
      ctx.stroke();
    }

    // Star shadow / depth
    ctx.save();
    ctx.shadowColor = 'rgba(192,57,43,0.6)';
    ctx.shadowBlur = 30 + Math.sin(pulse) * 10;
    drawStar(ctx, cx, cy, starR, innerR, 5, angle - Math.PI / 2);
    ctx.fillStyle = '#8b1a1a';
    ctx.fill();
    ctx.restore();

    // Star main fill with gradient
    drawStar(ctx, cx, cy, starR, innerR, 5, angle - Math.PI / 2);
    const sg = ctx.createRadialGradient(cx - starR * 0.2, cy - starR * 0.2, 0, cx, cy, starR);
    sg.addColorStop(0, '#e83030');
    sg.addColorStop(0.5, '#c0392b');
    sg.addColorStop(1, '#7a0a0a');
    ctx.fillStyle = sg;
    ctx.fill();

    // Star border
    drawStar(ctx, cx, cy, starR, innerR, 5, angle - Math.PI / 2);
    ctx.strokeStyle = 'rgba(220,80,60,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Inner circle
    ctx.beginPath();
    ctx.arc(cx, cy, innerR * 0.85, 0, Math.PI * 2);
    const ig = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR * 0.85);
    ig.addColorStop(0, 'rgba(10,3,3,0.7)');
    ig.addColorStop(1, 'rgba(58,10,10,0.5)');
    ctx.fillStyle = ig;
    ctx.fill();

    // Hammer and sickle (counter-rotate slightly so it doesn't spin too fast)
    drawHammerSickle(ctx, cx, cy, innerR * 0.045, angle * 0.1);

    // Outer ring border
    ctx.beginPath();
    ctx.arc(cx, cy, starR + 8, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(192,57,43,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
