<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="American Revolution">
  <title>American Revolution — 1776 &amp; the Birth of Freedom</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦅</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #02040a; --navy: #0a1040; --red: #8b1a1a; --blue: #1a3a8b; --gold: #c8902c; --amber: #e0aa50; --white: #d8dce8; --text: #c0c8d8; --muted: #304060; --card: rgba(2,4,10,.94); --border: rgba(200,144,44,.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(26,58,139,.12) 0%, transparent 60%), linear-gradient(180deg, #02040a 0%, #010208 100%); }
    #revolution-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(200,144,44,.5)); }
    .hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; color: var(--amber); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(200,144,44,.1); border: 1px solid var(--border); border-radius: 6px; padding: .35rem 1rem; font-size: .85rem; color: var(--gold); letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .quote-box { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--gold); border-radius: 0 10px 10px 0; padding: 1rem 1.25rem; margin-bottom: .75rem; }
    .quote-text { font-size: .95rem; color: var(--amber); font-style: italic; line-height: 1.6; }
    .quote-attr { font-size: .8rem; color: var(--muted); margin-top: .5rem; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 110px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    #flag-canvas { width: 100%; height: 220px; border: 1px solid var(--border); border-radius: 10px; background: rgba(2,4,10,.8); cursor: pointer; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(2,4,10,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(200,144,44,.07); }
    .card-img { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 6px; margin-bottom: .75rem; filter: sepia(25%) brightness(.85); transition: filter .3s; display: block; }
    .card-img:hover { filter: sepia(8%) brightness(1); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .gallery-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .gallery-img { width: 100%; height: 220px; object-fit: cover; display: block; filter: sepia(25%) brightness(.85); transition: filter .3s; }
    .gallery-img:hover { filter: sepia(8%) brightness(1.05); }
    .gallery-info { padding: .6rem .85rem .8rem; }
    .gallery-title { font-size: .88rem; color: var(--amber); font-weight: 700; margin-bottom: .2rem; }
    .gallery-caption { font-size: .76rem; color: var(--muted); font-style: italic; line-height: 1.4; }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } }
  </style>

<body>
<canvas id="revolution-canvas"></canvas>

<script>
document.querySelectorAll('.sub-nav a').forEach(function(a){
  var h = a.getAttribute('href');
  var p = location.pathname;
  if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/revolution') || p.endsWith('index.html')))) {
    a.classList.add('active');
  }
});

<div class="wrap">
<section id="flag">
<div class="section-title">The Flag — Stars and Stripes</div>
    <canvas id="flag-canvas"></canvas>
    <div class="canvas-label">Click to add a star — the flag grows as new states join the Union</div>
</section>
</div>
<script>
(function(){
  const c = document.getElementById('revolution-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const stars = Array.from({length:80}, () => ({ x: Math.random(), y: Math.random()*0.5, r: Math.random()*1.2+.3, a: Math.random()*Math.PI*2 }));
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.006;
    stars.forEach(s => {
      s.a += 0.003;
      ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,220,255,${0.2+0.15*Math.sin(s.a)})`; ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script>
(function(){
  const c = document.getElementById('flag-canvas');
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 220;
  const W = c.width, H = c.height;
  let t = 0, extraStars = [];
  const flagW = W*0.6, flagH = H*0.75;
  const flagX = (W-flagW)/2, flagY = (H-flagH)/2;
  c.addEventListener('click', e => {
    const r = c.getBoundingClientRect();
    extraStars.push({ x: e.clientX-r.left, y: e.clientY-r.top, alpha: 1 });
  });
  function drawStar(cx, cy, size, alpha){
    ctx.save(); ctx.translate(cx,cy); ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a = (i*72-90)*Math.PI/180;
      const ia = ((i+0.5)*72-90)*Math.PI/180;
      if(i===0) ctx.moveTo(Math.cos(a)*size, Math.sin(a)*size);
      else ctx.lineTo(Math.cos(a)*size, Math.sin(a)*size);
      ctx.lineTo(Math.cos(ia)*(size*0.4), Math.sin(ia)*(size*0.4));
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.02;
    ctx.fillStyle = 'rgba(2,4,10,.95)'; ctx.fillRect(0,0,W,H);
    // Flag stripes wave
    const stripes = 13;
    const sh = flagH/stripes;
    for(let i=0;i<stripes;i++){
      for(let x=0;x<=flagW;x+=3){
        const wave = Math.sin(x/40 + t + i*0.5)*4;
        const fy = flagY + i*sh + wave;
        ctx.fillStyle = i%2===0 ? `rgba(180,30,30,1)` : `rgba(220,220,220,1)`;
        ctx.fillRect(flagX+x, fy, 3, sh+1);
      }
    }
    // Canton (blue field)
    const cantonW = flagW*0.38, cantonH = flagH*7/13;
    for(let x=0;x<=cantonW;x+=3){
      const wave = Math.sin(x/40 + t)*4;
      ctx.fillStyle = 'rgba(20,40,120,1)';
      ctx.fillRect(flagX+x, flagY+wave, 3, cantonH);
    }
    // Stars (13 original)
    const cols = 6, rows = 5;
    const sw = cantonW/(cols+1), srh = cantonH/(rows+1);
    let starCount = 0;
    for(let row=0;row<rows&&starCount<13;row++){
      const rowCols = row%2===0 ? cols : cols-1;
      const rowOffset = row%2===0 ? 0 : sw/2;
      for(let col=0;col<rowCols&&starCount<13;col++){
        const sx = flagX+sw+col*sw+rowOffset;
        const sy = flagY+srh+row*srh+Math.sin(sx/40+t)*4;
        drawStar(sx,sy,4,1);
        starCount++;
      }
    }
    // Extra stars (clicked)
    extraStars.forEach(s => {
      s.alpha = Math.min(1, s.alpha);
      drawStar(s.x, s.y, 8, s.alpha);
      // Sparkle
      for(let i=0;i<5;i++){
        const sa = (i/5)*Math.PI*2 + t*3;
        ctx.beginPath(); ctx.arc(s.x+Math.cos(sa)*15, s.y+Math.sin(sa)*15, 2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,220,100,${s.alpha*0.6})`; ctx.fill();
      }
    });
    // Pole
    ctx.strokeStyle = 'rgba(200,160,80,.6)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(flagX,flagY-10); ctx.lineTo(flagX,H); ctx.stroke();
    // Label
    ctx.font = '11px Georgia'; ctx.fillStyle = 'rgba(200,144,44,.6)'; ctx.textAlign = 'center';
    ctx.fillText('July 4, 1776 — E PLURIBUS UNUM', W/2, H-8);
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script src="/shared/nav.js?v=3"></script>
