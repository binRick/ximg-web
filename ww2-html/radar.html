  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #040508; --olive: #1a2010; --green: #2a4018; --khaki: #7a6a38; --gold: #c8a02c; --amber: #e0c050; --red: #8b1a1a; --text: #c8c0a0; --muted: #405030; --card: rgba(4,5,8,.94); --border: rgba(200,160,44,.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(42,64,24,.15) 0%, transparent 60%), linear-gradient(180deg, #040508 0%, #010204 100%); }
    #ww2-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.12; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(200,160,44,.4)); }
    .hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; color: var(--amber); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(200,160,44,.1); border: 1px solid var(--border); border-radius: 6px; padding: .35rem 1rem; font-size: .85rem; color: var(--gold); letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 1rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-icon { font-size: 1.8rem; margin-bottom: .4rem; }
    .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--amber); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 110px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--khaki); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    #radar-canvas { width: 100%; height: 220px; border: 1px solid var(--border); border-radius: 10px; background: rgba(4,5,8,.8); cursor: pointer; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(4,5,8,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(200,160,44,.07); }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } }
    .card-img { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 6px; margin-bottom: .75rem; filter: sepia(30%) brightness(.82); transition: filter .3s; display: block; }
    .card-img:hover { filter: sepia(8%) brightness(1); }
    .tl-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 4px; margin-top: .65rem; filter: sepia(30%) brightness(.85); transition: filter .3s; display: block; }
    .tl-img:hover { filter: sepia(8%) brightness(1); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .gallery-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .gallery-img { width: 100%; height: 220px; object-fit: cover; display: block; filter: sepia(25%) brightness(.85); transition: filter .3s; }
    .gallery-img:hover { filter: sepia(5%) brightness(1.05); }
    .gallery-info { padding: .6rem .85rem .8rem; }
    .gallery-title { font-size: .88rem; color: var(--amber); font-weight: 700; margin-bottom: .2rem; }
    .gallery-caption { font-size: .76rem; color: var(--muted); font-style: italic; line-height: 1.4; }
  </style>

<div class="wrap">
<section id="radar">
<div class="section-title">WWII Radar — Eyes in the Dark</div>
    <canvas id="radar-canvas"></canvas>
    <div class="canvas-label">Click to add contacts — radar sweeps the sky for enemy aircraft like the Chain Home system defending Britain</div>
</section>
</div>
<script>
(function(){
  const c = document.getElementById('ww2-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.008;
    // Searchlights
    for(let i=0;i<4;i++){
      const bx = (i+1)*W/5, by = H;
      const ang = Math.sin(t*0.5+i*1.2)*0.4 - 0.8;
      const len = H*0.8;
      const g = ctx.createLinearGradient(bx,by,bx+Math.cos(ang)*len,by+Math.sin(ang)*len);
      g.addColorStop(0,'rgba(200,180,100,.06)'); g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+Math.cos(ang)*len,by+Math.sin(ang)*len);
      ctx.strokeStyle = g; ctx.lineWidth = 30; ctx.stroke();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script>
(function(){
  const c = document.getElementById('radar-canvas');
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 220;
  const W = c.width, H = c.height;
  const cx = W/2, cy = H/2, R = Math.min(cx,cy)-10;
  let angle = 0, contacts = [], blips = [];
  c.addEventListener('click', e => {
    const r = c.getBoundingClientRect();
    const rx = e.clientX-r.left-cx, ry = e.clientY-r.top-cy;
    if(Math.sqrt(rx*rx+ry*ry) < R) contacts.push({ x: rx, y: ry, alpha: 1 });
  });
  // Random initial contacts
  for(let i=0;i<5;i++){
    const a = Math.random()*Math.PI*2, d = Math.random()*(R-20)+10;
    contacts.push({ x: Math.cos(a)*d, y: Math.sin(a)*d, alpha: 0.5+Math.random()*0.5 });
  }
  function frame(){
    ctx.clearRect(0,0,W,H);
    // Background
    ctx.fillStyle = 'rgba(0,10,0,.98)'; ctx.fillRect(0,0,W,H);
    // Grid circles
    for(let i=1;i<=4;i++){
      ctx.beginPath(); ctx.arc(cx,cy,R*i/4,0,Math.PI*2);
      ctx.strokeStyle = `rgba(0,180,0,${0.12+i*0.03})`; ctx.lineWidth = 1; ctx.stroke();
    }
    // Cross hairs
    ctx.strokeStyle = 'rgba(0,180,0,.1)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
    // Sweep
    angle += 0.04;
    const sweepX = cx + Math.cos(angle)*R, sweepY = cy + Math.sin(angle)*R;
    const sg = ctx.createConicalGradient ? null : null;
    // Draw sweep trail
    for(let trail=0;trail<20;trail++){
      const ta = angle - trail*0.04;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,R,ta,ta+0.04);
      ctx.closePath();
      ctx.fillStyle = `rgba(0,200,0,${(20-trail)/20*0.08})`; ctx.fill();
    }
    // Sweep line
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(sweepX,sweepY);
    ctx.strokeStyle = 'rgba(0,255,0,.6)'; ctx.lineWidth = 2; ctx.stroke();
    // Detect contacts near sweep angle
    contacts.forEach(ct => {
      const cta = Math.atan2(ct.y, ct.x);
      const diff = ((angle - cta) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
      if(diff < 0.15) ct.alpha = 1;
      else ct.alpha = Math.max(0.05, ct.alpha - 0.005);
      ctx.beginPath(); ctx.arc(cx+ct.x, cy+ct.y, 4, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,255,0,${ct.alpha})`; ctx.fill();
    });
    // Center dot
    ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fillStyle='rgba(0,255,0,.8)'; ctx.fill();
    // Labels
    ctx.font='10px monospace'; ctx.fillStyle='rgba(0,200,0,.6)'; ctx.textAlign='center';
    ctx.fillText('CHAIN HOME RADAR', cx, H-8);
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
