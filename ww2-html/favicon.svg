<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0f1a"/>
  <!-- WW2 fighter plane silhouette -->
  <!-- Fuselage -->
  <ellipse cx="16" cy="16" rx="12" ry="3" fill="#6b7280"/>
  <!-- Wings -->
  <path d="M16 14 L8 8 L8 16 L16 16 Z" fill="#4b5563"/>
  <path d="M16 14 L24 8 L24 16 L16 16 Z" fill="#4b5563"/>
  <!-- Tail fins -->
  <path d="M26 15 L30 11 L30 17 Z" fill="#374151"/>
  <path d="M26 17 L30 21 L30 15 Z" fill="#374151"/>
  <!-- Propeller -->
  <ellipse cx="5" cy="16" rx="1.5" ry="5" fill="#9ca3af"/>
  <!-- Cockpit -->
  <ellipse cx="14" cy="15" rx="3" ry="2" fill="#1e3a5f"/>
  <!-- Star insignia -->
  <circle cx="18" cy="16" r="2" fill="#dc2626" opacity="0.8"/>
</svg>
