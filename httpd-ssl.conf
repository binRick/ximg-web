LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule rewrite_module modules/mod_rewrite.so

Listen 443

SSLPassPhraseDialog  builtin
SSLSessionCache        shmcb:/usr/local/apache2/logs/ssl_scache(512000)
SSLSessionCacheTimeout  300

<VirtualHost *:80>
    ServerName ximg.app
    ServerAlias www.ximg.app

    # Allow ACME challenge through before redirecting
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://ximg.app$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName ximg.app
    ServerAlias www.ximg.app

    DocumentRoot /usr/local/apache2/htdocs

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/ximg.app/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ximg.app/privkey.pem

    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off
    Header always set Strict-Transport-Security "max-age=63072000"

    <Directory /usr/local/apache2/htdocs>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
