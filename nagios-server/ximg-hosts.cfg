# ─────────────────────────────────────────────────────────────────────────────
# Commands
# ─────────────────────────────────────────────────────────────────────────────

define command {
    command_name    check_https_vhost
    command_line    $USER1$/check_http -H '$HOSTADDRESS$' -S --sni -p 443 -t 15 -w 3 -c 8
}

define command {
    command_name    check_https_cert
    command_line    $USER1$/check_http -H '$HOSTADDRESS$' -S --sni -p 443 -C 30,14 -t 15
}

define command {
    command_name    check_smtp_25
    command_line    $USER1$/check_smtp -H '$HOSTADDRESS$' -p 25 -t 10
}

define command {
    command_name    check_tcp_22
    command_line    $USER1$/check_tcp -H '$HOSTADDRESS$' -p 22 -t 10
}

define command {
    command_name    check_tcp_3000
    command_line    $USER1$/check_tcp -H '$HOSTADDRESS$' -p 3000 -t 10
}

define command {
    command_name    check_dummy_ok
    command_line    $USER1$/check_dummy 0 "OK"
}

define command {
    command_name    check_docker
    command_line    python3 /opt/nagios/libexec/check_docker.py '$ARG1$'
}

define command {
    command_name    check_suricata_freshness
    command_line    /opt/nagios/libexec/check_suricata.sh
}

