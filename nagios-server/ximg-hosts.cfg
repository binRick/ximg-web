# ─────────────────────────────────────────────────────────────────────────────
# Commands
# ─────────────────────────────────────────────────────────────────────────────

# HTTPS check: resolves address field as FQDN, connects to 443 with SNI
define command {
    command_name    check_https_vhost
    command_line    $USER1$/check_http -H '$HOSTADDRESS$' -S --sni -p 443 -t 15
}

# TCP port 22 check (SSH honeypot)
define command {
    command_name    check_tcp_22
    command_line    $USER1$/check_tcp -H '$HOSTADDRESS$' -p 22 -t 10
}

# ─────────────────────────────────────────────────────────────────────────────
# Host template
# ─────────────────────────────────────────────────────────────────────────────

define host {
    name                    ximg-web-host
    use                     generic-host
    check_command           check_https_vhost
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    contact_groups          admins
    register                0
}

