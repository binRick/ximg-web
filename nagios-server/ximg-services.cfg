# ─────────────────────────────────────────────────────────────────────────────
# Service templates
# ─────────────────────────────────────────────────────────────────────────────

define service {
    name                    ximg-web-service
    use                     generic-service
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    contact_groups          admins
    register                0
}

define service {
    name                    ximg-cert-service
    use                     generic-service
    max_check_attempts      3
    check_interval          60
    retry_interval          10
    check_period            24x7
    notification_interval   720
    notification_period     24x7
    contact_groups          admins
    register                0
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS status + response time — all web hosts via hostgroup
# ─────────────────────────────────────────────────────────────────────────────

define service {
    use                     ximg-web-service
    hostgroup_name          ximg-web
    service_description     HTTPS
    check_command           check_https_vhost
}

# ─────────────────────────────────────────────────────────────────────────────
# SSL certificate expiry — all web hosts (warn 30d, critical 14d)
# ─────────────────────────────────────────────────────────────────────────────

define service {
    use                     ximg-cert-service
    hostgroup_name          ximg-web
    service_description     SSL Certificate
    check_command           check_https_cert
}

