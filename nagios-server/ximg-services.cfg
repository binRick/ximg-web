# ─────────────────────────────────────────────────────────────────────────────
# Service template — HTTPS check
# ─────────────────────────────────────────────────────────────────────────────

define service {
    name                    ximg-https-service
    use                     generic-service
    service_description     HTTPS
    check_command           check_https_vhost
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    contact_groups          admins
    register                0
}

