<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The game of kings — 1,500 years of strategy, brilliance, and the eternal battle between order and chaos on 64 squares.">
  <title>Chess — chess.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0a07;
      --panel:   #16120d;
      --dark-sq: #b58863;
      --lite-sq: #f0d9b5;
      --gold:    #c8a030;
      --amber:   #e8b840;
      --cream:   #ede0c8;
      --text:    #d4c4a0;
      --muted:   #7a6a50;
      --card:    rgba(18,14,9,.92);
      --border:  rgba(184,136,99,.18);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(184,136,99,.12) 0%, transparent 60%),
        linear-gradient(180deg, #0d0a07 0%, #080604 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(184,136,99,.012) 0, rgba(184,136,99,.012) 1px, transparent 1px, transparent 64px),
        repeating-linear-gradient(90deg, rgba(240,217,181,.008) 0, rgba(240,217,181,.008) 1px, transparent 1px, transparent 80px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto; width: 100%;
      padding: 102px 1.25rem 5rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* ── Hero ── */
    .hero {
      padding: 2.5rem 1.5rem 1rem;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: .75rem;
      animation: fadeUp .7s ease both;
    }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 20px rgba(200,160,48,.5)); }
    .hero h1 {
      font-size: clamp(2rem,6vw,3.6rem);
      font-weight: 900; line-height: 1.05; letter-spacing: -.02em;
      background: linear-gradient(135deg, #f0d9b5 0%, #c8a030 45%, #b58863 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic;
      max-width: 640px; line-height: 1.65; letter-spacing: .02em;
    }
    .hero-divider {
      width: 180px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, #f0d9b5, #c8a030, #b58863);
    }
    .hero-chips {
      display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; margin-top: .25rem;
    }
    .hero-chip {
      font-size: .66rem; font-weight: 700; padding: .22rem .72rem; border-radius: 99px;
      letter-spacing: .07em; text-transform: uppercase;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .chip-a { background: rgba(240,217,181,.1);  border: 1px solid rgba(240,217,181,.3); color: var(--cream); }
    .chip-b { background: rgba(181,136,99,.12);  border: 1px solid rgba(181,136,99,.35);  color: var(--dark-sq); }
    .chip-c { background: rgba(200,160,48,.08);  border: 1px solid rgba(200,160,48,.3);   color: var(--gold); }

    /* ── Tabs ── */
    .tabs {
      position: fixed; top: 44px; left: 0; right: 0; z-index: 100;
      height: 44px;
      background: var(--bg);
      border-bottom: 1px solid rgba(184,136,99,.18);
      display: flex; align-items: center; justify-content: center; gap: .4rem;
      padding: 0 1rem;
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      font-size: .78rem; padding: .36rem 1rem; border-radius: 6px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.08); background: transparent; color: var(--muted);
      font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      transition: all .2s; font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .tab-btn.active { color: var(--amber); border-color: rgba(232,184,64,.45); background: rgba(232,184,64,.07); }
    .tab-btn:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,.18); }

    .tab-panel { display: flex; flex-direction: column; gap: 1.75rem; }
    .tab-panel

    /* ── Section header ── */
    .sec-header {
      display: flex; align-items: center; gap: 1rem;
      font-size: .6rem; text-transform: uppercase; letter-spacing: .2em;
      color: var(--amber); font-weight: 700;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .sec-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(232,184,64,.35), transparent); }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }
    @media(max-width:540px){ .cards-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .card:hover {
      border-color: rgba(184,136,99,.45);
      box-shadow: 0 8px 36px rgba(184,136,99,.12);
      transform: translateY(-2px);
    }
    .card-head {
      padding: 1rem 1.1rem .6rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .75rem;
    }
    .card-icon { font-size: 1.8rem; line-height: 1; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--cream); line-height: 1.2; }
    .card-sub   { font-size: .7rem; color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; margin-top: .15rem; }
    .card-body  { padding: .9rem 1.1rem 1rem; font-size: .84rem; line-height: 1.7; color: var(--text); flex: 1; }
    .card-body p + p { margin-top: .5rem; }

    /* ── Piece cards wide ── */
    .pieces-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    .piece-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.1rem .9rem; text-align: center;
      transition: border-color .2s, transform .2s;
    }
    .piece-card:hover { border-color: rgba(184,136,99,.5); transform: translateY(-2px); }
    .piece-sym  { font-size: 2.8rem; line-height: 1.1; margin-bottom: .4rem; }
    .piece-name { font-size: .88rem; font-weight: 700; color: var(--cream); }
    .piece-val  { font-size: .7rem; color: var(--gold); font-weight: 700; margin: .2rem 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    .piece-move { font-size: .72rem; color: var(--muted); line-height: 1.5; }

    /* ── Chessboard ── */
    .board-wrap {
      display: flex; justify-content: center;
      animation: fadeUp .6s ease both .15s;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      width: min(400px, 90vw);
      border: 3px solid var(--dark-sq);
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(184,136,99,.25), 0 0 80px rgba(0,0,0,.6);
      overflow: hidden;
    }
    .sq {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1.4rem, 4.5vw, 2.2rem);
      line-height: 1;
      user-select: none;
    }
    .sq.lite { background: var(--lite-sq); }
    .sq.dark { background: var(--dark-sq); }

    /* ── Opening table ── */
    .opening-list {
      display: flex; flex-direction: column; gap: .65rem;
    }
    .opening-row {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: .75rem 1rem;
      display: grid; grid-template-columns: 1fr auto;
      gap: .4rem 1rem; align-items: start;
      transition: border-color .2s;
    }
    .opening-row:hover { border-color: rgba(184,136,99,.4); }
    .opening-name  { font-size: .9rem; font-weight: 700; color: var(--cream); }
    .opening-moves { font-size: .72rem; color: var(--gold); font-family: 'Courier New', monospace; text-align: right; white-space: nowrap; }
    .opening-desc  { font-size: .78rem; color: var(--muted); line-height: 1.5; grid-column: 1; }
    .opening-tag   {
      font-size: .62rem; font-weight: 700; padding: .18rem .55rem; border-radius: 99px;
      font-family: 'Segoe UI', system-ui, sans-serif; letter-spacing: .05em; white-space: nowrap;
    }
    .tag-open   { background: rgba(100,200,100,.1); border: 1px solid rgba(100,200,100,.3); color: #90d890; }
    .tag-closed { background: rgba(200,100,100,.1); border: 1px solid rgba(200,100,100,.3); color: #e09090; }
    .tag-semi   { background: rgba(100,150,220,.1); border: 1px solid rgba(100,150,220,.3); color: #90b8f8; }

    /* ── Champions timeline ── */
    .timeline {
      display: flex; flex-direction: column; gap: 0;
      border-left: 2px solid rgba(184,136,99,.25);
      padding-left: 1.5rem;
      margin-left: .5rem;
    }
    .tl-item {
      position: relative;
      padding: .6rem 0 .9rem;
    }
    .tl-item::before {
      content: '♟';
      position: absolute; left: -1.75rem; top: .55rem;
      font-size: .85rem; color: var(--gold);
    }
    .tl-year  { font-size: .68rem; color: var(--gold); font-weight: 700; letter-spacing: .1em; font-family: 'Segoe UI', system-ui, sans-serif; }
    .tl-name  { font-size: .96rem; font-weight: 700; color: var(--cream); margin: .1rem 0; }
    .tl-from  { font-size: .72rem; color: var(--muted); margin-bottom: .2rem; }
    .tl-desc  { font-size: .78rem; color: var(--text); line-height: 1.55; }

    /* ── Tactics grid ── */
    .tactics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .tactic-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.1rem; transition: border-color .2s, transform .2s;
    }
    .tactic-card:hover { border-color: rgba(184,136,99,.4); transform: translateY(-2px); }
    .tactic-head { display: flex; align-items: center; gap: .6rem; margin-bottom: .5rem; }
    .tactic-icon { font-size: 1.5rem; }
    .tactic-name { font-size: .92rem; font-weight: 700; color: var(--cream); }
    .tactic-body { font-size: .8rem; line-height: 1.6; color: var(--text); }
    .tactic-eg   { font-size: .72rem; color: var(--gold); font-family: 'Courier New', monospace; margin-top: .35rem; }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .stat-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.1rem; text-align: center;
    }
    .stat-num  { font-size: 2rem; font-weight: 900; color: var(--amber); font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1; }
    .stat-label{ font-size: .72rem; color: var(--muted); margin-top: .3rem; text-transform: uppercase; letter-spacing: .08em; font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ── Notation block ── */
    .notation {
      font-family: 'Courier New', monospace;
      font-size: .82rem; color: var(--cream);
      background: rgba(0,0,0,.35); border: 1px solid rgba(184,136,99,.15);
      border-radius: 8px; padding: .7rem 1rem; line-height: 1.8;
    }
    .notation span { color: var(--gold); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Champions with portraits ── */
    .tl-portrait {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; object-position: top;
      border: 2px solid rgba(184,136,99,.45);
      flex-shrink: 0;
      background: var(--panel);
    }
    .tl-item-inner {
      display: flex; gap: 1rem; align-items: flex-start;
    }
    .tl-text { flex: 1; }

    /* ── Play tab ── */
    .play-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.5rem;
      align-items: start;
    }
    @media(max-width:700px){ .play-layout { grid-template-columns: 1fr; } }

    /* Opponent selector */
    .opponent-grid {
      display: flex; flex-direction: column; gap: .65rem;
    }
    .opp-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: .7rem .9rem; cursor: pointer; transition: border-color .2s, background .2s;
      display: flex; align-items: center; gap: .8rem;
    }
    .opp-card.selected { border-color: var(--amber); background: rgba(232,184,64,.07); }
    .opp-card:hover:not(.selected) { border-color: rgba(184,136,99,.45); }
    .opp-avatar {
      width: 52px; height: 52px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--panel);
    }
    .opp-avatar svg { width: 52px; height: 52px; }
    .opp-info { flex: 1; min-width: 0; }
    .opp-name  { font-size: .88rem; font-weight: 700; color: var(--cream); }
    .opp-level { font-size: .7rem; color: var(--gold); font-family: 'Segoe UI', system-ui, sans-serif; }
    .opp-desc  { font-size: .7rem; color: var(--muted); margin-top: .1rem; line-height: 1.4; }

    /* Game board area */
    .game-area { display: flex; flex-direction: column; gap: 1rem; }

    .game-status {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: .6rem 1rem; font-size: .82rem; color: var(--text);
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
    }
    .game-status-msg { font-weight: 700; color: var(--cream); }
    .game-timer { font-family: 'Courier New', monospace; color: var(--gold); font-size: .85rem; }

    .play-board-wrap {
      display: flex; justify-content: center;
    }
    #play-board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      width: min(480px, 92vw);
      border: 3px solid var(--dark-sq);
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(184,136,99,.25), 0 0 80px rgba(0,0,0,.6);
      overflow: hidden;
      cursor: pointer;
    }
    .psq {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1.5rem, 5vw, 2.4rem);
      line-height: 1; user-select: none; position: relative;
      transition: background .1s;
    }
    .psq.lite { background: var(--lite-sq); }
    .psq.dark { background: var(--dark-sq); }
    .psq.selected { background: #f6f669 !important; }
    .psq.legal    { background: rgba(50,200,50,.35) !important; }
    .psq.last-move{ background: rgba(200,200,50,.4) !important; }
    .psq.in-check { background: rgba(220,50,50,.55) !important; }

    .coord-file {
      position: absolute; bottom: 1px; right: 3px;
      font-size: .55rem; font-weight: 700; opacity: .55;
      font-family: 'Segoe UI', system-ui, sans-serif;
      pointer-events: none;
    }
    .coord-rank {
      position: absolute; top: 1px; left: 3px;
      font-size: .55rem; font-weight: 700; opacity: .55;
      font-family: 'Segoe UI', system-ui, sans-serif;
      pointer-events: none;
    }

    .captured-row {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: .5rem .85rem; font-size: 1.1rem; line-height: 1.6; min-height: 2.5rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .captured-label { font-size: .65rem; color: var(--muted); font-weight: 700; letter-spacing: .1em; text-transform: uppercase; font-family: 'Segoe UI', system-ui, sans-serif; }

    .move-history {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: .6rem .85rem; max-height: 120px; overflow-y: auto;
      font-family: 'Courier New', monospace; font-size: .78rem; color: var(--text);
      line-height: 1.8;
    }
    .move-history span { color: var(--gold); }

    .game-controls {
      display: flex; gap: .6rem; flex-wrap: wrap;
    }
    .ctrl-btn {
      font-size: .74rem; padding: .38rem .9rem; border-radius: 7px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.12); background: transparent; color: var(--text);
      font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      transition: all .2s; font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .ctrl-btn:hover { border-color: rgba(232,184,64,.5); color: var(--amber); }
    .ctrl-btn.primary { background: rgba(232,184,64,.12); border-color: rgba(232,184,64,.4); color: var(--amber); }

    /* Promotion modal */
    #promo-modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
    }
    #promo-modal
    .promo-box {
      background: var(--panel); border: 2px solid var(--dark-sq);
      border-radius: 14px; padding: 1.5rem 2rem; text-align: center;
    }
    .promo-box h3 { color: var(--cream); margin-bottom: 1rem; }
    .promo-pieces { display: flex; gap: .75rem; justify-content: center; }
    .promo-piece {
      font-size: 2.5rem; cursor: pointer; padding: .3rem .5rem;
      border-radius: 8px; border: 2px solid transparent;
      transition: border-color .2s;
    }
    .promo-piece:hover { border-color: var(--amber); }

    /* Mech Turk tab */
    .mt-hero {
      display: flex; flex-wrap: wrap; gap: 2rem; align-items: flex-start;
    }
    .mt-ascii {
      font-family: 'Courier New', monospace; font-size: .68rem; line-height: 1.35;
      color: var(--gold); white-space: pre; flex-shrink: 0;
      background: rgba(0,0,0,.3); border: 1px solid rgba(184,136,99,.2);
      border-radius: 10px; padding: .9rem 1.1rem;
    }
    .mt-img-block { flex-shrink: 0; }
    .mt-intro { flex: 1; min-width: 220px; font-size: .88rem; line-height: 1.75; color: var(--text); }
    .mt-intro strong { color: var(--cream); }
  </style>
</head>
<body>
<div class="tabs">
    <a class="tab-btn " href="index.html">Board</a>
    <a class="tab-btn" href="play.html">Play</a>
    <a class="tab-btn" href="pieces.html">Pieces</a>
    <a class="tab-btn" href="openings.html">Openings</a>
    <a class="tab-btn" href="champions.html">Champions</a>
    <a class="tab-btn" href="tactics.html">Tactics</a>
    <a class="tab-btn" href="history.html">History</a>
    <a class="tab-btn" href="mechturk.html">Mech Turk</a>
  </div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/chess') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="play">
<div class="sec-header">Play vs AI</div>

    <div id="promo-modal" class="hidden">
      <div class="promo-box">
        <h3>Promote Pawn</h3>
        <div class="promo-pieces">
          <div class="promo-piece" data-piece="Q">♕</div>
          <div class="promo-piece" data-piece="R">♖</div>
          <div class="promo-piece" data-piece="B">♗</div>
          <div class="promo-piece" data-piece="N">♘</div>
        </div>
      </div>
    </div>

    <!-- Opponent Selection -->
    <div id="play-setup">
      <div class="sec-header">Choose Your Opponent</div>
      <div class="opponent-grid" id="opp-grid"></div>
      <div style="margin-top:1rem">
        <button class="ctrl-btn primary" id="start-game-btn" onclick="startChessGame()">Start Game</button>
      </div>
    </div>

    <!-- Game UI (hidden until started) -->
    <div id="play-game" class="hidden">
      <div class="play-layout">
        <div class="game-area">
          <div class="game-status">
            <span class="game-status-msg" id="game-msg">Your move (White)</span>
            <span class="game-timer" id="game-timer">0:00</span>
          </div>
          <div class="captured-row">
            <span class="captured-label">Captured:</span>
            <span id="captured-display"></span>
            <span id="material-score" style="margin-left:auto;font-size:.75rem;color:var(--gold);font-family:'Segoe UI',system-ui,sans-serif;"></span>
          </div>
          <div class="play-board-wrap">
            <div id="play-board"></div>
          </div>
          <div class="move-history" id="move-history"></div>
          <div class="game-controls">
            <button class="ctrl-btn primary" id="new-game-btn" onclick="resetChessGame()">New Game</button>
            <button class="ctrl-btn" onclick="showSetup()">Change Opponent</button>
            <button class="ctrl-btn" id="undo-btn" onclick="undoMove()">Undo</button>
            <button class="ctrl-btn" id="flip-btn" onclick="flipBoard()">Flip Board</button>
          </div>
        </div>

        <!-- Sidebar -->
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <div class="card" id="opp-info-card">
