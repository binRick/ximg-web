<!doctypehtml><html lang=en><head><meta charset=utf-8><title>Iron Fist 3D</title><meta content="width=device-width,initial-scale=1,user-scalable=no"name=viewport><style>body,html{margin:0;padding:0;background:#000;color:#eee;font-family:ui-monospace,Menlo,Consolas,monospace;height:100%;overflow:hidden}#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}canvas.emscripten{display:block;background:#000;max-width:100vw;max-height:100vh;image-rendering:pixelated;outline:0}#status{position:fixed;left:10px;bottom:10px;font-size:12px;color:#888;pointer-events:none}#gate{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:10;cursor:pointer;text-align:center;padding:20px}#gate h1{color:#d22;font-size:min(12vw, 80px);margin:0 0 8px;letter-spacing:4px;text-shadow:2px 2px 0 #500}#gate p{color:#aaa;margin:4px 0}#gate .cta{color:#d22;margin-top:20px;font-size:20px;animation:blink 1.2s infinite}@keyframes blink{50%{opacity:.3}}</style></head><body><div id=gate><h1>IRON FIST 3D</h1><p>WASD / arrows — move    mouse — look    LMB — fire</p><p>space — jump    shift — sprint    - / + — music vol</p><p>1 — shotgun    2 — MG    3 — launcher</p><p class=cta>[ CLICK TO START ]</p><p style=margin-top:18px;font-size:11px;color:#666>loading… assets decode after this click</p></div><div id=stage><canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas></div><div id=status>starting…</div><script>const statusEl=document.getElementById("status"),gateEl=document.getElementById("gate"),canvas=document.getElementById("canvas");var Module={canvas:canvas,print:(...t)=>console.log(...t),printErr:(...t)=>console.error(...t),setStatus:t=>{statusEl.textContent=t||""},totalDependencies:0,monitorRunDependencies:function(t){this.totalDependencies=Math.max(this.totalDependencies,t),this.setStatus(t?`loading… (${this.totalDependencies-t}/${this.totalDependencies})`:"ready — click to start")}};Module.setStatus("downloading…"),window.onerror=t=>Module.setStatus("err: "+t),gateEl.addEventListener("click",(()=>{gateEl.style.display="none",canvas.focus()}))</script><script async src=index.js></script></body></html>
