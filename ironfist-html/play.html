<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Fist - Play</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0806;--bg2:#141010;--bg3:#1c1414;
  --red:#c0392b;--orange:#e67e22;--fire:#ff4500;
  --gold:#d4a017;--text:#c8bfb0;--dim:#5a524a;
  --mono:'Courier New',monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}

/* ── Sub-nav ── */
#subnav{
  position:sticky;top:52px;z-index:150;
  background:rgba(8,11,14,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;justify-content:center;flex-wrap:wrap;gap:.2rem;padding:.4rem 1rem;
}
#subnav a{
  font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  color:#5a6070;padding:.3rem .65rem;border-radius:3px;text-decoration:none;
  transition:color .2s,background .2s;font-family:'Courier New',monospace;
}
#subnav a:hover,#subnav a.active{color:var(--fire);background:rgba(255,255,255,.06)}

/* ── Game container ── */
.game-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:calc(100vh - 52px - 38px);/* viewport minus nav minus subnav */
  background:#000;position:relative;
}
.game-wrap iframe{
  border:none;width:100%;height:100%;
}
.game-hint{
  position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);
  font-size:.65rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;
  pointer-events:none;opacity:.7;z-index:10;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
</style>
</head>
<body>

<nav id="subnav">
  <a href="index.html">Overview</a>
  <a href="play.html">Play</a>
</nav>
<script>
document.querySelectorAll('#subnav a').forEach(function(a){
  var href=a.getAttribute('href');
  var path=location.pathname;
  if(path.endsWith(href)||(href==='index.html'&&(path.endsWith('/')||path.endsWith('index.html')))){
    a.classList.add('active');
  }
});
</script>

<div class="game-wrap">
  <iframe src="game/index.html" allow="autoplay; pointer-lock; fullscreen" allowfullscreen></iframe>
  <div class="game-hint">WASD move &bull; mouse aim &bull; LMB fire &bull; 1/2/3 weapons &bull; click to start</div>
</div>

<script src="/shared/nav.js?v=2"></script>
</body>
</html>
