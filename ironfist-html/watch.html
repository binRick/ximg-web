<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Fist - Watch Replay</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0806;--bg2:#141010;--red:#c0392b;--fire:#ff4500;--text:#c8bfb0;--dim:#5a524a;--mono:'Courier New',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-top:60px}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}
#subnav{position:sticky;top:52px;z-index:150;width:100%;background:rgba(8,11,14,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:center;flex-wrap:wrap;gap:.2rem;padding:.4rem 1rem}
#subnav a{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#5a6070;padding:.3rem .65rem;border-radius:3px;text-decoration:none;transition:color .2s,background .2s;font-family:'Courier New',monospace}
#subnav a:hover,#subnav a.active{color:var(--fire);background:rgba(255,255,255,.06)}
.container{max-width:900px;width:100%;padding:2rem 1rem}
h1{font-size:1.4rem;color:#fff;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:.5rem;text-shadow:0 0 30px rgba(255,69,0,.3)}
.subtitle{text-align:center;color:var(--dim);font-size:.75rem;margin-bottom:1.5rem}
.video-wrap{background:#000;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.08);margin-bottom:1rem}
video{display:block;width:100%;max-height:70vh;background:#000}
.error{text-align:center;padding:3rem;color:var(--red);font-size:.85rem}
.back{display:inline-block;margin-top:1rem;color:var(--fire);font-size:.8rem;text-decoration:none;letter-spacing:.08em}
.back:hover{color:#fff}
</style>
</head>
<body>

<nav id="subnav">
  <a href="index.html">Overview</a>
  <a href="play.html">Play</a>
  <a href="scores.html">High Scores</a>
</nav>
<script>
document.querySelectorAll('#subnav a').forEach(function(a){
  var href=a.getAttribute('href');
  var path=location.pathname;
  if(path.endsWith(href)){a.classList.add('active')}
});
</script>

<div class="container">
  <h1>Replay</h1>
  <p class="subtitle" id="info">Loading...</p>

  <div class="video-wrap" id="video-wrap" style="display:none">
    <video id="player" controls autoplay muted playsinline></video>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <div style="text-align:center">
    <a class="back" href="scores.html">&larr; Back to High Scores</a>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(location.search);
  var videoId = params.get('v');
  if (!videoId) {
    document.getElementById('error').style.display = '';
    document.getElementById('error').textContent = 'No video ID provided.';
    document.getElementById('info').textContent = '';
    return;
  }

  var player = document.getElementById('player');
  var wrap = document.getElementById('video-wrap');

  player.src = '/api/videos/' + videoId;
  wrap.style.display = '';
  document.getElementById('info').textContent = 'Video ID: ' + videoId;

  player.onerror = function() {
    wrap.style.display = 'none';
    document.getElementById('error').style.display = '';
    document.getElementById('error').textContent = 'Failed to load video. It may have been removed.';
  };
})();
</script>

<script src="/shared/nav.js?v=5"></script>
</body>
</html>
