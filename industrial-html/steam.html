<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Industrial Revolution">
  <title>Industrial Revolution — Steam, Steel &amp; Progress</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #040303; --soot: #0a0808; --iron: #2a2020; --rust: #6b3018; --steel: #8090a0; --gold: #c8902c; --amber: #e0aa50; --orange: #d45010; --text: #c8b8a0; --muted: #504030; --card: rgba(4,3,3,.94); --border: rgba(200,144,44,.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(107,48,24,.15) 0%, transparent 60%), linear-gradient(180deg, #040303 0%, #010100 100%); }
    #industrial-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(212,80,16,.5)); }
    .hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; color: var(--amber); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(200,144,44,.1); border: 1px solid var(--border); border-radius: 6px; padding: .35rem 1rem; font-size: .85rem; color: var(--gold); letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 1rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-icon { font-size: 1.8rem; margin-bottom: .4rem; }
    .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--amber); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 110px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--orange); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    #steam-canvas { width: 100%; height: 220px; border: 1px solid var(--border); border-radius: 10px; background: rgba(4,3,3,.8); cursor: pointer; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(4,3,3,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(200,144,44,.07); }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } }
    .card-img { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 6px; margin-bottom: .75rem; filter: sepia(30%) brightness(.82); transition: filter .3s; display: block; }
    .card-img:hover { filter: sepia(8%) brightness(1); }
    .tl-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 4px; margin-top: .65rem; filter: sepia(30%) brightness(.85); transition: filter .3s; display: block; }
    .tl-img:hover { filter: sepia(8%) brightness(1); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .gallery-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .gallery-img { width: 100%; height: 220px; object-fit: cover; display: block; filter: sepia(25%) brightness(.85); transition: filter .3s; }
    .gallery-img:hover { filter: sepia(5%) brightness(1.05); }
    .gallery-info { padding: .6rem .85rem .8rem; }
    .gallery-title { font-size: .88rem; color: var(--amber); font-weight: 700; margin-bottom: .2rem; }
    .gallery-caption { font-size: .76rem; color: var(--muted); font-style: italic; line-height: 1.4; }
  </style>
</head>
<body>
<canvas id="industrial-canvas"></canvas>
<nav class="sub-nav-wrap">
  <div class="sub-nav">
    <a href="index.html">⚙️ Inventions</a>
    <a href="innovators.html">🔬 Innovators</a>
    <a href="timeline.html">📅 Timeline</a>
    <a href="steam.html">🚂 Steam Engine</a>
    <a href="gallery.html">🖼 Gallery</a>
  </div>
</nav>
<script>
document.querySelectorAll('.sub-nav a').forEach(function(a){
  var h = a.getAttribute('href');
  var p = location.pathname;
  if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/industrial') || p.endsWith('index.html')))) {
    a.classList.add('active');
  }
});
</script>
<section id="steam">
<div class="section-title">Steam Engine — Power of the Industrial Age</div>
    <canvas id="steam-canvas"></canvas>
    <div class="canvas-label">Click to add coal — the locomotive runs on your fuel, powering the Industrial Revolution</div>
  </div>
</div>
<script>
(function(){
  const c = document.getElementById('industrial-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const embers = Array.from({length:60}, () => ({ x: Math.random(), y: Math.random(), r: Math.random()*2+.5, a: Math.random()*Math.PI*2, vy: -Math.random()*0.5-0.2 }));
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.01;
    embers.forEach(e => {
      e.a += 0.01; e.y += e.vy; if(e.y < -0.1) e.y = 1.1;
      ctx.beginPath(); ctx.arc(e.x*W, e.y*H, e.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(212,80,16,${0.2+0.15*Math.sin(e.a)})`; ctx.fill();
    });
    // Factory chimneys smoke
    for(let i=0;i<5;i++){
      const cx = (i*0.2+0.1)*W;
      for(let p=0;p<3;p++){
        const py = 0.3+(p*0.15 + ((t*0.5+i+p)%0.5));
        if(py < 0 || py > 0.8) continue;
        ctx.beginPath(); ctx.arc(cx, py*H, 15+p*8, 0, Math.PI*2);
        ctx.fillStyle = `rgba(50,40,30,${0.06-p*0.01})`; ctx.fill();
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
})();

(function(){
  const c = document.getElementById('steam-canvas');
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 220;
  const W = c.width, H = c.height;
  let t = 0, trainX = 0, speed = 1.5, coal = 5, puffs = [];
  c.addEventListener('click', () => { coal = Math.min(20, coal+3); speed = Math.min(6, speed+0.5); });
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.02;
    // Sky with soot
    ctx.fillStyle = 'rgba(4,3,3,.97)'; ctx.fillRect(0,0,W,H);
    // Industrial skyline
    for(let i=0;i<8;i++){
      const fx = i*(W/7.5), fw = 20+i*8, fh = 40+i*20;
      ctx.fillStyle = `rgba(${20+i*3},${15+i*2},${10+i*2},.9)`;
      ctx.fillRect(fx, H*0.55-fh, fw, fh);
      // Chimney
      ctx.fillStyle = 'rgba(30,20,15,.9)'; ctx.fillRect(fx+fw*0.3,H*0.55-fh-25,8,25);
      // Smoke
      for(let s=0;s<3;s++){
        const sy = H*0.55-fh-25 - (((t*0.4+i+s*0.3)%0.8))*60;
        ctx.beginPath(); ctx.arc(fx+fw*0.3+4, sy, 8+s*4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(50,40,30,${0.1-s*0.02})`; ctx.fill();
      }
    }
    // Track
    ctx.fillStyle = 'rgba(80,60,40,.8)'; ctx.fillRect(0,H*0.72,W,6);
    for(let i=0;i<W/30;i++){
      ctx.fillStyle = 'rgba(60,45,30,.6)'; ctx.fillRect(i*30,H*0.7,4,14);
    }
    // Puffs
    puffs = puffs.filter(p=>p.alpha>0.01);
    puffs.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.r += 0.5; p.alpha -= 0.015;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(180,160,140,${p.alpha})`; ctx.fill();
    });
    // Locomotive
    trainX = (trainX + speed) % (W + 200);
    const lx = trainX - 150, ly = H*0.7-30;
    // Coal car
    ctx.fillStyle = '#2a1a10'; ctx.fillRect(lx-60,ly+5,50,25);
    // Body
    ctx.fillStyle = '#3a2a20'; ctx.fillRect(lx,ly,80,25);
    // Boiler
    ctx.fillStyle = '#5a3a20';
    ctx.beginPath(); ctx.ellipse(lx+80,ly+12,20,12,0,0,Math.PI*2); ctx.fill();
    // Smokestack
    ctx.fillStyle = '#2a1a10'; ctx.fillRect(lx+55,ly-20,10,20);
    ctx.fillStyle = '#3a2a10'; ctx.fillRect(lx+52,ly-22,16,6);
    // Wheels
    [lx+15,lx+45,lx+70].forEach(wx=>{
      ctx.beginPath(); ctx.arc(wx,ly+30,12,0,Math.PI*2);
      ctx.fillStyle='#4a3020'; ctx.fill();
      ctx.strokeStyle='#8a6040'; ctx.lineWidth=2; ctx.stroke();
      // Spokes
      for(let s=0;s<6;s++){
        const sa=(s/6)*Math.PI*2+t*2*speed/3;
        ctx.beginPath(); ctx.moveTo(wx,ly+30); ctx.lineTo(wx+Math.cos(sa)*10,ly+30+Math.sin(sa)*10);
        ctx.strokeStyle='rgba(100,80,60,.8)'; ctx.lineWidth=1.5; ctx.stroke();
      }
    });
    // Add puffs
    if(Math.random()<0.3) puffs.push({ x:lx+60, y:ly-20, vx:speed*0.3+Math.random()*0.5, vy:-Math.random()*1-0.5, r:5, alpha:0.6 });
    // Coal meter
    ctx.font='11px monospace'; ctx.fillStyle='rgba(200,144,44,.7)'; ctx.textAlign='left';
    ctx.fillText(`COAL: ${'▓'.repeat(Math.floor(coal))}${'░'.repeat(20-Math.floor(coal))} SPEED: ${speed.toFixed(1)}km/h x10`, 8, 15);
    coal = Math.max(1, coal-0.01); speed = Math.max(1, speed-0.005);
    requestAnimationFrame(frame);
  }
  frame();
})();
(function(){
  const navLinks = document.querySelectorAll('.sub-nav a');
  const sections = document.querySelectorAll('.page-section');
  function showSection(id) {
    sections.forEach(s => s.classList.remove('visible'));
    navLinks.forEach(a => a.classList.remove('active'));
    const tg = document.getElementById(id);
    if(tg) tg.classList.add('visible');
    navLinks.forEach(a => { if(a.getAttribute('href') === '#'+id) a.classList.add('active'); });
  }
  navLinks.forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const id = a.getAttribute('href').slice(1);
      history.pushState(null, '', '#'+id);
      showSection(id);
    });
  });
  function onHash() {
    const hash = location.hash.slice(1);
    const first = navLinks[0] ? navLinks[0].getAttribute('href').slice(1) : '';
    if(hash && document.getElementById(hash)) { showSection(hash); }
    else if(first) { showSection(first); }
  }
  window.addEventListener('popstate', onHash);
  onHash();
})();
</script>
