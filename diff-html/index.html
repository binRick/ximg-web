<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Text Diff — diff.ximg.app — interactive educational app on ximg.app">
<title>Text Diff — diff.ximg.app</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#02020f;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-top:44px}
.subnav{position:sticky;top:44px;z-index:100;background:#02020f;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 1rem;justify-content:center}
.tab-btn{padding:.65rem 1.1rem;font-size:.85rem;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:#c9d1d9}
.tab-btn.active{color:#22d3ee;border-bottom-color:#22d3ee}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
.tab-panel{display:none}
.tab-panel.active{display:block}
.page-title{font-size:1.15rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
.page-sub{font-size:.8rem;color:#475569;margin-bottom:1.25rem}
label.lbl{display:block;font-size:.72rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem}
textarea{width:100%;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#c9d1d9;font-family:'Courier New',monospace;font-size:.83rem;padding:.65rem .85rem;outline:none;resize:vertical;transition:border-color .2s;min-height:180px;line-height:1.55}
textarea:focus{border-color:#22d3ee55}
.card{background:#070720;border:1px solid #1e293b;border-radius:8px;padding:1.1rem;margin-bottom:1rem}
.row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
.btn{background:#0f172a;border:1px solid #1e293b;border-radius:6px;color:#c9d1d9;font-size:.82rem;padding:.45rem .9rem;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{border-color:#22d3ee55;color:#22d3ee}
.btn.primary{background:rgba(34,211,238,.1);border-color:#22d3ee55;color:#22d3ee}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:680px){.two-col{grid-template-columns:1fr}}
.diff-output{background:#070720;border:1px solid #1e293b;border-radius:8px;overflow:hidden;font-family:'Courier New',monospace;font-size:.8rem;line-height:1.6}
.diff-header{background:#0a0a22;border-bottom:1px solid #1e293b;padding:.55rem 1rem;font-size:.72rem;color:#475569;display:flex;justify-content:space-between;align-items:center}
.diff-body{max-height:480px;overflow-y:auto;padding:.5rem 0}
.diff-body::-webkit-scrollbar{width:6px}
.diff-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.diff-line{display:flex;min-height:1.55em}
.diff-ln{color:#334155;min-width:42px;text-align:right;padding:0 .6rem;font-size:.72rem;user-select:none;flex-shrink:0;line-height:1.55}
.diff-text{padding:0 .75rem;white-space:pre-wrap;word-break:break-all;flex:1;min-width:0;line-height:1.55}
.diff-line.added{background:rgba(34,197,94,.1)}
.diff-line.added .diff-text{color:#86efac}
.diff-line.added .diff-ln{color:#22c55e44}
.diff-line.removed{background:rgba(248,113,113,.1)}
.diff-line.removed .diff-text{color:#fca5a5}
.diff-line.removed .diff-ln{color:#f8717144}
.diff-line.unchanged .diff-text{color:#475569}
.diff-line.unchanged .diff-ln{color:#1e293b}
.diff-prefix{min-width:1.2em;display:inline-block;flex-shrink:0;font-weight:700}
.diff-line.added .diff-prefix{color:#22c55e}
.diff-line.removed .diff-prefix{color:#f87171}
.diff-line.unchanged .diff-prefix{color:#334155}
.stat-chips{display:flex;gap:.6rem;flex-wrap:wrap}
.chip{font-size:.74rem;padding:.2rem .6rem;border-radius:4px}
.chip.add{background:rgba(34,197,94,.12);border:1px solid #22c55e44;color:#22c55e}
.chip.rem{background:rgba(248,113,113,.12);border:1px solid #f8717144;color:#f87171}
.chip.unch{background:rgba(71,85,105,.15);border:1px solid #47556933;color:#64748b}
.no-diff{padding:1.5rem;text-align:center;color:#475569;font-size:.85rem}
.json-err{color:#f87171;font-size:.78rem;margin-top:.3rem;min-height:1em}
.toggle-row{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:#94a3b8;cursor:pointer}
input[type=checkbox]{accent-color:#22d3ee;width:14px;height:14px;cursor:pointer}
</style>
</head>
<body>
<nav class="subnav">
  <button class="tab-btn active" onclick="showTab('textdiff')">Text Diff</button>
  <button class="tab-btn" onclick="showTab('jsondiff')">JSON Diff</button>
</nav>

<!-- TEXT DIFF -->
<div id="textdiff" class="tab-panel active">
<div class="page">
  <div class="page-title">Text Diff</div>
  <div class="page-sub">Side-by-side text comparison using the Myers diff algorithm. Green = added, red = removed, gray = unchanged.</div>
  <div class="two-col">
    <div>
      <label class="lbl">Left (original)</label>
      <textarea id="td-left" placeholder="Paste original text here..." oninput="runTextDiff()"></textarea>
    </div>
    <div>
      <label class="lbl">Right (modified)</label>
      <textarea id="td-right" placeholder="Paste modified text here..." oninput="runTextDiff()"></textarea>
    </div>
  </div>
  <div class="row">
    <button class="btn" onclick="clearTextDiff()">Clear</button>
    <button class="btn" onclick="swapTextDiff()">&#8644; Swap</button>
    <label class="toggle-row"><input type="checkbox" id="td-ctx" onchange="runTextDiff()" checked> Show context lines</label>
  </div>
  <div id="td-output"></div>
</div>
</div>

<!-- JSON DIFF -->
<div id="jsondiff" class="tab-panel">
<div class="page">
  <div class="page-title">JSON Diff</div>
  <div class="page-sub">Deep structural comparison of two JSON values. Both sides are pretty-printed, then diffed line by line.</div>
  <div class="two-col">
    <div>
      <label class="lbl">Left JSON</label>
      <textarea id="jd-left" placeholder='{"key": "value", ...}' oninput="runJsonDiff()"></textarea>
      <div class="json-err" id="jd-left-err"></div>
    </div>
    <div>
      <label class="lbl">Right JSON</label>
      <textarea id="jd-right" placeholder='{"key": "value", ...}' oninput="runJsonDiff()"></textarea>
      <div class="json-err" id="jd-right-err"></div>
    </div>
  </div>
  <div class="row">
    <button class="btn" onclick="clearJsonDiff()">Clear</button>
    <button class="btn" onclick="swapJsonDiff()">&#8644; Swap</button>
    <button class="btn primary" onclick="prettifyJson()">Prettify both</button>
  </div>
  <div id="jd-output"></div>
</div>
</div>

<script>
// ── Tab switching ────────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ── Myers diff (line-level) ───────────────────────────────────────────────────
// Returns array of {type:'add'|'remove'|'equal', lines:[...]}
function myersDiff(a, b) {
  const n = a.length, m = b.length;
  const max = n + m;
  if (max === 0) return [];
  const v = new Int32Array(2 * max + 1);
  const trace = [];

  outer:
  for (let d = 0; d <= max; d++) {
    trace.push(v.slice());
    for (let k = -d; k <= d; k += 2) {
      const ki = k + max;
      let x;
      if (k === -d || (k !== d && v[ki-1] < v[ki+1])) {
        x = v[ki+1];
      } else {
        x = v[ki-1] + 1;
      }
      let y = x - k;
      while (x < n && y < m && a[x] === b[y]) { x++; y++; }
      v[ki] = x;
      if (x >= n && y >= m) break outer;
    }
  }

  // backtrack
  const ops = [];
  let x = n, y = m;
  for (let d = trace.length - 1; d >= 0; d--) {
    const vv = trace[d];
    const ki = (x - y) + max;
    let px, py;
    if ((x - y) === -d || ((x - y) !== d && vv[ki-1] < vv[ki+1])) {
      px = vv[ki+1]; py = px - ((x-y)+1);
    } else {
      px = vv[ki-1]; py = px - ((x-y)-1);
    }
    while (x > px && y > py) { ops.push({t:'=',ai:x-1,bi:y-1}); x--; y--; }
    if (d > 0) {
      if (x === px) { ops.push({t:'+',bi:y-1}); y--; }
      else           { ops.push({t:'-',ai:x-1}); x--; }
    }
  }
  ops.reverse();

  // Consolidate into runs
  const result = [];
  for (const op of ops) {
    const last = result[result.length-1];
    if (op.t === '=') {
      if (last && last.type === 'equal') last.left.push(a[op.ai]), last.right.push(b[op.bi]);
      else result.push({type:'equal', left:[a[op.ai]], right:[b[op.bi]]});
    } else if (op.t === '-') {
      if (last && last.type === 'remove') last.left.push(a[op.ai]);
      else result.push({type:'remove', left:[a[op.ai]], right:[]});
    } else {
      if (last && last.type === 'add') last.right.push(b[op.bi]);
      else if (last && last.type === 'remove') { last.type = 'change'; last.right.push(b[op.bi]); }
      else result.push({type:'add', left:[], right:[b[op.bi]]});
    }
  }
  return result;
}

function renderDiff(hunks, showContext) {
  if (!hunks.length) return '<div class="no-diff">Both inputs are identical.</div>';

  let added = 0, removed = 0, unchanged = 0;
  let lines = [];
  let leftN = 1, rightN = 1;
  const CTX = showContext ? 3 : 99999;

  // Flatten hunks into displayable lines, with context collapsing
  const flatLines = [];
  for (const h of hunks) {
    if (h.type === 'equal') {
      h.left.forEach((l, i) => {
        flatLines.push({type:'unchanged', left:l, right:h.right[i], leftN:leftN++, rightN:rightN++});
        unchanged++;
      });
    } else if (h.type === 'remove') {
      h.left.forEach(l => { flatLines.push({type:'removed', left:l, right:null, leftN:leftN++, rightN:null}); removed++; });
    } else if (h.type === 'add') {
      h.right.forEach(r => { flatLines.push({type:'added', left:null, right:r, leftN:null, rightN:rightN++}); added++; });
    } else { // change
      const ml = Math.max(h.left.length, h.right.length);
      for (let i=0;i<ml;i++) {
        if (i < h.left.length && i < h.right.length) {
          flatLines.push({type:'change', left:h.left[i], right:h.right[i], leftN:leftN++, rightN:rightN++});
          removed++; added++;
        } else if (i < h.left.length) {
          flatLines.push({type:'removed', left:h.left[i], right:null, leftN:leftN++, rightN:null}); removed++;
        } else {
          flatLines.push({type:'added', left:null, right:h.right[i], leftN:null, rightN:rightN++}); added++;
        }
      }
    }
  }

  // Context filtering — mark which lines to show
  if (showContext) {
    const show = new Uint8Array(flatLines.length);
    for (let i=0;i<flatLines.length;i++) {
      if (flatLines[i].type !== 'unchanged') {
        for (let j=Math.max(0,i-CTX);j<=Math.min(flatLines.length-1,i+CTX);j++) show[j]=1;
      }
    }
    for (let i=0;i<flatLines.length;i++) {
      if (!show[i]) { flatLines[i].hidden = true; }
    }
  }

  let html = '';
  let hiddenCount = 0;
  for (let i=0;i<flatLines.length;i++) {
    const fl = flatLines[i];
    if (fl.hidden) { hiddenCount++; continue; }
    if (hiddenCount > 0) {
      html += `<div class="diff-line unchanged" style="background:#0a0a22;cursor:default"><span class="diff-ln" style="min-width:88px"></span><span class="diff-text" style="color:#334155;font-style:italic">... ${hiddenCount} unchanged line${hiddenCount>1?'s':''} hidden ...</span></div>`;
      hiddenCount = 0;
    }
    if (fl.type === 'unchanged') {
      html += diffLine('unchanged', fl.leftN, fl.rightN, ' ', escHtml(fl.left));
    } else if (fl.type === 'removed') {
      html += diffLine('removed', fl.leftN, '', '-', escHtml(fl.left));
    } else if (fl.type === 'added') {
      html += diffLine('added', '', fl.rightN, '+', escHtml(fl.right));
    } else { // change: show as remove + add
      html += diffLine('removed', fl.leftN, '', '-', escHtml(fl.left));
      html += diffLine('added', '', fl.rightN, '+', escHtml(fl.right));
    }
  }
  if (hiddenCount > 0) {
    html += `<div class="diff-line unchanged" style="background:#0a0a22;"><span class="diff-ln" style="min-width:88px"></span><span class="diff-text" style="color:#334155;font-style:italic">... ${hiddenCount} unchanged line${hiddenCount>1?'s':''} hidden ...</span></div>`;
  }

  const stats = `<div class="stat-chips">
    <span class="chip add">+${added} added</span>
    <span class="chip rem">-${removed} removed</span>
    <span class="chip unch">${unchanged} unchanged</span>
  </div>`;

  return `<div class="diff-output">
    <div class="diff-header"><span>Diff Result</span>${stats}</div>
    <div class="diff-body">${html}</div>
  </div>`;
}

function diffLine(cls, ln1, ln2, prefix, text) {
  return `<div class="diff-line ${cls}">
    <span class="diff-ln">${ln1 || ''}</span>
    <span class="diff-ln">${ln2 || ''}</span>
    <span class="diff-text"><span class="diff-prefix">${prefix}</span>${text}</span>
  </div>`;
}

function escHtml(s) {
  if (!s && s !== '') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let tdTimer = null;
function runTextDiff() {
  clearTimeout(tdTimer);
  tdTimer = setTimeout(_runTextDiff, 60);
}
function _runTextDiff() {
  const left = document.getElementById('td-left').value;
  const right = document.getElementById('td-right').value;
  const outEl = document.getElementById('td-output');
  if (!left && !right) { outEl.innerHTML = ''; return; }
  const la = left.split('\n');
  const ra = right.split('\n');
  const hunks = myersDiff(la, ra);
  const showCtx = document.getElementById('td-ctx').checked;
  outEl.innerHTML = renderDiff(hunks, showCtx);
}

function clearTextDiff() {
  document.getElementById('td-left').value = '';
  document.getElementById('td-right').value = '';
  document.getElementById('td-output').innerHTML = '';
}
function swapTextDiff() {
  const l = document.getElementById('td-left').value;
  const r = document.getElementById('td-right').value;
  document.getElementById('td-left').value = r;
  document.getElementById('td-right').value = l;
  runTextDiff();
}

// ── JSON Diff ─────────────────────────────────────────────────────────────────
function tryParseJson(str, errEl) {
  try { const v = JSON.parse(str); errEl.textContent = ''; return {ok:true, val:v}; }
  catch(e) { errEl.textContent = 'Parse error: ' + e.message; return {ok:false}; }
}
function prettifyVal(v) { return JSON.stringify(v, null, 2); }

let jdTimer = null;
function runJsonDiff() {
  clearTimeout(jdTimer);
  jdTimer = setTimeout(_runJsonDiff, 80);
}
function _runJsonDiff() {
  const ls = document.getElementById('jd-left').value.trim();
  const rs = document.getElementById('jd-right').value.trim();
  const outEl = document.getElementById('jd-output');
  if (!ls && !rs) { outEl.innerHTML = ''; return; }
  const lp = tryParseJson(ls || '""', document.getElementById('jd-left-err'));
  const rp = tryParseJson(rs || '""', document.getElementById('jd-right-err'));
  if (!lp.ok || !rp.ok) { outEl.innerHTML = ''; return; }
  const lPretty = prettifyVal(lp.val);
  const rPretty = prettifyVal(rp.val);
  const hunks = myersDiff(lPretty.split('\n'), rPretty.split('\n'));
  outEl.innerHTML = renderDiff(hunks, true);
}

function prettifyJson() {
  const lEl = document.getElementById('jd-left');
  const rEl = document.getElementById('jd-right');
  try { if (lEl.value.trim()) lEl.value = prettifyVal(JSON.parse(lEl.value)); document.getElementById('jd-left-err').textContent=''; } catch(e) { document.getElementById('jd-left-err').textContent='Parse error: '+e.message; }
  try { if (rEl.value.trim()) rEl.value = prettifyVal(JSON.parse(rEl.value)); document.getElementById('jd-right-err').textContent=''; } catch(e) { document.getElementById('jd-right-err').textContent='Parse error: '+e.message; }
  runJsonDiff();
}
function clearJsonDiff() {
  document.getElementById('jd-left').value = '';
  document.getElementById('jd-right').value = '';
  document.getElementById('jd-output').innerHTML = '';
  document.getElementById('jd-left-err').textContent = '';
  document.getElementById('jd-right-err').textContent = '';
}
function swapJsonDiff() {
  const l = document.getElementById('jd-left').value;
  const r = document.getElementById('jd-right').value;
  document.getElementById('jd-left').value = r;
  document.getElementById('jd-right').value = l;
  runJsonDiff();
}
</script>
<script src="/shared/nav.js?v=2"></script>
