<svg xmlns="http://www.w3.org/2000/svg" width="760" height="270" viewBox="0 0 760 270">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4fc3f7"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="270" rx="12" fill="url(#bg)" stroke="#21262d" stroke-width="1"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#484f58">TLS CERTIFICATE CHAIN</text>

  <!-- ── Box 1: Leaf Cert ── -->
  <rect x="20" y="45" width="210" height="155" rx="8" fill="#0d1117" stroke="#f87171" stroke-width="1.5"/>
  <!-- Title strip -->
  <rect x="20" y="45" width="210" height="28" rx="8" fill="rgba(248,113,113,0.12)"/>
  <rect x="20" y="63" width="210" height="10" fill="rgba(248,113,113,0.12)"/>
  <text x="125" y="63" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="700" letter-spacing="2" fill="#f87171">LEAF CERT</text>
  <!-- Content -->
  <text x="34" y="90" font-family="'Courier New',monospace" font-size="11" fill="#484f58">CN=</text>
  <text x="58" y="90" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">ximg.app</text>
  <text x="34" y="108" font-family="'Courier New',monospace" font-size="11" fill="#484f58">IsCA:</text>
  <text x="74" y="108" font-family="'Courier New',monospace" font-size="11" fill="#f87171">false</text>
  <text x="34" y="126" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Issuer:</text>
  <text x="88" y="126" font-family="'Courier New',monospace" font-size="11" fill="#c9d1d9">E7</text>
  <text x="34" y="144" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Expires:</text>
  <text x="96" y="144" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">2026-07-05</text>
  <text x="34" y="162" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Index:</text>
  <text x="82" y="162" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">[0]</text>
  <!-- Not saved badge -->
  <rect x="20" y="179" width="210" height="21" rx="0" fill="rgba(248,113,113,0.08)"/>
  <rect x="20" y="179" width="210" height="21" fill="none"/>
  <rect x="20" y="194" width="210" height="6" rx="0" ry="8" fill="rgba(248,113,113,0.08)"/>
  <rect x="20" y="191" width="210" height="9" rx="0" fill="rgba(248,113,113,0.08)"/>
  <text x="125" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#f87171">✕ not saved by default</text>

  <!-- ── Arrow 1 ── -->
  <line x1="232" y1="122" x2="266" y2="122" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="249" y="114" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#484f58">signs</text>

  <!-- ── Box 2: Intermediate CA ── -->
  <rect x="270" y="45" width="220" height="155" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- Title strip -->
  <rect x="270" y="45" width="220" height="28" rx="8" fill="rgba(167,139,250,0.12)"/>
  <rect x="270" y="63" width="220" height="10" fill="rgba(167,139,250,0.12)"/>
  <text x="380" y="63" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="700" letter-spacing="2" fill="#a78bfa">INTERMEDIATE CA</text>
  <!-- Content -->
  <text x="284" y="90" font-family="'Courier New',monospace" font-size="11" fill="#484f58">CN=</text>
  <text x="308" y="90" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">E7</text>
  <text x="284" y="108" font-family="'Courier New',monospace" font-size="11" fill="#484f58">IsCA:</text>
  <text x="324" y="108" font-family="'Courier New',monospace" font-size="11" fill="#4ade80">true</text>
  <text x="284" y="126" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Issuer:</text>
  <text x="338" y="126" font-family="'Courier New',monospace" font-size="11" fill="#c9d1d9">ISRG Root X1</text>
  <text x="284" y="144" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Expires:</text>
  <text x="346" y="144" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">2027-03-12</text>
  <text x="284" y="162" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Index:</text>
  <text x="332" y="162" font-family="'Courier New',monospace" font-size="11" fill="#fbbf24">[1]</text>
  <!-- Saved badge -->
  <rect x="270" y="179" width="220" height="21" rx="0" fill="rgba(74,222,128,0.08)"/>
  <rect x="270" y="191" width="220" height="9" rx="0" fill="rgba(74,222,128,0.08)"/>
  <text x="380" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#4ade80">✓ saved automatically</text>

  <!-- ── Arrow 2 ── -->
  <line x1="492" y1="122" x2="526" y2="122" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="509" y="114" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#484f58">signs</text>

  <!-- ── Box 3: Root CA ── -->
  <rect x="530" y="45" width="210" height="155" rx="8" fill="#0d1117" stroke="#4ade80" stroke-width="1.5"/>
  <!-- Title strip -->
  <rect x="530" y="45" width="210" height="28" rx="8" fill="rgba(74,222,128,0.10)"/>
  <rect x="530" y="63" width="210" height="10" fill="rgba(74,222,128,0.10)"/>
  <text x="635" y="63" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="700" letter-spacing="2" fill="#4ade80">ROOT CA</text>
  <!-- Content -->
  <text x="544" y="90" font-family="'Courier New',monospace" font-size="11" fill="#484f58">CN=</text>
  <text x="568" y="90" font-family="'Courier New',monospace" font-size="11" fill="#e2e8f0">ISRG Root X1</text>
  <text x="544" y="108" font-family="'Courier New',monospace" font-size="11" fill="#484f58">IsCA:</text>
  <text x="584" y="108" font-family="'Courier New',monospace" font-size="11" fill="#4ade80">true</text>
  <text x="544" y="126" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Issuer:</text>
  <text x="598" y="126" font-family="'Courier New',monospace" font-size="11" fill="#c9d1d9">self-signed</text>
  <text x="544" y="144" font-family="'Courier New',monospace" font-size="11" fill="#484f58">AIA:</text>
  <text x="572" y="144" font-family="'Courier New',monospace" font-size="11" fill="#4fc3f7">x1.i.lencr.org</text>
  <text x="544" y="162" font-family="'Courier New',monospace" font-size="11" fill="#484f58">Index:</text>
  <text x="592" y="162" font-family="'Courier New',monospace" font-size="11" fill="#484f58">not in chain</text>
  <!-- Fetch-root badge -->
  <rect x="530" y="179" width="210" height="21" rx="0" fill="rgba(251,191,36,0.08)"/>
  <rect x="530" y="191" width="210" height="9" rx="0" fill="rgba(251,191,36,0.08)"/>
  <text x="635" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#fbbf24">✓ saved with -fetch-root</text>

  <!-- ── Bottom legend ── -->
  <text x="380" y="242" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#484f58">tls-ca-fetch walks the chain from server handshake · root fetched via AIA extension</text>
</svg>
