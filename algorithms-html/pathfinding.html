<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sorting Algorithms">
<title>Explorable Algorithms — algorithms.ximg.app</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#02020f;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;padding-top:44px;min-height:100vh}
  .subnav{position:sticky;top:44px;z-index:90;background:#070720;border-bottom:1px solid #1e293b;display:flex;justify-content:center;gap:0;overflow-x:auto}
  .subnav button{background:none;border:none;color:#94a3b8;padding:12px 22px;cursor:pointer;font-size:.9rem;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
  .subnav button:hover{color:#e2e8f0;background:#0f172a}
  .subnav button.active{color:#f97316;border-bottom-color:#f97316}
  h2{font-size:1.4rem;margin-bottom:6px;color:#f1f5f9}
  .subtitle{color:#64748b;font-size:.85rem;margin-bottom:20px}
  .controls{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px;align-items:center}
  .controls label{font-size:.82rem;color:#94a3b8}
  .controls select,.controls input[type=range]{background:#070720;border:1px solid #1e293b;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:.85rem}
  .controls input[type=range]{width:120px;accent-color:#f97316}
  .btn{background:#f97316;border:none;color:#fff;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;transition:opacity .2s}
  .btn:hover{opacity:.85}
  .btn.secondary{background:#1e293b;color:#94a3b8}
  .btn.secondary:hover{background:#334155;color:#e2e8f0}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  canvas{display:block;background:#070720;border:1px solid #1e293b;border-radius:8px}
  .speed-val{font-size:.8rem;color:#f97316;min-width:30px}
  /* sorting */
  #sortCanvas{width:100%;max-width:800px}
  .sort-info{margin-top:12px;font-size:.82rem;color:#64748b;display:flex;gap:24px}
  .sort-info span{display:flex;align-items:center;gap:6px}
  .sort-info .dot{width:10px;height:10px;border-radius:50%}
  /* pathfinding */
  #pathWrap{display:flex;gap:20px;flex-wrap:wrap}
  #pathCanvas{cursor:crosshair}
  .path-legend{display:flex;flex-direction:column;gap:8px;font-size:.8rem;color:#94a3b8}
  .path-legend span{display:flex;align-items:center;gap:8px}
  .path-legend .swatch{width:16px;height:16px;border-radius:3px;flex-shrink:0}
  #pathStats{margin-top:10px;font-size:.82rem;color:#64748b}
  /* BST */
  #bstWrap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
  #bstCanvas{background:#070720;border:1px solid #1e293b;border-radius:8px}
  .bst-controls{display:flex;flex-direction:column;gap:10px}
  .bst-controls input{background:#070720;border:1px solid #1e293b;color:#e2e8f0;padding:7px 10px;border-radius:6px;width:80px;font-size:.85rem}
  .traversal-seq{margin-top:10px;font-size:.8rem;color:#64748b;max-width:400px;line-height:1.6}
  /* graph */
  #graphCanvas{cursor:crosshair;width:100%;max-width:800px}
  .graph-info{margin-top:10px;font-size:.82rem;color:#64748b}
</style>
</head>
<body>
<nav class="subnav">
  <a class="active" href="index.html">Sorting</a>
  <a href="pathfinding.html">Pathfinding</a>
  <a href="bst.html">Binary Trees</a>
  <a href="graph.html">Graph</a>
</nav>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/algorithms') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="pathfinding">
<h2>Pathfinding Algorithms</h2>
  <p class="subtitle">Draw walls, set start/end, run A* or Dijkstra</p>
  <div class="controls">
    <label>Algorithm
      <select id="pathAlgo">
        <option value="astar">A* Search</option>
        <option value="dijkstra">Dijkstra</option>
      </select>
    </label>
    <label>Mode
      <select id="pathMode">
        <option value="wall">Draw Walls</option>
        <option value="start">Set Start</option>
        <option value="end">Set End</option>
      </select>
    </label>
    <button class="btn" id="pathRun">Find Path</button>
    <button class="btn secondary" id="pathClear">Clear</button>
    <button class="btn secondary" id="pathClearWalls">Clear Walls</button>
  </div>
  <div id="pathWrap">
    <canvas id="pathCanvas" width="560" height="420"></canvas>
    <div>
      <div class="path-legend">
        <span><span class="swatch" style="background:#22c55e"></span>Start</span>
        <span><span class="swatch" style="background:#ef4444"></span>End</span>
        <span><span class="swatch" style="background:#1e293b"></span>Wall</span>
        <span><span class="swatch" style="background:#3b82f6"></span>Explored</span>
        <span><span class="swatch" style="background:#f97316"></span>Path</span>
      </div>
      <div id="pathStats"></div>
    </div>
  </div>
</div>

<!-- ── TAB 3: BST ─────────────────────────────────────────────────────────── -->
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
