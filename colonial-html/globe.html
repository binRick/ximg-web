<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Age of Exploration">
  <title>Age of Exploration — Navigators of the New World</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛵</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #020408; --ocean: #041020; --navy: #0a1c40; --gold: #c8902c; --amber: #e0aa50; --teal: #1a7080; --text: #b8c8d0; --muted: #304050; --card: rgba(2,4,8,.94); --border: rgba(200,144,44,.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(10,28,64,.2) 0%, transparent 60%), linear-gradient(180deg, #020408 0%, #010206 100%); }
    #colonial-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.18; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(200,144,44,.5)); }
    .hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; color: var(--amber); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(200,144,44,.1); border: 1px solid var(--border); border-radius: 6px; padding: .35rem 1rem; font-size: .85rem; color: var(--gold); letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 110px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--teal); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    #globe-canvas { width: 100%; height: 260px; border: 1px solid var(--border); border-radius: 10px; background: rgba(2,4,8,.8); cursor: pointer; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(2,4,8,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(200,144,44,.07); }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } }
    .card-img { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 6px; margin-bottom: .75rem; filter: sepia(30%) brightness(.82); transition: filter .3s; display: block; }
    .card-img:hover { filter: sepia(8%) brightness(1); }
    .tl-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 4px; margin-top: .65rem; filter: sepia(30%) brightness(.85); transition: filter .3s; display: block; }
    .tl-img:hover { filter: sepia(8%) brightness(1); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .gallery-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .gallery-img { width: 100%; height: 220px; object-fit: cover; display: block; filter: sepia(25%) brightness(.85); transition: filter .3s; }
    .gallery-img:hover { filter: sepia(5%) brightness(1.05); }
    .gallery-info { padding: .6rem .85rem .8rem; }
    .gallery-title { font-size: .88rem; color: var(--amber); font-weight: 700; margin-bottom: .2rem; }
    .gallery-caption { font-size: .76rem; color: var(--muted); font-style: italic; line-height: 1.4; }
  </style>
</head>
<body>
<canvas id="colonial-canvas"></canvas>
<nav class="sub-nav-wrap">
  <div class="sub-nav">
    <a href="index.html">⛵ Explorers</a>
    <a href="empires.html">🌍 Colonial Empires</a>
    <a href="timeline.html">📅 Timeline</a>
    <a href="globe.html">🌐 Globe</a>
    <a href="gallery.html">📷 Gallery</a>
  </div>
</nav>
<script>
document.querySelectorAll('.sub-nav a').forEach(function(a){
  var h = a.getAttribute('href');
  var p = location.pathname;
  if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/colonial') || p.endsWith('index.html')))) {
    a.classList.add('active');
  }
});
</script>
<div class="wrap">
<section id="globe">
<div class="section-title">The Spinning Globe — Tracks of the Explorers</div>
    <canvas id="globe-canvas"></canvas>
    <div class="canvas-label">Click to chart a new course — exploration routes across the known and unknown world</div>
</section>
</div>
<script>
(function(){
  const c = document.getElementById('colonial-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const stars = Array.from({length:80}, () => ({ x: Math.random(), y: Math.random()*0.5, r: Math.random()*1.2+.3, a: Math.random()*Math.PI*2 }));
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.006;
    stars.forEach(s => {
      s.a += 0.003;
      ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
      ctx.fillStyle=`rgba(180,200,220,${0.2+0.12*Math.sin(s.a)})`; ctx.fill();
    });
    // Ocean waves
    for(let i=0;i<4;i++){
      ctx.beginPath(); ctx.moveTo(0,H*(0.6+i*0.1));
      for(let x=0;x<=W;x+=8) ctx.lineTo(x,H*(0.6+i*0.1)+Math.sin(x/100+t+i)*8);
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      ctx.fillStyle=`rgba(4,16,32,${0.05+i*0.03})`; ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script>
(function(){
  const c = document.getElementById('globe-canvas');
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 260;
  const W = c.width, H = c.height;
  const cx = W/2, cy = H/2, R = Math.min(W,H)/2-20;
  let rot = 0, speed = 0.003, ships = [], t = 0;
  c.addEventListener('click', e => {
    const r = c.getBoundingClientRect();
    const mx = e.clientX-r.left-cx, my = e.clientY-r.top-cy;
    const ang = Math.atan2(my, mx);
    ships.push({ angle: ang, lat: Math.random()*0.8-0.4, t: 0, col: ['#e0aa50','#60a0e0','#e06040'][Math.floor(Math.random()*3)] });
  });
  // Pre-load exploration routes
  const routes = [
    { name: 'Columbus', start: [0.1,-0.05], end: [-1.1,-0.3], col: '#e0aa50' },
    { name: 'da Gama', start: [0.1,0.55], end: [1.3,-0.2], col: '#60c0a0' },
    { name: 'Magellan', start: [0.1,-0.05], end: [-2.5,-0.3], col: '#c060e0' }
  ];
  function project(lon, lat, r){
    const x = Math.cos(lat) * Math.sin(lon) * r;
    const z = Math.cos(lat) * Math.cos(lon);
    const y = Math.sin(lat) * r;
    return { x, y, z };
  }
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.016; rot += speed;
    // Globe
    const g = ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,0,cx,cy,R);
    g.addColorStop(0,'rgba(20,50,100,.9)'); g.addColorStop(0.5,'rgba(10,30,70,.9)'); g.addColorStop(1,'rgba(2,8,20,.9)');
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(100,160,220,.2)'; ctx.lineWidth=1; ctx.stroke();
    // Latitude lines
    for(let lat=-60;lat<=60;lat+=30){
      const ly = Math.sin(lat*Math.PI/180)*R;
      const rr = Math.cos(lat*Math.PI/180)*R;
      ctx.beginPath(); ctx.ellipse(cx,cy+ly,rr,rr*0.15,0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(100,160,220,${lat===0?0.2:0.08})`; ctx.lineWidth=lat===0?1.5:0.5; ctx.stroke();
    }
    // Longitude lines
    for(let i=0;i<12;i++){
      const a = (i/12)*Math.PI*2 + rot;
      ctx.beginPath(); ctx.ellipse(cx,cy,Math.abs(Math.cos(a))*R,R,0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(100,160,220,0.06)`; ctx.lineWidth=0.5; ctx.stroke();
    }
    // Land masses (simplified)
    const lands = [
      { lon: 0, lat: 0.3, r: R*0.08 }, // Europe/Africa center
      { lon: -1.3, lat: 0.1, r: R*0.1 }, // Americas
      { lon: 1.5, lat: 0.15, r: R*0.1 }, // Asia
      { lon: 2.2, lat: -0.5, r: R*0.07 }, // Australia
    ];
    lands.forEach(l => {
      const lon = l.lon + rot;
      const vis = Math.cos(lon);
      if(vis > 0){
        const sx = cx + Math.sin(lon)*Math.cos(l.lat)*R;
        const sy = cy - Math.sin(l.lat)*R;
        ctx.beginPath(); ctx.arc(sx, sy, l.r*vis, 0, Math.PI*2);
        ctx.fillStyle=`rgba(40,100,40,${0.5*vis})`; ctx.fill();
      }
    });
    // Route lines
    routes.forEach((route, ri) => {
      const steps = 60;
      ctx.beginPath();
      let first = true;
      for(let i=0;i<=steps;i++){
        const frac = i/steps;
        const lon = route.start[0] + (route.end[0]-route.start[0])*frac + rot;
        const lat = route.start[1] + (route.end[1]-route.start[1])*frac;
        const vis = Math.cos(lon);
        if(vis > 0.1){
          const x = cx + Math.sin(lon)*Math.cos(lat)*R;
          const y = cy - Math.sin(lat)*R;
          if(first){ ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
        } else { first = true; }
      }
      ctx.strokeStyle=route.col; ctx.lineWidth=1.5; ctx.globalAlpha=0.5; ctx.stroke(); ctx.globalAlpha=1;
      // Ship marker
      const shipFrac = (t*0.05+ri*0.33)%1;
      const slon = route.start[0] + (route.end[0]-route.start[0])*shipFrac + rot;
      const slat = route.start[1] + (route.end[1]-route.start[1])*shipFrac;
      const svis = Math.cos(slon);
      if(svis > 0.1){
        const sx = cx + Math.sin(slon)*Math.cos(slat)*R;
        const sy = cy - Math.sin(slat)*R;
        ctx.beginPath(); ctx.arc(sx,sy,4*svis,0,Math.PI*2);
        ctx.fillStyle=route.col; ctx.fill();
      }
    });
    // Globe border
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,160,220,.3)'; ctx.lineWidth=1.5; ctx.stroke();
    // Legend
    routes.forEach((r,i) => {
      ctx.fillStyle=r.col; ctx.fillRect(8,8+i*16,8,8);
      ctx.font='10px Georgia'; ctx.fillStyle='rgba(180,200,220,.7)'; ctx.textAlign='left';
      ctx.fillText(r.name, 20, 16+i*16);
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
