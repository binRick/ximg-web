<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180">
<rect width="400" height="180" fill="#0a0a25"/>
<text x="200" y="20" font-size="14" fill="#22d3ee" font-family="sans-serif" text-anchor="middle" font-weight="bold">Capacitor Types</text>
<!-- Ceramic -->
<rect x="30" y="50" width="80" height="80" rx="40" fill="#c8a060"/>
<text x="70" y="94" font-size="11" fill="#02020f" font-family="sans-serif" text-anchor="middle">104</text>
<text x="70" y="150" font-size="12" fill="#e2e8f0" font-family="sans-serif" text-anchor="middle">Ceramic</text>
<!-- Electrolytic -->
<rect x="150" y="60" width="50" height="80" rx="4" fill="#888"/>
<rect x="155" y="65" width="40" height="30" fill="#333"/>
<text x="175" y="85" font-size="9" fill="#fff" font-family="monospace" text-anchor="middle">100µF</text>
<line x1="165" y1="140" x2="165" y2="155" stroke="#e2e8f0" stroke-width="2"/>
<line x1="185" y1="140" x2="185" y2="155" stroke="#e2e8f0" stroke-width="2"/>
<text x="175" y="170" font-size="12" fill="#e2e8f0" font-family="sans-serif" text-anchor="middle">Electrolytic</text>
<!-- Film -->
<rect x="260" y="55" width="80" height="70" rx="5" fill="#f4a542"/>
<text x="300" y="94" font-size="11" fill="#02020f" font-family="monospace" text-anchor="middle">.1µF</text>
<text x="300" y="150" font-size="12" fill="#e2e8f0" font-family="sans-serif" text-anchor="middle">Film</text>
</svg>
