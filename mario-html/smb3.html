<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Super Mario Bros. — mario.ximg.app</title>
<link rel="icon" href="favicon.svg">
<link href="vendor/press-start-2p.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Press Start 2P',monospace}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#mctrl{position:fixed;bottom:0;left:0;right:0;display:none;pointer-events:none;z-index:200;
  padding:10px 16px 20px;justify-content:space-between;align-items:flex-end}
#mctrl.show{display:flex}
.dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px;gap:4px;pointer-events:all}
.dbtn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  user-select:none;-webkit-user-select:none;touch-action:manipulation}
.dbtn:active,.dbtn.pressed{background:rgba(255,255,255,.4)}
.abtn-wrap{display:flex;gap:12px;pointer-events:all;align-items:flex-end}
.abtn-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.abtn-label{font-size:.35rem;color:#888}
.abtn{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.55rem;font-family:'Press Start 2P',monospace;
  user-select:none;-webkit-user-select:none;touch-action:manipulation}
.abtn:active,.abtn.pressed{filter:brightness(1.5)}
#btn-b{background:rgba(200,30,30,.75);border:2px solid rgba(255,60,60,.9);color:#fff}
#btn-a{background:rgba(30,80,220,.75);border:2px solid rgba(60,120,255,.9);color:#fff}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="mctrl">
  <div class="dpad">
    <div></div><div class="dbtn" id="db-up">▲</div><div></div>
    <div class="dbtn" id="db-left">◀</div><div></div><div class="dbtn" id="db-right">▶</div>
  </div>
  <div class="abtn-wrap">
    <div class="abtn-col"><div class="abtn" id="btn-b">B</div><div class="abtn-label">RUN</div></div>
    <div class="abtn-col"><div class="abtn" id="btn-a">A</div><div class="abtn-label">JUMP</div></div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// CANVAS + SCALE
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const VW = 256, VH = 240;
let SC = 3;
let hiScore = parseInt(localStorage.getItem('smb3_hi') || '0');

function resize() {
  const navH = 36;
  const aw = window.innerWidth, ah = window.innerHeight - navH;
  SC = Math.max(2, Math.floor(Math.min(aw/VW, ah/VH)));
  canvas.width  = VW * SC;
  canvas.height = VH * SC;
  canvas.style.marginTop = navH + 'px';
}
resize();
window.addEventListener('resize', resize);

function pr(x,y,w,h,c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.round(x*SC), Math.round(y*SC), Math.round(w*SC), Math.round(h*SC));
}
function pt(txt,x,y,sz,c,al='left') {
  ctx.font = `${sz*SC}px 'Press Start 2P',monospace`;
  ctx.fillStyle = c; ctx.textAlign = al;
  ctx.fillText(txt, x*SC, y*SC);
  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════
// NES SMB1 PALETTE
// ═══════════════════════════════════════════════════════
const C = {
  sky:  '#5C94FC',
  gr1:  '#C84010', gr2: '#7C2800', grt: '#FC9838',
  bk1:  '#C84010', bk2: '#7C2800', bk3: '#FC9838',
  qb1:  '#FCC000', qb2: '#C88000',
  ub1:  '#BC9860', ub2: '#7C5838',
  pp1:  '#00A800', pp2: '#006800', pp3: '#54FC54',
  hl1:  '#52E400', hl2: '#00A800',
  mr:   '#B53120', mb:  '#2038EC', ms: '#FCBCB0', mh: '#6C3800',
  gm1:  '#A83000', gm2: '#180800', gm3: '#D8C098', gm4: '#FC9838',
  kp1:  '#00A800', kp2: '#006800', kp3: '#E8D060',
  cn1:  '#FCC000',
  fp1:  '#B4B4B4', fp2: '#00A800',
  blk:  '#000000', wht: '#FCFCFC',
};

// ═══════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════
const K = {left:0,right:0,up:0,jump:0,run:0,start:0,jumpP:0,startP:0};
const KMAP = {
  ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up',
  KeyZ:'jump', Space:'jump', KeyA:'jump',
  KeyX:'run', ShiftLeft:'run', ShiftRight:'run', KeyS:'run',
  Escape:'start', Enter:'start',
};
document.addEventListener('keydown', e=>{
  const k=KMAP[e.code]; if(!k) return; e.preventDefault();
  if(!K[k]) K[k+'P']=1; K[k]=1; initAudio();
});
document.addEventListener('keyup', e=>{ const k=KMAP[e.code]; if(k) K[k]=0; });
function bindBtn(id,key) {
  const el=document.getElementById(id); if(!el) return;
  const on=()=>{ initAudio(); if(!K[key]) K[key+'P']=1; K[key]=1; el.classList.add('pressed'); };
  const off=()=>{ K[key]=0; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
}
bindBtn('db-left','left'); bindBtn('db-right','right'); bindBtn('db-up','up');
bindBtn('btn-a','jump'); bindBtn('btn-b','run');
if('ontouchstart' in window) document.getElementById('mctrl').classList.add('show');
function clearPressed() { K.jumpP=0; K.startP=0; }

// ═══════════════════════════════════════════════════════
// AUDIO — NES 3-channel synthesis + Web Audio scheduler
// ═══════════════════════════════════════════════════════
let AC = null, pulseWave = null;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  // NES 25% duty-cycle pulse wave via Fourier series
  const real = new Float32Array(64), imag = new Float32Array(64);
  for (let k = 1; k < 64; k++) imag[k] = (2/(k*Math.PI)) * Math.sin(k*Math.PI*0.25);
  pulseWave = AC.createPeriodicWave(real, imag, { disableNormalization: false });
}

function mf(n) { return 440 * Math.pow(2, (n - 69) / 12); }

// Schedule a note at an exact AudioContext timestamp (no drift)
function schedNote(freq, dur, vol, chan, at) {
  if (!AC || !freq) return;
  const o = AC.createOscillator(), g = AC.createGain();
  if (chan === 'pulse') { o.setPeriodicWave(pulseWave); }
  else { o.type = chan; }
  o.frequency.value = freq;
  // NES-style ADSR: sharp attack, slight decay, sustain, fast release
  g.gain.setValueAtTime(0, at);
  g.gain.linearRampToValueAtTime(vol, at + 0.004);
  g.gain.setValueAtTime(vol * 0.85, at + dur * 0.2);
  g.gain.setValueAtTime(vol * 0.72, at + dur * 0.75);
  g.gain.exponentialRampToValueAtTime(0.001, at + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(at); o.stop(at + dur + 0.01);
}

// Immediate one-shot for SFX
function beep(freq, dur, vol = 0.22, type = 'square') {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + dur + 0.01);
}

function nz(dur, vol = 0.15) {
  if (!AC) return;
  const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
  const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
  const s = AC.createBufferSource(), g = AC.createGain();
  s.buffer = buf; g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  s.connect(g); g.connect(AC.destination); s.start();
}

const SFX = {
  jump()    { beep(330,0.05,0.18); setTimeout(()=>beep(440,0.09,0.15),40); },
  coin()    { beep(mf(77),0.04,0.22); setTimeout(()=>beep(mf(83),0.09,0.18),50); },
  stomp()   { nz(0.06,0.2); beep(130,0.05,0.12,'sawtooth'); },
  brick()   { nz(0.05,0.18); beep(210,0.05,0.1); },
  powerup() { [72,74,76,77,79,81].forEach((n,i)=>setTimeout(()=>beep(mf(n),0.09,0.2),i*55)); },
  oneup()   { [76,79,84,88].forEach((n,i)=>setTimeout(()=>beep(mf(n),0.1,0.22),i*70)); },
  die()     { stopBGM(); [69,64,60,57].forEach((n,i)=>setTimeout(()=>beep(mf(n),0.13,0.2),i*90)); },
  clear()   { stopBGM(); [64,67,71,72,76].forEach((n,i)=>setTimeout(()=>beep(mf(n),0.15,0.22),i*90)); },
  bump()    { beep(210,0.04,0.1); },
  kick()    { nz(0.05,0.18); beep(160,0.05,0.1,'sawtooth'); },
  flag()    { stopBGM(); [79,76,74,72,71,69,67,64].forEach((n,i)=>setTimeout(()=>beep(mf(n),0.08,0.2),i*65)); },
};

// ── SMB3 World 1 Overworld BGM ─────────────────────────────────────────────
// 3 channels: Pulse 1 (melody) | Pulse 2 (harmony) | Triangle (bass)
// 16th-note grid @ 168 BPM, 128-step loop

const SMB3_BPM  = 168;
const SMB3_S16  = 60 / SMB3_BPM / 4; // 16th note in seconds

// Pulse 1 — melody (MIDI note numbers, 0 = rest)
const M1 = [
  // ── A phrase — measures 1-2 ──
  76,0,74,0, 72,0,71,0,   // E5 D5  C5 B4
  69,0,68,0, 69,0, 0,0,   // A4 Ab4 A4 —
  72,0, 0,74, 76,0,72,0,  // C5 — D5 E5 C5 —
  69,0, 0, 0,  0,0, 0,0,  // A4 — — —
  // ── A phrase — measures 3-4 ──
  79,0,77,0, 76,0,74,0,   // G5 F5  E5 D5
  72,0,71,0, 72,0, 0,0,   // C5 B4  C5 —
  74,0, 0,76, 79,0,76,0,  // D5 — E5 G5 E5 —
  72,0, 0, 0,  0,0, 0,0,  // C5 — — —
  // ── B phrase — measures 5-6 ──
  84,0, 0,0,  79,0, 0,0,  // C6 —  G5 —
  81,0, 0,0,  76,0, 0,0,  // A5 —  E5 —
  79,0,76,0,  74,0,72,71, // G5 E5 D5 C5 B4
  69,0,68,0,  69,0, 0,0,  // A4 Ab4 A4 —
  // ── B phrase — measures 7-8 ──
  84,0, 0,0,  79,0, 0,0,  // C6 —  G5 —
  81,0, 0,0,  76,0, 0,0,  // A5 —  E5 —
  79,0,76,0,  74,0,72,71, // G5 E5 D5 C5 B4
  67,0, 0,0,   0,0, 0,0,  // G4 — — —
];

// Pulse 2 — harmony (third below melody)
const M2 = [
  72,0,71,0, 69,0,67,0,
  65,0,64,0, 65,0, 0,0,
  69,0, 0,71, 72,0,69,0,
  65,0, 0, 0,  0,0, 0,0,
  76,0,74,0, 72,0,71,0,
  69,0,68,0, 69,0, 0,0,
  71,0, 0,72, 76,0,72,0,
  69,0, 0, 0,  0,0, 0,0,
  79,0, 0,0,  76,0, 0,0,
  77,0, 0,0,  72,0, 0,0,
  76,0,72,0,  71,0,69,67,
  65,0,64,0,  65,0, 0,0,
  79,0, 0,0,  76,0, 0,0,
  77,0, 0,0,  72,0, 0,0,
  76,0,72,0,  71,0,69,67,
  64,0, 0,0,   0,0, 0,0,
];

// Triangle — bass (root + fifth pattern)
const MB = [
  60,0,0,0, 60,0,0,0,   // C4
  65,0,0,0, 64,0,0,0,   // F4 E4
  60,0,0,0, 67,0,0,0,   // C4 G4
  65,0,0,0, 64,0,0,0,   // F4 E4
  67,0,0,0, 67,0,0,0,   // G4
  62,0,0,0, 60,0,0,0,   // D4 C4
  60,0,0,0, 67,0,0,0,   // C4 G4
  65,0,0,0, 60,0,0,0,   // F4 C4
  60,0,0,0, 67,0,0,0,
  65,0,0,0, 60,0,0,0,
  67,0,0,0, 62,0,0,0,
  65,0,0,0, 64,0,0,0,
  60,0,0,0, 67,0,0,0,
  65,0,0,0, 60,0,0,0,
  67,0,0,0, 62,0,0,0,
  60,0,0,0, 60,0,0,0,
];

let BGM_on = false, BGM_sched = null, BGM_step = 0, BGM_t0 = 0;

function bgmSchedule() {
  if (!BGM_on || !AC) return;
  const AHEAD = 0.15; // schedule 150 ms ahead
  const until = AC.currentTime + AHEAD;
  const len = M1.length;
  while (BGM_t0 + BGM_step * SMB3_S16 < until) {
    const t = BGM_t0 + BGM_step * SMB3_S16;
    const i = BGM_step % len;
    if (M1[i]) schedNote(mf(M1[i]), SMB3_S16 * 0.80, 0.11,  'pulse',    t);
    if (M2[i]) schedNote(mf(M2[i]), SMB3_S16 * 0.78, 0.065, 'pulse',    t);
    if (MB[i]) schedNote(mf(MB[i]), SMB3_S16 * 1.08, 0.058, 'triangle', t);
    BGM_step++;
  }
  BGM_sched = setTimeout(bgmSchedule, 25);
}

function startBGM() {
  if (BGM_on) return;
  BGM_on = true; BGM_step = 0;
  BGM_t0 = AC.currentTime + 0.05;
  bgmSchedule();
}
function stopBGM() {
  BGM_on = false;
  if (BGM_sched) clearTimeout(BGM_sched);
}

// ═══════════════════════════════════════════════════════
// TILE TYPES + DRAWING
// ═══════════════════════════════════════════════════════
const T=16;
const AIR=0,GROUND=1,BRICK=2,QBLOCK=3,USED=4,
      PTOP_L=5,PTOP_R=6,PBOD_L=7,PBOD_R=8,SOLID=9;

function isSolid(t) {
  return t===GROUND||t===BRICK||t===QBLOCK||t===USED||t===SOLID||
         t===PTOP_L||t===PTOP_R||t===PBOD_L||t===PBOD_R;
}

function drawGround(sx,sy) {
  pr(sx,sy,  T,2, C.grt);
  pr(sx+1,sy,T-2,1,'#FCC000');
  pr(sx,sy+2,T,T-2, C.gr1);
  pr(sx,sy+2,T,1, C.gr2); pr(sx,sy+10,T,1, C.gr2);
  pr(sx+4,sy+3,1,7,C.gr2); pr(sx+12,sy+3,1,7,C.gr2);
  pr(sx+8,sy+11,1,5,C.gr2);
  pr(sx+1,sy+3,3,1,'#E05820'); pr(sx+9,sy+11,3,1,'#E05820');
}
function drawGroundFill(sx,sy) {
  pr(sx,sy,T,T,C.gr1);
  pr(sx,sy,T,1,C.gr2); pr(sx,sy+8,T,1,C.gr2);
  pr(sx+8,sy+1,1,7,C.gr2); pr(sx+4,sy+9,1,7,C.gr2);
}
function drawBrick(sx,sy) {
  pr(sx,sy,T,T,C.bk1);
  pr(sx,sy,T,1,C.bk2); pr(sx,sy+8,T,1,C.bk2);
  pr(sx,sy+1,1,7,C.bk2); pr(sx+8,sy+9,1,7,C.bk2);
  pr(sx+1,sy+1,6,1,C.bk3); pr(sx+9,sy+9,5,1,C.bk3);
}
function drawQBlock(sx,sy,used,frame) {
  if(used) {
    pr(sx,sy,T,T,C.ub1);
    pr(sx,sy,1,T,C.ub2); pr(sx+T-1,sy,1,T,C.ub2);
    pr(sx,sy,T,1,'#DCC890'); pr(sx,sy+T-1,T,1,C.ub2);
    pr(sx+5,sy+4,6,2,C.ub2); pr(sx+5,sy+6,2,4,C.ub2); pr(sx+9,sy+6,2,4,C.ub2);
    return;
  }
  const ani=Math.floor(frame/8)%4;
  const cols=['#FCC000','#F8A800','#FCFCFC','#F8A800'];
  pr(sx,sy,T,T,cols[ani]);
  pr(sx,sy,1,T,'#FCFCFC'); pr(sx,sy,T,1,'#FCFCFC');
  pr(sx+T-1,sy,1,T,C.qb2); pr(sx,sy+T-1,T,1,C.qb2);
  // ? mark
  const qc = ani===2 ? C.qb2 : '#000';
  pr(sx+5,sy+3,2,1,qc); pr(sx+7,sy+3,2,1,qc); pr(sx+9,sy+4,1,2,qc);
  pr(sx+7,sy+6,2,1,qc); pr(sx+6,sy+7,2,2,qc); pr(sx+6,sy+10,2,2,qc);
}
function drawSolid(sx,sy) {
  pr(sx,sy,T,T,C.gr1);
  pr(sx,sy,T,2,C.grt); pr(sx+1,sy,T-2,1,'#FCC000');
}
function drawPipeTL(sx,sy) {
  pr(sx-2,sy,T+4,T,C.pp1);
  pr(sx-2,sy,2,T,C.pp2); pr(sx,sy,2,T,C.pp3); pr(sx+T,sy,2,T,C.pp2); pr(sx+T+2,sy,2,T,C.pp2);
  pr(sx-2,sy,T+4,3,C.pp3); pr(sx-2,sy+T-3,T+4,3,C.pp2);
}
function drawPipeTR(sx,sy) {
  pr(sx-2,sy,T+4,T,C.pp1);
  pr(sx-2,sy,2,T,C.pp3); pr(sx+T-2,sy,2,T,C.pp2); pr(sx+T,sy,2,T,C.pp2);
  pr(sx-2,sy,T+4,3,C.pp3); pr(sx-2,sy+T-3,T+4,3,C.pp2);
}
function drawPipeBL(sx,sy) {
  pr(sx-2,sy,T+4,T,C.pp1);
  pr(sx-2,sy,2,T,C.pp2); pr(sx,sy,2,T,C.pp3); pr(sx+T,sy,2,T,C.pp2); pr(sx+T+2,sy,2,T,C.pp2);
}
function drawPipeBR(sx,sy) {
  pr(sx-2,sy,T+4,T,C.pp1);
  pr(sx-2,sy,2,T,C.pp3); pr(sx+T-2,sy,2,T,C.pp2); pr(sx+T,sy,2,T,C.pp2);
}

function drawTile(tx,ty,type,frame,camX) {
  const sx=tx*T-camX, sy=ty*T;
  if(sx>VW+T+4||sx<-T-4) return;
  switch(type) {
    case GROUND:   drawGround(sx,sy);        break;
    case BRICK:    drawBrick(sx,sy);         break;
    case QBLOCK:   drawQBlock(sx,sy,false,frame); break;
    case USED:     drawQBlock(sx,sy,true,0);      break;
    case SOLID:    drawSolid(sx,sy);         break;
    case PTOP_L:   drawPipeTL(sx,sy);        break;
    case PTOP_R:   drawPipeTR(sx,sy);        break;
    case PBOD_L:   drawPipeBL(sx,sy);        break;
    case PBOD_R:   drawPipeBR(sx,sy);        break;
  }
}

// ═══════════════════════════════════════════════════════
// SPRITE DRAWING — NES SMB1 PIXEL ART
// ═══════════════════════════════════════════════════════
const SMALL=0, BIG=1, FIRE=2;

function drawMario(vx,vy,power,dir,frame,inv,crouching) {
  if(inv && Math.floor(Date.now()/80)%2===0) return;
  const W = power>=BIG ? 16 : 12;
  ctx.save();
  if(dir<0) { ctx.translate((vx+W)*SC,0); ctx.scale(-1,1); vx=0; }
  const r=(ox,oy,w,h,c)=>pr(vx+ox,vy+oy,w,h,c);
  const RED  = power===FIRE ? '#FCFCFC' : C.mr;
  const BLUE = power===FIRE ? C.mr      : C.mb;

  if(power===SMALL) {
    // Hat
    r(3,0,6,1,RED); r(2,1,8,1,RED); r(1,2,10,2,RED);
    // Face
    r(2,4,3,1,C.mh); r(7,4,3,1,C.mh);
    r(2,5,8,2,C.ms);
    r(4,5,2,1,C.mh);
    r(3,7,2,1,C.mh); r(7,7,2,1,C.mh);
    // Body
    r(2,8,8,2,RED);
    r(1,10,4,3,BLUE); r(7,10,4,3,BLUE); r(4,10,4,3,BLUE);
    // Legs
    const f=frame%3;
    if(f===0){ r(2,13,3,2,C.mh); r(7,13,3,2,C.mh); }
    else if(f===1){ r(1,13,4,1,C.mh);r(2,14,3,1,C.mh); r(7,12,4,1,C.mh);r(6,13,4,1,C.mh); }
    else          { r(4,12,3,1,C.mh);r(3,13,4,1,C.mh); r(5,13,4,1,C.mh);r(6,14,3,1,C.mh); }
  } else if(!crouching) {
    // Big Mario 16×24
    r(3,0,8,2,RED); r(2,2,12,2,RED);
    r(3,4,4,1,C.mh); r(9,4,4,1,C.mh);

// ═══════════════════════════════════════════════════════
// LEVEL DATA
// ═══════════════════════════════════════════════════════
const LW=170, LH=15;
let MAP    = null;  // Uint8Array
let QDATA  = {};    // "tx,ty" -> {used,content}
let BUMPS  = [];    // [{tx,ty,dy,timer}]
let FLAGX  = 0;     // pixel x of flagpole center

function st(tx,ty,t){ if(tx>=0&&tx<LW&&ty>=0&&ty<LH) MAP[ty*LW+tx]=t; }
function gt(tx,ty){
  if(tx<0) return SOLID; if(tx>=LW) return AIR;
  if(ty<0) return AIR;   if(ty>=LH) return SOLID;
  return MAP[ty*LW+tx];
}
function rowT(ty,x1,x2,t){ for(let x=x1;x<=x2;x++) st(x,ty,t); }
function colT(tx,y1,y2,t){ for(let y=y1;y<=y2;y++) st(tx,y,t); }
function ground(x1,x2){ rowT(12,x1,x2,GROUND); rowT(13,x1,x2,GROUND); rowT(14,x1,x2,GROUND); }
function pipe(tx,h){
  const top=12-h;
  st(tx,top,PTOP_L); st(tx+1,top,PTOP_R);
  for(let y=top+1;y<=11;y++){ st(tx,y,PBOD_L); st(tx+1,y,PBOD_R); }
}
function qb(tx,ty,content){ st(tx,ty,QBLOCK); QDATA[tx+','+ty]={used:false,content}; }
function stairUp(startX,steps){ // staircase going right, ascending
  for(let i=0;i<steps;i++) colT(startX+i, 12-i-1, 11, SOLID);
}
function stairDown(startX,steps){ // staircase going right, descending
  for(let i=0;i<steps;i++) colT(startX+i, 12-(steps-i), 11, SOLID);
}

function buildLevel() {
  MAP   = new Uint8Array(LW*LH);
  QDATA = {};
  BUMPS = [];

  // Full ground (1-1 has no pits)
  ground(0, LW-1);

  // ── Phase 1: Opening ──
  qb(16, 9, 'mushroom');
  st(20,9,BRICK); qb(21,9,'coin'); qb(22,9,'coin'); st(23,9,BRICK); st(24,9,BRICK);

  // ── Phase 2: First pipe ──
  pipe(29, 2);  // 2 tiles tall

  // ── Phase 3: Second pipe + blocks ──
  qb(38, 5, 'coin');           // lone high block
  pipe(40, 3);                 // 3 tiles tall

  // Brick platform
  st(46,9,BRICK); st(47,9,BRICK); st(48,9,BRICK);
  qb(49,9,'star');
  st(50,9,BRICK); st(51,9,BRICK); st(52,9,BRICK);

  // Upper bridge
  for(let x=53;x<=59;x++) st(x,5,BRICK);

  // ── Phase 4: Third + fourth pipe ──
  pipe(57, 4);  // 4 tall
  pipe(64, 5);  // 5 tall (tallest)

  // ── Phase 5: Post-pipes blocks ──
  st(75,9,BRICK); st(76,9,BRICK); st(77,9,BRICK);
  qb(78,9,'coin');
  st(79,9,BRICK); st(80,9,BRICK);
  qb(84,5,'coin');
  for(let x=85;x<=89;x++) st(x,5,BRICK);

  // ── Phase 6: Pre-staircase blocks ──
  st(100,9,BRICK); st(101,9,BRICK); st(102,9,BRICK);

  // ── Phase 7: Staircases ──
  stairUp(108, 8);    // 8-step ascending at x=108–115
  stairDown(117, 8);  // 8-step descending at x=117–124

  // ── Phase 8: Flagpole ──
  FLAGX = 133 * T + T/2;

  // Castle blocks past flag
  for(let x=136;x<=LW-1;x++) {
    st(x,12,GROUND); st(x,13,GROUND); st(x,14,GROUND);
  }
  // Castle wall
  for(let x=138;x<=LW-4;x++) st(x,10,SOLID);
  colT(138,10,11,SOLID); colT(LW-5,10,11,SOLID);
  for(let y=8;y<=9;y++){ st(139,y,SOLID); st(LW-6,y,SOLID); }
  for(let x=140;x<=LW-7;x++) st(x,10,SOLID);
}

// ═══════════════════════════════════════════════════════
// ENTITIES
// ═══════════════════════════════════════════════════════
class Entity {
  constructor(x,y){ this.x=x; this.y=y; this.vx=0; this.vy=0; this.remove=false; }
  tileAt(ox,oy){ return gt(Math.floor((this.x+ox)/T), Math.floor((this.y+oy)/T)); }
}

// ── PLAYER ──────────────────────────────────────────────
class Player extends Entity {
  constructor(x,y) {
    super(x,y);
    this.power   = SMALL;
    this.dir     = 1;
    this.frame   = 0;
    this.frameTimer = 0;
    this.onGround   = false;
    this.jumpTimer  = 0;    // frames left to sustain jump
    this.invTimer   = 0;    // invincibility frames
    this.starTimer  = 0;    // star power frames
    this.dead       = false;
    this.crouching  = false;
    this.score      = 0;
    this.coins      = 0;
    this.lives      = 3;
    this.fireCD     = 0;
  }
  get w(){ return this.power>=BIG ? 12 : 10; }
  get h(){ return this.power>=BIG ? (this.crouching?16:24) : 16; }
  get drawX(){ return this.x - (this.power>=BIG?2:1); }
  get drawY(){ return this.y; }

  die(game) {
    if(this.invTimer>0&&this.starTimer<=0) return;
    if(this.power>SMALL){ this.power=SMALL; this.invTimer=120; SFX.powerup(); return; }
    if(this.dead) return;
    this.dead=true; this.vy=-6; SFX.die();
  }

  update(K,game) {
    if(this.dead){
      this.vy = Math.min(this.vy+0.3, 8);
      this.y += this.vy;
      return;
    }

    const big    = this.power >= BIG;
    const onIce  = false;
    if(this.invTimer>0) this.invTimer--;
    if(this.starTimer>0) this.starTimer--;
    if(this.fireCD>0) this.fireCD--;

    // ── Horizontal ──
    const running = K.run;
    const maxSpd  = running ? 2.5 : 1.5;
    const acc     = this.onGround ? (running?0.18:0.12) : 0.08;
    const fric    = this.onGround ? 0.18 : 0.04;

    if(K.left) {
      this.vx = Math.max(this.vx - acc, -maxSpd);
      this.dir = -1;
    } else if(K.right) {
      this.vx = Math.min(this.vx + acc, maxSpd);
      this.dir = 1;
    } else {
      if(this.vx > 0) this.vx = Math.max(0, this.vx-fric);
      else if(this.vx < 0) this.vx = Math.min(0, this.vx+fric);
    }

    // ── Crouching (big only) ──
    this.crouching = big && K.up===0 && K.left===0 && K.right===0 && false; // no crouching in SMB1

    // ── Jump ──
    const jumpVy = Math.abs(this.vx)>1.8 ? -5.8 : -4.8;
    if(K.jumpP && this.onGround) {
      this.vy = jumpVy;
      this.jumpTimer = 16;
      this.onGround = false;
      SFX.jump();
    }
    if(K.jump && this.jumpTimer>0 && this.vy<0) {
      this.vy -= 0.20;
      this.jumpTimer--;
    } else {
      this.jumpTimer=0;
    }
    if(!K.jump && this.vy<0) this.jumpTimer=0;

    // ── Gravity ──
    const grav = (K.jump&&this.vy<0&&this.jumpTimer>0) ? 0.22 : 0.35;
    this.vy = Math.min(this.vy + grav, 5.5);

    // ── Move + collide ──
    this.moveX(this.vx);
    this.moveY(this.vy);

    // ── Fireball ──
    if(K.run && this.power===FIRE && this.fireCD<=0) {
      this.fireCD=18;
      game.spawnFireball(this.x+8*this.dir, this.y+8, this.dir);
    }

    // ── Animate ──
    if(this.onGround && (K.left||K.right)) {
      this.frameTimer++;
      const spd = Math.abs(this.vx);
      const rate = spd > 1.5 ? 5 : 9;
      if(this.frameTimer>=rate){ this.frameTimer=0; this.frame++; }
    } else if(!this.onGround) {
      this.frame=1;
    } else {
      this.frame=0; this.frameTimer=0;
    }
  }

  moveX(dx) {
    this.x += dx;
    const hw=this.w/2, h=this.h;
    // Left wall
    if(isSolid(gt(Math.floor((this.x)/T), Math.floor((this.y+2)/T))) ||
       isSolid(gt(Math.floor((this.x)/T), Math.floor((this.y+h-2)/T)))) {
      this.x = Math.floor((this.x)/T)*T + T;
      this.vx=0;
    }
    // Right wall
    if(isSolid(gt(Math.floor((this.x+this.w)/T), Math.floor((this.y+2)/T))) ||
       isSolid(gt(Math.floor((this.x+this.w)/T), Math.floor((this.y+h-2)/T)))) {
      this.x = Math.floor((this.x+this.w)/T)*T - this.w;
      this.vx=0;
    }
  }

  moveY(dy) {
    this.y += dy;
    this.onGround=false;
    if(dy>0) {
      // Floor
      const ty=Math.floor((this.y+this.h)/T);
      const lx=Math.floor((this.x+1)/T), rx=Math.floor((this.x+this.w-1)/T);
      if(isSolid(gt(lx,ty))||isSolid(gt(rx,ty))) {
        this.y = ty*T - this.h;
        this.vy=0; this.onGround=true;
      }
    } else if(dy<0) {
      // Ceiling
      const ty=Math.floor(this.y/T);
      const lx=Math.floor((this.x+1)/T), rx=Math.floor((this.x+this.w-1)/T);
      const hitL=isSolid(gt(lx,ty)), hitR=isSolid(gt(rx,ty));
      if(hitL||hitR) {
        this.y = (ty+1)*T;
        this.vy=0;
        // Hit block?
        if(hitL) game.hitBlock(lx,ty);
        else     game.hitBlock(rx,ty);
      }
    }
  }
}

// ── GOOMBA ──────────────────────────────────────────────
class Goomba extends Entity {
  constructor(x,y){ super(x,y); this.vx=-0.8; this.frame=0; this.timer=0; this.squished=false; this.squishTimer=0; }
  update(game) {
    if(this.squished){ if(++this.squishTimer>30) this.remove=true; return; }
    this.vy=Math.min(this.vy+0.35,5);
    this.y+=this.vy;
    // Floor
    const ty=Math.floor((this.y+16)/T);
    if(isSolid(gt(Math.floor((this.x+2)/T),ty))||isSolid(gt(Math.floor((this.x+13)/T),ty))) {
      this.y=ty*T-16; this.vy=0;
    }
    this.x+=this.vx;
    // Wall bounce
    if(isSolid(gt(Math.floor((this.vx<0?(this.x+1):(this.x+15))/T),Math.floor((this.y+8)/T))))
      this.vx=-this.vx;
    if(this.x<0) this.vx=Math.abs(this.vx);
    if(++this.timer%12===0) this.frame^=1;
  }
  stomp(game){ this.squished=true; game.addScore(100); SFX.stomp(); }
  draw(camX){ drawGoomba(this.x-camX,this.y,this.frame,this.squished); }
}

// ── KOOPA ───────────────────────────────────────────────
class Koopa extends Entity {
  constructor(x,y,red=false){
    super(x,y); this.red=red; this.vx=-0.7; this.frame=0; this.timer=0;
    this.inShell=false; this.shellTimer=0; this.spinning=false;
  }
  update(game) {
    this.vy=Math.min(this.vy+0.35,5); this.y+=this.vy;
    const ty=Math.floor((this.y+16)/T);
    if(isSolid(gt(Math.floor((this.x+2)/T),ty))||isSolid(gt(Math.floor((this.x+13)/T),ty))) {
      this.y=ty*T-16; this.vy=0;
    }
    this.x+=this.vx;
    if(isSolid(gt(Math.floor((this.vx<0?(this.x+1):(this.x+15))/T),Math.floor((this.y+8)/T))))
      this.vx=-this.vx;
    if(this.x<0) this.vx=Math.abs(this.vx);
    if(this.inShell && this.shellTimer>0) this.shellTimer--;
    if(this.inShell && this.shellTimer===0 && !this.spinning) { this.inShell=false; this.vx=-0.7; }
    if(++this.timer%10===0) this.frame^=1;
  }
  stomp(game) {
    if(!this.inShell){
      this.inShell=true; this.shellTimer=180; this.spinning=false; this.vx=0;
      game.addScore(100); SFX.stomp();
    } else {
      this.spinning=true; this.vx=this.x<game.player.x ? -4 : 4;
      game.addScore(400); SFX.kick();
    }
  }
  draw(camX){ drawKoopa(this.x-camX,this.y,this.dir||1,this.frame,this.inShell,this.spinning); }
}

// ── ITEM (Mushroom / FireFlower / Star) ──────────────────
class Item extends Entity {
  constructor(x,y,type){ super(x,y); this.type=type; this.vy=0; this.vx=0.8; this.frame=0; this.timer=0; }
  update(game) {
    this.vy=Math.min(this.vy+0.35,4); this.y+=this.vy;
    const ty=Math.floor((this.y+16)/T);
    if(isSolid(gt(Math.floor((this.x+2)/T),ty))||isSolid(gt(Math.floor((this.x+13)/T),ty))){
      this.y=ty*T-16; this.vy=0;
    }
    if(this.type!=='flower') {
      this.x+=this.vx;
      if(isSolid(gt(Math.floor((this.vx<0?(this.x+1):(this.x+15))/T),Math.floor((this.y+8)/T))))
        this.vx=-this.vx;
    }
    if(++this.timer%6===0) this.frame++;
  }
  draw(camX) {
    const sx=this.x-camX;
    if(this.type==='mushroom') drawMushroom(sx,this.y,false);
    else if(this.type==='flower') drawFireFlower(sx,this.y,this.frame);
    else if(this.type==='star')   drawStar(sx,this.y,this.frame);
    else if(this.type==='1up')    drawMushroom(sx,this.y,true);
  }
}

// ── COIN FLY ─────────────────────────────────────────────
class CoinFly extends Entity {
  constructor(x,y){ super(x,y); this.vy=-4; this.timer=0; this.frame=0; }
  update(){ this.vy+=0.25; this.y+=this.vy; this.timer++; this.frame=Math.floor(this.timer/4); if(this.timer>40) this.remove=true; }
  draw(camX){ drawCoin(this.x-camX,this.y,this.frame); }
}

// ── FIREBALL ─────────────────────────────────────────────
class Fireball extends Entity {
  constructor(x,y,dir){ super(x,y); this.vx=dir*4; this.vy=2; this.frame=0; this.timer=0; this.dir=dir; }
  update(game) {
    this.vy=Math.min(this.vy+0.4,4); this.x+=this.vx; this.y+=this.vy;
    const ty=Math.floor((this.y+8)/T);
    if(isSolid(gt(Math.floor((this.x+4)/T),ty))) { this.vy=-3; this.y=ty*T-8; }
    if(isSolid(gt(Math.floor((this.x+8)/T),Math.floor((this.y+4)/T)))) this.remove=true;
    if(++this.timer>90) this.remove=true;
    this.frame=Math.floor(this.timer/4);
  }
  draw(camX){ drawFireball(this.x-camX,this.y,this.frame); }
}

// ── SCORE POPUP ───────────────────────────────────────────
class Popup {
  constructor(x,y,txt){ this.x=x; this.y=y; this.txt=txt; this.timer=0; this.remove=false; }
  update(){ this.y-=0.5; if(++this.timer>50) this.remove=true; }
  draw(camX){ pt(this.txt,this.x-camX,this.y,4,'#FCF0C0','center'); }
}

// ═══════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════
function drawHUD(game) {
  pr(0,0,VW,16,C.blk);
  const p=game.player;
  // Score
  pt('MARIO', 2,6, 4, C.wht);
  pt(String(p.score).padStart(6,'0'), 2, 14, 4, C.wht);
  // Coin indicator
  pr(56,5,6,8,C.cn1); pr(58,6,2,6,'#C89400'); pr(56,5,1,8,'#FCFC54');
  pt('x'+String(p.coins).padStart(2,'0'), 64, 14, 4, C.wht);
  // Hi-Score
  pt('HI-SCORE', 88, 6, 4, C.wht);
  const hiColor = p.score>0 && p.score===hiScore ? '#FCC000' : C.wht;
  pt(String(hiScore).padStart(6,'0'), 96, 14, 4, hiColor);
  // World
  pt('WORLD', 162, 6, 4, C.wht);
  pt('  1-1', 162, 14, 4, C.wht);
  // Time
  pt('TIME', 214, 6, 4, C.wht);
  const t=Math.max(0,Math.floor(game.timer));
  const tc = t<100?'#FC4040':C.wht;
  pt(String(t).padStart(3,' '), 214, 14, 4, tc);
}

// ═══════════════════════════════════════════════════════
// DECORATIONS (clouds, hills, bushes)
// ═══════════════════════════════════════════════════════
function drawBG(camX) {
  // Sky
  ctx.fillStyle=C.sky;
  ctx.fillRect(0, 16*SC, canvas.width, canvas.height);

  // Hills (parallax 0.5)
  const hillPos=[0,64,176,288,400,512];
  const hscroll=Math.floor(camX*0.5);
  hillPos.forEach(hp => {
    const sx=((hp*2-hscroll)%(VW*2)+VW*2)%(VW*2)-16;
    // big hill
    ctx.fillStyle=C.hl2;
    ctx.beginPath();
    ctx.arc((sx+24)*SC,(VH-30)*SC,22*SC,Math.PI,0);
    ctx.fill();
    ctx.fillStyle=C.hl1;
    ctx.beginPath();
    ctx.arc((sx+24)*SC,(VH-30)*SC,20*SC,Math.PI,0);
    ctx.fill();
    // dots on hill
    pr(sx+16,VH-42,3,3,C.hl2); pr(sx+26,VH-46,3,3,C.hl2); pr(sx+36,VH-42,3,3,C.hl2);
    // small hill beside
    ctx.fillStyle=C.hl2;
    ctx.beginPath();
    ctx.arc((sx+64)*SC,(VH-30)*SC,14*SC,Math.PI,0);
    ctx.fill();
    ctx.fillStyle=C.hl1;
    ctx.beginPath();
    ctx.arc((sx+64)*SC,(VH-30)*SC,12*SC,Math.PI,0);
    ctx.fill();
  });

  // Clouds (parallax 0.3)
  const cscroll=Math.floor(camX*0.3);
  const cloudPos=[20,100,200,300,400,480,560];
  cloudPos.forEach(cp => {
    const sx=((cp*2-cscroll)%(VW*2+32)+VW*2+32)%(VW*2+32)-16;
    const cy=Math.floor(cp/80)%3*20+24;
    pr(sx+4, cy,   16,7, C.wht); pr(sx,   cy+7,  24,7, C.wht);
    pr(sx+4, cy+14, 16,4, C.wht);
    pr(sx+8, cy-6,  8,8, C.wht);
    // Cloud shadow line
    pr(sx+2, cy+18, 20,2, '#BCBCBC');
  });

  // Bushes (ground level, parallax 1.0)
  const bscroll=Math.floor(camX);
  const bushPos=[24,80,144,232,296,368,432];
  bushPos.forEach(bp => {
    const sx=((bp*16-bscroll)%(LW*T+32)+LW*T+32)%(LW*T+32)/1;
    if(sx>-32&&sx<VW+32) {
      const by=VH-49;
      pr(sx+2,by,10,6,C.hl2); pr(sx,by+4,14,6,C.hl2); pr(sx+2,by+10,10,4,C.hl2);
      pr(sx+18,by+2,8,5,C.hl2); pr(sx+16,by+5,12,5,C.hl2); pr(sx+18,by+10,8,3,C.hl2);
      pr(sx+36,by,10,6,C.hl2); pr(sx+34,by+4,14,6,C.hl2); pr(sx+36,by+10,10,4,C.hl2);
    }
  });
}

// ═══════════════════════════════════════════════════════
// GAME
// ═══════════════════════════════════════════════════════
class Game {
  constructor() {
    this.state       = 'title';
    this.titleBlink  = 0;
    this.player      = new Player(T*3, 12*T - 16);
    this.entities    = [];
    this.popups      = [];
    this.camX        = 0;
    this.timer       = 400;
    this.clearTimer  = 0;
    this.flagSlide   = false;
    this.flagY       = 16*3;   // virtual Y of flag on pole (slides down)
    this.deadTimer   = 0;
    buildLevel();
    this._spawnEnemies();
  }

  _spawnEnemies() {
    const goombas=[7,12,24,36,42,52,68,73,82,90,105];
    goombas.forEach(tx=>this.entities.push(new Goomba(tx*T, 11*T)));
    const koopas=[31,62,88];
    koopas.forEach(tx=>this.entities.push(new Koopa(tx*T,11*T)));
  }

  reset() {
    const p=this.player;
    const lives=p.lives, score=p.score, coins=p.coins;
    buildLevel();
    this.entities=[]; this.popups=[];
    this.camX=0; this.timer=400;
    this.clearTimer=0; this.flagSlide=false; this.flagY=16*3;
    this.deadTimer=0;
    this.player=new Player(T*3,12*T-16);
    this.player.lives=lives; this.player.score=score; this.player.coins=coins;
    this._spawnEnemies();
  }

  addScore(v) {
    this.player.score+=v;
    if(this.player.score > hiScore) {
      hiScore = this.player.score;
      localStorage.setItem('smb3_hi', hiScore);
    }
  }

  spawnFireball(x,y,dir) {
    this.entities.push(new Fireball(x,y,dir));
    SFX.bump();
  }

  hitBlock(tx,ty) {
    const type=gt(tx,ty);
    const key=tx+','+ty;
    if(type===BRICK) {
      if(this.player.power>=BIG) {
        st(tx,ty,AIR);
        this.addScore(50);
        SFX.brick();
      } else {
        BUMPS.push({tx,ty,dy:-3,timer:0});
        SFX.bump();
      }
    } else if(type===QBLOCK) {
      const qd=QDATA[key]; if(!qd||qd.used) return;
      qd.used=true; st(tx,ty,USED);
      BUMPS.push({tx,ty,dy:-4,timer:0});
      this._spawnFromBlock(tx,ty,qd.content);
    }
  }

  _spawnFromBlock(tx,ty,content) {
    const px=tx*T, py=(ty-1)*T;
    if(content==='coin') {
      this.entities.push(new CoinFly(px,py));
      this.player.coins++; this.addScore(200); SFX.coin();
    } else if(content==='mushroom') {
      const type=this.player.power>=BIG?'flower':'mushroom';
      this.entities.push(new Item(px,py,type));
      SFX.powerup();
    } else if(content==='star') {
      this.entities.push(new Item(px,py,'star'));
      SFX.powerup();
    } else if(content==='1up') {
      this.entities.push(new Item(px,py,'1up'));
      SFX.oneup();
    }
  }

  checkCollisions() {
    const p=this.player;
    if(p.dead) return;
    this.entities.forEach(e=>{
      if(e.remove) return;
      if(e instanceof Goomba||e instanceof Koopa) {
        // AABB
        if(e instanceof Goomba && e.squished) return;
        if(e instanceof Koopa && e.inShell && !e.spinning) return;
        const ew=14,eh=14;
        if(p.x+p.w>e.x+2 && p.x<e.x+ew && p.y+p.h>e.y+2 && p.y<e.y+eh) {
          if(p.starTimer>0) { e.stomp?e.stomp(this):null; e.remove=true; this.addScore(200); return; }
          // Measure overlap on each axis to decide: top hit vs side hit
          const xOv = Math.min(p.x+p.w, e.x+ew) - Math.max(p.x, e.x+2);
          const yOv = Math.min(p.y+p.h, e.y+eh) - Math.max(p.y, e.y+2);
          if(p.vy > 0 && yOv <= xOv + 4) {
            // Falling and vertical penetration is shallow relative to horizontal → stomp
            e.stomp(this); p.vy=-4; p.onGround=false;
            this.popups.push(new Popup(e.x+8,e.y,'100'));
          } else if(p.vy >= -1 || xOv > 3) {
            // Side/bottom hit, or ascending with significant overlap → die
            p.die(this);
          }
          // else: ascending and barely clipping edge (xOv ≤ 3, vy < -1) → ignore
        }
      } else if(e instanceof Item) {
        if(p.x+p.w>e.x+2 && p.x<e.x+14 && p.y+p.h>e.y+2 && p.y<e.y+14) {
          if(e.type==='mushroom'||e.type==='flower') {
            if(e.type==='mushroom'&&p.power===SMALL){ p.power=BIG; this.addScore(1000); }
            else if(e.type==='flower'){ p.power=FIRE; this.addScore(1000); }
            SFX.powerup(); e.remove=true;
            this.popups.push(new Popup(p.x+6,p.y,'1000'));
          } else if(e.type==='star') {
            p.starTimer=600; this.addScore(1000); e.remove=true;
            this.popups.push(new Popup(p.x+6,p.y,'1000'));
          } else if(e.type==='1up') {
            p.lives++; SFX.oneup(); e.remove=true;
            this.popups.push(new Popup(p.x+6,p.y,'1UP!'));
          }
        }
      } else if(e instanceof Fireball) {
        // vs enemies
        this.entities.forEach(en=>{
          if(en===e||en.remove) return;
          if(!(en instanceof Goomba||en instanceof Koopa)) return;
          if(e.x+8>en.x && e.x<en.x+14 && e.y+4>en.y && e.y<en.y+14) {
            en.stomp(this); e.remove=true;
            this.popups.push(new Popup(en.x+8,en.y,'200'));
          }
        });
      }
    });

    // Flag
    if(!this.flagSlide && p.x+p.w > FLAGX-2 && p.x < FLAGX+4) {
      this.flagSlide=true;
      this.state='clear'; this.clearTimer=0;
      SFX.flag();
    }

    // Pit death (y > screen)
    if(p.y > VH+32 && !p.dead) p.die(this);
  }

  update() {
    this.titleBlink++;
    if(this.state==='title') {
      if(K.startP||K.jumpP) { this.state='playing'; startBGM(); initAudio(); }
      clearPressed(); return;
    }
    if(this.state==='gameover') {
      if(K.startP||K.jumpP){ this.player.lives=3; this.player.score=0; this.player.coins=0; this.reset(); this.state='title'; }
      clearPressed(); return;
    }
    if(this.state==='clear') {
      this.clearTimer++;
      // Slide flag down
      if(this.flagY < (11*T-10)) this.flagY=Math.min(11*T-10, this.flagY+4);
      if(this.clearTimer>200 && (K.startP||K.jumpP)) { this.reset(); this.state='playing'; startBGM(); }
      clearPressed(); return;
    }
    if(this.state==='paused') {
      if(K.startP){ this.state='playing'; startBGM(); }
      clearPressed(); return;
    }
    if(this.state!=='playing') return;
    if(K.startP){ this.state='paused'; stopBGM(); clearPressed(); return; }

    const p=this.player;
    if(p.dead) {
      p.update(K,this);
      if(++this.deadTimer>90){
        p.lives--;
        if(p.lives<=0){ this.state='gameover'; this.deadTimer=0; clearPressed(); return; }
        this.reset(); this.state='playing'; startBGM();
        this.deadTimer=0;
      }
      clearPressed(); return;
    }

    // Timer
    this.timer -= 1/60;
    if(this.timer<=0) p.die(this);

    p.update(K,this);

    this.entities.forEach(e=>{
      if(e instanceof Goomba||e instanceof Koopa) e.update(this);
      else e.update(this);
    });
    this.entities=this.entities.filter(e=>!e.remove);
    this.popups=this.popups.filter(pp=>{ pp.update(); return !pp.remove; });

    // Brick bump animations
    BUMPS=BUMPS.filter(b=>{ b.timer++; b.dy*=0.7; return b.timer<16; });

    this.checkCollisions();

    // Camera
    const targetX=p.x - VW*0.38 + p.dir*18;
    this.camX += (targetX-this.camX)*0.12;
    const maxCam=LW*T-VW;
    this.camX=Math.max(0,Math.min(maxCam,this.camX));
    if(p.x < this.camX+8) p.x=this.camX+8;

    clearPressed();
  }

  drawLevel() {
    const startTx=Math.floor(this.camX/T)-1;
    const endTx=startTx+Math.ceil(VW/T)+3;
    for(let ty=1;ty<LH;ty++) {
      for(let tx=Math.max(0,startTx);tx<Math.min(LW,endTx);tx++) {
        let type=gt(tx,ty);
        if(type===AIR) continue;
        // Bump offset
        let bumpOff=0;
        const bmp=BUMPS.find(b=>b.tx===tx&&b.ty===ty);
        const sy=ty*T+(bmp?Math.round(bmp.dy):0);
        const sx=tx*T-this.camX;
        if(sx>VW+T+4||sx<-T-4) continue;
        switch(type) {
          case GROUND:  drawGround(sx,sy);       break;
          case BRICK:   drawBrick(sx,sy);        break;
          case QBLOCK:  drawQBlock(sx,sy,false,this.frame||0); break;
          case USED:    drawQBlock(sx,sy,true,0); break;
          case SOLID:   drawSolid(sx,sy);        break;
          case PTOP_L:  drawPipeTL(sx,sy);       break;
          case PTOP_R:  drawPipeTR(sx,sy);       break;
          case PBOD_L:  drawPipeBL(sx,sy);       break;
          case PBOD_R:  drawPipeBR(sx,sy);       break;
        }
      }
    }
  }

  drawFlagpole() {
    const sx=FLAGX-this.camX;
    if(sx<-20||sx>VW+20) return;
    // Pole
    pr(sx-1, 16, 3, 11*T-13, C.fp1);
    pr(sx,   16, 1, 11*T-13, C.wht);
    // Ball
    pr(sx-3, 13, 7, 6, '#FCFC54'); pr(sx-2,14,5,4,'#FCF0A0');
    // Flag (slides down)
    pr(sx+2, this.flagY,    14, 12, C.fp2);
    pr(sx+4, this.flagY+1,  10, 10, '#00C800');
    pr(sx+6, this.flagY+3,   4, 6,  C.fp2);
  }

  draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(this.state==='title') { this.drawTitle(); return; }
    if(this.state==='gameover') { this.drawGameOver(); return; }

    drawBG(this.camX);
    this.drawLevel();
    this.drawFlagpole();
    this.entities.forEach(e=>{ if(e.draw) e.draw(this.camX); });
    this.popups.forEach(pp=>pp.draw(this.camX));

    // Mario
    const p=this.player;
    if(!p.dead||p.y<VH+32) {
      drawMario(p.x-this.camX, p.y, p.power, p.dir,
                p.onGround?(Math.abs(p.vx)>0.1?p.frame:0):1,
                p.invTimer, false);
    }

    drawHUD(this);

    if(this.state==='clear') this.drawClear();
    if(this.state==='paused') this.drawPaused();
  }

  drawTitle() {
    ctx.fillStyle=C.sky; ctx.fillRect(0,0,canvas.width,canvas.height);
    pr(0,VH-32,VW,32,C.gr1); pr(0,VH-34,VW,2,C.grt); pr(1,VH-34,VW-2,1,'#FCC000');
    // Clouds
    pr(30,28,28,9,C.wht); pr(26,35,36,9,C.wht); pr(34,22,20,10,C.wht);
    pr(170,40,22,8,C.wht); pr(166,46,30,8,C.wht); pr(178,34,14,9,C.wht);
    // Pipe
    pr(194,VH-64,32,30,C.pp1); pr(190,VH-68,40,8,C.pp1);
    pr(190,VH-68,4,38,C.pp2); pr(226,VH-68,4,38,C.pp2); pr(194,VH-68,4,38,C.pp3);
    // Mario on title
    drawMario(VW/2-6, VH-50, SMALL, 1, 0, 0, false);
    // Goomba
    drawGoomba(50, VH-46, 0, false);
    // Title text
    pt('SUPER',VW/2,54,8,'#E42020','center');
    pt('MARIO',VW/2,70,8,'#E42020','center');
    pt('BROS.',VW/2,86,8,'#E42020','center');
    // White outline effect
    pt('SUPER',VW/2+1,55,8,'#FCC000','center');
    // Blink
    if(Math.floor(this.titleBlink/30)%2===0)
      pt('PRESS Z TO START',VW/2,VH-56,4,C.wht,'center');
    pt('Z:JUMP  X:RUN  ARROWS:MOVE',VW/2,VH-16,3,'#C0C0FC','center');
    // Lives
    pt('x'+this.player.lives,VW/2+12,VH-40,5,C.wht,'center');
    drawMario(VW/2-8, VH-50, SMALL, 1, 0, 0, false);
  }

  drawGameOver() {
    ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    pt('GAME OVER',VW/2,VH/2-16,8,'#E42020','center');
    pt('SCORE:    '+String(this.player.score).padStart(6,'0'),VW/2,VH/2+4,5,C.wht,'center');
    const isNew = this.player.score>0 && this.player.score===hiScore;
    pt('HI-SCORE: '+String(hiScore).padStart(6,'0'),VW/2,VH/2+18,5,isNew?'#FCC000':C.wht,'center');
    if(isNew) pt('NEW RECORD!',VW/2,VH/2+32,4,'#FCC000','center');
    if(Math.floor(this.titleBlink/30)%2===0)
      pt('Z TO RETRY',VW/2,VH/2+(isNew?46:32),4,'#C0C0FC','center');
  }

  drawClear() {
    const a=Math.min(1,this.clearTimer/60);
    ctx.fillStyle=`rgba(0,0,0,${a*0.5})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if(this.clearTimer>50){
      pt('COURSE CLEAR!',VW/2,VH/2-16,7,'#FCC000','center');
      pt('SCORE:    '+String(this.player.score).padStart(6,'0'),VW/2,VH/2+4,5,C.wht,'center');
      const isNew = this.player.score>0 && this.player.score===hiScore;
      if(isNew) pt('NEW RECORD!',VW/2,VH/2+18,4,'#FCC000','center');
      if(this.clearTimer>130) pt('Z TO CONTINUE',VW/2,VH/2+(isNew?32:22),4,'#C0C0FC','center');
    }
  }

  drawPaused() {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    pr(VW/2-44,VH/2-14,88,26,'#000040');
    pt('PAUSED',VW/2,VH/2+4,6,C.wht,'center');
  }
}

// ═══════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════
const game = new Game();
let lastT = 0;
let qFrame = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  if(ts - lastT < 1000/62) return;
  lastT = ts;
  qFrame++;
  game.frame = qFrame; // for Q-block animation
  game.update();
  game.draw();
}

requestAnimationFrame(loop);
