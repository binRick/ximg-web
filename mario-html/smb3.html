<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Super Mario Bros. 3 — mario.ximg.app</title>
<link rel="icon" href="favicon.svg">
<link href="vendor/press-start-2p.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Press Start 2P',monospace}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#mctrl{position:fixed;bottom:0;left:0;right:0;display:none;pointer-events:none;z-index:200;
  padding:10px 16px 16px;justify-content:space-between;align-items:flex-end}
#mctrl.show{display:flex}
.dpad{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:52px 52px;gap:3px;pointer-events:all}
.dbtn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  user-select:none;-webkit-user-select:none;touch-action:manipulation}
.dbtn:active,.dbtn.pressed{background:rgba(255,255,255,.4)}
.abtn-wrap{display:flex;gap:10px;pointer-events:all;align-items:flex-end}
.abtn-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.abtn-label{font-size:.38rem;color:#888}
.abtn{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-family:'Press Start 2P',monospace;
  user-select:none;-webkit-user-select:none;touch-action:manipulation}
.abtn:active,.abtn.pressed{filter:brightness(1.5)}
#btn-b{background:rgba(200,30,30,.75);border:2px solid rgba(255,60,60,.9);color:#fff}
#btn-a{background:rgba(30,80,220,.75);border:2px solid rgba(60,120,255,.9);color:#fff}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="mctrl">
  <div class="dpad">
    <div></div>
    <div class="dbtn" id="db-up">▲</div>
    <div></div>
    <div class="dbtn" id="db-left">◀</div>
    <div></div>
    <div class="dbtn" id="db-right">▶</div>
  </div>
  <div class="abtn-wrap">
    <div class="abtn-col">
      <div class="abtn" id="btn-b">B</div>
      <div class="abtn-label">RUN/FIRE</div>
    </div>
    <div class="abtn-col">
      <div class="abtn" id="btn-a">A</div>
      <div class="abtn-label">JUMP</div>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// CANVAS + SCALE
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const VW = 256, VH = 240;  // NES virtual resolution
let SC = 3;                  // display scale

function resize() {
  const navH = 36;
  const aw = window.innerWidth, ah = window.innerHeight - navH;
  SC = Math.max(2, Math.floor(Math.min(aw / VW, ah / VH)));
  canvas.width  = VW * SC;
  canvas.height = VH * SC;
  canvas.style.marginTop = navH + 'px';
}
resize();
window.addEventListener('resize', resize);

// helper: fill rect in virtual coords
function pr(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.round(x*SC), Math.round(y*SC), Math.round(w*SC), Math.round(h*SC));
}
function pt(text, x, y, size, color, align='left') {
  ctx.font = `${size*SC}px 'Press Start 2P', monospace`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x*SC, y*SC);
  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════
const T   = 16; // tile size in virtual pixels

// Tile types
const AIR=0,GROUND=1,BRICK=2,QBLOCK=3,USED=4,SOLID=5,NOTE=6,
      PTOP_L=7,PTOP_R=8,PBOD_L=9,PBOD_R=10,
      COIN_T=11,HIDDEN=12,CLOUD=13,GOAL_T=14;

// Power states
const SMALL=0, BIG=1, FIRE=2, RACCOON=3;

// Physics
const GR=0.35, GR_HOLD=0.16, MAX_FALL=5.5;
const WALK_ACC=0.12, RUN_ACC=0.18, AIR_ACC=0.08;
const WALK_MAX=1.6, RUN_MAX=3.0;
const FRIC=0.18, AIR_FRIC=0.05, SKID_FRIC=0.28;
const JUMP_VY=-5.8, RUN_JUMP_VY=-7.2;
const JUMP_HOLD=14; // frames you can hold jump

// Colors — NES SMB3 palette
const COL = {
  sky:'#5C94FC', sky2:'#92D8FC',
  ground:'#AC7C00', ground2:'#C89800',
  groundTop:'#00A800',
  brick:'#C84010', brickDark:'#9C2800',
  qblock:'#FCC000', qblockDark:'#CC9400',
  pipe:'#00A800', pipeLight:'#00CC00', pipeDark:'#006800',
  coin:'#FCC000',
  mred:'#E42020', mblue:'#2038EC', mskin:'#FCBCB0',
  mbrn:'#7C5010', mmus:'#4B2504',
  used:'#C0A870',
  underground_bg:'#000060', underground_ground:'#706840',
};

// ═══════════════════════════════════════════════════════
// AUDIO (Web Audio API)
// ═══════════════════════════════════════════════════════
let AC = null;
function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
}

function midiFreq(n) { return 440 * Math.pow(2, (n-69)/12); }

function playTone(freq, dur, vol=0.3, type='square', detune=0) {
  if (!AC) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type = type;
  o.frequency.value = freq;
  o.detune.value = detune;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}

function playNoise(dur, vol=0.15) {
  if (!AC) return;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const s = AC.createBufferSource();
  const g = AC.createGain();
  s.buffer = buf;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  s.connect(g); g.connect(AC.destination);
  s.start();
}

const SFX = {
  jump()    { playTone(330,0.08,0.25); setTimeout(()=>playTone(440,0.12,0.2),40); },
  coin()    { playTone(midiFreq(76),0.06,0.3); setTimeout(()=>playTone(midiFreq(81),0.12,0.25),60); },
  stomp()   { playNoise(0.08,0.2); playTone(120,0.08,0.15,'sawtooth'); },
  brick()   { playNoise(0.05,0.18); playTone(200,0.06,0.12,'square'); },
  powerup() { [72,74,76,77,79,81].forEach((n,i)=>setTimeout(()=>playTone(midiFreq(n),0.1,0.25),i*60)); },
  oneup()   { [76,79,84].forEach((n,i)=>setTimeout(()=>playTone(midiFreq(n),0.12,0.3),i*80)); },
  fireball(){ playTone(400,0.06,0.15,'sawtooth'); },
  die()     { [69,64,60,57].forEach((n,i)=>setTimeout(()=>playTone(midiFreq(n),0.15,0.25),i*100)); },
  clear()   { [64,67,71,72].forEach((n,i)=>setTimeout(()=>playTone(midiFreq(n),0.18,0.3),i*100));
               setTimeout(()=>playTone(midiFreq(76),0.5,0.3),400); },
  star()    { playTone(880,0.04,0.1); playTone(1320,0.04,0.1); },
  kick()    { playNoise(0.06,0.2); playTone(160,0.06,0.15,'sawtooth'); },
  bump()    { playTone(200,0.05,0.12); playNoise(0.04,0.1); },
};

// BGM — SMB3 World 1 theme (simplified sequencer)
let bgmPlaying=false, bgmHandle=null, bgmStep=0, bgmBar=0;
// MIDI notes for melody — approx SMB3 World 1 course theme
const BGM_MELODY = [
  64,64,0,59,0,60,0,62,  // E B C D
  60,0,59,0,57,0,57,0,   // C B A A
  60,0,64,0,62,0,60,0,   // C E D C
  59,0,59,0,57,0,57,0,   // B B A A
  59,0,60,0,62,0,62,0,   // B C D D
  64,0,64,0,60,0,60,0,   // E E C C
  57,0,57,0,57,0,57,0,   // A A A A
  59,0,60,0,62,0,57,0,   // B C D A
];
const BGM_BPM = 148;

function bgmTick() {
  if (!bgmPlaying||!AC) return;
  const n = BGM_MELODY[bgmStep % BGM_MELODY.length];
  if (n) playTone(midiFreq(n+12), 0.12, 0.12, 'square');
  bgmStep++;
  // Bass on beat (every 8 steps)
  if (bgmStep % 8 === 0) {
    const bassNote = [45,45,45,45,45,45,47,43][Math.floor(bgmStep/8)%8];
    playTone(midiFreq(bassNote), 0.18, 0.08, 'square');
  }
  const msPerStep = (60000/BGM_BPM)/4; // 16th notes
  bgmHandle = setTimeout(bgmTick, msPerStep);
}
function startBGM() { if(!bgmPlaying){bgmPlaying=true;bgmStep=0;bgmTick();} }
function stopBGM()  { bgmPlaying=false; if(bgmHandle) clearTimeout(bgmHandle); }

// ═══════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════
const K = {left:0,right:0,up:0,down:0,jump:0,run:0,
            jumpP:0,runP:0,startP:0}; // P = pressed this frame

const KMAP = {
  ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
  KeyZ:'jump', KeyX:'run', ShiftLeft:'run', ShiftRight:'run',
  Space:'jump', KeyA:'jump', KeyS:'run',
  Escape:'start', Enter:'start',
};

document.addEventListener('keydown', e=>{
  const k = KMAP[e.code];
  if (!k) return;
  e.preventDefault();
  if (!K[k]) { K[k+'P']=1; }
  K[k]=1;
  initAudio();
});
document.addEventListener('keyup', e=>{
  const k = KMAP[e.code]; if(k) K[k]=0;
});

function bindBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  const on = ()=>{ initAudio(); if(!K[key]){K[key+'P']=1;} K[key]=1; el.classList.add('pressed'); };
  const off=()=>{ K[key]=0; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
}
bindBtn('db-left','left'); bindBtn('db-right','right');
bindBtn('db-up','up');
bindBtn('btn-a','jump'); bindBtn('btn-b','run');

function clearPressed() { K.jumpP=0; K.runP=0; K.startP=0; }

if ('ontouchstart' in window) document.getElementById('mctrl').classList.add('show');

// ═══════════════════════════════════════════════════════
// SPRITE DRAWING
// ═══════════════════════════════════════════════════════

function drawMario(vx, vy, power, dir, frame, invTimer, crouching, tailSwing) {
  // Flash when hit
  if (invTimer > 0 && Math.floor(Date.now()/80) % 2 === 0) return;
  const big  = power >= BIG;
  const fire = power === FIRE;
  const racc = power === RACCOON;
  const h = big ? 26 : 14;

  // flip context for direction
  ctx.save();
  if (dir < 0) {
    ctx.scale(-1, 1);
    ctx.translate(-Math.round((vx + (big?12:12)) * SC), 0);
    vx = 0;
  }

  const px = vx, py = vy;
  const r = (ox,oy,rw,rh,c)=>pr(px+ox, py+oy, rw, rh, c);

  const RED  = fire ? '#FCFCFC' : COL.mred;
  const BLU  = fire ? COL.mred  : COL.mblue;
  const SKIN = COL.mskin;
  const BRWN = COL.mbrn;
  const MBRN = COL.mmus;
  const HRED = '#E42020';

  if (!big) {
    // SMALL MARIO 12×14
    // hat
    r(2,0, 8,1, HRED); r(1,1, 10,2, HRED);
    // face
    r(2,3, 8,3, SKIN);
    r(4,4, 2,1, MBRN); r(7,4,2,1, MBRN);
    r(5,3, 2,1, '#000');  // eye
    // shirt + overalls
    r(1,6, 10,2, RED);
    r(0,8, 4,3, BLU); r(8,8,4,3,BLU); r(4,8,4,3,BLU);
    // legs animation
    const lx = frame===1?-1:frame===2?1:0;
    r(1+lx,11, 4,2, BRWN); r(7-lx,11,4,2, BRWN);
  } else if (!crouching) {
    // BIG MARIO 12×26
    r(2,0,8,1,HRED); r(1,1,10,3,HRED);
    r(2,4,8,5,SKIN);
    r(3,5,2,1,'#000'); r(8,5,2,1,'#000'); // eyes
    r(4,6,2,1,MBRN); r(7,6,2,1,MBRN);    // mustache
    r(1,9,10,4,RED);
    r(0,13,3,7,BLU); r(9,13,3,7,BLU); r(3,13,6,8,BLU);
    const lx = frame===1?-1:frame===2?1:0;
    r(1+lx,21,4,5,BRWN); r(7-lx,21,4,5,BRWN);
    if (racc) {
      // ears
      r(1,-3,3,3,'#C8784C'); r(8,-3,3,3,'#C8784C');
      r(2,-2,2,2,'#FCE0C8'); r(9,-2,2,2,'#FCE0C8');
      // tail (oscillate with frame)
      const ty2 = tailSwing ? 13 : 14;
      r(10, ty2, 5,3,'#C8784C'); r(10,ty2+3,4,3,'#FCBCB0');
    }
  } else {
    // CROUCHING BIG MARIO 12×18
    r(2,0,8,1,HRED); r(1,1,10,3,HRED);
    r(2,4,8,4,SKIN);
    r(3,5,2,1,'#000'); r(8,5,2,1,'#000');
    r(1,8,10,3,RED);
    r(0,11,12,7,BLU);
  }
  ctx.restore();
}

function drawGoomba(vx, vy, squished, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  if (squished) {
    r(0,12,16,3,'#AC5820'); r(0,13,16,2,'#D87040');
    r(1,12,3,3,'#1C0C04'); r(12,12,3,3,'#1C0C04');
    r(2,13,2,1,'#FC4040'); r(12,13,2,1,'#FC4040'); return;
  }
  r(2,0,12,8,'#AC5820'); r(0,4,16,9,'#AC5820');
  r(3,1,10,3,'#7C3410'); r(0,4,3,3,'#7C3410'); r(13,4,3,3,'#7C3410');
  r(1,8,14,6,'#D8A880');
  r(2,9,4,4,'#1C0C04'); r(10,9,4,4,'#1C0C04');
  r(3,10,2,1,'#FC0000'); r(11,10,2,1,'#FC0000');
  r(4,13,8,2,'#7C3410');
  const lx=frame===1?-2:0, rx=frame===1?0:2;
  r(0+lx,13,5,3,'#7C3410'); r(11-rx,13,5,3,'#7C3410');
}

function drawKoopa(vx, vy, red, inShell, spinning, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  const SC1 = red ? '#E42020' : '#00A800';
  const SC2 = red ? '#AA0000' : '#006800';
  if (inShell) {
    r(1,6,14,10,SC1); r(3,7,10,8,SC2);
    r(4,8,8,6,SC1);
    if (spinning) { r(1,12,3,2,'#FFD700'); r(12,12,3,2,'#FFD700'); }
    return;
  }
  // shell body
  r(2,4,12,12,SC1); r(4,5,8,10,SC2); r(5,6,6,8,SC1);
  // legs
  const lx=frame===1?-1:1;
  r(0+lx,14,5,4,'#E8D060'); r(11-lx,14,5,4,'#E8D060');
  // head/neck
  r(3,0,10,6,'#E8D060');
  r(4,0,2,2,'#1C0C04'); r(10,0,2,2,'#1C0C04'); // eyes
}

function drawParaGoomba(vx, vy, frame) {
  drawGoomba(vx, vy+2, false, frame);
  // wings
  const wy = vy+(frame%2===0?0:1);
  pr(vx-4, wy+2, 5, 8, '#FCFCFC'); pr(vx-4, wy+2, 5, 2, '#C0C0FC');
  pr(vx+15,wy+2, 5, 8, '#FCFCFC'); pr(vx+15,wy+2, 5, 2, '#C0C0FC');
}

function drawHammerBro(vx, vy, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  // shell
  r(2,4,12,14,'#00A800'); r(4,5,8,12,'#006800'); r(5,6,6,10,'#00A800');
  // head
  r(2,0,12,6,'#E8D060');
  r(3,0,3,3,'#1C0C04'); r(10,0,3,3,'#1C0C04');
  r(2,0,12,2,'#E42020'); // helmet
  // arm with hammer
  const hox = frame===0 ? 12 : 10;
  r(hox,-2,4,4,'#7C3410'); // hammer
  r(hox+1,-5,3,4,'#7C3410');
  r(hox,-6,5,2,'#C87040');
  // legs
  r(1,16,5,4,'#E8D060'); r(10,16,5,4,'#E8D060');
}

function drawPiranha(vx, vy, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  r(2,0,12,12,'#E42020'); r(0,3,16,6,'#E42020');
  r(4,3,8,6,'#FCF0C0');
  // teeth (alternate)
  if (frame%2===0) {
    r(2,10,3,3,'#FCF0C0'); r(6,10,3,3,'#FCF0C0'); r(10,10,3,3,'#FCF0C0');
  } else {
    r(0,10,3,3,'#FCF0C0'); r(4,10,3,3,'#FCF0C0'); r(8,10,3,3,'#FCF0C0'); r(12,10,3,3,'#FCF0C0');
  }
}

function drawMushroom(vx, vy, oneup) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  const top = oneup ? '#00CC00' : '#E42020';
  r(4,0,8,4,top); r(2,2,12,4,top); r(0,4,16,4,top);
  r(2,4,3,3,'#FCF0C0'); r(10,4,3,3,'#FCF0C0'); // spots
  r(2,8,12,8,'#FCF0C0'); // stem
}

function drawFireFlower(vx, vy, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  r(7,12,2,4,'#00A800'); r(5,14,6,2,'#00A800'); // stem
  const fc=frame%2===0?'#E42020':'#FCC000';
  r(5,4,6,8,fc); r(3,6,10,4,fc);
  r(6,6,4,4,'#FCF0C0'); // center
}

function drawSuperLeaf(vx, vy, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  const yoff=frame%2===0?0:1;
  r(4,4+yoff,8,8,'#00C800'); r(2,6+yoff,12,4,'#00C800');
  r(7,0+yoff,2,5,'#00C800'); // tip
  r(6,6+yoff,4,4,'#FCF0C0'); // center
  // veins
  r(6,7+yoff,4,1,'#009000');
}

function drawStar(vx, vy, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  const cs=['#FCC000','#FCFC00','#FCFCFC','#FCA000'];
  const c=cs[frame%4];
  r(6,0,4,4,c); r(4,4,8,4,c); r(2,6,12,4,c); r(4,10,8,4,c); r(6,12,4,4,c);
  r(0,4,4,6,c); r(12,4,4,6,c);
}

function drawCoin(vx, vy, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  const frames=[[3,0,10,16],[5,0,6,16],[6,0,4,16],[5,0,6,16]];
  const [fx,fw]=frames[frame%4].slice(0,2).concat(frames[frame%4].slice(2));
  // simplified: just draw coin
  r(frames[frame%4][0],0,frames[frame%4][2],frames[frame%4][3],'#FCC000');
  r(frames[frame%4][0]+2,2,frames[frame%4][2]-4,frames[frame%4][3]-4,'#C89400');
}

function drawFireball(vx, vy, frame) {
  const r=(ox,oy,rw,rh,c)=>pr(vx+ox,vy+oy,rw,rh,c);
  const c=frame%2===0?'#E42020':'#FCC000';
  r(2,0,6,6,c); r(0,2,10,2,'#FCF0C0');
}

// ═══════════════════════════════════════════════════════
// TILE DRAWING
// ═══════════════════════════════════════════════════════
function drawTile(tx, ty, type, camX) {
  const sx = tx*T - camX, sy = ty*T;
  if (sx > VW+T || sx < -T) return;
  const r=(ox,oy,rw,rh,c)=>pr(sx+ox,sy+oy,rw,rh,c);
  switch(type) {
    case GROUND:
      r(0,0,16,16,COL.ground);
      r(0,0,16,2,COL.groundTop);
      r(1,1,14,1,'#00CC00');
      r(0,2,1,14,'#D8A000'); r(15,2,1,14,'#D8A000');
      break;
    case BRICK:
      r(0,0,16,16,COL.brick);

function isSolid(type) {
  return type===GROUND||type===BRICK||type===QBLOCK||type===USED||
         type===SOLID||type===NOTE||type===PTOP_L||type===PTOP_R||
         type===PBOD_L||type===PBOD_R;
}
function isTopOnly(type) { return type===CLOUD; }

function mkMap(W) {
  return { W, H:15, data: new Uint8Array(W*15) };
}
function st(m, tx, ty, t) { if(tx>=0&&tx<m.W&&ty>=0&&ty<15) m.data[ty*m.W+tx]=t; }
function gt(m, tx, ty) {
  if(tx<0) return SOLID; if(tx>=m.W) return AIR;
  if(ty<0) return AIR; if(ty>=15) return SOLID;
  return m.data[ty*m.W+tx];
}
function rowT(m,ty,x1,x2,t) { for(let x=x1;x<=x2;x++) st(m,x,ty,t); }
function colT(m,tx,y1,y2,t) { for(let y=y1;y<=y2;y++) st(m,tx,y,t); }
function ground(m, x1, x2) { rowT(m,12,x1,x2,GROUND); rowT(m,13,x1,x2,GROUND); rowT(m,14,x1,x2,GROUND); }
function pipe(m, tx, topRow, h) {
  st(m,tx,topRow,PTOP_L); st(m,tx+1,topRow,PTOP_R);
  for(let y=topRow+1;y<topRow+h;y++){st(m,tx,y,PBOD_L);st(m,tx+1,y,PBOD_R);}
}

// ═══════════════════════════════════════════════════════
// ENTITIES
// ═══════════════════════════════════════════════════════
class Entity {
  constructor(x, y, w, h) {
    this.x=x; this.y=y; this.w=w; this.h=h;
    this.vx=0; this.vy=0;
    this.onGround=false; this.dead=false; this.remove=false;
    this.dir=1; this.frame=0; this.frameTimer=0;
  }
  tickFrame(rate=8) { if(++this.frameTimer>=rate){this.frameTimer=0;this.frame++;} }
  get cx() { return this.x+this.w/2; }
  get cy() { return this.y+this.h/2; }
  get right() { return this.x+this.w; }
  get bottom() { return this.y+this.h; }
  overlaps(o) {
    return this.x<o.x+o.w && this.right>o.x && this.y<o.y+o.h && this.bottom>o.y;
  }
}

// ─── Player ────────────────────────────────────────
class Player extends Entity {
  constructor(x, y) {
    super(x, y, 12, 14);
    this.power = SMALL;
    this.jumpHold = 0;
    this.jumpQueued = false;
    this.running = false;
    this.skidding = false;
    this.crouching = false;
    this.invTimer = 0;    // invincibility frames after hit
    this.starTimer = 0;   // star invincibility
    this.dieAnim = 0;     // death animation
    this.pmeter = 0;      // P-meter 0-8 (raccoon fly)
    this.flying = false;  // raccoon sustained flight
    this.flyJumps = 0;    // aerial jumps for raccoon
    this.tailTimer = 0;   // raccoon tail swing
    this.lives = 3;
    this.score = 0;
    this.coins = 0;
    this.stompCombo = 0;
    this.stompTimer = 0;
    this.fireTimer = 0;
    this.fireRound = 0;
  }

  get h() { return this.power >= BIG ? (this.crouching ? 18 : 26) : 14; }
  set h(_) {}

  grow(toPower) {
    if (toPower <= this.power) return;
    if (this.power === SMALL && toPower >= BIG) this.y -= 12;
    this.power = toPower;
    SFX.powerup();
  }
  shrink() {
    if (this.power === SMALL) { this.die(); return; }
    this.power = SMALL;
    this.y += 12;
    this.invTimer = 120;
    this.flying = false;
    this.pmeter = 0;
    SFX.powerup();
  }
  die() {
    if (this.invTimer > 0 && this.starTimer <= 0) return;
    this.dead = true;
    this.dieAnim = 1;
    this.vy = -8;
    stopBGM();
    SFX.die();
  }

  update(keys, level, game) {
    if (this.dead) {
      this.y += this.vy;
      this.vy += GR;
      return;
    }

    if (this.invTimer > 0) this.invTimer--;
    if (this.starTimer > 0) { this.starTimer--; if(this.starTimer%10===0) SFX.star(); }
    if (this.tailTimer > 0) this.tailTimer--;
    if (this.stompTimer > 0) { this.stompTimer--; } else { this.stompCombo=0; }
    if (this.fireTimer > 0) this.fireTimer--;

    const running = keys.run && !this.crouching;
    this.running = running;
    const maxSpd = running ? RUN_MAX : WALK_MAX;
    const accel  = this.onGround ? (running ? RUN_ACC : WALK_ACC) : AIR_ACC;

    // Horizontal movement
    if (keys.left && !this.crouching) {
      if (this.vx > 0) { this.vx -= SKID_FRIC; this.skidding=true; }
      else { this.vx -= accel; this.skidding=false; }
      this.dir = -1;
    } else if (keys.right && !this.crouching) {
      if (this.vx < 0) { this.vx += SKID_FRIC; this.skidding=true; }
      else { this.vx += accel; this.skidding=false; }
      this.dir = 1;
    } else {
      this.skidding = false;
      const fric = this.onGround ? FRIC : AIR_FRIC;
      if (this.vx > 0) this.vx = Math.max(0, this.vx - fric);
      else if (this.vx < 0) this.vx = Math.min(0, this.vx + fric);
    }
    this.vx = Math.max(-maxSpd, Math.min(maxSpd, this.vx));

    // P-meter
    if (this.power === RACCOON) {
      if (Math.abs(this.vx) >= RUN_MAX - 0.1 && this.onGround) {
        this.pmeter = Math.min(8, this.pmeter + 0.15);
      } else if (!this.flying) {
        this.pmeter = Math.max(0, this.pmeter - 0.08);
      }
    }

    // Crouch
    this.crouching = keys.down && this.onGround && this.power >= BIG;

    // Jump
    if (keys.jump && this.onGround && !this.crouching) {
      const jv = Math.abs(this.vx) > WALK_MAX - 0.1 ? RUN_JUMP_VY : JUMP_VY;
      this.vy = jv;
      this.jumpHold = JUMP_HOLD;
      this.onGround = false;
      this.flying = false;
      SFX.jump();
    } else if (keys.jump && this.jumpHold > 0 && this.vy < 0) {
      this.jumpHold--;
      this.vy += (GR_HOLD - GR); // reduce gravity while holding
    } else {
      this.jumpHold = 0;
    }
    if (!keys.jump) this.jumpHold = 0;

    // Raccoon fly
    if (this.power === RACCOON && this.pmeter >= 8 && !this.onGround) {
      if (keys.jump && !this._prevJump) {
        this.flying = true;
        this.vy = -4.5;
        SFX.jump();
      }
      if (this.flying && keys.jump) {
        this.vy = Math.max(this.vy, -3.5);
        this.vy -= 0.1;
        this.pmeter = Math.max(4, this.pmeter - 0.05);
      }
    }
    if (this.onGround) { this.flying = false; }
    this._prevJump = keys.jump;

    // Raccoon tail whip
    if (this.power === RACCOON && keys.runP && this.onGround) {
      this.tailTimer = 16;
      SFX.kick();
    }

    // Fire
    if (this.power === FIRE && keys.runP && this.fireTimer <= 0 && this.fireRound < 2) {
      game.spawnFireball(this);
      this.fireTimer = 18;
      this.fireRound++;
      SFX.fireball();
    }
    if (this.onGround && keys.run && this.fireRound > 0) this.fireRound=0;

    // Gravity
    if (!this.flying) {
      const grav = (this.vy < 0 && keys.jump && this.jumpHold > 0) ? GR_HOLD : GR;
      this.vy = Math.min(this.vy + grav, MAX_FALL);
    }

    // Animate
    this.tickFrame(this.onGround ? (Math.abs(this.vx) > 0.5 ? 6 : 999) : 999);

    // Move + collide
    this.onGround = false;
    moveEntity(this, level, game);

    // Death by pit
    if (this.y > VH + 32) this.die();
    // Death by top
    if (this.y < 0 && level.underground) { this.y = 0; this.vy = 0; }
  }
}

// ─── Goomba ────────────────────────────────────────
class Goomba extends Entity {
  constructor(x,y){super(x,y,14,14); this.vx=-0.6; this.squishTimer=0; }
  update(level, game) {
    if (this.squishTimer > 0) { this.squishTimer--; if(!this.squishTimer) this.remove=true; return; }
    this.vy = Math.min(this.vy+GR, MAX_FALL);
    this.tickFrame(12);
    moveEntity(this, level, game);
    if (this.y > VH+32) this.remove=true;
  }
  stomp(game) { this.squishTimer=20; this.vx=0; this.vy=0; SFX.stomp(); return 100; }
  hit(game) { this.remove=true; }
  draw(camX) { drawGoomba(this.x-camX, this.y, this.squishTimer>0, this.frame%2); }
}

// ─── Koopa ─────────────────────────────────────────
class KoopaTroopa extends Entity {
  constructor(x,y,red){
    super(x,y,14,22); this.red=red; this.vx=red?-0.5:-0.6;
    this.inShell=false; this.shelled=false;
  }
  update(level, game) {
    this.vy = Math.min(this.vy+GR, MAX_FALL);
    this.tickFrame(10);
    moveEntity(this, level, game);
    if (this.red && this.onGround && this._hitWall) { this.vx *= -1; this.dir*=-1; }
    if (this.y > VH+32) this.remove=true;
  }
  stomp(game) {
    if (!this.inShell) {
      this.inShell=true; this.shelled=true; this.vx=0; this.vy=0; this.h=14;
      this.y+=8; SFX.stomp(); return 100;
    } else if (Math.abs(this.vx)<0.1) {
      // kick shell
      return 0; // shell kick handled by player
    }
    return 100;
  }
  kick(dir, game) { this.vx=dir*5; this.inShell=true; SFX.kick(); }
  hit(game) { if(!this.inShell){this.remove=true;} }
  draw(camX) {
    if (this.inShell) drawKoopa(this.x-camX, this.y+(this.shelled?8:0), this.red, true, Math.abs(this.vx)>1, this.frame%2);
    else drawKoopa(this.x-camX, this.y, this.red, false, false, this.frame%2);
  }
}

// ─── Buzzy Beetle ──────────────────────────────────
class Buzzy extends Entity {
  constructor(x,y){super(x,y,14,14); this.vx=-0.5; this.inShell=false; }
  update(level,game) {
    this.vy=Math.min(this.vy+GR,MAX_FALL);
    this.tickFrame(10);

  stomp(game) {
    this.inShell=true; this.vx=0; SFX.stomp(); return 100;
  }
  kick(dir) { this.vx=dir*5; SFX.kick(); }
  hit(game) { if(!this.inShell) this.remove=true; }
  draw(camX) {

    r(0,0,14,14,'#3844A0');
    r(2,0,10,6,'#5860C0');
    r(1,6,12,8,'#3844A0');

// ─── Para-Goomba ───────────────────────────────────
class ParaGoomba extends Entity {
  constructor(x,y){super(x,y,14,14); this.vx=-0.5; this.t=0; }
  update(level,game) {
    this.t+=0.08;
    this.y += Math.sin(this.t)*0.5;
    this.vy=0;
    this.tickFrame(8);
    this.x += this.vx;
    if(this.x<0||this.x>level.W*T) this.remove=true;
  }
  stomp(game) {
    // become normal goomba
    const g=new Goomba(this.x,this.y); g.vx=this.vx;
    game.entities.push(g); this.remove=true; SFX.stomp(); return 100;
  }
  hit(game) { this.remove=true; }
  draw(camX) { drawParaGoomba(this.x-camX, this.y, this.frame%2); }
}

// ─── Piranha Plant ─────────────────────────────────
class PiranhaPlant extends Entity {
  constructor(x,y){super(x,y,14,20); this.t=0; this.pipeTop=y; this.up=false; this.wait=0; }
  update(level,game) {
    this.t+=0.015;
    const off=Math.sin(this.t);
    if(off>0.8&&!this.up){this.up=true;}
    if(off<-0.8&&this.up){this.up=false;}
    this.y=this.pipeTop*T - (this.up?18:0);
    this.tickFrame(8);
  }
  stomp(game) { return 0; } // can't stomp piranha
  hit(game) { this.remove=true; }
  draw(camX) { drawPiranha(this.x-camX, this.y, this.frame%2); }
}

// ─── Hammer Bro ────────────────────────────────────
class HammerBro extends Entity {
  constructor(x,y){
    super(x,y,14,22); this.vx=-0.3; this.t=0;
    this.throwTimer=Math.random()*60+30; this.jumpTimer=Math.random()*120+90;
  }
  update(level,game) {
    this.t+=0.04;
    this.vy=Math.min(this.vy+GR,MAX_FALL);
    if(--this.throwTimer<=0){
      this.throwTimer=Math.random()*60+40;
      game.entities.push(new Hammer(this.cx-6, this.y-4, this.dir*2.5-0.5));
    }
    if(--this.jumpTimer<=0&&this.onGround){
      this.jumpTimer=Math.random()*120+80;
      this.vy=-5;
    }
    this.tickFrame(16);
    moveEntity(this,level,game);
    if(this.y>VH+32) this.remove=true;
  }
  stomp(game) { this.remove=true; SFX.stomp(); return 1000; }
  hit(game) { this.remove=true; }
  draw(camX) { drawHammerBro(this.x-camX,this.y,this.frame%2); }
}

class Hammer extends Entity {
  constructor(x,y,vx){ super(x,y,10,10); this.vx=vx; this.vy=-4; this.t=0; }
  update(level,game) {
    this.t+=0.2; this.vy=Math.min(this.vy+GR,MAX_FALL);
    this.x+=this.vx; this.y+=this.vy;
    if(this.y>VH+32||this.x<-32||this.x>level.W*T) this.remove=true;
  }
  draw(camX) {
    const r=(ox,oy,rw,rh,c)=>pr(this.x-camX+ox,this.y+oy,rw,rh,c);

// ─── Fireball ──────────────────────────────────────
class Fireball extends Entity {
  constructor(x,y,dir){ super(x,y,8,8); this.vx=dir*4; this.vy=-2; this.t=0; }
  update(level,game) {
    this.vy=Math.min(this.vy+0.5,5);
    this.x+=this.vx; this.y+=this.vy;
    // bounce off ground
    const ty=Math.floor((this.y+8)/T), tx=Math.floor(this.cx/T);
    if(isSolid(gt(level.map,tx,ty))) { this.vy=-3; this.y=ty*T-8; }
    // wall
    const tx2=Math.floor((this.x+(this.vx>0?8:0))/T);
    if(isSolid(gt(level.map,tx2,Math.floor(this.cy/T)))) this.remove=true;
    this.tickFrame(4);
    if(++this.t>120||this.x<game.camX-16||this.x>game.camX+VW+16) this.remove=true;
  }
  draw(camX) { if(!this.remove) drawFireball(this.x-camX,this.y,this.frame%2); }
}

// ─── Items ─────────────────────────────────────────
class ItemEntity extends Entity {
  constructor(x,y,w,h){ super(x,y,w,h); this.slideDir=1; }
  baseUpdate(level,game) {
    this.vy=Math.min(this.vy+GR,MAX_FALL);
    this.x+=this.vx; this.y+=this.vy;
    // basic tile collision for items
    const ty=Math.floor((this.y+this.h)/T);
    const tx=Math.floor(this.cx/T);
    if(isSolid(gt(level.map,tx,ty))){this.y=ty*T-this.h;this.vy=0;this.onGround=true;}
    const txL=Math.floor(this.x/T),txR=Math.floor(this.right/T);
    const tyM=Math.floor(this.cy/T);
    if(isSolid(gt(level.map,txL,tyM))){this.x=(txL+1)*T;}
    if(isSolid(gt(level.map,txR,tyM))){this.x=txR*T-this.w;}
    if(this.vx===0&&this.onGround) this.vx=this.slideDir*0.8;
    if(this.x<0||this.x>level.W*T||this.y>VH+32) this.remove=true;
  }
}

// ═══════════════════════════════════════════════════════
// COLLISION / MOVEMENT
// ═══════════════════════════════════════════════════════
function moveEntity(e, level, game) {
  // X
  e.x += e.vx;
  const yTop=Math.floor(e.y/T), yBot=Math.floor((e.y+e.h-0.5)/T);
  e._hitWall=false;
  for(let ty=yTop;ty<=yBot;ty++) {
    const txL=Math.floor(e.x/T), txR=Math.floor((e.x+e.w-0.5)/T);
    if(e.vx<0&&isSolid(gt(level.map,txL,ty))){e.x=(txL+1)*T;e.vx=0;e.dir*=-1;e._hitWall=true;}
    if(e.vx>0&&isSolid(gt(level.map,txR,ty))){e.x=txR*T-e.w;e.vx=0;e.dir*=-1;e._hitWall=true;}
  }
  // Y
  e.y += e.vy;
  const xLeft=Math.floor(e.x/T), xRight=Math.floor((e.x+e.w-0.5)/T);
  if(e.vy>0) { // falling
    const tyB=Math.floor((e.y+e.h-0.5)/T);
    for(let tx=xLeft;tx<=xRight;tx++){
      const t=gt(level.map,tx,tyB);
      if(isSolid(t)||(isTopOnly(t)&&e.y+e.h-e.vy<=tyB*T+2)){
        e.y=tyB*T-e.h; e.vy=0; e.onGround=true;
      }
    }
  }
  if(e.vy<0) { // going up
    const tyT=Math.floor(e.y/T);
    for(let tx=xLeft;tx<=xRight;tx++){
      const t=gt(level.map,tx,tyT);
      if(isSolid(t)){
        e.y=(tyT+1)*T; e.vy=0;
        // block hit
        if(game&&game.onBlockHit) game.onBlockHit(tx,tyT,e);
      }
    }
  }
  // Level left wall
  if(e.x<0&&game&&e===game.player){e.x=0;e.vx=0;}
}

// WORLD MAP
// ═══════════════════════════════════════════════════════
const MAP_NODES = [
  {x:30,  y:160, id:0, label:'1-1'},
  {x:70,  y:160, id:1, label:'1-2'},
  {x:110, y:140, id:2, label:'TOAD'},
  {x:150, y:160, id:3, label:'1-3'},
  {x:200, y:130, id:4, label:'CASTLE'},
];

function drawWorldMap(cursor, cleared) {
  // Background
  ctx.fillStyle='#00A800';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // Green field
  for(let i=0;i<VW;i+=8) for(let j=0;j<VH;j+=8)
    if((i+j)%16<8){pr(i,j,8,8,'#00B800');}

  pt('WORLD 1', VW/2, 20, 7, '#FCF0C0', 'center');

  // Draw path between nodes
  ctx.strokeStyle='#C89800'; ctx.lineWidth=3*SC;
  for(let i=0;i<MAP_NODES.length-1;i++){
    const a=MAP_NODES[i],b=MAP_NODES[i+1];
    ctx.beginPath();
    ctx.moveTo(a.x*SC,a.y*SC);
    ctx.lineTo(b.x*SC,b.y*SC);
    ctx.stroke();
  }

  // Draw nodes
  MAP_NODES.forEach((n,i)=>{
    const col = n.id===4?'#C84010':cleared[i]?'#808080':'#FCC000';
    pr(n.x-10,n.y-10,20,20,col);
    pr(n.x-9,n.y-9,18,18,'#000');
    pr(n.x-8,n.y-8,16,16,col);
    pt(n.label,n.x,n.y-14,4,'#FCF0C0','center');
  });

  // Mario icon at cursor
  const cn=MAP_NODES[cursor];
  pr(cn.x-6,cn.y-24,12,20,COL.mred);
  pr(cn.x-4,cn.y-24,8,8,COL.mskin);

  // Instructions
  pt('ARROW KEYS: MOVE',VW/2,VH-30,4,'#FCF0C0','center');
  pt('Z / A: ENTER LEVEL',VW/2,VH-18,4,'#FCF0C0','center');
}

// ═══════════════════════════════════════════════════════
// GAME CLASS
// ═══════════════════════════════════════════════════════
class Game {
  constructor() {
    this.state='title'; // title|map|playing|paused|clear|gameover|dead
    this.levelIdx=0;
    this.cleared=[false,false,false,false,false];
    this.mapCursor=0;
    this.player=new Player(0,0);
    this.entities=[];
    this.popups=[];
    this.camX=0;
    this.levelData=LEVELS[0];
    this.timer=400;
    this.pauseFrame=0;
    this.deadTimer=0;
    this.clearTimer=0;
    this.cardPhase=0; // 0=spinning,1=show
    this.cardVal=0;
    this.titleBlink=0;
    this.mapBlinkTimer=0;
  }

  loadLevel(idx) {
    this.levelIdx=idx;
    this.levelData=LEVELS[Math.min(idx,LEVELS.length-1)];
    const ld=this.levelData;
    const ps=ld.playerStart;
    this.player=new Player(ps.tx*T+2, ps.ty*T);
    this.player.power=this.savedPower||SMALL;
    this.entities=[];
    this.popups=[];
    this.camX=0;
    this.timer=400;
    this.state='playing';

    // Spawn entities
    ld.entities.forEach(e=>{
      const x=e.tx*T, y=e.ty*T;
      switch(e.type){
        case'goomba': this.entities.push(new Goomba(x,y)); break;
        case'koopa':  this.entities.push(new KoopaTroopa(x,y,e.red)); break;
        case'piranha':this.entities.push(new PiranhaPlant(x/T,e.pipeRow,y)); break;
        case'paragoomba': this.entities.push(new ParaGoomba(x,y)); break;
        case'hammerbro': this.entities.push(new HammerBro(x,y)); break;
        case'buzzy': this.entities.push(new Buzzy(x,y)); break;
      }
    });

    // Fix piranha plants
    this.entities=this.entities.map(e=>{
      if(e instanceof PiranhaPlant){
        const pe=e;
        // already constructed correctly above
        return e;
      }
      return e;
    });

    startBGM();
  }

  spawnFireball(p) {
    const fb=new Fireball(p.cx-4+(p.dir>0?6:0), p.y+4, p.dir);
    this.entities.push(fb);
  }

  onBlockHit(tx,ty,hitter) {
    const ld=this.levelData;
    const t=gt(ld.map,tx,ty);
    if(t===QBLOCK||t===HIDDEN) {
      const key=`${ty}_${tx}`;
      const content=ld.qContent[key]||'coin';
      st(ld.map,tx,ty,USED);
      this.spawnFromBlock(tx,ty,content,hitter);
      SFX.bump();
    } else if(t===BRICK&&hitter instanceof Player&&hitter.power>=BIG) {
      st(ld.map,tx,ty,AIR);
      this.addScore(50,tx*T,ty*T);
      SFX.brick();
    } else if(t===NOTE) {
      hitter.vy=-6;
      this.addScore(50,tx*T,ty*T);
      SFX.bump();
    } else if(t!==AIR&&t!==USED) {
      SFX.bump();
    }
  }

  spawnFromBlock(tx,ty,content,hitter) {
    const ld=this.levelData;
    const bx=tx*T+1, by=(ty-1)*T;
    if(content==='coin'){
      this.player.coins++; this.addScore(200,bx,by);
      this.entities.push(new CoinFly(bx,by));
      SFX.coin();
    } else if(content==='powerup') {
      if(this.player.power===SMALL) this.entities.push(new MushroomItem(bx,by,false));
      else if(ld.id==='1-3') this.entities.push(new SuperLeafItem(bx,by));
      else this.entities.push(new FireFlowerItem(bx,by));
    } else if(content==='leaf') {
      this.entities.push(new SuperLeafItem(bx,by));
    } else if(content==='1up') {
      this.entities.push(new MushroomItem(bx,by,true));
    } else if(content==='star') {
      this.entities.push(new StarItem(bx,by));
    }
  }

  addScore(v, x, y) {
    this.player.score += v;
    this.popups.push(new ScorePopup(x, y, v));
  }

  checkEntityCollisions() {
    const p=this.player;
    if(p.dead) return;

    this.entities.forEach(e=>{
      if(e.remove||e instanceof Fireball||e instanceof Hammer||
         e instanceof MushroomItem||e instanceof FireFlowerItem||
         e instanceof SuperLeafItem||e instanceof StarItem||
         e instanceof CoinFly) return;

      if(!p.overlaps(e)) return;

      // Item collection
      if(e instanceof MushroomItem||e instanceof FireFlowerItem||
         e instanceof SuperLeafItem||e instanceof StarItem) {
        e.collect(p,this); return;
      }

      // Hammer/fireball hit player
      if(e instanceof Hammer) {
        if(p.starTimer>0){e.remove=true;return;}
        e.remove=true; this.hitPlayer(); return;
      }

      // Stomping enemy
      const fromAbove = p.vy>0 && p.bottom-p.vy <= e.y+4;
      if(fromAbove) {
        // Stomp
        if(e instanceof KoopaTroopa&&e.inShell&&Math.abs(e.vx)<0.1){
          // kick shell
          e.kick(p.cx<e.cx?1:-1,this);
          p.vy=-3;
          this.addScore(400,e.cx,e.y);
        } else {
          const pts=e.stomp(this);
          if(pts>0){
            this.addScore(pts,e.cx,e.y);
            this.player.stompCombo++;
            this.player.stompTimer=20;
          }
          p.vy=-3.5; // bounce
        }
      } else {
        // Side collision with enemy
        if(p.starTimer>0){
          e.hit(this); this.addScore(200,e.cx,e.y);
        } else if(e instanceof KoopaTroopa&&e.inShell&&Math.abs(e.vx)>1){
          this.hitPlayer();
        } else if(!(e instanceof KoopaTroopa&&e.inShell&&Math.abs(e.vx)<0.1)){
          this.hitPlayer();
        } else if(e instanceof Buzzy&&e.inShell&&Math.abs(e.vx)<0.1){
          // kick buzzy
          e.kick(p.cx<e.cx?1:-1);
        }
      }

      // Tail whip
      if(p.power===RACCOON&&p.tailTimer>8) {
        e.hit(this); this.addScore(200,e.cx,e.y);
      }
    });

    // Fireball vs enemy
    this.entities.forEach(fb=>{
      if(!(fb instanceof Fireball)||fb.remove) return;
      this.entities.forEach(e=>{
        if(e.remove||e instanceof Fireball) return;
        if(fb.overlaps(e)){
          if(e instanceof Buzzy) return; // immune
          e.hit(this); this.addScore(200,e.cx,e.y); fb.remove=true;
        }
      });
    });

    // Collect coins in map
    const txL=Math.floor(p.x/T),txR=Math.floor(p.right/T);
    const tyT=Math.floor(p.y/T),tyB=Math.floor(p.bottom/T);
    for(let ty=tyT;ty<=tyB;ty++) for(let tx=txL;tx<=txR;tx++){
      if(gt(this.levelData.map,tx,ty)===COIN_T){
        st(this.levelData.map,tx,ty,AIR);
        p.coins++; this.addScore(200,tx*T,ty*T); SFX.coin();
      }
    }

    // Goal
    if(p.cx >= this.levelData.goalPx && this.state==='playing') {
      this.triggerClear();
    }
  }

  hitPlayer() {
    const p=this.player;
    if(p.invTimer>0||p.starTimer>0) return;
    if(p.power>SMALL) p.shrink();
    else p.die();
  }

  triggerClear() {
    this.state='clear';
    this.clearTimer=0;
    this.cardPhase=0;
    this.cardVal=Math.floor(Math.random()*3);
    stopBGM();
    SFX.clear();
  }

  update() {
    if(this.state==='title') {
      this.titleBlink++;
      if(K.jump||K.startP||K.runP) { initAudio(); this.state='map'; }
      return;
    }
    if(this.state==='map') {
      this.mapBlinkTimer++;
      if(K.rightP||K.right&&(this.mapBlinkTimer%15===0)) {
        if(this.mapCursor<MAP_NODES.length-1) this.mapCursor++;
      }
      if(K.leftP||K.left&&(this.mapBlinkTimer%15===0)) {
        if(this.mapCursor>0) this.mapCursor--;
      }
      if(K.jumpP||K.startP) {
        const node=MAP_NODES[this.mapCursor];
        if(node.id<3) { // playable level
          this.savedPower=this.player.power||SMALL;
          this.loadLevel(node.id);
        } else if(node.id===2) {
          // Toad house - give power up
          this.state='toad';
        }
      }
      return;
    }
    if(this.state==='toad') {
      if(K.jumpP||K.startP) {
        // Give random powerup
        const pow=[BIG,FIRE,RACCOON][Math.floor(Math.random()*3)];
        this.player.power=pow; this.savedPower=pow;
        SFX.powerup();
        this.cleared[2]=true;
        this.state='map';
      }
      return;
    }
    if(this.state==='clear') {
      this.clearTimer++;
      if(this.clearTimer>120) {
        if(K.jumpP||K.startP||this.clearTimer>240) {
          this.cleared[this.levelIdx]=true;
          this.mapCursor=Math.min(this.levelIdx+1, MAP_NODES.length-1);
          this.savedPower=this.player.power;
          this.state='map';
          startBGM();
        }
      }
      return;
    }
    if(this.state==='gameover') {
      if(++this.deadTimer>120&&(K.jumpP||K.startP)) {
        this.state='title'; this.player=new Player(0,0);
      }
      return;
    }
    if(this.state==='paused') {
      if(K.startP) this.state='playing';
      return;
    }
    if(this.state!=='playing') return;

    if(K.startP) { this.state='paused'; return; }

    const p=this.player;

    if(p.dead) {
      p.update(K,this.levelData,this);
      if(++this.deadTimer>90) {
        p.lives--;
        if(p.lives<=0){ this.state='gameover'; this.deadTimer=0; return; }
        this.loadLevel(this.levelIdx);
        this.deadTimer=0;
      }
      return;
    }

    // Timer
    this.timer-=1/60;
    if(this.timer<=0&&this.state==='playing') { p.die(); }

    p.update(K, this.levelData, this);

    // Update entities
    this.entities.forEach(e=>{
      if(e instanceof Fireball||e instanceof Hammer||
         e instanceof CoinFly) e.update(this.levelData,this);
      else if(e instanceof PiranhaPlant) e.update(this.levelData,this);
      else if(e instanceof MushroomItem||e instanceof FireFlowerItem||
              e instanceof SuperLeafItem||e instanceof StarItem) e.update(this.levelData,this);
      else e.update(this.levelData,this);
    });
    this.entities=this.entities.filter(e=>!e.remove);
    this.popups=this.popups.filter(pp=>{ pp.update(); return !pp.remove; });

    this.checkEntityCollisions();

    // Camera: follow player with lookahead, clamp to level
    const targetX=p.x-VW*0.35+p.dir*20;
    this.camX+=(targetX-this.camX)*0.12;
    const maxCam=(this.levelData.W*T)-VW;
    this.camX=Math.max(0,Math.min(maxCam,this.camX));
    // Can't scroll back
    if(p.x < this.camX+8) p.x=this.camX+8;

    clearPressed();
  }

  drawBG() {
    const ld=this.levelData;
    // Sky gradient
    ctx.fillStyle=ld.bg;
    ctx.fillRect(0,8*SC,canvas.width,canvas.height);
    if(!ld.underground) {
      // Clouds (parallax)
      const cx=Math.floor(this.camX*0.3);
      const cloudPositions=[30,90,160,220,290,360,420];
      cloudPositions.forEach(cp=>{
        const sx=((cp-cx)%VW+VW)%VW;
        pr(sx,30,28,10,'#FCFCFC'); pr(sx+4,24,20,8,'#FCFCFC');
        pr(sx-2,36,32,8,'#FCFCFC');
      });
      // Hills
      const hillPositions=[0,80,160,240,320];
      hillPositions.forEach(hp=>{
        const sx=((hp-Math.floor(this.camX*0.5))%VW+VW)%VW;
        ctx.fillStyle='#00C800';
        ctx.beginPath();
        ctx.arc((sx+24)*SC,(VH-28)*SC,20*SC,Math.PI,0);
        ctx.fill();
      });
    }
  }

  draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(this.state==='title') {
      this.drawTitle(); return;
    }
    if(this.state==='map'||this.state==='toad') {
      drawWorldMap(this.mapCursor,this.cleared);
      if(this.state==='toad'){
        pr(VW/2-60,VH/2-30,120,60,'#000040');
        pt('TOAD HOUSE',VW/2,VH/2-18,5,'#FCC000','center');
        pt('A GIFT!',VW/2,VH/2-6,5,'#FCF0C0','center');
        pt('[A/Z] TO TAKE',VW/2,VH/2+10,4,'#C0C0FC','center');
      }
      return;
    }
    if(this.state==='gameover') {
      ctx.fillStyle='#000';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      pt('GAME OVER',VW/2,VH/2-10,8,'#E42020','center');
      pt('SCORE:'+this.player.score,VW/2,VH/2+10,5,'#FCF0C0','center');
      if(this.deadTimer>60) pt('[A/Z] TITLE',VW/2,VH/2+26,4,'#888','center');
      return;
    }
    if(this.state==='paused') {
      this.drawBG();
      this.drawLevel();
      this.drawEntities();
      this.drawMario();
      drawHUD(this);
      pr(VW/2-40,VH/2-12,80,24,'#000040');
      pt('PAUSED',VW/2,VH/2+3,6,'#FCF0C0','center');
      return;
    }

    this.drawBG();
    this.drawLevel();
    this.drawEntities();
    this.drawMario();
    this.popups.forEach(pp=>pp.draw(this.camX));
    drawHUD(this);

    if(this.state==='clear') this.drawClear();
    if(this.player.dead&&this.deadTimer<60){
      pt('YOU DIED',VW/2,VH/2,7,'#E42020','center');
    }
  }

  drawTitle() {
    // Sky BG
    ctx.fillStyle='#5C94FC';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    pr(0,VH-32,VW,32,'#AC7C00');
    pr(0,VH-34,VW,2,'#00A800');

    // Title
    pt('SUPER',VW/2,50,8,'#E42020','center');
    pt('MARIO',VW/2,66,8,'#E42020','center');
    pt('BROS. 3',VW/2,82,8,'#E42020','center');

    // Mario sprite on title
    const p=this._titlePlayer||(()=>{
      const tp=new Player(VW/2-6, VH-46); tp.power=RACCOON; return (this._titlePlayer=tp);
    })();
    drawMario(p.x, p.y, RACCOON, 1, Math.floor(Date.now()/200)%3, 0, false, Math.floor(Date.now()/300)%2);

    // Blink PRESS START
    if(Math.floor(this.titleBlink/30)%2===0)
      pt('PRESS Z TO START',VW/2,VH-60,4,'#FCF0C0','center');

    pt('ARROW KEYS: MOVE   Z: JUMP   X: RUN/FIRE',VW/2,VH-20,3,'#C0C0FC','center');
  }

  drawLevel() {
    const ld=this.levelData;
    const startTx=Math.floor(this.camX/T)-1;
    const endTx=startTx+Math.ceil(VW/T)+2;
    for(let ty=0;ty<15;ty++) {
      for(let tx=Math.max(0,startTx);tx<Math.min(ld.W,endTx);tx++){
        const t=gt(ld.map,tx,ty);
        if(t!==AIR) drawTile(tx,ty,t,this.camX);
      }
    }
  }

  drawEntities() {
    this.entities.forEach(e=>{ if(e.draw) e.draw(this.camX); });
  }

  drawMario() {
    const p=this.player;
    if(p.dead&&p.y>VH+32) return;
    drawMario(p.x-this.camX, p.y,
      p.power, p.dir, p.frame%3, p.invTimer,
      p.crouching, p.tailTimer>8&&Math.floor(Date.now()/80)%2===0);
  }

  drawClear() {
    const a=Math.min(1, this.clearTimer/60);
    ctx.fillStyle=`rgba(0,0,0,${a*0.6})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if(this.clearTimer>40){
      pt('COURSE CLEAR!',VW/2,VH/2-16,7,'#FCC000','center');
      pt('SCORE: '+this.player.score,VW/2,VH/2+4,5,'#FCF0C0','center');
      if(this.clearTimer>120) pt('[Z] CONTINUE',VW/2,VH/2+22,4,'#C0C0FC','center');
    }
  }
}

// ═══════════════════════════════════════════════════════
// PARALLAX BACKGROUND DECORATIONS
// ═══════════════════════════════════════════════════════
// (handled inside Game.drawBG)

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
const game = new Game();

// Fix PiranhaPlant constructor — needs proper args
// Re-build entities correctly after loading
const _origLoad = Game.prototype.loadLevel;
Game.prototype.loadLevel = function(idx) {
  _origLoad.call(this, idx);
  // Fix piranhas
  this.entities = this.entities.filter(e=>!(e instanceof PiranhaPlant));
  this.levelData.entities.forEach(e=>{
    if(e.type==='piranha'){
      const px=new PiranhaPlant(e.tx, e.pipeRow, e.ty*T);
      px.x=e.tx*T; px.pipeTop=e.pipeRow;
      px.y=e.pipeRow*T;
      this.entities.push(px);
    }
  });
};

// Fix K right/left pressed events
['right','left','up','down','jump','run','start'].forEach(k=>{
  Object.defineProperty(K, k+'P', {
    get(){ return this['_'+k+'P']||0; },
    set(v){ this['_'+k+'P']=v; },
  });
});

let lastT=0, acc=0;
const STEP=1000/60;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt=Math.min(ts-lastT,50); lastT=ts;
  acc+=dt;
  while(acc>=STEP){ game.update(); acc-=STEP; }
  game.draw();
  // clear one-shot keys
  K._jumpP=0; K._runP=0; K._startP=0;
  K._rightP=0; K._leftP=0; K._upP=0; K._downP=0;
}

// Patch keydown to also set pressed flags
document.addEventListener('keydown', e=>{
  const k=KMAP[e.code]; if(!k) return;
  K['_'+k+'P']=1;
});

// Patch mobile buttons to set pressed
['db-left','db-right','db-up','btn-a','btn-b'].forEach(id=>{
  const el=document.getElementById(id);
  if(!el) return;
  const k={
    'db-left':'left','db-right':'right','db-up':'up',
    'btn-a':'jump','btn-b':'run'
  }[id];
  const on=()=>{ K['_'+k+'P']=1; };
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('mousedown',on);
});

requestAnimationFrame(loop);
</script>
