<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>mario.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#000}
    body{display:flex;flex-direction:column;font-family:'Press Start 2P',monospace}
    #gw{flex:1;position:relative;overflow:hidden}
    canvas{display:block;width:100%;height:100%}

    #overlay{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:rgba(0,0,0,.65);
      color:#fff;gap:1.2rem;text-align:center;padding:2rem;cursor:pointer;
    }
    #overlay.off{display:none}
    #overlay h2{font-size:clamp(.9rem,4vw,2rem);color:#FFD700;text-shadow:3px 3px #000}
    #overlay p{font-size:clamp(.45rem,1.5vw,.72rem);color:#ccc;line-height:2}
    #overlay .hint{font-size:clamp(.35rem,1vw,.55rem);color:#888;margin-top:.3rem}

    #ctrl{
      position:absolute;bottom:14px;left:0;right:0;
      display:none;justify-content:space-between;padding:0 20px;
      pointer-events:none;z-index:10;align-items:flex-end;
    }
    .dpad{display:flex;gap:8px}
    .cbtn{
      pointer-events:all;width:58px;height:58px;border-radius:50%;
      background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);
      display:flex;align-items:center;justify-content:center;
      font-size:1.4rem;user-select:none;-webkit-user-select:none;touch-action:manipulation;
    }
  </style>
</head>
<body>
  <script src="/shared/nav.js?v=2"></script>
  <div id="gw">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h2>&#9824; SUPER MARIO</h2>
      <p>Collect coins &amp; reach the flag!<br>Jump on Goombas to defeat them.</p>
      <p>&#8592; &#8594; Move &nbsp;&nbsp; &#8593; / Space Jump</p>
      <p class="hint">Press any key or tap to start</p>
    </div>
    <div id="ctrl">
      <div class="dpad">
        <div class="cbtn" id="bl">&#9664;</div>
        <div class="cbtn" id="br">&#9654;</div>
      </div>
      <div class="cbtn" id="bj">&#9650;</div>
    </div>
  </div>
  <script>
  'use strict';

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const ctrl   = document.getElementById('ctrl');
  const gw     = document.getElementById('gw');

  /* ── sizing ── */
  function resize() {
    canvas.width  = gw.clientWidth;
    canvas.height = gw.clientHeight;
  }
  window.addEventListener('resize', () => { resize(); if (state !== 'splash') buildLevel(); });
  resize();

  /* ── input ── */
  const K = {}, T = {};
  document.addEventListener('keydown', e => {
    K[e.code] = true;
    if (state !== 'playing') begin();
  });
  document.addEventListener('keyup', e => K[e.code] = false);
  overlay.addEventListener('click', () => { if (state !== 'playing') begin(); });

  function bindBtn(id, name) {
    const el = document.getElementById(id);
    const on  = e => { e.preventDefault(); T[name] = true;  if (state !== 'playing') begin(); };
    const off = e => { e.preventDefault(); T[name] = false; };
    el.addEventListener('touchstart', on,  {passive:false});
    el.addEventListener('touchend',   off, {passive:false});
    el.addEventListener('mousedown',  on);
    el.addEventListener('mouseup',    off);
  }
  bindBtn('bl','left'); bindBtn('br','right'); bindBtn('bj','jump');

  if ('ontouchstart' in window) ctrl.style.display = 'flex';

  const L = () => K.ArrowLeft  || K.KeyA || T.left;
  const R = () => K.ArrowRight || K.KeyD || T.right;
  const J = () => K.ArrowUp    || K.KeyW || K.Space || T.jump;

  /* ── constants ── */
  const TILE  = 32;
  const LW    = 5200;   // level width px
  const GRAV  = 0.55;
  const JVY   = -12.5;
  const SPD   = 4.8;

  /* ── state ── */
  let state = 'splash';
  let score = 0, lives = 3, camX = 0;
  let player = null, platforms = [], coins = [], enemies = [], particles = [], flag = null;
  let jumpHeld = false;

  /* ── level ── */
  function buildLevel() {
    const ch = canvas.height;
    const gy = ch - TILE;           // ground top

    platforms = [{ x:0, y:gy, w:LW, h:TILE*4, ground:true }];
    coins = []; enemies = []; particles = [];

    // Floating platforms: [tile_x, tiles_above_ground, tile_width]
    const pd = [
      [5,3,3],[10,5,4],[15,3,2],[20,4,3],[26,6,5],[32,3,3],[37,5,4],
      [43,3,2],[48,4,3],[53,6,4],[59,3,3],[64,5,2],[69,4,4],[74,3,3],
      [79,5,3],[84,4,4],[89,3,2],[94,6,5],[100,3,3],[105,5,4],
      [111,4,2],[116,3,3],[121,5,4],[126,4,3],[131,6,5],[137,3,2],
      [142,4,3],[147,3,4],[152,5,3],[157,4,2],
    ];

    pd.forEach(([tx,ab,tw]) => {
      const px = tx*TILE, py = gy - ab*TILE, pw = tw*TILE;
      platforms.push({x:px, y:py, w:pw, h:TILE});
      // Coins above platform
      for (let i=0;i<tw;i++) {
        if (Math.random()<0.55)
          coins.push({x:px+i*TILE+8, y:py-TILE-2, w:16, h:16, got:false, t:Math.random()*6.28});
      }
      // Enemy on wider platforms
      if (tw>=3 && Math.random()<0.45)
        enemies.push(makeGoomba(px+TILE, py-TILE, px, px+pw-28));
    });

    // Ground coins
    for (let tx=4; tx<LW/TILE-10; tx+=4+Math.floor(Math.random()*4))
      coins.push({x:tx*TILE+8, y:gy-TILE-2, w:16, h:16, got:false, t:Math.random()*6.28});

    // Ground goombas
    for (let tx=20; tx<LW/TILE-20; tx+=18+Math.floor(Math.random()*10))
      enemies.push(makeGoomba(tx*TILE, gy-TILE, 0, LW));

    flag = {x:LW-5*TILE, y:gy-12*TILE, h:12*TILE, triggered:false};

    player = {x:80, y:gy-50, w:22, h:30, vx:0, vy:0, onGround:false, face:1, iframes:0};
    jumpHeld = false;
    camX = 0;
  }

  function makeGoomba(x, y, minX, maxX) {
    return {x, y, w:28, h:TILE, vx:(Math.random()<0.5?-1.8:1.8), minX, maxX,
            alive:true, squash:0};
  }

  /* ── physics ── */
  function overlapX(a,b){ return a.x+a.w>b.x && a.x<b.x+b.w; }
  function overlap(a,b){ return overlapX(a,b) && a.y+a.h>b.y && a.y<b.y+b.h; }

  function moveAndCollide(obj) {
    // X pass
    obj.x += obj.vx;
    for (const p of platforms) {
      if (!overlap(obj,p)) continue;
      if (obj.vx>0) obj.x = p.x-obj.w;
      else if (obj.vx<0) obj.x = p.x+p.w;
      obj.vx = 0;
    }
    // Y pass
    obj.y += obj.vy;
    obj.onGround = false;
    for (const p of platforms) {
      if (!overlapX(obj,p)) continue;
      // landing
      if (obj.vy>=0 && obj.y+obj.h>p.y && obj.y+obj.h-obj.vy<=p.y+2) {
        obj.y = p.y-obj.h; obj.vy=0; obj.onGround=true;
      }
      // ceiling
      else if (obj.vy<0 && obj.y<p.y+p.h && obj.y-obj.vy>=p.y+p.h-2) {
        obj.y = p.y+p.h; obj.vy=0;
      }
    }
  }

  /* ── update ── */
  function begin() {
    if (state==='splash'||state==='over'||state==='win') {
      state='playing'; score=0; lives=3;
      buildLevel();
    }
    overlay.classList.add('off');
  }

  function showMsg(title, body) {
    overlay.querySelector('h2').textContent = title;
    overlay.querySelector('p').innerHTML = body;
    overlay.querySelector('.hint').textContent = 'Press any key or tap to restart';
    overlay.classList.remove('off');
  }

  function loseLife() {
    lives--;
    if (lives<=0) { state='over'; showMsg('GAME OVER', `Score: ${score}`); return; }
    // respawn at camera position
    player.x = Math.max(80, camX+80);
    player.y = canvas.height-TILE-player.h-80;
    player.vx=0; player.vy=0; player.iframes=150;
  }

  function burst(x, y, color, n=8) {
    for (let i=0;i<n;i++) {
      const a=Math.random()*6.28, s=2+Math.random()*3;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:22,col:color});
    }
  }

  function update() {
    if (state!=='playing') return;

    // Player
    if (R()) { player.vx=SPD;  player.face=1; }
    else if (L()) { player.vx=-SPD; player.face=-1; }
    else player.vx*=0.72;

    if (J()&&!jumpHeld&&player.onGround) { player.vy=JVY; jumpHeld=true; }
    if (!J()) { jumpHeld=false; if (player.vy<-4) player.vy+=2; } // variable jump height

    player.vy = Math.min(player.vy+GRAV, 20);
    player.x  = Math.max(0, player.x);
    moveAndCollide(player);

    if (player.y > canvas.height+200) { loseLife(); return; }

    camX = Math.max(0, Math.min(player.x-canvas.width*0.33, LW-canvas.width));

    // Coins
    coins.forEach(c => {
      if (c.got||!overlap(player,c)) return;
      c.got=true; score+=100;
      burst(c.x+8, c.y+8, '#FFD700');
    });

    // Enemies
    for (let i=enemies.length-1;i>=0;i--) {
      const e=enemies[i];
      if (!e.alive) { if(--e.squash<=0) enemies.splice(i,1); continue; }
      e.x+=e.vx;
      if (e.x<=e.minX||e.x+e.w>=e.maxX) { e.vx*=-1; e.x=Math.max(e.minX,Math.min(e.x,e.maxX-e.w)); }

      if (!overlap(player,e)) continue;
      if (player.iframes>0) continue;

      if (player.vy>0 && player.y+player.h < e.y+e.h*0.55) {
        // Stomp!
        e.alive=false; e.squash=18; score+=200;
        player.vy=-8;
        burst(e.x+14, e.y, '#8D6E63');
      } else {
        loseLife();
      }
    }

    // Flagpole
    if (!flag.triggered && player.x+player.w>flag.x && player.x<flag.x+14) {
      flag.triggered=true;
      score += 1000+coins.filter(c=>c.got).length*20;
      state='win';
      showMsg('&#127941; YOU WIN!', `Score: ${score}`);
    }

    if (player.iframes>0) player.iframes--;

    // Particles
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life--;});
    particles=particles.filter(p=>p.life>0);
  }

  /* ── drawing ── */
  function drawBg() {
    const cw=canvas.width, ch=canvas.height;
    // Sky
    const sg=ctx.createLinearGradient(0,0,0,ch);
    sg.addColorStop(0,'#1565C0'); sg.addColorStop(1,'#42A5F5');
    ctx.fillStyle=sg; ctx.fillRect(0,0,cw,ch);

    // Clouds (40% parallax)
    ctx.fillStyle='rgba(255,255,255,.92)';
    [[350,55],[850,38],[1500,75],[2200,48],[2900,68],[3600,42],[4300,62]].forEach(([cx,cy])=>{
      const bx=cx-camX*0.4;
      if(bx<-120||bx>cw+120) return;
      ctx.beginPath();
      ctx.arc(bx+20,cy+12,18,0,6.28); ctx.arc(bx+48,cy,26,0,6.28); ctx.arc(bx+80,cy+14,18,0,6.28);
      ctx.fill();
    });

    // Hills (65% parallax)
    [[600,80],[1400,60],[2300,90],[3200,70],[4100,80]].forEach(([hx,hs])=>{
      const bx=hx-camX*0.65;
      if(bx<-200||bx>cw+200) return;
      ctx.fillStyle='#388E3C';
      ctx.beginPath(); ctx.arc(bx,ch-TILE*2-4,hs,Math.PI,0); ctx.fill();
      ctx.fillStyle='#43A047';
      ctx.beginPath(); ctx.arc(bx+hs*0.7,ch-TILE*2-4,hs*0.6,Math.PI,0); ctx.fill();
    });
  }

  function drawPlatform(p) {
    const bx=p.x-camX;
    if(bx+p.w<-60||bx>canvas.width+60) return;
    if (p.ground) {
      ctx.fillStyle='#4CAF50'; ctx.fillRect(bx,p.y,p.w,10);
      ctx.fillStyle='#795548'; ctx.fillRect(bx,p.y+10,p.w,p.h-10);
      ctx.fillStyle='#6D4C41';
      for(let tx=0;tx<p.w;tx+=TILE) ctx.fillRect(bx+tx,p.y+10,1,p.h-10);
      for(let ty=p.y+12;ty<p.y+p.h;ty+=14) ctx.fillRect(bx,ty,p.w,1);
    } else {
      for(let tx=0;tx<p.w;tx+=TILE){
        ctx.fillStyle=(Math.floor((p.x+tx)/TILE)%2===0)?'#C0392B':'#E74C3C';
        ctx.fillRect(bx+tx,p.y,Math.min(TILE,p.w-tx),p.h);
      }
      ctx.fillStyle='#922B21';
      for(let tx=0;tx<=p.w;tx+=TILE) ctx.fillRect(bx+tx,p.y,1,p.h);
      ctx.fillRect(bx,p.y,p.w,1); ctx.fillRect(bx,p.y+p.h-1,p.w,1);
      ctx.fillStyle='rgba(255,160,160,.25)'; ctx.fillRect(bx,p.y,p.w,5);
    }
  }

  function drawCoin(c) {
    if (c.got) return;
    c.t+=0.09;
    const cx=c.x-camX+8, cy=c.y+8;
    const rx=8*Math.abs(Math.cos(c.t));
    if(cx<-20||cx>canvas.width+20) return;
    const g=ctx.createRadialGradient(cx-1,cy-2,1,cx,cy,Math.max(rx,1));
    g.addColorStop(0,'#FFFDE7'); g.addColorStop(0.5,'#FFD600'); g.addColorStop(1,'#F57F17');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(cx,cy,Math.max(rx,0.5),8,0,0,6.28); ctx.fill();
    // Star gleam
    if(rx>4){
      ctx.fillStyle='rgba(255,255,255,.7)';
      ctx.fillRect(cx-1,cy-5,2,4); ctx.fillRect(cx-2,cy-2,4,2);
    }
  }

  function drawGoomba(e) {
    const ex=e.x-camX;
    if(ex+e.w<-10||ex>canvas.width+10) return;
    if (!e.alive) {
      // Squashed pancake
      ctx.fillStyle='#8D6E63';
      ctx.fillRect(ex,e.y+e.h-8,e.w,8);
      ctx.fillStyle='#6D4C41';
      ctx.fillRect(ex+3,e.y+e.h-13,e.w-6,5);
      return;
    }
    const ey=e.y;
    // Body
    ctx.fillStyle='#8D6E63';
    ctx.beginPath(); ctx.ellipse(ex+14,ey+12,13,11,0,0,6.28); ctx.fill();
    ctx.fillStyle='#A1887F';
    ctx.fillRect(ex+2,ey+10,24,14);
    // Feet
    ctx.fillStyle='#6D4C41';
    const wob=Math.sin(Date.now()/200)*2; // wobble walk
    ctx.fillRect(ex+wob,ey+20,10,8);
    ctx.fillRect(ex+18-wob,ey+20,10,8);
    // Eyes
    ctx.fillStyle='#FFF';
    ctx.fillRect(ex+4,ey+4,7,7); ctx.fillRect(ex+17,ey+4,7,7);
    ctx.fillStyle='#000';
    ctx.fillRect(ex+8,ey+7,3,3); ctx.fillRect(ex+17,ey+7,3,3);
    // Angry brows
    ctx.fillStyle='#3E2723';
    ctx.save(); ctx.translate(ex+7,ey+4); ctx.rotate(0.35); ctx.fillRect(0,0,7,2); ctx.restore();
    ctx.save(); ctx.translate(ex+24,ey+4); ctx.rotate(-0.35); ctx.fillRect(-7,0,7,2); ctx.restore();
  }

  function drawFlag() {
    if (!flag) return;
    const fx=flag.x-camX;
    if(fx<-60||fx>canvas.width+60) return;
    ctx.fillStyle='#9E9E9E'; ctx.fillRect(fx+6,flag.y,5,flag.h);
    ctx.fillStyle=flag.triggered?'#BDBDBD':'#4CAF50';
    ctx.beginPath(); ctx.moveTo(fx+11,flag.y+4); ctx.lineTo(fx+46,flag.y+22); ctx.lineTo(fx+11,flag.y+38); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5D4037'; ctx.fillRect(fx-1,flag.y+flag.h,17,10);
  }

  function drawPlayer() {
    if (!player) return;
    if (player.iframes>0&&Math.floor(player.iframes/5)%2===0) return;
    const mx=player.x-camX, my=player.y;
    const f=player.face>0;
    const p=2;

    // Cap
    ctx.fillStyle='#E52521';
    ctx.fillRect(mx+4*p,my,7*p,2*p);
    ctx.fillRect(mx+2*p,my+2*p,9*p,2*p);
    // Face
    ctx.fillStyle='#FAB87F';
    ctx.fillRect(mx+2*p,my+4*p,8*p,4*p);
    // Eye
    ctx.fillStyle='#000';
    ctx.fillRect(mx+(f?8:2)*p,my+5*p,2*p,2*p);
    // Mustache
    ctx.fillStyle='#5D4037';
    ctx.fillRect(mx+(f?3:2)*p,my+7*p,4*p,2*p);
    ctx.fillRect(mx+(f?8:5)*p,my+7*p,3*p,2*p);
    // Body
    ctx.fillStyle='#E52521';
    ctx.fillRect(mx+2*p,my+8*p,8*p,5*p);
    // Overalls
    ctx.fillStyle='#0049AD';
    ctx.fillRect(mx,my+10*p,12*p,5*p);
    ctx.fillRect(mx+2*p,my+9*p,3*p,2*p);
    ctx.fillRect(mx+7*p,my+9*p,3*p,2*p);
    // Buttons
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.fillRect(mx+3*p,my+12*p,1*p,1*p); ctx.fillRect(mx+8*p,my+12*p,1*p,1*p);
    // Shoes
    ctx.fillStyle='#5D4037';
    ctx.fillRect(mx+(f?0:3)*p,my+15*p,6*p,2*p);
    ctx.fillRect(mx+(f?6:3)*p,my+15*p,6*p,2*p);
  }

  function drawParticles() {
    particles.forEach(p=>{
      ctx.globalAlpha=p.life/22;
      ctx.fillStyle=p.col;
      ctx.fillRect(p.x-camX-3,p.y-3,6,6);
    });
    ctx.globalAlpha=1;
  }

  function drawHUD() {
    ctx.font='11px "Press Start 2P",monospace';
    const got=coins.filter(c=>c.got).length, tot=coins.length;
    function shadow(txt,x,y,col){
      ctx.fillStyle='#000'; ctx.fillText(txt,x+1,y+1);
      ctx.fillStyle=col||'#fff'; ctx.fillText(txt,x,y);
    }
    shadow(`SCORE ${score}`,16,28);
    shadow(`\u2665 ${lives}`,canvas.width/2-35,28,'#FF5252');
    ctx.fillStyle='#000'; ctx.fillText(`\u25CF ${got}/${tot}`,canvas.width-140,29);
    ctx.fillStyle='#FFD700'; ctx.fillText(`\u25CF ${got}/${tot}`,canvas.width-141,28);
  }

  function render() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBg();
    platforms.forEach(drawPlatform);
    coins.forEach(drawCoin);
    drawFlag();
    enemies.forEach(drawGoomba);
    drawPlayer();
    drawParticles();
    drawHUD();
  }

  /* ── loop ── */
  function loop() { update(); render(); requestAnimationFrame(loop); }
  loop();
  </script>
</body>
</html>
