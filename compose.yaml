  ssh:
    build: ./ssh-server
    restart: unless-stopped
    hostname: web01
    ports:
      - "22:22"
    volumes:
      - ./ssh-logs:/ssh-logs
    cap_add:
      - NET_ADMIN
    networks:
      - ssh-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/shared.conf:/etc/nginx/shared.conf:ro
      - ./shared-html:/shared-html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public-html:/var/www/certbot:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web
      - linux
      - butterfly
      - ascii
      - json
      - poker
      - logs

