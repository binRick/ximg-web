services:
  web:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./public-html:/usr/local/apache2/htdocs
      - ./shared-html/nav.js:/usr/local/apache2/htdocs/nav.js:ro

  linux:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./linux-html:/usr/local/apache2/htdocs
      - ./shared-html/nav.js:/usr/local/apache2/htdocs/nav.js:ro

  butterfly:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./butterfly-html:/usr/local/apache2/htdocs
      - ./shared-html/nav.js:/usr/local/apache2/htdocs/nav.js:ro

  ascii:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./ascii-html:/usr/local/apache2/htdocs
      - ./shared-html/nav.js:/usr/local/apache2/htdocs/nav.js:ro

  json:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./json-html:/usr/local/apache2/htdocs
      - ./shared-html/nav.js:/usr/local/apache2/htdocs/nav.js:ro

  logs:
    build: ./logs-server
    restart: unless-stopped
    volumes:
      - ./logs:/logs:ro
      - ./shared-html/nav.js:/app/nav.js:ro

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public-html:/var/www/certbot:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web
      - linux
      - butterfly
      - ascii
      - json
      - logs
