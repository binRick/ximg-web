services:
  web:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./public-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  linux:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./linux-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  butterfly:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./butterfly-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  ascii:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./ascii-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  json:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./json-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  poker:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./poker-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  logs:
    build: ./logs-server
    restart: unless-stopped
    volumes:
      - ./logs:/logs:ro
      - ./ssh-logs:/ssh-logs:ro
      - ./shared-html:/app/shared:ro

  ssh:
    build: ./ssh-server
    restart: unless-stopped
    ports:
      - "22:22"
    volumes:
      - ./ssh-logs:/ssh-logs
    cap_add:
      - NET_ADMIN
    networks:
      - ssh-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public-html:/var/www/certbot:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web
      - linux
      - butterfly
      - ascii
      - json
      - poker
      - logs

networks:
  ssh-net:
    driver: bridge
