services:

  mail:
    build: ./mail-server
    restart: unless-stopped
    ports:
      - "25:25"
    volumes:
      - ./mail-data:/mail-data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  awstats:
    build: ./awstats
    restart: unless-stopped
    init: true
    volumes:
      - ./logs:/logs:ro
      - ./awstats-data:/data
      - ./awstats-output:/output
      - ./shared-html:/shared-html:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  githubstars:
    build: ./githubstars-server
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  github-stats:
    build: ./github-stats-server
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3009/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bundler:
    build: ./bundler-server
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nodejs-bundler:
    build: ./nodejs-bundler-server
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  go-bundler:
    build: ./go-bundler-server
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  apt-bundler:
    build: ./apt-bundler-server
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rpm-bundler:
    build: ./rpm-bundler-server
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3007/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ansible-bundler:
    build: ./ansible-bundler-server
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nuget-bundler:
    build: ./nuget-bundler-server
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3008/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    networks:
      - webnet
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w3 127.0.0.1 3310 | grep -q PONG"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  dockerimagedownloader:
    build: ./downloader-server
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./shared-html:/app/shared:ro
      - ./logs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  change:
    build: ./change-server
    restart: unless-stopped
    volumes:
      - .:/repo:ro
      - ./shared-html:/app/shared:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  ca-fetcher-server:
    build: ./ca-fetcher-server
    restart: unless-stopped
    networks:
      - webnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  logs:
    build: ./logs-server
    restart: unless-stopped
    volumes:
      - ./logs:/logs:ro
      - ./ssh-logs:/ssh-logs:ro
      - ./logs-data:/data
      - /var/log/suricata:/var/log/suricata:ro
      - /var/lib/proc-trace:/proc-trace:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  ssh:
    build: ./ssh-server
    restart: unless-stopped
    hostname: web01
    ports:
      - "22:22"
      - "9922:22"
    volumes:
      - ./ssh-logs:/ssh-logs
    cap_add:
      - NET_ADMIN
    networks:
      - ssh-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 22)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  honeypot-proxy:
    build: ./honeypot-server
    restart: unless-stopped
    networks:
      - webnet
      - ssh-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(3007,'localhost',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/shared.conf:/etc/nginx/shared.conf:ro
      - ./shared-html:/shared-html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public-html:/var/www/certbot:ro
      - ./logs:/var/log/nginx
    depends_on:
      - static
      - logs
    networks:
      - default
      - webnet
    healthcheck:
      test: ["CMD-SHELL", "kill -0 $(cat /var/run/nginx.pid)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  static:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
    - ./nginx/static.conf:/etc/nginx/conf.d/default.conf:ro
    - ./shared-html:/sites/shared:ro
    - ./public-html:/sites/ximg.app:ro
    - ./public-html:/sites/www.ximg.app:ro
