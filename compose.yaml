services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - ./public-html:/usr/local/apache2/htdocs

  linux:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./linux-html:/usr/local/apache2/htdocs

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public-html:/var/www/certbot:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web
      - linux
