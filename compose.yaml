  coldwar:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./coldwar-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  change:
    build: ./change-server
    restart: unless-stopped
    volumes:
      - .:/repo:ro

  logs:
    build: ./logs-server
    restart: unless-stopped
    volumes:
      - ./logs:/logs:ro
      - ./ssh-logs:/ssh-logs:ro
      - ./logs-data:/data

  systemd:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./systemd-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  ssh:
    build: ./ssh-server
    restart: unless-stopped
    ports:
      - "22:22"
    volumes:
      - ./ssh-logs:/ssh-logs
    cap_add:
      - NET_ADMIN
    networks:
      - ssh-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/shared.conf:/etc/nginx/shared.conf:ro
      - ./shared-html:/shared-html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public-html:/var/www/certbot:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web
      - linux
      - butterfly
      - ascii
      - json
      - poker
      - logs

  mac:
    image: httpd:2.4-alpine
    restart: unless-stopped
    volumes:
      - ./mac-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

networks:
  ssh-net:
    driver: bridge
