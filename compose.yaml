    restart: unless-stopped
    volumes:
      - ./computers-html:/usr/local/apache2/htdocs
      - ./shared-html:/usr/local/apache2/htdocs/shared:ro

  logs:
    build: ./logs-server
    restart: unless-stopped
    volumes:
      - ./logs:/logs:ro
      - ./ssh-logs:/ssh-logs:ro
      - ./shared-html:/app/shared:ro
      - ./logs-data:/data

  ssh:
    build: ./ssh-server
    restart: unless-stopped
    ports:
      - "22:22"
    volumes:
      - ./ssh-logs:/ssh-logs
    cap_add:
      - NET_ADMIN
    networks:
      - ssh-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./public-html:/var/www/certbot:ro
      - ./logs:/var/log/nginx
    depends_on:
      - web
      - linux
      - butterfly
      - ascii
      - json
      - poker
      - logs

networks:
  ssh-net:
    driver: bridge
