<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
<rect width="400" height="200" fill="#0a0a25"/>
<text x="200" y="20" font-size="14" fill="#22d3ee" font-family="sans-serif" text-anchor="middle" font-weight="bold">Half-Wave Dipole Antenna</text>
<line x1="200" y1="40" x2="200" y2="100" stroke="#22d3ee" stroke-width="3"/>
<line x1="60" y1="100" x2="200" y2="100" stroke="#22d3ee" stroke-width="4"/>
<line x1="200" y1="100" x2="340" y2="100" stroke="#22d3ee" stroke-width="4"/>
<line x1="200" y1="100" x2="200" y2="170" stroke="#aaa" stroke-width="2" stroke-dasharray="5,4"/>
<text x="130" y="90" font-size="12" fill="#e2e8f0" font-family="sans-serif">← λ/4 →</text>
<text x="210" y="90" font-size="12" fill="#e2e8f0" font-family="sans-serif">← λ/4 →</text>
<text x="200" y="185" font-size="11" fill="#94a3b8" font-family="sans-serif" text-anchor="middle">Total length = λ/2 = 150m/f(MHz)</text>
