<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Data — ximg.app</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #02020f;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding-top: 44px;
      min-height: 100vh;
    }

    .page-header {
      background: #070720;
      border-bottom: 1px solid #1e293b;
      padding: 18px 24px 14px;
    }
    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #22d3ee;
      letter-spacing: 0.02em;
    }
    .page-header p {
      font-size: 0.82rem;
      color: #64748b;
      margin-top: 3px;
    }

    .tab-nav {
      display: flex;
      background: #070720;
      border-bottom: 1px solid #1e293b;
      position: sticky;
      top: 44px;
      z-index: 10;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 11px 22px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #64748b;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #cbd5e1; }
    .tab-btn.active { color: #22d3ee; border-bottom-color: #22d3ee; }

    .tab-pane { display: none; padding: 20px; }
    .tab-pane.active { display: block; }

    canvas { display: block; }

    /* ── Internet Traffic ── */
    #traffic-wrap {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
    }
    .map-card {
      background: #070720;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 14px;
    }
    .map-card h2 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #22d3ee;
      margin-bottom: 10px;
    }
    #traffic-map { width: 100%; }
    .bars-card {
      background: #070720;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 14px;
    }
    .bars-card h2 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #22d3ee;
      margin-bottom: 12px;
    }
    .bar-row {
      margin-bottom: 10px;
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 3px;
    }
    .bar-track {
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0891b2, #22d3ee);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* ── Cyber Attacks ── */
    #attacks-wrap {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 16px;
    }
    .feed-card {
      background: #070720;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 14px;
      max-height: 520px;
      overflow: hidden;
    }
    .feed-card h2 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #f97316;
      margin-bottom: 10px;
    }
    .feed-header {
      display: grid;
      grid-template-columns: 90px 1fr 1fr 100px 70px;
      gap: 8px;
      font-size: 0.72rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding-bottom: 6px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 6px;
    }
    #attack-feed { overflow: hidden; }
    .attack-row {
      display: grid;
      grid-template-columns: 90px 1fr 1fr 100px 70px;
      gap: 8px;
      font-size: 0.76rem;
      padding: 5px 0;
      border-bottom: 1px solid #0f172a;
      color: #94a3b8;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .sev-high   { color: #ef4444; }
    .sev-med    { color: #f97316; }
    .sev-low    { color: #eab308; }
    .sev-info   { color: #22d3ee; }

    /* ── Stocks ── */
    #stocks-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stock-card {
      background: #070720;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 14px;
    }
    .stock-ticker { font-size: 1rem; font-weight: 700; color: #e2e8f0; }
    .stock-name   { font-size: 0.72rem; color: #475569; margin-bottom: 6px; }
    .stock-price  { font-size: 1.3rem; font-weight: 600; }
    .stock-change { font-size: 0.78rem; margin-left: 6px; }
    .up   { color: #22c55e; }
    .down { color: #ef4444; }
    .stock-spark { margin-top: 8px; }
    .heatmap-card {
      background: #070720;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 14px;
    }
    .heatmap-card h2 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #22d3ee;
      margin-bottom: 12px;
    }
    #heatmap-canvas { width: 100%; }

    /* ── Live Stats ── */
    #stats-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .stat-card {
      background: #070720;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #22d3ee, transparent);
    }
    .stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .stat-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; margin-bottom: 6px; }
    .stat-value { font-size: 1.7rem; font-weight: 700; color: #22d3ee; font-variant-numeric: tabular-nums; }
    .stat-rate  { font-size: 0.72rem; color: #22c55e; margin-top: 4px; }

    @media (max-width: 900px) {
      #traffic-wrap, #attacks-wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Real-Time World Data Dashboard</h1>
  <p>Live-updating global visualizations — internet traffic, cyber threats, markets &amp; statistics</p>
</div>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="traffic">Internet Traffic</button>
  <button class="tab-btn" data-tab="attacks">Cyber Attacks</button>
  <button class="tab-btn" data-tab="stocks">Stock Markets</button>
  <button class="tab-btn" data-tab="livestats">Live Stats</button>
</nav>

<!-- ══════════════════════ TAB 1: INTERNET TRAFFIC ══════════════════════ -->
<div class="tab-pane active" id="tab-traffic">
  <div id="traffic-wrap">
    <div class="map-card">
      <h2>Global Internet Traffic Flow</h2>
      <canvas id="traffic-map" height="420"></canvas>
    </div>
    <div class="bars-card">
      <h2>Traffic Volume by City (Gbps)</h2>
      <div id="city-bars"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════ TAB 2: CYBER ATTACKS ══════════════════════ -->
<div class="tab-pane" id="tab-attacks">
  <div id="attacks-wrap">
    <div class="map-card">
      <h2>Live Attack Map</h2>
      <canvas id="attack-map" height="420"></canvas>
    </div>
    <div class="feed-card">
      <h2>Attack Feed</h2>
      <div class="feed-header">
        <span>Time</span><span>Source</span><span>Target</span><span>Type</span><span>Sev</span>
      </div>
      <div id="attack-feed"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════ TAB 3: STOCKS ══════════════════════ -->
<div class="tab-pane" id="tab-stocks">
  <div id="stocks-wrap"></div>
  <div class="heatmap-card">
    <h2>Market Heat Map</h2>
    <canvas id="heatmap-canvas" height="140"></canvas>
  </div>
</div>

<!-- ══════════════════════ TAB 4: LIVE STATS ══════════════════════ -->
<div class="tab-pane" id="tab-livestats">
  <div id="stats-wrap"></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-top:1.5rem;padding:0 1rem 2rem;">
    <figure style="margin:0">
      <img src="images/ocean-currents.jpg" alt="Global ocean surface currents map showing circulation patterns" style="border-radius:8px;max-width:100%;display:block;">
      <figcaption style="color:#64748b;font-size:0.78rem;margin-top:0.4rem;text-align:center;">Global ocean surface currents</figcaption>
    </figure>
    <figure style="margin:0" id="img-tectonic">
      <img src="images/tectonic-plates.png" alt="Tectonic plates world map showing plate boundaries and movement" style="border-radius:8px;max-width:100%;display:block;" onerror="this.closest('figure').style.display='none'">
      <figcaption style="color:#64748b;font-size:0.78rem;margin-top:0.4rem;text-align:center;">Tectonic plates — boundaries and movement</figcaption>
    </figure>
    <figure style="margin:0" id="img-world-map">
      <img src="images/world-map.svg" alt="World map blank outline showing all continents" style="border-radius:8px;max-width:100%;display:block;background:#e8f4f8;padding:0.5rem;" onerror="this.closest('figure').style.display='none'">
      <figcaption style="color:#64748b;font-size:0.78rem;margin-top:0.4rem;text-align:center;">World map — continents and geography</figcaption>
    </figure>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════════
const tabBtns  = document.querySelectorAll('.tab-btn');
const tabPanes = document.querySelectorAll('.tab-pane');
tabBtns.forEach(btn => btn.addEventListener('click', () => {
  tabBtns.forEach(b => b.classList.remove('active'));
  tabPanes.forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
}));

// ═══════════════════════════════════════════════════════════
// TAB 1 — INTERNET TRAFFIC MAP
// ═══════════════════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('traffic-map');
  const ctx    = canvas.getContext('2d');

  // city coords as fraction of canvas [x, y]
  const CITIES = [
    { name: 'New York',    x: 0.22, y: 0.38, bps: 420 },
    { name: 'London',      x: 0.46, y: 0.27, bps: 380 },
    { name: 'Frankfurt',   x: 0.50, y: 0.28, bps: 310 },
    { name: 'Tokyo',       x: 0.82, y: 0.35, bps: 280 },
    { name: 'Singapore',   x: 0.76, y: 0.55, bps: 210 },
    { name: 'São Paulo',   x: 0.27, y: 0.65, bps: 160 },
  ];

  // All city-pair routes
  const ROUTES = [];
  for (let i = 0; i < CITIES.length; i++)
    for (let j = i + 1; j < CITIES.length; j++)
      ROUTES.push([i, j]);

  // World map simplified land polygons (normalised 0-1 coords, Mercator-ish)
  const LAND = [
    // North America
    [[0.04,0.20],[0.22,0.15],[0.29,0.20],[0.29,0.28],[0.22,0.32],[0.18,0.46],[0.22,0.55],[0.16,0.58],[0.10,0.42],[0.05,0.30]],
    // Greenland
    [[0.22,0.08],[0.33,0.06],[0.36,0.14],[0.28,0.20],[0.22,0.16]],
    // South America
    [[0.20,0.55],[0.27,0.52],[0.34,0.56],[0.36,0.70],[0.30,0.82],[0.22,0.82],[0.18,0.70],[0.20,0.60]],
    // Europe
    [[0.44,0.20],[0.54,0.18],[0.58,0.22],[0.56,0.32],[0.50,0.34],[0.44,0.30]],
    // Africa
    [[0.46,0.36],[0.56,0.35],[0.58,0.44],[0.56,0.60],[0.50,0.70],[0.44,0.64],[0.43,0.50]],
    // Middle East
    [[0.56,0.34],[0.64,0.33],[0.66,0.40],[0.60,0.44],[0.56,0.42]],
    // India
    [[0.65,0.38],[0.72,0.38],[0.72,0.52],[0.68,0.56],[0.64,0.50]],
    // Russia/Asia
    [[0.54,0.10],[0.72,0.08],[0.88,0.14],[0.90,0.24],[0.80,0.28],[0.70,0.28],[0.60,0.24],[0.54,0.18]],
    // China/SE Asia
    [[0.70,0.28],[0.84,0.26],[0.86,0.38],[0.80,0.46],[0.72,0.44],[0.68,0.36]],
    // Australia
    [[0.78,0.62],[0.90,0.60],[0.94,0.68],[0.88,0.76],[0.78,0.74],[0.76,0.66]],
    // Japan
    [[0.84,0.28],[0.88,0.26],[0.90,0.32],[0.86,0.36],[0.82,0.34]],
  ];

  // Particles travelling along routes
  const particles = [];
  function spawnParticle() {
    const [ai, bi] = ROUTES[Math.floor(Math.random() * ROUTES.length)];
    particles.push({ ai, bi, t: 0, speed: 0.004 + Math.random() * 0.006, r: 2 + Math.random() * 2 });
  }
  for (let i = 0; i < 18; i++) spawnParticle();

  // Simulated city bps fluctuation
  const barsEl = document.getElementById('city-bars');
  CITIES.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'bar-row';
    div.innerHTML = `<div class="bar-label"><span>${c.name}</span><span id="bps-${i}">0 Gbps</span></div>
      <div class="bar-track"><div class="bar-fill" id="bar-${i}" style="width:0%"></div></div>`;
    barsEl.appendChild(div);
  });

  function resize() {
    const w = canvas.parentElement.clientWidth - 28;
    canvas.width  = w;
    canvas.height = Math.round(w * 0.52);
  }
  window.addEventListener('resize', resize);
  resize();

  function drawLand() {
    ctx.fillStyle = '#0d1b2a';
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 1;
    LAND.forEach(poly => {
      ctx.beginPath();
      poly.forEach(([fx, fy], i) => {
        const px = fx * canvas.width;
        const py = fy * canvas.height;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    });
  }

  function drawRoutes() {
    ROUTES.forEach(([ai, bi]) => {
      const a = CITIES[ai], b = CITIES[bi];
      const ax = a.x * canvas.width, ay = a.y * canvas.height;
      const bx = b.x * canvas.width, by = b.y * canvas.height;
      const mx = (ax + bx) / 2, my = (ay + by) / 2 - 40;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(mx, my, bx, by);
      ctx.strokeStyle = 'rgba(34,211,238,0.08)';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  function drawCities() {
    CITIES.forEach(c => {
      const cx = c.x * canvas.width, cy = c.y * canvas.height;
      // Pulse ring
      ctx.beginPath();
      ctx.arc(cx, cy, 8 + 4 * Math.sin(Date.now() / 500 + cx), 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(34,211,238,0.18)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Core dot
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#22d3ee';
      ctx.fill();
      // Label
      ctx.fillStyle = '#94a3b8';
      ctx.font = '10px Segoe UI, sans-serif';
      ctx.fillText(c.name, cx + 6, cy - 4);
    });
  }

  function bezierPoint(ax, ay, bx, by, t) {
    const mx = (ax + bx) / 2, my = (ay + by) / 2 - 40;
    const x = (1-t)*(1-t)*ax + 2*(1-t)*t*mx + t*t*bx;
    const y = (1-t)*(1-t)*ay + 2*(1-t)*t*my + t*t*by;
    return {x, y};
  }

  function drawParticles() {
    particles.forEach(p => {
      const a = CITIES[p.ai], b = CITIES[p.bi];
      const ax = a.x * canvas.width, ay = a.y * canvas.height;
      const bx = b.x * canvas.width, by = b.y * canvas.height;
      const {x, y} = bezierPoint(ax, ay, bx, by, p.t);
      // Trail
      ctx.beginPath();
      ctx.arc(x, y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(34,211,238,${0.3 + 0.5 * p.t})`;
      ctx.fill();
      p.t += p.speed;
    });
    // Remove finished, spawn new
    for (let i = particles.length - 1; i >= 0; i--) {
      if (particles[i].t >= 1) { particles.splice(i, 1); spawnParticle(); }
    }
  }

  let bpsLastUpdate = 0;
  function updateBars(now) {
    if (now - bpsLastUpdate < 1000) return;
    bpsLastUpdate = now;
    CITIES.forEach((c, i) => {
      c.bps = Math.max(50, c.bps + (Math.random() - 0.48) * 30);
      const pct = Math.min(100, (c.bps / 500) * 100);
      const el = document.getElementById(`bar-${i}`);
      const bpsel = document.getElementById(`bps-${i}`);
      if (el) el.style.width = pct + '%';
      if (bpsel) bpsel.textContent = c.bps.toFixed(0) + ' Gbps';
    });
  }

  function frame(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Ocean
    ctx.fillStyle = '#02020f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Grid
    ctx.strokeStyle = 'rgba(30,41,59,0.4)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < canvas.width; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
    for (let y = 0; y < canvas.height; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
    drawLand();
    drawRoutes();
    drawParticles();
    drawCities();
    updateBars(now);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

// ═══════════════════════════════════════════════════════════
// TAB 2 — CYBER ATTACKS
// ═══════════════════════════════════════════════════════════
(function () {
  const canvas = document.getElementById('attack-map');
  const ctx    = canvas.getContext('2d');
  const feedEl = document.getElementById('attack-feed');

  const COUNTRIES = [
    { name: 'China',         x: 0.80, y: 0.33 },
    { name: 'Russia',        x: 0.68, y: 0.22 },
    { name: 'USA',           x: 0.18, y: 0.34 },
    { name: 'Germany',       x: 0.50, y: 0.27 },
    { name: 'Brazil',        x: 0.27, y: 0.64 },
    { name: 'Iran',          x: 0.62, y: 0.36 },
    { name: 'N.Korea',       x: 0.84, y: 0.30 },
    { name: 'India',         x: 0.68, y: 0.44 },
    { name: 'UK',            x: 0.45, y: 0.25 },
    { name: 'Japan',         x: 0.86, y: 0.32 },
    { name: 'France',        x: 0.48, y: 0.28 },
    { name: 'Canada',        x: 0.16, y: 0.24 },
  ];

  const TYPES = ['DDoS', 'Port Scan', 'Brute Force', 'SQLi', 'XSS', 'Ransomware', 'C2 Beacon'];
  const SEVS  = [
    { label: 'CRITICAL', cls: 'sev-high' },
    { label: 'HIGH',     cls: 'sev-high' },
    { label: 'MEDIUM',   cls: 'sev-med'  },
    { label: 'LOW',      cls: 'sev-low'  },
    { label: 'INFO',     cls: 'sev-info' },
  ];

  const LAND = [
    [[0.04,0.20],[0.22,0.15],[0.29,0.20],[0.29,0.28],[0.22,0.32],[0.18,0.46],[0.22,0.55],[0.16,0.58],[0.10,0.42],[0.05,0.30]],
    [[0.20,0.55],[0.27,0.52],[0.34,0.56],[0.36,0.70],[0.30,0.82],[0.22,0.82],[0.18,0.70]],
    [[0.44,0.20],[0.54,0.18],[0.58,0.22],[0.56,0.32],[0.50,0.34],[0.44,0.30]],
    [[0.46,0.36],[0.56,0.35],[0.58,0.44],[0.56,0.60],[0.50,0.70],[0.44,0.64],[0.43,0.50]],
    [[0.56,0.34],[0.64,0.33],[0.66,0.40],[0.60,0.44],[0.56,0.42]],
    [[0.65,0.38],[0.72,0.38],[0.72,0.52],[0.68,0.56],[0.64,0.50]],
    [[0.54,0.10],[0.72,0.08],[0.88,0.14],[0.90,0.24],[0.80,0.28],[0.70,0.28],[0.60,0.24],[0.54,0.18]],
    [[0.70,0.28],[0.84,0.26],[0.86,0.38],[0.80,0.46],[0.72,0.44],[0.68,0.36]],
    [[0.78,0.62],[0.90,0.60],[0.94,0.68],[0.88,0.76],[0.78,0.74],[0.76,0.66]],
    [[0.84,0.28],[0.88,0.26],[0.90,0.32],[0.86,0.36],[0.82,0.34]],
  ];

  const arrows = []; // active attack arrows on map

  function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function spawnAttack() {
    const src = rand(COUNTRIES);
    let tgt;
    do { tgt = rand(COUNTRIES); } while (tgt === src);
    const sev  = rand(SEVS);
    const type = rand(TYPES);
    const now  = new Date();
    const ts   = now.toTimeString().slice(0,8);

    // Feed row
    const row = document.createElement('div');
    row.className = 'attack-row';
    row.innerHTML = `<span>${ts}</span><span>${src.name}</span><span>${tgt.name}</span><span>${type}</span><span class="${sev.cls}">${sev.label}</span>`;
    feedEl.prepend(row);
    while (feedEl.childElementCount > 18) feedEl.lastElementChild.remove();

    // Map arrow
    arrows.push({ sx: src.x, sy: src.y, tx: tgt.x, ty: tgt.y, t: 0, speed: 0.02, sev: sev.cls });
  }

  let lastAttack = 0;
  function resize() {
    const w = canvas.parentElement.clientWidth - 28;
    canvas.width  = w;
    canvas.height = Math.round(w * 0.52);
  }
  window.addEventListener('resize', resize);
  resize();

  function drawMap() {
    ctx.fillStyle = '#02020f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = 'rgba(30,41,59,0.3)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < canvas.width; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
    for (let y = 0; y < canvas.height; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
    ctx.fillStyle = '#0d1b2a';
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 1;
    LAND.forEach(poly => {
      ctx.beginPath();
      poly.forEach(([fx,fy],i) => { i===0?ctx.moveTo(fx*canvas.width,fy*canvas.height):ctx.lineTo(fx*canvas.width,fy*canvas.height); });
      ctx.closePath(); ctx.fill(); ctx.stroke();
    });
    // Country dots
    COUNTRIES.forEach(c => {
      ctx.beginPath();
      ctx.arc(c.x*canvas.width, c.y*canvas.height, 3, 0, Math.PI*2);
      ctx.fillStyle = '#475569';
      ctx.fill();
    });
  }

  const SEV_COLOR = { 'sev-high': '#ef4444', 'sev-med': '#f97316', 'sev-low': '#eab308', 'sev-info': '#22d3ee' };

  function drawArrows(now) {
    for (let i = arrows.length - 1; i >= 0; i--) {
      const a = arrows[i];
      const ax = a.sx * canvas.width, ay = a.sy * canvas.height;
      const bx = a.tx * canvas.width, by = a.ty * canvas.height;
      const cx2 = (ax+bx)/2, cy2 = (ay+by)/2 - 35;
      const t = a.t;
      const x = (1-t)*(1-t)*ax + 2*(1-t)*t*cx2 + t*t*bx;
      const y = (1-t)*(1-t)*ay + 2*(1-t)*t*cy2 + t*t*by;
      const col = SEV_COLOR[a.sev] || '#ef4444';
      // Trail
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fillStyle = col;
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(x, y, 6, 0, Math.PI*2);
      ctx.fillStyle = col.replace(')', ',0.3)').replace('rgb','rgba');
      ctx.fill();
      a.t += a.speed;
      if (a.t >= 1) arrows.splice(i, 1);
    }
  }

  function frame(now) {
    drawMap();
    drawArrows(now);
    if (now - lastAttack > 2000) { spawnAttack(); lastAttack = now; }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

// TAB 3 — STOCKS
// ═══════════════════════════════════════════════════════════
(function () {
  const STOCKS = [
    { ticker: 'AAPL',  name: 'Apple',     price: 189.30 },
    { ticker: 'MSFT',  name: 'Microsoft', price: 415.70 },
    { ticker: 'GOOGL', name: 'Google',    price: 175.40 },
    { ticker: 'AMZN',  name: 'Amazon',    price: 182.10 },
    { ticker: 'META',  name: 'Meta',      price: 527.20 },
    { ticker: 'NVDA',  name: 'NVIDIA',    price: 870.50 },
    { ticker: 'NFLX',  name: 'Netflix',   price: 628.80 },
    { ticker: 'TSLA',  name: 'Tesla',     price: 244.60 },
    { ticker: 'SPX',   name: 'S&P 500',   price: 5213.00 },
    { ticker: 'NDX',   name: 'NASDAQ',    price: 18224.00 },
    { ticker: 'DJI',   name: 'Dow Jones', price: 38780.00 },
    { ticker: 'VIX',   name: 'Volatility',price: 15.42 },
  ];
  const HISTORY_LEN = 60;
  STOCKS.forEach(s => {
    s.open  = s.price;
    s.hist  = Array.from({length: HISTORY_LEN}, (_, i) => s.price + (Math.random()-0.5)*s.price*0.04);
  });

  const wrap = document.getElementById('stocks-wrap');
  STOCKS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'stock-card';
    card.innerHTML = `
      <div class="stock-ticker" id="stk-tick-${i}">${s.ticker}</div>
      <div class="stock-name">${s.name}</div>
      <div style="display:flex;align-items:baseline">
        <div class="stock-price" id="stk-price-${i}">$${s.price.toFixed(2)}</div>
        <div class="stock-change" id="stk-chg-${i}"></div>
      </div>
      <canvas class="stock-spark" id="spark-${i}" height="40" width="200"></canvas>`;
    wrap.appendChild(card);
  });

  function updateStocks() {
    STOCKS.forEach((s, i) => {
      const move = (Math.random() - 0.49) * s.price * 0.003;
      s.price = Math.max(0.01, s.price + move);
      s.hist.push(s.price);
      if (s.hist.length > HISTORY_LEN) s.hist.shift();
      const chg = ((s.price - s.open) / s.open * 100);
      const cls = chg >= 0 ? 'up' : 'down';
      const sign = chg >= 0 ? '+' : '';
      document.getElementById(`stk-price-${i}`).textContent = '$' + s.price.toFixed(2);
      document.getElementById(`stk-price-${i}`).className = 'stock-price ' + cls;
      document.getElementById(`stk-chg-${i}`).textContent = sign + chg.toFixed(2) + '%';
      document.getElementById(`stk-chg-${i}`).className = 'stock-change ' + cls;
      drawSparkline(i, s.hist, cls);
    });
    drawHeatmap();
  }

  function drawSparkline(i, hist, cls) {
    const canvas = document.getElementById(`spark-${i}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    const min = Math.min(...hist), max = Math.max(...hist);
    const range = max - min || 1;
    const col = cls === 'up' ? '#22c55e' : '#ef4444';
    ctx.beginPath();
    hist.forEach((v, idx) => {
      const x = (idx / (hist.length-1)) * w;
      const y = h - ((v - min) / range) * (h - 4) - 2;
      idx === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Fill under
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fillStyle = col.replace(')', ',0.12)').replace('#','rgba(').replace('rgba(','rgba(');
    // Simpler fill approach
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, col.replace('#22c55e','rgba(34,197,94,0.3)').replace('#ef4444','rgba(239,68,68,0.3)'));
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function drawHeatmap() {
    const canvas = document.getElementById('heatmap-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.clientWidth - 28;
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    const cols = 6, rows = 2;
    const cellW = w / cols, cellH = h / rows;
    STOCKS.forEach((s, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      const chg = (s.price - s.open) / s.open * 100;
      const intensity = Math.min(1, Math.abs(chg) / 3);
      let r, g, b;
      if (chg >= 0) { r = 14; g = Math.round(100 + 140*intensity); b = 14; }
      else           { r = Math.round(100 + 140*intensity); g = 14; b = 14; }
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(col*cellW+1, row*cellH+1, cellW-2, cellH-2);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 13px Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.ticker, col*cellW + cellW/2, row*cellH + cellH/2 - 4);
      const sign = chg >= 0 ? '+' : '';
      ctx.font = '10px Segoe UI, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(sign + chg.toFixed(2) + '%', col*cellW + cellW/2, row*cellH + cellH/2 + 12);
    });
  }

  setInterval(updateStocks, 800);
  updateStocks();
})();

// TAB 4 — LIVE STATS
// ═══════════════════════════════════════════════════════════
(function () {
  const now = Date.now();
  const DAY_START = new Date(); DAY_START.setHours(0,0,0,0);
  const dayMs = now - DAY_START.getTime();
  const dayFrac = dayMs / 86400000;

  const STATS = [
    { icon: '🌐', label: 'Internet Users Right Now', base: 5.44e9, rate: 0,       fmt: v => formatBig(v) },
    { icon: '📧', label: 'Emails Sent Today',        base: 0,       rate: 3472222, fmt: v => formatBig(v), dayBased: true, total: 300e9 },
    { icon: '🔍', label: 'Google Searches Today',    base: 0,       rate: 104167,  fmt: v => formatBig(v), dayBased: true, total: 9e9 },
    { icon: '▶️', label: 'YouTube Videos Watched',   base: 0,       rate: 58000,   fmt: v => formatBig(v), dayBased: true, total: 5e9 },
    { icon: '🐦', label: 'Tweets Posted Today',      base: 0,       rate: 6944,    fmt: v => formatBig(v), dayBased: true, total: 600e6 },
    { icon: '💻', label: 'Websites Online',          base: 1.98e9,  rate: 0.8,     fmt: v => formatBig(v) },
    { icon: '📱', label: 'App Downloads Today',      base: 0,       rate: 4050,    fmt: v => formatBig(v), dayBased: true, total: 350e6 },
    { icon: '💰', label: 'Online Sales Today ($)',   base: 0,       rate: 8102,    fmt: v => '$' + formatBig(v), dayBased: true, total: 700e6 },
  ];

  STATS.forEach(s => {
    if (s.dayBased) s.current = Math.round(s.total * dayFrac);
    else s.current = s.base;
  });

  const wrap = document.getElementById('stats-wrap');
  STATS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-icon">${s.icon}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" id="sv-${i}">0</div>
      <div class="stat-rate" id="sr-${i}"></div>`;
    wrap.appendChild(card);
  });

  function formatBig(n) {
    if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n/1e9).toFixed(2)  + 'B';
    if (n >= 1e6)  return (n/1e6).toFixed(2)  + 'M';
    if (n >= 1e3)  return (n/1e3).toFixed(1)  + 'K';
    return n.toLocaleString();
  }

  function tick(elapsed) {
    STATS.forEach((s, i) => {
      if (s.dayBased) {
        s.current += s.rate * (elapsed / 1000);
      } else if (s.rate) {
        s.current += s.rate * (elapsed / 1000);
      }
      const el = document.getElementById(`sv-${i}`);
      const rel = document.getElementById(`sr-${i}`);
      if (el) el.textContent = s.fmt(Math.round(s.current));
      if (rel && s.rate) rel.textContent = '+' + formatBig(Math.round(s.rate)) + ' per second';
    });
  }

  let lastT = performance.now();
  function frame(now) {
    const dt = now - lastT; lastT = now;
    tick(dt);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
