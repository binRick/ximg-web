<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Log — change.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #030a0d;
      --panel:  #061018;
      --green:  #00e676;
      --ltgrn:  #69f0ae;
      --teal:   #00acc1;
      --amber:  #ffb300;
      --steel:  #607d8b;
      --text:   #cfe8f0;
      --muted:  #3d6070;
      --card:   rgba(4,18,28,.9);
      --border: rgba(0,230,118,.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 100% 50% at 50% 0%, #001a0a 0%, transparent 60%),
        linear-gradient(180deg, #030a0d 0%, #020508 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(0,230,118,.012) 0, rgba(0,230,118,.012) 1px, transparent 1px, transparent 56px),
        repeating-linear-gradient(90deg, rgba(0,230,118,.008) 0, rgba(0,230,118,.008) 1px, transparent 1px, transparent 72px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 1.75rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .6rem; }
    .hero-icon { font-size: 2.5rem; filter: drop-shadow(0 0 18px rgba(0,230,118,.6)); }
    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #69f0ae 0%, #ffffff 45%, #00acc1 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em;
    }
    .hero-sub { font-size: .9rem; color: var(--muted); max-width: 480px; line-height: 1.6; }
    .hero-divider {
      width: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), var(--teal), transparent);
    }

    /* ── Stats bar ── */
    .stats {
      display: flex; flex-wrap: wrap; gap: .75rem; justify-content: center;
    }
    .stat {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem 1.1rem; text-align: center;
    }
    .stat-n { font-size: 1.4rem; font-weight: 900; color: var(--ltgrn); line-height: 1; }
    .stat-l { font-size: .68rem; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em; margin-top: .2rem; }

    /* ── Search / filter bar ── */
    .toolbar {
      display: flex; gap: .75rem; align-items: center; flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1; min-width: 220px; position: relative;
    }
    .search-icon {
      position: absolute; left: .75rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: .9rem; pointer-events: none;
    }
    #search {
      width: 100%; padding: .55rem .75rem .55rem 2.2rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: .88rem; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: rgba(0,230,118,.4); }

    .count-badge {
      font-size: .8rem; color: var(--muted); white-space: nowrap;
      font-weight: 600; padding: .4rem .8rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    }
    .count-badge span { color: var(--ltgrn); }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; }

    .day-group { display: flex; flex-direction: column; }
    .day-label {
      font-size: .72rem; font-weight: 700; color: var(--amber);
      text-transform: uppercase; letter-spacing: .12em;
      padding: .5rem 0 .4rem 52px;
    }
    .day-label.hidden { display: none; }

    .commit-row {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 0;
      align-items: stretch;
    }
    .commit-row.hidden { display: none; }

    /* spine */
    .spine {
      display: flex; flex-direction: column; align-items: center;
      padding-top: .55rem;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      transition: transform .15s;
    }
    .commit-row:hover .dot { transform: scale(1.4); }
    .line {
      flex: 1; width: 2px;
      background: linear-gradient(180deg, rgba(0,230,118,.3) 0%, rgba(0,230,118,.08) 100%);
      min-height: 8px;
    }

    /* card */
    .commit-card {
      margin: 0 0 .75rem 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px; padding: .75rem 1rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .commit-row:hover .commit-card {
      border-color: rgba(0,230,118,.35);
      box-shadow: 0 4px 20px rgba(0,230,118,.1);
    }

    .commit-top {
      display: flex; align-items: flex-start; gap: .75rem; flex-wrap: wrap;
    }
    .commit-subject {
      flex: 1; min-width: 0;
      font-size: .92rem; font-weight: 600; color: var(--text);
      line-height: 1.45; word-break: break-word;
    }
    .commit-meta {
      display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
      margin-top: .45rem;
    }
    .hash-chip {
      font-family: 'Courier New', monospace;
      font-size: .72rem; color: var(--teal);
      background: rgba(0,172,193,.12); border: 1px solid rgba(0,172,193,.2);
      border-radius: 4px; padding: .1rem .45rem;
      letter-spacing: .03em;
      text-decoration: none;
    }
    .hash-chip:hover {
      background: rgba(0,172,193,.25); border-color: rgba(0,172,193,.5);
      text-decoration: underline;
    }
    .author-chip {
      font-size: .72rem; color: var(--muted);
      display: flex; align-items: center; gap: .25rem;
    }
    .time-chip {
      font-size: .72rem; color: var(--muted);
      margin-left: auto;
    }

    .no-results {
      text-align: center; color: var(--muted); font-size: .9rem;
      padding: 3rem 1rem; display: none;
    }
    .no-results.visible { display: block; }
  </style>
</head>

// ── Build stats ──────────────────────────────────────────────────────────────
(function() {
  var days = new Set();
  COMMITS.forEach(function(c) { days.add(c.date.slice(0,10)); });
  var authors = new Set(COMMITS.map(function(c){ return c.author; }));
  var first = COMMITS[COMMITS.length-1].date.slice(0,10);
  var statsEl = document.getElementById('stats');
  statsEl.innerHTML =
    '<div class="stat"><div class="stat-n">' + COMMITS.length + '</div><div class="stat-l">Commits</div></div>' +
    '<div class="stat"><div class="stat-n">' + days.size + '</div><div class="stat-l">Active Days</div></div>' +
    '<div class="stat"><div class="stat-n">' + authors.size + '</div><div class="stat-l">Author' + (authors.size>1?'s':'') + '</div></div>' +
    '<div class="stat"><div class="stat-n">' + first + '</div><div class="stat-l">First Commit</div></div>';
})();

// ── Build timeline ───────────────────────────────────────────────────────────
function parseDate(dateStr) {
  // Git date format: "2026-03-31 19:10:37 -0400" — space instead of T, offset without colon
  // Normalize to ISO 8601 so all browsers parse it correctly
  return new Date(dateStr.replace(' ', 'T').replace(/([+-]\d{2})(\d{2})$/, '$1:$2'));
}
function formatDate(dateStr) {
  var d = parseDate(dateStr);
  return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
}
function formatTime(dateStr) {
  var d = parseDate(dateStr);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function highlight(text, q) {
  if (!q) return escHtml(text);
  var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<mark style="background:rgba(0,230,118,.25);color:#69f0ae;border-radius:2px">$1</mark>');
}

var timelineEl = document.getElementById('timeline');
var groups = {}; // date -> [{commit, rowEl, labelEl}]
var rows = [];

COMMITS.forEach(function(c, i) {
  var day = c.date.slice(0, 10);
  if (!groups[day]) {
    var labelEl = document.createElement('div');
    labelEl.className = 'day-label';
    labelEl.dataset.day = day;
    labelEl.textContent = formatDate(c.date);
    timelineEl.appendChild(labelEl);
    groups[day] = { labelEl: labelEl, items: [] };
  }

  var rowEl = document.createElement('div');
  rowEl.className = 'commit-row';
  rowEl.dataset.hash = c.hash;
  rowEl.dataset.subject = c.subject.toLowerCase();
  rowEl.dataset.author = c.author.toLowerCase();
  rowEl.innerHTML =
    '<div class="spine"><div class="dot"></div>' + (i < COMMITS.length - 1 ? '<div class="line"></div>' : '') + '</div>' +
    '<div class="commit-card">' +
      '<div class="commit-top">' +
        '<div class="commit-subject" data-orig="' + escHtml(c.subject) + '">' + escHtml(c.subject) + '</div>' +
      '</div>' +
      '<div class="commit-meta">' +
        '<a class="hash-chip" href="https://github.com/binRick/ximg-web/commit/' + c.hash + '" target="_blank" rel="noopener">' + c.short + '</a>' +
        '<span class="author-chip">👤 ' + escHtml(c.author) + '</span>' +
        '<span class="time-chip">🕐 ' + formatTime(c.date) + '</span>' +
      '</div>' +
    '</div>';

  timelineEl.appendChild(rowEl);
  groups[day].items.push(rowEl);
  rows.push({ rowEl: rowEl, commit: c, day: day });
});

document.getElementById('total-count').textContent = COMMITS.length;
document.getElementById('visible-count').textContent = COMMITS.length;

// ── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  var visible = 0;

  rows.forEach(function(r) {
    var match = !q ||
      r.commit.subject.toLowerCase().includes(q) ||
      r.commit.hash.includes(q) ||
      r.commit.short.includes(q) ||
      r.commit.author.toLowerCase().includes(q);

    r.rowEl.classList.toggle('hidden', !match);
    if (match) {
      visible++;
      var subj = r.rowEl.querySelector('.commit-subject');
      subj.innerHTML = highlight(r.commit.subject, this.value.trim());
    }
  }.bind(this));

  // hide day labels when all their commits are hidden
  Object.keys(groups).forEach(function(day) {
    var g = groups[day];
    var anyVisible = g.items.some(function(row) { return !row.classList.contains('hidden'); });
    g.labelEl.classList.toggle('hidden', !anyVisible);
  });

  document.getElementById('visible-count').textContent = visible;
  document.getElementById('no-results').classList.toggle('visible', visible === 0);
});
