<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ancient Egypt — Land of the Pharaohs — interactive educational app on ximg.app">
  <title>Ancient Egypt — Land of the Pharaohs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>𓂀</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080600;
      --panel:   #100d04;
      --sand:    #2a2008;
      --gold:    #c9a84c;
      --amber:   #e2b96e;
      --red:     #8b3a1a;
      --teal:    #1a6b6b;
      --blue:    #2a5c8a;
      --text:    #d4c8a8;
      --muted:   #5a5030;
      --card:    rgba(8,6,0,.94);
      --border:  rgba(201,168,76,.2);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 100% 50% at 50% 0%, rgba(201,168,76,.12) 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 20% 90%, rgba(139,58,26,.2) 0%, transparent 60%),
        linear-gradient(180deg, #080600 0%, #030200 100%);
    }
    #egypt-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; opacity: 0.15; pointer-events: none;
    }
    .wrap {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 5rem;
      display: flex; flex-direction: column; gap: 2rem;
    }
    /* Hero */
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(201,168,76,.6)); }
    .hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; color: var(--amber); text-shadow: 0 0 30px rgba(226,185,110,.4); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates {
      display: inline-block; margin-top: .75rem;
      background: rgba(201,168,76,.1); border: 1px solid var(--border);
      border-radius: 6px; padding: .35rem 1rem;
      font-size: .85rem; color: var(--gold); letter-spacing: .08em;
    }
    /* Section */
    .section-title {
      font-size: 1.1rem; font-weight: 700; letter-spacing: .12em;
      color: var(--gold); text-transform: uppercase;
      border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem;
    }
    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 1rem; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1.1rem; text-align: center; transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--gold); }
    .stat-icon { font-size: 2rem; margin-bottom: .4rem; }
    .stat-val { font-size: 1.4rem; font-weight: 700; color: var(--amber); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
    /* Pharaohs grid */
    .pharaoh-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .pharaoh-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1.1rem 1.2rem; transition: border-color .2s, transform .2s;
    }
    .pharaoh-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .pharaoh-name { font-size: 1rem; font-weight: 700; color: var(--amber); }
    .pharaoh-reign { font-size: .78rem; color: var(--gold); margin-bottom: .4rem; }
    .pharaoh-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .pharaoh-tag {
      display: inline-block; margin-top: .5rem; padding: .2rem .55rem;
      font-size: .72rem; border-radius: 4px; font-weight: 700;
    }
    .tag-builder { background: rgba(201,168,76,.15); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
    .tag-warrior { background: rgba(139,58,26,.2); color: #e09060; border: 1px solid rgba(139,58,26,.4); }
    .tag-scholar { background: rgba(26,107,107,.2); color: #60d0c0; border: 1px solid rgba(26,107,107,.4); }
    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 120px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body {
      background: var(--card); border: 1px solid var(--border);
      border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0;
      padding: .6rem .85rem;
    }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    /* Wonders grid */
    .wonder-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 1rem; }
    .wonder-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; text-align: center;
    }
    .wonder-icon { font-size: 2rem; margin-bottom: .5rem; }
    .wonder-name { font-size: .95rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .wonder-desc { font-size: .8rem; color: var(--text); line-height: 1.5; }
    /* Hieroglyph canvas */
    #hiero-canvas { width: 100%; height: 200px; border: 1px solid var(--border); border-radius: 10px; background: rgba(8,6,0,.8); cursor: crosshair; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    /* Sub nav */
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(8,6,0,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a {
      color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem;
      letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent;
      transition: color .18s, border-color .18s, background .18s; white-space: nowrap;
    }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(201,168,76,.07); }
    .sub-nav a img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; vertical-align: middle; margin-right: 6px; opacity: 0.8; transition: opacity .2s; display: inline-block; }
    .sub-nav a:hover img, .sub-nav a.active img { opacity: 1; }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } }
  </style>
</head>

<div class="wrap">
<section id="hieroglyphs">
<div class="section-title">Interactive Hieroglyph Nile</div>
    <canvas id="hiero-canvas"></canvas>
    <div class="canvas-label">Move your cursor to part the Nile waters — ancient symbols float on the eternal river</div>
</section>

// Background canvas — sand dune waves

<script>
(function(){
  const c = document.getElementById('egypt-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  const particles = [];
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i = 0; i < 80; i++){
    particles.push({ x: Math.random()*2000, y: Math.random()*1200, s: Math.random()*2+.5, a: Math.random()*Math.PI*2, sp: Math.random()*.3+.1 });
  }
  function frame(){
    ctx.clearRect(0,0,W,H);
    t += 0.008;
    // Stars
    particles.forEach(p => {
      p.a += 0.005;
      ctx.beginPath();
      ctx.arc(p.x % W, p.y % H, p.s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(201,168,76,${.3+.3*Math.sin(p.a)})`;
      ctx.fill();
    });
    // Dune waves
    for(let i = 0; i < 5; i++){
      ctx.beginPath();
      const y = H * (.4 + i * .12);
      const amp = 30 - i*4;
      ctx.moveTo(0, y);
      for(let x = 0; x <= W; x += 8){
        ctx.lineTo(x, y + Math.sin(x/120 + t + i) * amp);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = `rgba(201,168,76,${.025 - i*.003})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script>
// Hieroglyph canvas
</script>
<script>
(function(){
  const c = document.getElementById('hiero-canvas');
  const ctx = c.getContext('2d');
  let initialized = false;
  function initSize(){
    const w = c.offsetWidth;
    if(w > 0 && !initialized){
      c.width = w; c.height = 200;
      for(let i = 0; i < 25; i++){
        symbols.push({
          x: Math.random()*w, y: Math.random()*160+20,
          g: glyphs[Math.floor(Math.random()*glyphs.length)],
          s: Math.random()*10+14, a: Math.random()*Math.PI*2, sp: Math.random()*.5+.2, vx: 0
        });
      }
      initialized = true;
    }
  }
  const glyphs = ['𓂀','𓃀','𓆣','𓇋','𓈖','𓉐','𓊃','𓋴','𓌂','𓍿','𓎛','𓏌','𓐍','𓀭','𓁿','𓂋','𓃭','𓄿','𓅓','𓆑'];
  const symbols = [];
  let mx = -999, my = -999;
  c.addEventListener('mousemove', e => {
    const r = c.getBoundingClientRect();
    mx = e.clientX - r.left; my = e.clientY - r.top;
  });
  c.addEventListener('mouseleave', () => { mx = -999; });
  let t = 0;
  function frame(){
    initSize();
    if(!initialized){ requestAnimationFrame(frame); return; }
    ctx.clearRect(0,0,c.width,c.height);
    // Nile river
    ctx.fillStyle = 'rgba(26,80,120,.25)';
    ctx.fillRect(0,0,c.width,c.height);
    // Ripples
    t += 0.03;
    for(let y = 10; y < c.height; y += 20){
      ctx.beginPath();
      ctx.moveTo(0, y);
      for(let x = 0; x <= c.width; x+=4){
        ctx.lineTo(x, y + Math.sin(x/40 + t + y/30)*3);
      }
      ctx.strokeStyle = 'rgba(100,180,220,.1)'; ctx.lineWidth = 1; ctx.stroke();
    }
    // Mouse ripple
    if(mx > -1){
      const g = ctx.createRadialGradient(mx,my,0,mx,my,80);
      g.addColorStop(0,'rgba(201,168,76,.15)');
      g.addColorStop(1,'transparent');
      ctx.fillStyle = g; ctx.fillRect(0,0,c.width,c.height);
    }
    symbols.forEach(s => {
      s.a += 0.015;
      s.y += Math.sin(s.a)*0.3;
      const dx = s.x - mx, dy = s.y - my;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 100){ s.vx += (dx/dist)*1.5; }
      s.vx *= 0.92;
      s.x += s.vx + s.sp * 0.3;
      if(s.x > c.width+30) s.x = -30;
      if(s.x < -30) s.x = c.width+30;
      ctx.font = `${s.s}px serif`;
      ctx.fillStyle = `rgba(201,168,76,${.4+.3*Math.sin(s.a)})`;
      ctx.fillText(s.g, s.x, s.y);
    });
    requestAnimationFrame(frame);
  }
  frame();
  window.addEventListener('resize', () => { if(c.offsetWidth > 0) c.width = c.offsetWidth; });
})();
</script>
