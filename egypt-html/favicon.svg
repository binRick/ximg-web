<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1000"/>
  <!-- Pyramid -->
  <polygon points="16,4 30,28 2,28" fill="#d97706"/>
  <polygon points="16,4 30,28 2,28" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <!-- Eye of Horus hint (horizontal lines) -->
  <line x1="2" y1="28" x2="30" y2="28" stroke="#92400e" stroke-width="2"/>
  <!-- Sun disk above -->
  <circle cx="16" cy="2" r="2" fill="#fbbf24"/>
</svg>
