<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0f18"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#bd93f9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="14"/>

  <!-- Glow blob -->
  <ellipse cx="450" cy="100" rx="300" ry="80" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Color stripe — bottom, 16 colors -->
  <rect x="0"    y="183" width="56"  height="6" rx="0" fill="#44475a"/>
  <rect x="56"   y="183" width="56"  height="6" rx="0" fill="#ff5555"/>
  <rect x="112"  y="183" width="56"  height="6" rx="0" fill="#50fa7b"/>
  <rect x="168"  y="183" width="56"  height="6" rx="0" fill="#ffb86c"/>
  <rect x="224"  y="183" width="56"  height="6" rx="0" fill="#8be9fd"/>
  <rect x="280"  y="183" width="56"  height="6" rx="0" fill="#bd93f9"/>
  <rect x="336"  y="183" width="56"  height="6" rx="0" fill="#ff79c6"/>
  <rect x="392"  y="183" width="56"  height="6" rx="0" fill="#94a3a5"/>
  <rect x="448"  y="183" width="57"  height="6" rx="0" fill="#3b4252"/>
  <rect x="505"  y="183" width="56"  height="6" rx="0" fill="#bf616a"/>
  <rect x="561"  y="183" width="56"  height="6" rx="0" fill="#a3be8c"/>
  <rect x="617"  y="183" width="56"  height="6" rx="0" fill="#ebcb8b"/>
  <rect x="673"  y="183" width="56"  height="6" rx="0" fill="#81a1c1"/>
  <rect x="729"  y="183" width="56"  height="6" rx="0" fill="#b48ead"/>
  <rect x="785"  y="183" width="57"  height="6" rx="0" fill="#88c0d0"/>
  <rect x="842"  y="183" width="58"  height="6" rx="0" fill="#eceff4"/>

  <!-- Corner round fix on stripe -->
  <rect x="0"   y="183" width="14"  height="6" fill="#44475a" rx="0"/>
  <rect x="886" y="183" width="14"  height="6" fill="#eceff4" rx="0"/>

  <!-- Palette icon dots -->
  <circle cx="338" cy="90" r="11" fill="#ff5555" opacity="0.9"/>
  <circle cx="362" cy="90" r="11" fill="#50fa7b" opacity="0.9"/>
  <circle cx="386" cy="90" r="11" fill="#ffb86c" opacity="0.9"/>
  <circle cx="410" cy="90" r="11" fill="#8be9fd" opacity="0.9"/>
  <circle cx="434" cy="90" r="11" fill="#bd93f9" opacity="0.9"/>
  <circle cx="458" cy="90" r="11" fill="#ff79c6" opacity="0.9"/>

  <!-- Main title -->
  <text x="450" y="58" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold" fill="white" letter-spacing="6">pal</text>

  <!-- Subtitle -->
  <text x="450" y="118" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" fill="#8be9fd" letter-spacing="3" opacity="0.9">terminal palette switcher</text>

  <!-- Stats line -->
  <text x="450" y="155" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="12" fill="#6272a4" letter-spacing="2">420 themes  ·  zero dependencies  ·  OSC escape sequences</text>
</svg>
