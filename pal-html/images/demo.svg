<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="winbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21222c"/>
      <stop offset="100%" stop-color="#191a21"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Window shadow -->
  <rect x="10" y="14" width="700" height="418" rx="12" fill="#000" opacity="0.4" filter="url(#shadow)"/>

  <!-- Window -->
  <rect x="0" y="0" width="720" height="440" rx="12" fill="url(#winbg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="38" rx="12" fill="#2d2f3f"/>
  <rect x="0" y="26" width="720" height="12" fill="#2d2f3f"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="7" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="7" fill="#ffbd2e"/>
  <circle cx="66" cy="19" r="7" fill="#28c840"/>

  <!-- Window title -->
  <text x="360" y="24" text-anchor="middle" font-size="12" fill="#8892b0" letter-spacing="1">Terminal — pal</text>

  <!-- ─── Command 1: pal -h ─── -->
  <text x="22" y="68" font-size="13" fill="#8892b0">~/projects</text>
  <text x="110" y="68" font-size="13" fill="#bd93f9"> ❯ </text>
  <text x="140" y="68" font-size="13" fill="#f8f8f2">pal -h</text>

  <!-- Help output -->
  <text x="22" y="90"  font-size="12" fill="#6272a4">  🎨 </text>
  <text x="54" y="90"  font-size="12" fill="#8be9fd" font-weight="bold">pal</text>
  <text x="82" y="90"  font-size="12" fill="#6272a4"> — terminal palette switcher</text>

  <text x="22" y="110" font-size="12" fill="#bd93f9">  Usage</text>

  <text x="38" y="128" font-size="12" fill="#f1fa8c" font-weight="bold">pal list</text>
  <text x="120" y="128" font-size="12" fill="#6272a4">               📋 list all available palettes</text>

  <text x="38" y="144" font-size="12" fill="#f1fa8c" font-weight="bold">pal set </text>
  <text x="108" y="144" font-size="12" fill="#ff79c6">&lt;name&gt;</text>
  <text x="160" y="144" font-size="12" fill="#6272a4">         🖌  apply a palette to the current terminal</text>

  <text x="38" y="160" font-size="12" fill="#f1fa8c" font-weight="bold">pal preview </text>
  <text x="131" y="160" font-size="12" fill="#ff79c6">&lt;name&gt;</text>
  <text x="183" y="160" font-size="12" fill="#6272a4">     👁  apply and show a color swatch</text>

  <text x="38" y="176" font-size="12" fill="#f1fa8c" font-weight="bold">pal random</text>
  <text x="120" y="176" font-size="12" fill="#6272a4">             🎲 apply a random palette</text>

  <!-- divider -->
  <line x1="22" y1="192" x2="698" y2="192" stroke="#44475a" stroke-width="1" opacity="0.5"/>

  <!-- ─── Command 2: pal preview dracula-dark ─── -->
  <text x="22" y="212" font-size="13" fill="#8892b0">~/projects</text>
  <text x="110" y="212" font-size="13" fill="#bd93f9"> ❯ </text>
  <text x="140" y="212" font-size="13" fill="#f8f8f2">pal preview dracula-dark</text>

  <!-- Preview output header -->
  <text x="22" y="234" font-size="12" fill="#6272a4">  palette: </text>
  <text x="90" y="234" font-size="12" fill="#f8f8f2">dracula-dark</text>

  <!-- Dracula color blocks — row 1 (colors 0–7) -->
  <rect x="22"  y="244" width="40" height="28" fill="#44475a" rx="2"/>
  <rect x="66"  y="244" width="40" height="28" fill="#ff5555" rx="2"/>
  <rect x="110" y="244" width="40" height="28" fill="#50fa7b" rx="2"/>
  <rect x="154" y="244" width="40" height="28" fill="#ffb86c" rx="2"/>
  <rect x="198" y="244" width="40" height="28" fill="#8be9fd" rx="2"/>
  <rect x="242" y="244" width="40" height="28" fill="#bd93f9" rx="2"/>
  <rect x="286" y="244" width="40" height="28" fill="#ff79c6" rx="2"/>
  <rect x="330" y="244" width="40" height="28" fill="#94a3a5" rx="2"/>

  <!-- Dracula color blocks — row 2 (colors 8–15) -->
  <rect x="22"  y="276" width="40" height="28" fill="#000000" rx="2"/>
  <rect x="66"  y="276" width="40" height="28" fill="#ff5555" rx="2"/>
  <rect x="110" y="276" width="40" height="28" fill="#50fa7b" rx="2"/>
  <rect x="154" y="276" width="40" height="28" fill="#ffb86c" rx="2"/>
  <rect x="198" y="276" width="40" height="28" fill="#8be9fd" rx="2"/>
  <rect x="242" y="276" width="40" height="28" fill="#bd93f9" rx="2"/>
  <rect x="286" y="276" width="40" height="28" fill="#ff79c6" rx="2"/>
  <rect x="330" y="276" width="40" height="28" fill="#ffffff" rx="2"/>

  <!-- fg/bg/cursor -->
  <text x="22" y="326" font-size="11" fill="#44475a">  fg:</text>
  <text x="52" y="326" font-size="11" fill="#94a3a5">#94A3A5</text>
  <text x="112" y="326" font-size="11" fill="#44475a">  bg:</text>
  <text x="142" y="326" font-size="11" fill="#94a3a5">#282A36</text>
  <text x="202" y="326" font-size="11" fill="#44475a">  cursor:</text>
  <text x="252" y="326" font-size="11" fill="#94a3a5">#94A3A5</text>

  <!-- divider -->
  <line x1="22" y1="342" x2="698" y2="342" stroke="#44475a" stroke-width="1" opacity="0.5"/>

  <!-- ─── Command 3: pal random ─── -->
  <text x="22" y="362" font-size="13" fill="#8892b0">~/projects</text>
  <text x="110" y="362" font-size="13" fill="#bd93f9"> ❯ </text>
  <text x="140" y="362" font-size="13" fill="#f8f8f2">pal random</text>
  <text x="22" y="382" font-size="12" fill="#6272a4">Applied: </text>
  <text x="82" y="382" font-size="12" fill="#50fa7b">nord</text>

  <!-- blinking cursor -->
  <rect x="22" y="400" width="8" height="14" fill="#f8f8f2" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
