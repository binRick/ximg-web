<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unix Epoch Converter — epoch.ximg.app — interactive educational app on ximg.app">
  <title>Unix Epoch Converter — epoch.ximg.app</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#02020f;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-top:44px}

    .subnav{position:sticky;top:44px;z-index:100;background:#02020f;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 1rem;justify-content:center}
    .tab-btn{padding:.65rem 1.1rem;font-size:.82rem;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
    .tab-btn:hover{color:#c9d1d9}
    .tab-btn.active{color:#22d3ee;border-bottom-color:#22d3ee}

    .page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
    .page-title{font-size:1.2rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
    .page-sub{font-size:.8rem;color:#475569;margin-bottom:1.25rem}

    label.lbl{display:block;font-size:.7rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
    input[type=text],input[type=number],input[type=datetime-local],select,textarea{width:100%;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;font-family:'Courier New',monospace;font-size:.9rem;padding:.55rem .8rem;outline:none;transition:border-color .2s}
    input:focus,select:focus,textarea:focus{border-color:#22d3ee55}
    select{cursor:pointer}
    textarea{resize:vertical;min-height:80px;line-height:1.5}

    .card{background:#070720;border:1px solid #1e293b;border-radius:8px;padding:1rem 1.2rem}
    .card-title{font-size:.78rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}

    /* Now tab */
    .now-hero{text-align:center;padding:2rem 1rem 1.5rem}
    .now-epoch-label{font-size:.75rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
    .now-epoch{font-size:3.2rem;font-weight:700;color:#22d3ee;font-family:'Courier New',monospace;letter-spacing:-.02em;line-height:1}
    .now-ms{font-size:1.4rem;color:#475569;font-family:'Courier New',monospace;margin-top:.4rem}
    .now-utc{font-size:1rem;color:#94a3b8;margin-top:.6rem;font-family:'Courier New',monospace}
    .now-copy-row{display:flex;gap:.5rem;justify-content:center;margin-top:.9rem;flex-wrap:wrap}
    .copy-btn{background:#0f172a;border:1px solid #1e293b;border-radius:5px;color:#64748b;font-size:.72rem;padding:.28rem .7rem;cursor:pointer;transition:all .15s;font-family:'Courier New',monospace}
    .copy-btn:hover{border-color:#22d3ee55;color:#22d3ee}

    .tz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.6rem;margin-top:1.25rem}
    .tz-card{background:#070720;border:1px solid #1e293b;border-radius:7px;padding:.75rem 1rem}
    .tz-name{font-size:.72rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
    .tz-time{font-size:1.15rem;font-weight:600;color:#e2e8f0;font-family:'Courier New',monospace}
    .tz-date{font-size:.78rem;color:#64748b;font-family:'Courier New',monospace;margin-top:.1rem}
    .tz-offset{font-size:.7rem;color:#334155;margin-top:.1rem}

    /* Convert tab */
    .convert-section{margin-bottom:1.5rem}
    .convert-section-title{font-size:.9rem;font-weight:700;color:#f1f5f9;margin-bottom:.8rem;padding-bottom:.35rem;border-bottom:1px solid #1e293b}
    .input-row{display:grid;grid-template-columns:1fr auto;gap:.5rem;align-items:end;margin-bottom:1rem}
    @media(max-width:540px){.input-row{grid-template-columns:1fr}}
    .btn{background:#0f172a;border:1px solid #22d3ee44;border-radius:6px;color:#22d3ee;font-size:.8rem;font-weight:600;padding:.5rem 1.1rem;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn:hover{background:#22d3ee15;border-color:#22d3ee88}
    .btn:active{transform:scale(.97)}
    .result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.5rem;margin-top:.75rem}
    .result-item{background:#040418;border:1px solid #1e293b;border-radius:6px;padding:.55rem .8rem}
    .ri-label{font-size:.68rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem}
    .ri-value{font-size:.85rem;color:#22d3ee;font-family:'Courier New',monospace;word-break:break-all}
    .ri-value.dim{color:#64748b}
    .error-msg{font-size:.8rem;color:#f85149;margin-top:.4rem;min-height:1.2em}
    .divider{border:none;border-top:1px solid #1e293b;margin:1.75rem 0}

    .tz-result-list{margin-top:.75rem;display:flex;flex-direction:column;gap:.4rem}
    .tzr-row{display:grid;grid-template-columns:160px 1fr;gap:.5rem;background:#040418;border:1px solid #1e293b;border-radius:6px;padding:.45rem .75rem;font-family:'Courier New',monospace;font-size:.82rem}
    .tzr-name{color:#475569}
    .tzr-val{color:#c9d1d9}

    /* Format tab */
    .fmt-search-wrap{margin-bottom:1.25rem}
    .ref-table{width:100%;border-collapse:collapse;font-size:.8rem}
    .ref-table th{text-align:left;padding:.4rem .6rem;border-bottom:1px solid #1e293b;color:#475569;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
    .ref-table td{padding:.38rem .6rem;border-bottom:1px solid #0f172a;vertical-align:top}
    .ref-table tr:hover td{background:#070720}
    .ref-table tr
    .tok{font-family:'Courier New',monospace;color:#22d3ee;font-size:.82rem}
    .tok-desc{color:#94a3b8}
    .tok-lang{font-size:.7rem;font-weight:700;letter-spacing:.05em;padding:.12rem .4rem;border-radius:4px;margin-right:.25rem;display:inline-block}
    .lang-py{background:rgba(250,204,21,.1);color:#facc15;border:1px solid rgba(250,204,21,.2)}
    .lang-js{background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
    .lang-go{background:rgba(99,179,237,.1);color:#63b3ed;border:1px solid rgba(99,179,237,.2)}
    .lang-java{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2)}
    .lang-sql{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
    .section-header td{background:#0a0a20;color:#475569;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.3rem .6rem;border-bottom:1px solid #1e293b}

    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0f172a;border:1px solid #22d3ee44;color:#22d3ee;padding:.5rem 1rem;border-radius:6px;font-size:.8rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="subnav">
  <a class="tab-btn " href="index.html">Now</a>
  <a class="tab-btn" href="convert.html">Convert</a>
  <a class="tab-btn" href="format.html">Format</a>
</div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/epoch') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="format">
<div class="page-title">Date Format Tokens</div>
  <div class="page-sub">Reference for common date format specifiers across languages and frameworks</div>

  <div class="fmt-search-wrap">
    <label class="lbl">Search tokens or descriptions</label>
    <input type="text" id="fmt-search" placeholder="e.g. year, month, HH, strftime…" oninput="filterFmt()">
  </div>

  <table class="ref-table" id="fmt-table">
    <thead>
      <tr>
        <th style="width:90px">Token</th>
        <th style="width:130px">Language</th>
        <th>Description</th>
        <th style="width:160px">Example output</th>
      </tr>
    </thead>
    <tbody id="fmt-tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast">
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
