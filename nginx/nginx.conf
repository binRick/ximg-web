nd:#2d1800!important;color:#f0883e!important}div.serviceTotals,table.serviceTotals,th.serviceTotals,td.serviceTotals,.serviceTotals{background:#161b22!important;color:#c9d1d9!important;border-color:#30363d!important}td.serviceTotalsOK,.serviceTotalsOK{background:#0d3321!important;color:#3fb950!important}td.serviceTotalsWARNING,.serviceTotalsWARNING{background:#2d2000!important;color:#d29922!important}td.serviceTotalsCRITICAL,.serviceTotalsCRITICAL{background:#3d0000!important;color:#f85149!important}td.serviceTotalsUNKNOWN,.serviceTotalsUNKNOWN{background:#2d1800!important;color:#f0883e!important}table.pageTitle,td.pageTitle,.pageTitle{background:#161b22!important;color:#c9d1d9!important}div.statusTitle,.statusTitle{background:#161b22!important;color:#58a6ff!important}input,select,textarea{background:#21262d!important;color:#c9d1d9!important;border:1px solid #30363d!important}</style><script src="/shared/nav.js?v=2"></script></body>';
