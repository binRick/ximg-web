    server {
        listen 443 ssl;
        server_name logs.ximg.app;

        access_log /var/log/nginx/logs.access.log;
        error_log  /var/log/nginx/logs.error.log;

        ssl_certificate     /etc/letsencrypt/live/ximg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ximg.app/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;

        # WebSocket upgrade
        location /ws {
            set $upstream_logs logs;
            proxy_pass          http://$upstream_logs:3000;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  24h;
        }

        # IDS WebSocket upgrade
        location /ids-ws {
            set $upstream_logs logs;
            proxy_pass          http://$upstream_logs:3000;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  24h;
        }

        include /etc/nginx/shared.conf;

        location / {
            set $upstream_logs logs;
            proxy_pass         http://$upstream_logs:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

