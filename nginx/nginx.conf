events {}

http {
    error_log  /var/log/nginx/error.log;

    # Use Docker's internal DNS resolver; re-resolve upstreams every 10 s
    # so nginx picks up new container IPs after restarts without itself needing a restart.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Redirect HTTP → HTTPS, but pass ACME challenges through
    server {
        listen 80;
        server_name ximg.app www.ximg.app linux.ximg.app logs.ximg.app butterfly.ximg.app ascii.ximg.app json.ximg.app poker.ximg.app mario.ximg.app yaml.ximg.app doom.ximg.app monkey.ximg.app docker.ximg.app pizza.ximg.app kombat.ximg.app chinese.ximg.app wargames.ximg.app warcraft.ximg.app moto.ximg.app india.ximg.app wood.ximg.app guns.ximg.app tampa.ximg.app florida.ximg.app america.ximg.app computers.ximg.app trump.ximg.app cnc.ximg.app rx.ximg.app mail.ximg.app simcity.ximg.app internet.ximg.app change.ximg.app fidonet.ximg.app coldwar.ximg.app apps.ximg.app ansible.ximg.app chess.ximg.app passwords.ximg.app tmux.ximg.app programming.ximg.app git.ximg.app systemd.ximg.app vr.ximg.app nav.ximg.app ximg.ximg.app mac.ximg.app ai.ximg.app kart.ximg.app claude.ximg.app bash.ximg.app zsh.ximg.app vt101.ximg.app stats.ximg.app ids.ximg.app nagios.ximg.app status.ximg.app unix.ximg.app bsd.ximg.app vim.ximg.app http.ximg.app ssh.ximg.app sql.ximg.app space.ximg.app coffee.ximg.app japan.ximg.app quake.ximg.app nintendo.ximg.app pirates.ximg.app medieval.ximg.app physics.ximg.app chemistry.ximg.app biology.ximg.app math.ximg.app evolution.ximg.app dns.ximg.app suricata.ximg.app crypto.ximg.app readme.ximg.app claudemd.ximg.app algorithms.ximg.app os.ximg.app security.ximg.app database.ximg.app network.ximg.app request.ximg.app world.ximg.app sandbox.ximg.app gravity.ximg.app waves.ximg.app chaos.ximg.app epidemic.ximg.app playground.ximg.app tokens.ximg.app temperature.ximg.app embeddings.ximg.app agents.ximg.app visualize.ximg.app statslab.ximg.app regression.ximg.app probability.ximg.app systemdesign.ximg.app loadbalancer.ximg.app cdn.ximg.app queue.ximg.app brain.ximg.app sleep.ximg.app nutrition.ximg.app training.ximg.app punch.ximg.app terminal.ximg.app circuit.ximg.app logic.ximg.app protocol.ximg.app mainframe.ximg.app regex.ximg.app jwt.ximg.app cron.ximg.app color.ximg.app arpanet.ximg.app dna.ximg.app cell.ximg.app immune.ximg.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        include /etc/nginx/shared.conf;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name ximg.app www.ximg.app;

        access_log /var/log/nginx/ximg.access.log;
        error_log  /var/log/nginx/ximg.error.log;

        ssl_certificate     /etc/letsencrypt/live/wargames.ximg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wargames.ximg.app/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;

        include /etc/nginx/shared.conf;

        location / {
            set $upstream web;
            proxy_pass         http://$upstream:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

