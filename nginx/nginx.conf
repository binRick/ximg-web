events {}

http {
    error_log  /var/log/nginx/error.log;

    # Use Docker's internal DNS resolver; re-resolve upstreams every 10 s
    # so nginx picks up new container IPs after restarts without itself needing a restart.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Redirect HTTP → HTTPS, but pass ACME challenges through
    server {
        listen 80;
        server_name ximg.app www.ximg.app linux.ximg.app logs.ximg.app butterfly.ximg.app ascii.ximg.app json.ximg.app poker.ximg.app mario.ximg.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name ximg.app www.ximg.app;

        access_log /var/log/nginx/ximg.access.log;
        error_log  /var/log/nginx/ximg.error.log;

        ssl_certificate     /etc/letsencrypt/live/ximg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ximg.app/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;

        location / {
            set $upstream web;
            proxy_pass         http://$upstream:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name butterfly.ximg.app;

        access_log /var/log/nginx/butterfly.access.log;
        error_log  /var/log/nginx/butterfly.error.log;

        ssl_certificate     /etc/letsencrypt/live/ximg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ximg.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000" always;

        location / {
            set $upstream butterfly;
            proxy_pass         http://$upstream:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name logs.ximg.app;

        access_log /var/log/nginx/logs.access.log;
        error_log  /var/log/nginx/logs.error.log;

        ssl_certificate     /etc/letsencrypt/live/ximg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ximg.app/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;

        # WebSocket upgrade
        location /ws {
            set $upstream_logs logs;
            proxy_pass          http://$upstream_logs:3000;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  24h;
        }

        location / {
            set $upstream_logs logs;
            proxy_pass         http://$upstream_logs:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

