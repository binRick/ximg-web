        server_name waves.ximg.app;
        access_log /var/log/nginx/waves.access.log;
        error_log  /var/log/nginx/waves.error.log;
        ssl_certificate     /etc/letsencrypt/live/waves.ximg.app-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/waves.ximg.app-0001/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000" always;
        include /etc/nginx/shared.conf;
        location / {
            set $upstream waves;
            proxy_pass         http://$upstream:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

