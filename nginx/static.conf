server {
    listen 80;
    server_name _;

    root /sites/$host;
    index index.html;

    location /shared/ {
        alias /sites/shared/;
    }

    # Asset extensions get a clean 404 - skip the SPA-style index.html
    # fallback so missing images/audio/video/etc don't serve HTML.
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|mp3|mp4|wav|ogg|webm|wasm|data|zip|gz|pdf)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
