location /shared/ {
    alias /shared-html/;
    types { application/javascript js; }
}

# Drop scanner/bot probes — regex location takes priority over plain prefix locations
# Patterns: Cisco IOS, TP-Link, CGI, PHP, WordPress (login/admin/content/includes/json/config/wpeprivate),
# XML-RPC, WLW manifest, Solr, Spring Boot actuator, .env/.git/.gitlab/.aws/.DS_Store,
# shell dotfiles (.bash*/.zsh*/.sh_history/.profile/.python_history/.node_repl_history),
# path traversal (etc/passwd), phpinfo, PHPUnit eval-stdin, phpMyAdmin, D-Link HNAP1,
# Laravel _ignition, boaform router, GeoServer, Jenkins/Hudson, Hikvision SDK/webLanguage,
# Apache server-status, Symfony _profiler, Yii debug, router webui, PHP Xdebug,
# AWS metadata SSRF (169.254.169.254), Symfony parameters.yml, docker-compose.yml, kustomization.yaml
location ~* "(/exec/show/|tmUnblock\.cgi|/cgi-bin/|\.php($|\?)|/wp-login|/wp-admin|/wp-content/|/wp-includes/|/wp-json/|/wp-config|/_wpeprivate/|xmlrpc\.php|wlwmanifest\.xml|/solr/|/actuator/|/\.env($|\?|\.)|/\.git/|/\.gitlab|/\.aws/|/\.DS_Store|/\.bash|/\.zsh|/\.sh_history|/\.profile|/\.python_history|/\.node_repl_history|etc/passwd|phpinfo|eval-stdin|/vendor/phpunit/|/phpMyAdmin|/HNAP1|/_ignition/|/boaform/|/geoserver/|/hudson|/SDK/webLanguage|/server-status|/_profiler/|/debug/default/|/webui/|XDEBUG_SESSION|169\.254\.169\.254|/parameters\.yml|/docker-compose\.yml|/kustomization\.yaml)" {
    return 444;
}
