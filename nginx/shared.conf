location /shared/ {
    alias /shared-html/;
    types { application/javascript js; }
}

# Drop scanner/bot probes — regex location takes priority over plain prefix locations
location ~* "(/exec/show/|tmUnblock\.cgi|/cgi-bin/|\.php($|\?)|/wp-login|/wp-admin|xmlrpc\.php|/solr/|/actuator/|/\.env($|\?)|/\.git/|etc/passwd)" {
    return 444;
}
