<svg xmlns="http://www.w3.org/2000/svg" width="740" height="280" viewBox="0 0 740 280">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .cur { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }
    </style>
  </defs>

  <!-- shadow -->
  <rect x="4" y="6" width="732" height="270" rx="12" fill="rgba(0,0,0,0.45)"/>
  <!-- window -->
  <rect width="732" height="270" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- titlebar -->
  <rect width="732" height="36" rx="12" fill="url(#tbg)"/>
  <rect y="24" width="732" height="12" fill="#161b22"/>
  <line x1="0" y1="36" x2="732" y2="36" stroke="#21262d" stroke-width="1"/>
  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="366" y="23" text-anchor="middle" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="12" fill="#484f58">proc-trace-net — CMD mode</text>

  <!-- L1: prompt + command -->
  <text xml:space="preserve" x="20" y="65" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13">
    <tspan fill="#a78bfa">$</tspan><tspan fill="#fbbf24"> sudo </tspan><tspan fill="#4fc3f7">proc-trace-net</tspan><tspan fill="#e2e8f0"> -ctr curl https://github.com</tspan>
  </text>

  <!-- L2: NEW connection — curl → github -->
  <text xml:space="preserve" x="20" y="90" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13">
    <tspan fill="#fbbf24">84231</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#4fc3f7">curl        </tspan><tspan fill="#6e7681"> TCP  </tspan><tspan fill="#4ade80">10.0.2.15:55104         </tspan><tspan fill="#22d3ee"> → </tspan><tspan fill="#fbbf24">140.82.121.3:443       </tspan><tspan fill="#6e7681"> [github.com]</tspan>
  </text>

  <!-- L3: UPDATE — ESTABLISHED -->
  <text xml:space="preserve" x="20" y="115" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13">
    <tspan fill="#fbbf24">84231</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#4fc3f7">curl        </tspan><tspan fill="#6e7681"> TCP  </tspan><tspan fill="#4ade80">10.0.2.15:55104         </tspan><tspan fill="#c084fc"> ⇒ </tspan><tspan fill="#fbbf24">140.82.121.3:443       </tspan><tspan fill="#c084fc"> ESTABLISHED</tspan>
  </text>

  <!-- L4: DNS query (systemd-resolved) -->
  <text xml:space="preserve" x="20" y="140" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13">
    <tspan fill="#fbbf24"> 1823</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#4fc3f7">systemd-r   </tspan><tspan fill="#6e7681"> UDP  </tspan><tspan fill="#4ade80">10.0.2.15:57421         </tspan><tspan fill="#22d3ee"> → </tspan><tspan fill="#fbbf24">8.8.8.8:53             </tspan><tspan fill="#6e7681"> [dns.google]</tspan>
  </text>

  <!-- L5: CLOSED with timing -->
  <text xml:space="preserve" x="20" y="165" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13">
    <tspan fill="#fbbf24">84231</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#4fc3f7">curl        </tspan><tspan fill="#6e7681"> TCP  </tspan><tspan fill="#4ade80">10.0.2.15:55104         </tspan><tspan fill="#f87171"> × </tspan><tspan fill="#fbbf24">140.82.121.3:443       </tspan><tspan fill="#22d3ee"> 0.487s</tspan>
  </text>

  <!-- L6: blank gap -->

  <!-- L7: next prompt + blinking cursor -->
  <text xml:space="preserve" x="20" y="210" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13">
    <tspan fill="#a78bfa">$</tspan><tspan fill="#4ade80" class="cur"> █</tspan>
  </text>
</svg>
