<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0a0204;
      --card:   rgba(22,6,8,.85);
      --red:    #c41230;
      --crimson:#9b1527;
      --gold:   #d4a017;
      --amber:  #f59e0b;
      --cream:  #fdf0e6;
      --text:   #f5e6e0;
      --muted:  #9d6b5e;
      --border: rgba(196,18,48,.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 110% 55% at 50% 0%, #3d0608 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 85% 100%, #2a0406 0%, transparent 60%),
        linear-gradient(180deg, #0a0204 0%, #060102 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(196,18,48,.02) 0, rgba(196,18,48,.02) 1px, transparent 1px, transparent 56px),
        repeating-linear-gradient(90deg, rgba(212,160,23,.015) 0, rgba(212,160,23,.015) 1px, transparent 1px, transparent 72px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 20px rgba(196,18,48,.7)); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #c41230 0%, #d4a017 45%, #9b1527 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic; letter-spacing: .04em;
      max-width: 500px; line-height: 1.6;
    }
    .hero-divider {
      width: 120px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    /* ── Tabs ── */
    .tabs { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: .35rem; border-bottom: 1px solid rgba(255,255,255,.07); padding-bottom: .6rem; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      font-size: .73rem; padding: .3rem .65rem; border-radius: 6px; cursor: pointer; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,.08); background: transparent; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; transition: all .2s;
    }
    .tab.active { color: var(--red); border-color: rgba(196,18,48,.45); background: rgba(196,18,48,.08); }
    .tab:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,.18); }
    .section { display: flex; flex-direction: column; gap: 1.5rem; }
    .section.hidden { display: none; }

    /* ── Grid ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 1.5rem; }
    @media(max-width: 520px) { .cards { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .card:hover {
      border-color: rgba(196,18,48,.45);
      box-shadow: 0 8px 40px rgba(196,18,48,.12);
      transform: translateY(-3px);
    }

    /* ── Image area ── */
    .card-img-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: #180306;
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      display: block; position: relative; z-index: 1;
      opacity: 0; transition: opacity .4s;
    }
    .card-img-wrap img.loaded { opacity: 1; }
    .card-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
    }
    .ph-num  { font-size: 3.5rem; font-weight: 900; color: rgba(196,18,48,.12); line-height: 1; }
    .ph-icon { font-size: 2.2rem; opacity: .15; }

    .badge-rank {
      position: absolute; top: .75rem; left: .75rem; z-index: 2;
      background: rgba(0,0,0,.72); border: 1px solid rgba(196,18,48,.45);
      color: var(--amber); font-size: .65rem; font-weight: 700;
      padding: .2rem .55rem; border-radius: 5px; letter-spacing: .06em;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .badge-meta {
      position: absolute; bottom: .75rem; right: .75rem; z-index: 2;
      background: rgba(0,0,0,.65); color: rgba(255,255,255,.7);
      font-size: .65rem; padding: .18rem .5rem; border-radius: 4px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Card body ── */
    .card-body { padding: 1.1rem 1.2rem 1.25rem; display: flex; flex-direction: column; gap: .85rem; flex: 1; }
    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--cream); letter-spacing: -.01em; }
    .card-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; line-height: 1.45; }

    .card-stats { display: flex; gap: .5rem; flex-wrap: wrap; }
    .stat-chip {
      background: rgba(196,18,48,.08); border: 1px solid rgba(196,18,48,.18);
      border-radius: 7px; padding: .3rem .65rem; display: flex; flex-direction: column; gap: .1rem;
    }
    .stat-label { font-size: .6rem; color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-val   { font-size: .82rem; color: var(--amber); font-weight: 700; font-family: 'Segoe UI', system-ui, sans-serif; }

    .card-tags { display: flex; gap: .4rem; flex-wrap: wrap; }
    .tag {
      font-size: .68rem; padding: .2rem .55rem; border-radius: 12px;
      background: rgba(212,160,23,.07); border: 1px solid rgba(212,160,23,.18);
      color: rgba(212,160,23,.9); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600;
    }

    .facts-label { font-size: .7rem; font-weight: 700; color: var(--red); font-family: 'Segoe UI', system-ui, sans-serif; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    .facts-list { display: flex; flex-direction: column; gap: .55rem; }
    .fact { display: flex; gap: .55rem; align-items: flex-start; font-size: .8rem; line-height: 1.55; color: rgba(245,230,224,.8); }
    .fact-icon { font-size: .95rem; flex-shrink: 0; margin-top: .05rem; }
  </style>
</head>

function buildCards(data, containerId, rankLabel, phIcon) {
  const container = document.getElementById(containerId);
  data.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';

    const statsHtml = d.stats.map(s =>
      `<div class="stat-chip"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`
    ).join('');
    const tagsHtml = d.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const factsHtml = d.facts.map(f =>
      `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="card-img-placeholder">
          <div class="ph-num">${d.rank}</div>
          <div class="ph-icon">${phIcon}</div>
        </div>
        <img data-wiki="${d.wiki}" alt="${d.name}" onload="this.classList.add('loaded');this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">
        <div class="badge-rank">${rankLabel} ${d.rank}</div>
        <div class="badge-meta">${d.meta}</div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-title">${d.name}</div>
          <div class="card-sub">${d.sub}</div>
        </div>
        <div class="card-stats">${statsHtml}</div>
        <div class="card-tags">${tagsHtml}</div>
        <div>
          <div class="facts-label">🥢 Fun Facts</div>
          <div class="facts-list">${factsHtml}</div>
        </div>
      </div>`;

    container.appendChild(card);
  });
}

const ALL_TABS = ['cuisines','dishes','dimsum','streetfood','tea','ingredients','techniques','festivals','history'];

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('onclick').indexOf("'"+name+"'") !== -1);
  });
  ALL_TABS.forEach(function(tab) {
    document.getElementById('section-'+tab).classList.toggle('hidden', tab !== name);
  });
  localStorage.setItem('chinese_tab', name);
}
