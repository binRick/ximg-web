<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal — terminal.ximg.app</title>
  <meta name="description" content="Interactive retro Unix terminal — classic commands, VAX-11/780 BSD simulation, cowsay, fortune, and more">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --green-dim: #00cc33;
      --green-dark: #003d10;
      --bg: #050a05;
      --scanline: rgba(0, 0, 0, 0.25);
    }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      color: var(--green);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      /* CRT outer glow */
      background: radial-gradient(ellipse at center, #0a1a0a 0%, #020602 60%, #000 100%);
    }

    /* CRT screen container */
    #screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      /* phosphor green inner glow */
      box-shadow: inset 0 0 80px rgba(0, 255, 65, 0.04);
      /* nav pushdown */
      padding-top: 38px;
    }

    /* Scanline overlay */
    #screen::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        var(--scanline) 2px,
        var(--scanline) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* CRT flicker */
    #screen::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 255, 65, 0.015);
      pointer-events: none;
      z-index: 99;
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      92%  { opacity: 1; }
      93%  { opacity: 0.85; }
      94%  { opacity: 1; }
      96%  { opacity: 0.9; }
      97%  { opacity: 1; }
      100% { opacity: 1; }
    }

    /* Terminal output area */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem 0.5rem;
      line-height: 1.45;
      font-size: 0.875rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--green);
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.6);
      scroll-behavior: smooth;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #000; }
    #output::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }

    /* Input row */
    #input-row {
      display: flex;
      align-items: center;
      padding: 0.4rem 1rem 0.6rem;
      border-top: 1px solid rgba(0, 255, 65, 0.15);
      background: rgba(0, 5, 0, 0.6);
      gap: 0;
    }

    #prompt-label {
      color: var(--green);
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.6);
      font-size: 0.875rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.875rem;
      caret-color: var(--green);
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.6);
      padding: 0 0 0 2px;
    }

    /* Blinking cursor on the input */
    #cursor-block {
      width: 0.55em;
      height: 1.1em;
      background: var(--green);
      display: inline-block;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
      box-shadow: 0 0 6px var(--green);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Output line colors */
    .line-cmd   { color: #00ff41; }
    .line-out   { color: #00dd38; }
    .line-err   { color: #ff4422; text-shadow: 0 0 6px rgba(255,68,34,0.5); }
    .line-dim   { color: #009922; }
    .line-bold  { color: #44ff77; font-weight: bold; }
    .line-head  { color: #00ff41; text-decoration: underline; text-underline-offset: 3px; }
    .line-boot  { color: #007722; animation: bootfade 0.6s ease-in; }

    @keyframes bootfade {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: none; }
    }

    /* Mobile tap target */
    @media (max-width: 600px) {
      #output { font-size: 0.78rem; padding: 0.5rem 0.6rem 0.3rem; }
      #input-row { padding: 0.3rem 0.6rem 0.5rem; }
      #cmd-input, #prompt-label { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

<div id="screen">

  // ── ASCII calendar ────────────────────────────────────────────────────────
  function buildCal(year, month) { // month 0-based
    const today  = new Date();
    const isThisMonth = (today.getFullYear() === year && today.getMonth() === month);
    const first  = new Date(year, month, 1).getDay(); // 0=Sun
    const daysIn = new Date(year, month + 1, 0).getDate();
    const header = `   ${MONTHS[month]} ${year}`;
    let lines = [header, 'Su Mo Tu We Th Fr Sa'];
    let row = '   '.repeat(first);
    for (let d = 1; d <= daysIn; d++) {
      const pad = d < 10 ? ' ' + d : String(d);
      const hi  = isThisMonth && d === today.getDate();
      row += (hi ? '[' + pad + ']' : ' ' + pad + ' ').slice(0,3);
      if ((first + d) % 7 === 0 || d === daysIn) {
        lines.push(row.trimEnd());
        row = '';
      }
    }
    return lines.join('\n');
  }

  // ── Cowsay ────────────────────────────────────────────────────────────────
  function cowsay(text) {
    const words = text.trim() || 'Moo!';
    const maxW = 36;
    // word-wrap
    const lines = [];
    let cur = '';
    words.split(' ').forEach(w => {
      if ((cur + (cur ? ' ' : '') + w).length > maxW) {
        if (cur) lines.push(cur);
        cur = w.slice(0, maxW);
      } else {
        cur = cur ? cur + ' ' + w : w;
      }
    });
    if (cur) lines.push(cur);
    const width = Math.max(...lines.map(l => l.length));
    const top    = ' ' + '_'.repeat(width + 2);
    const bottom = ' ' + '-'.repeat(width + 2);
    const body = lines.map((l, i) => {
      const pad = ' '.repeat(width - l.length);
      if (lines.length === 1) return `< ${l}${pad} >`;
      if (i === 0)            return `/ ${l}${pad} \\`;
      if (i === lines.length - 1) return `\\ ${l}${pad} /`;
      return `| ${l}${pad} |`;
    });
    return [top, ...body, bottom,
      '        \\   ^__^',
      '         \\  (oo)\\_______',
      '            (__)\\       )\\/\\',
      '                ||----w |',
      '                ||     ||'
    ].join('\n');
  }

          ['last',         'Show login history'],
        ];
        cmds.forEach(([c, d]) => {
          addLine(`  ${c.padEnd(22)} ${d}`, 'line-out');
        });
        addLine('');
        break;
      }

      case 'ls': {
        if (args === '-la' || args === '-al' || args === '-a') {
          addLine(LS_OUTPUT, 'line-out');
        } else {
          addLine('backup.sh   history.txt   mail/   motd   notes.txt   src/   tmp/', 'line-out');
        }
        break;
      }

      case 'pwd': {
        addLine('/home/user', 'line-out');
        break;
      }

      case 'date': {
        addLine(fakeDate(), 'line-out');
        break;
      }

      case 'whoami': {
        addLine('user', 'line-out');
        break;
      }

      case 'uname': {
        addLine('VAX-11/780 UNIX 4.2BSD #1: Tue Sep 21 23:59:59 PDT 1982', 'line-out');
        break;
      }

      case 'uptime': {
        addLine(fakeUptime(), 'line-out');
        break;
      }

      case 'cal': {
        const d = new Date();
        addLine(buildCal(d.getFullYear(), d.getMonth()), 'line-out');
        break;
      }

      case 'clear': {
        output.innerHTML = '';
        break;
      }

      case 'echo': {
        addLine(args || '', 'line-out');
        break;
      }

      case 'cat': {
        if (args1 === 'motd' || args === 'motd') {
          addLine(MOTD, 'line-out');
        } else if (args1 === 'history.txt' || args === 'history.txt') {
          addLine(HISTORY_TXT, 'line-out');
        } else if (args1 === '.cshrc' || args1 === '.login' || args1 === '.profile') {
          addLine(`cat: ${args1}: Permission denied`, 'line-err');
        } else if (!args1) {
          // wait for input — simplified: just say so
          addLine('(cat: reading from stdin — use Ctrl-D to end)', 'line-dim');
        } else {
          addLine(`cat: ${args}: No such file or directory`, 'line-err');
        }
        break;
      }

      case 'man': {
        if (args1 === 'ls' || args === 'ls') {
          addLine(MAN_LS, 'line-out');
        } else if (!args1) {
          addLine('What manual page do you want?', 'line-err');
        } else {
          addLine(`No manual entry for ${args1}`, 'line-err');
        }
        break;
      }

      case 'fortune': {
        const f = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
        addLine('');
        addLine(f, 'line-out');
        addLine('');
        break;
      }

      case 'cowsay': {
        addLine(cowsay(args || 'Moo!'), 'line-out');
        break;
      }

      case 'banner': {
        if (!args) {
          addLine('Usage: banner <text>', 'line-err');
        } else {
          addLine(buildBanner(args), 'line-out');
        }
        break;
      }

      case 'ps': {
        addLine(FAKE_PS, 'line-out');
        break;
      }

      case 'top': {
        addLine(FAKE_TOP, 'line-out');
        break;
      }

      case 'history': {
        if (typedHistory.length === 0) {
          addLine('(no commands in history)', 'line-dim');
        } else {
          const recent = typedHistory.slice(-20);
          recent.forEach((c, i) => {
            const n = (typedHistory.length - recent.length + i + 1).toString().padStart(4,' ');
            addLine(`  ${n}  ${c}`, 'line-out');
          });
        }
        break;
      }

      case 'finger': {
        addLine(FAKE_FINGER, 'line-out');
        break;
      }

      case 'write': {
        addLine('write: ' + (args || 'user') + ' not logged in', 'line-err');
        break;
      }

      case 'talk': {
        addLine('talk: connection refused', 'line-err');
        break;
      }

      case 'ping': {
        const host = args || 'localhost';
        if (host === 'arpanet' || host === 'arpanet.ximg.app') {
          addLine(`PING arpanet.ximg.app (1969.10.29): 56 data bytes`, 'line-out');
          addLine(`64 bytes from 1969-10-29 (ARPANET node 1): icmp_seq=0 ttl=64 time=13.7 ms`, 'line-out');
          addLine(`64 bytes from 1969-10-29 (ARPANET node 1): icmp_seq=1 ttl=64 time=14.1 ms`, 'line-out');
          addLine(`64 bytes from 1969-10-29 (ARPANET node 1): icmp_seq=2 ttl=64 time=13.9 ms`, 'line-out');
          addLine(``, 'line-out');
          addLine(`--- arpanet.ximg.app ping statistics ---`, 'line-out');
          addLine(`3 packets transmitted, 3 received, 0% packet loss, time 2002ms`, 'line-out');
          addLine(`rtt min/avg/max = 13.7/13.9/14.1 ms`, 'line-out');
        } else {
          addLine(`PING ${host}: 56 data bytes`, 'line-out');
          addLine(`Request timeout for icmp_seq 0`, 'line-dim');
          addLine(`Request timeout for icmp_seq 1`, 'line-dim');
        }
        break;
      }

      case 'telnet': {
        const dest = args || '192.168.1.1';
        addLine(`Trying ${dest}...`, 'line-dim');
        addLine(`telnet: Unable to connect to remote host: Connection refused`, 'line-err');
        break;
      }

      case 'rlogin': {
        addLine('rlogin: Permission denied', 'line-err');
        break;
      }

      case 'who': {
        addLine(FAKE_WHO, 'line-out');
        break;
      }

      case 'last': {
        addLine(FAKE_LAST, 'line-out');
        break;
      }

      case 'exit':
      case 'logout': {
        addLine('');
        addLine('logout', 'line-dim');
        addLine('');
        addLine('Connection to vax11780 closed.', 'line-dim');
        addLine('');
        addLine('[Session terminated. Refresh to reconnect.]', 'line-dim');
        input.disabled = true;
        document.getElementById('prompt-label').style.opacity = '0.3';
        document.getElementById('cursor-block').style.display = 'none';
        break;
      }

      case 'ssh':
      case 'ftp': {
        addLine(`${cmd}: command not found`, 'line-err');
        addLine(`(Hint: try telnet or rlogin — it\'s 1982)`, 'line-dim');
        break;
      }

      case 'sudo': {
        addLine('sudo: command not found', 'line-err');
        addLine('(This is BSD Unix. We use su here.)', 'line-dim');
        break;
      }

      case 'su': {
        addLine('Password:', 'line-dim');
        setTimeout(() => {
          addLine('su: Sorry', 'line-err');
          scrollBottom();
        }, 800);
        break;
      }

      default: {
        // alternate between two bash-style not-found messages for variety
        if (Math.random() > 0.5) {
          addLine(`bash: ${esc(cmd)}: command not found`, 'line-err');
        } else {
          addLine(`-bash: ${esc(cmd)}: command not found`, 'line-err');
        }
        break;
      }
    }

    scrollBottom();
  }

  // ── Boot sequence ─────────────────────────────────────────────────────────
  const BOOT_LINES = [
    { text: '', delay: 0 },
    { text: 'KA780 V1.3, VMB V2.2', delay: 80 },
    { text: '' , delay: 120 },
    { text: '?BIOS-I-COLDSTART', delay: 160 },
    { text: 'Total Memory: 8 Megabytes', delay: 220 },
    { text: 'Testing memory ... Done.', delay: 350 },
    { text: '' , delay: 400 },
    { text: 'Bootstrapping from DU0: (RA81 disk)...', delay: 480 },
    { text: 'BSD UNIX -- Copyright (c) 1982 Regents of the University of California', delay: 700 },
    { text: '                   All rights reserved.', delay: 800 },
    { text: '' , delay: 850 },
    { text: 'vax11780 boot, auto-config', delay: 950 },
    { text: 'uba0 at nexus0', delay: 1050 },
    { text: 'uda0 at uba0 csr 172150 vec 774 ipl 15', delay: 1150 },
    { text: 'ra0 at uda0 drive 0: RA81', delay: 1250 },
    { text: 'ra1 at uda0 drive 1: RA81', delay: 1350 },
    { text: 'le0 at uba0 csr 174510: address 08:00:2b:xx:xx:xx', delay: 1450 },
    { text: '' , delay: 1500 },
    { text: '/dev/ra0b: 131072 sectors', delay: 1600 },
    { text: 'Checking file systems:', delay: 1700 },
    { text: '/dev/ra0a: 8192 files, 74210 blocks, 12438 free', delay: 1820 },
    { text: '/dev/ra1g: 41002 files, 286440 blocks, 195210 free', delay: 1950 },
    { text: '' , delay: 2000 },
    { text: 'Starting services: syslogd inetd cron sendmail lpd ...', delay: 2100 },
    { text: '' , delay: 2200 },
    { text: 'VAX/VMS V4.2 (VAX-11/780)  System uptime: 42 days', delay: 2300 },
    { text: '' , delay: 2500 },
    { text: 'login: user', delay: 2700 },
    { text: 'Password:', delay: 3000 },
    { text: '' , delay: 3400 },
  ];

  const WELCOME_LINES = [
    { text: 'Last login: Fri Apr  4 14:12:44 from 192.168.1.42', delay: 3500 },
    { text: '' , delay: 3560 },
    { text: 'BSD UNIX (vax11780)', delay: 3620 },
    { text: '' , delay: 3680 },
    { text: 'Type "help" to see available commands.', delay: 3740 },
    { text: '' , delay: 3800 },
  ];

  const ALL_BOOT = [...BOOT_LINES, ...WELCOME_LINES];

  function doBootSequence() {
    input.disabled = true;
    ALL_BOOT.forEach(({ text, delay }) => {
      setTimeout(() => {
        addLine(text, 'line-boot');
        scrollBottom();
      }, delay);
    });
    const totalDelay = ALL_BOOT[ALL_BOOT.length - 1].delay + 200;
    setTimeout(() => {
      input.disabled = false;
      input.focus();
      scrollBottom();
    }, totalDelay);
  }

  // ── Input / keyboard ──────────────────────────────────────────────────────
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      const val = input.value;
      input.value = '';
      historyIdx = -1;
      if (val.trim()) {
        cmdHistory.unshift(val);
        if (cmdHistory.length > 100) cmdHistory.length = 100;
      }
      runCommand(val);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIdx < cmdHistory.length - 1) {
        historyIdx++;
        input.value = cmdHistory[historyIdx];
        // move cursor to end
        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIdx > 0) {
        historyIdx--;
        input.value = cmdHistory[historyIdx];
      } else {
        historyIdx = -1;
        input.value = '';
      }
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      output.innerHTML = '';
    } else if (e.key === 'c' && e.ctrlKey) {
      e.preventDefault();
      addLine('user@vax11780:~$ ' + input.value + '^C', 'line-cmd');
      input.value = '';
      historyIdx = -1;
      scrollBottom();
    }
  });

  // Tap anywhere to focus input (mobile)
  screen.addEventListener('click', function (e) {
    if (!window.getSelection().toString()) {
      input.focus();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  doBootSequence();

})();
</script>
