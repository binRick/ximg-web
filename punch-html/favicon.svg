<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#1a1a2e"/>
  <!-- Punch card body (cream/beige) -->
  <rect x="3" y="7" width="26" height="18" rx="1" ry="1" fill="#f5f0e8"/>
  <!-- Corner cut (IBM style top-right) -->
  <polygon points="25,7 29,7 29,11" fill="#1a1a2e"/>
  <!-- Punch holes - row 1 -->
  <rect x="6"  y="10" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="10" y="10" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="14" y="10" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="19" y="10" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <!-- Punch holes - row 2 -->
  <rect x="6"  y="13" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="12" y="13" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="17" y="13" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="22" y="13" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <!-- Punch holes - row 3 -->
  <rect x="8"  y="16" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="13" y="16" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="18" y="16" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="22" y="16" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <!-- Punch holes - row 4 -->
  <rect x="6"  y="19" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="10" y="19" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="16" y="19" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
  <rect x="21" y="19" width="2" height="1.5" rx="0.3" fill="#1a1a2e"/>
</svg>
