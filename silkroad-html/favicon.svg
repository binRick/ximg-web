<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a0a00"/>
  <!-- Camel body -->
  <ellipse cx="16" cy="21" rx="9" ry="5" fill="#d97706"/>
  <!-- Hump -->
  <ellipse cx="14" cy="15" rx="4" ry="4" fill="#d97706"/>
  <!-- Second hump hint -->
  <ellipse cx="20" cy="16" rx="3" ry="3" fill="#b45309"/>
  <!-- Head/neck -->
  <ellipse cx="24" cy="17" rx="3" ry="2.5" fill="#d97706"/>
  <line x1="22" y1="19" x2="23" y2="17" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="10" y1="25" x2="9" y2="30" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="26" x2="13" y2="30" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="26" x2="19" y2="30" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="25" x2="23" y2="30" stroke="#b45309" stroke-width="2" stroke-linecap="round"/>
  <!-- Stars (desert sky) -->
  <text x="2" y="9" font-family="sans-serif" font-size="6" fill="#fbbf24">✦</text>
  <text x="26" y="7" font-family="sans-serif" font-size="5" fill="#fbbf24">✦</text>
</svg>
