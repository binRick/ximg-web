<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The history of motorcycling from 1867 to the electric era — 18 milestone events that shaped two-wheeled culture.">
  <title>Motorcycle History — moto.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #080808;
      --panel:  #100a06;
      --orange: #d45214;
      --amber:  #f09030;
      --steel:  #8090a0;
      --text:   #e8e0d8;
      --muted:  #706058;
      --card:   rgba(20,10,5,.82);
      --border: rgba(200,80,20,.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 120% 50% at 50% 0%, #1c0a04 0%, transparent 60%),
        radial-gradient(ellipse 70% 40% at 90% 100%, #120608 0%, transparent 60%),
        linear-gradient(180deg, #080808 0%, #040404 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,   rgba(200,80,20,.018) 0, rgba(200,80,20,.018) 1px, transparent 1px, transparent 64px),
        repeating-linear-gradient(90deg,  rgba(200,80,20,.012) 0, rgba(200,80,20,.012) 1px, transparent 1px, transparent 80px);
    }

    /* ── Sub-nav ── */
    .subnav {
      position: sticky;
      top: 44px;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: .3rem;
      padding: .45rem 1.5rem;
      background: rgba(8,6,4,.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.05);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .subnav::-webkit-scrollbar { display: none; }
    .subnav-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-right: .6rem;
      flex-shrink: 0;
      font-weight: 600;
    }
    .subnav-item {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .72rem;
      font-weight: 600;
      text-decoration: none;
      padding: .28rem .75rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      color: #807068;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s;
      cursor: pointer;
    }
    .subnav-item:hover { color: #c07840; border-color: rgba(200,120,60,.3); background: rgba(200,80,20,.06); }
    .subnav-item.active { color: var(--amber); border-color: rgba(240,144,48,.4); background: rgba(240,144,48,.09); }

    /* ── Layout ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1080px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 5rem;
      display: flex; flex-direction: column; gap: 3rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3.2rem; line-height: 1; filter: drop-shadow(0 0 22px rgba(212,82,20,.75)); }
    .hero h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 900; line-height: 1.04;
      background: linear-gradient(135deg, #d45214 0%, #f09030 38%, #b03010 72%, #e04010 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.03em; text-transform: uppercase;
    }
    .hero-sub {
      font-size: .93rem; color: var(--muted); letter-spacing: .02em;
      max-width: 480px; line-height: 1.65;
    }
    .hero-divider {
      width: 100px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }

    /* ── Section ── */
    section { display: flex; flex-direction: column; gap: 1.5rem; scroll-margin-top: 92px; }
    .section-header {
      display: flex; align-items: center; gap: 1rem;
      font-size: .62rem; text-transform: uppercase; letter-spacing: .2em;
      color: var(--orange); font-weight: 700;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(212,82,20,.4), transparent);
    }

    /* ── History timeline ── */
    .timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
    .timeline::before {
      content: ''; position: absolute; left: 72px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, transparent, rgba(200,80,20,.35) 8%, rgba(200,80,20,.35) 92%, transparent);
    }
    @media(max-width: 520px) { .timeline::before { left: 48px; } }

    .tl-item {
      display: flex; gap: 0; align-items: flex-start;
      padding: 0 0 2.25rem 0;
    }
    .tl-year {
      flex-shrink: 0; width: 72px; text-align: right; padding-right: 1.1rem;
      font-size: .72rem; font-weight: 800; color: var(--orange); line-height: 1;
      padding-top: .95rem; letter-spacing: .02em;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    @media(max-width: 520px) { .tl-year { width: 48px; padding-right: .7rem; font-size: .62rem; } }

    .tl-dot {
      flex-shrink: 0; width: 12px; height: 12px; border-radius: 50%;
      background: var(--orange); border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px rgba(200,80,20,.5);
      margin-top: .85rem; position: relative; z-index: 1;
    }
    .tl-dot.major {
      width: 16px; height: 16px; margin-top: .73rem;
      background: var(--amber); box-shadow: 0 0 10px rgba(240,144,48,.6), 0 0 0 3px rgba(240,144,48,.2);
    }

    .tl-card {
      flex: 1; margin-left: 1.1rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.2rem;
      display: flex; flex-direction: column; gap: .55rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .tl-card:hover { border-color: rgba(200,80,20,.4); box-shadow: 0 4px 24px rgba(200,80,20,.08); }
    .tl-card-header { display: flex; align-items: center; gap: .65rem; flex-wrap: wrap; }
    .tl-era {
      font-size: .56rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
      padding: .18rem .55rem; border-radius: 99px;
      border: 1px solid rgba(240,144,48,.3); background: rgba(240,144,48,.07);
      color: var(--amber); white-space: nowrap;
    }
    .tl-title {
      font-size: .95rem; font-weight: 800; color: var(--text); line-height: 1.25;
    }
    .tl-sub {
      font-size: .68rem; color: var(--muted); font-style: italic;
    }
    .tl-desc {
      font-size: .78rem; line-height: 1.7; color: #a8a098;
    }
    .tl-desc em  { color: var(--amber); font-style: normal; font-weight: 600; }
    .tl-desc strong { color: var(--text); }
    .tl-pills { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .1rem; }
    .tl-pill {
      font-size: .6rem; padding: .15rem .5rem; border-radius: 99px;
      border: 1px solid rgba(200,80,20,.3); background: rgba(200,80,20,.06);
      color: #e08860;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .hero    { animation: fadeUp .7s ease both 0s; }
    .subnav  { animation: fadeUp .5s ease both .05s; }
    section  { animation: fadeUp .7s ease both .15s; }
  </style>
</head>
<body>

  <script>
    document.querySelectorAll('.subnav-item').forEach(function(a) {
      var href = a.getAttribute('href');
      var path = location.pathname;
      if (path.endsWith(href) || (href === 'index.html' && (path.endsWith('/') || path.endsWith('/moto') || path.endsWith('index.html')))) {
        a.classList.add('active');
      }
    });
  </script>

  <div class="wrap">
    <div class="hero">
      <div class="hero-icon">📅</div>
      <h1>History</h1>
      <p class="hero-sub">From Daimler's 1885 Reitwagen to the electric era — 140 years of two-wheeled milestones.</p>
      <div class="hero-divider"></div>
    </div>

    <section>
      <div class="section-header">History</div>
      <div class="timeline" id="history-timeline"></div>
    </section>
  </div>

<script>
const HISTORY = [
  {
    year: '1867', major: false, era: 'Steam Age',
    title: 'Roper Steam Velocipede',
    sub: 'The first self-propelled two-wheeler',
    desc: 'American inventor <em>Sylvester Roper</em> attached a coal-fired steam engine to a wooden velocipede, creating the earliest known self-propelled two-wheeled vehicle. It reached around 40 km/h — Roper died demonstrating it at a race in 1896, reportedly of a heart attack, at age 72.',
    pills: ['Sylvester Roper', 'Steam Power', 'USA'],
  },
  {
    year: '1885', major: true, era: 'Birth of the Motorcycle',
    title: 'Daimler Reitwagen',
    sub: 'The world\'s first true gasoline-powered motorcycle',
    desc: '<em>Gottlieb Daimler</em> and <em>Wilhelm Maybach</em> built the Reitwagen ("riding car") in Bad Cannstatt, Germany — a wooden-framed machine with a single-cylinder four-stroke engine displacing 264cc. On 10 November 1885, Daimler\'s son Paul rode it 3 km. It is universally recognised as the birth of the motorcycle.',
    pills: ['Gottlieb Daimler', 'Wilhelm Maybach', 'Germany', '264cc', '0.5 hp'],
  },
  {
    year: '1894', major: false, era: 'First Production',
    title: 'Hildebrand & Wolfmüller',
    sub: 'The first commercially produced motorcycle',
    desc: 'German engineers <strong>Heinrich and Wilhelm Hildebrand</strong> with <em>Alois Wolfmüller</em> produced the world\'s first motorcycle available to the public. Over 2,000 were sold at 2,000 marks each before reliability problems ended production. The word <em>"Motorrad"</em> (motorcycle) was coined in their patent.',
    pills: ['Germany', 'First Production Run', '2 hp', '1,489cc'],
  },
  {
    year: '1901', major: true, era: 'American Golden Age',
    title: 'Indian Motorcycle Founded',
    sub: 'America\'s oldest motorcycle brand',
    desc: '<em>George Hendee</em> and <em>Carl Oscar Hedstrom</em> founded the Hendee Manufacturing Company in Springfield, Massachusetts. The first Indian used a 1.75 hp single-cylinder engine clipped to a bicycle frame. By 1913 Indian was the largest motorcycle manufacturer in the world, producing 32,000 bikes annually.',
    pills: ['Springfield MA', 'George Hendee', 'Carl Hedstrom', 'USA'],
  },
  {
    year: '1903', major: false, era: 'American Golden Age',
    title: 'Harley-Davidson Founded',
    sub: 'The Milwaukee legend begins',
    desc: '<em>William Harley</em> and brothers <em>Arthur, Walter, and William Davidson</em> built their first motorcycle in a 10-by-15-foot wooden shed in Milwaukee. The first Harley engine displaced 405cc and produced 2 hp. Within a decade, H-D would become the dominant force in American motorcycling — a position it holds to this day.',
    pills: ['Milwaukee WI', 'William Harley', 'Davidson Brothers', 'USA'],
  },
  {
    year: '1914', major: false, era: 'World War I',
    title: 'Motorcycles Go to War',
    sub: 'Two-wheelers reshape military communication',
    desc: 'By 1918, over <em>100,000 motorcycles</em> served the Allied forces as dispatch runners, staff transport, and sidecar machine-gun platforms. The Douglas, Triumph Type H, and Harley-Davidson J proved their reliability under battlefield conditions — introducing millions of soldiers to motorcycle culture and creating a huge post-war civilian market.',
    pills: ['Triumph Type H', 'Douglas', 'Harley WLA', 'Dispatch Riders'],
  },
  {
    year: '1949', major: true, era: 'Japanese Revolution',
    title: 'Honda Motor Co. Founded',
    sub: 'Soichiro Honda changes everything',
    desc: '<em>Soichiro Honda</em> founded Honda Motor Co. in post-war Japan, initially fitting surplus army radio generator engines to bicycles. The Honda Dream D-Type (1949) was their first true motorcycle. Honda\'s philosophy — <em>"The Power of Dreams"</em> — led to the world\'s best-selling internal combustion engine vehicle by volume: the Super Cub, with over 100 million units produced.',
    pills: ['Soichiro Honda', 'Japan', 'Post-War', 'Super Cub'],
  },
  {
    year: '1959', major: false, era: 'Japanese Revolution',
    title: 'Honda Enters the US Market',
    sub: '"You Meet the Nicest People on a Honda"',
    desc: 'Honda\'s advertising campaign — targeting ordinary Americans rather than the rough biker image — transformed the US motorcycle market. Sales exploded from nearly zero to <em>100,000 units by 1963</em>. The campaign dismantled the outlaw biker stereotype and created a new demographic of respectable, middle-class motorcycle riders.',
    pills: ['Honda Super Cub', 'American Market', 'Grey Advertising', 'Image Revolution'],
  },
  {
    year: '1969', major: true, era: 'Cultural Moment',
    title: 'Easy Rider',
    sub: 'Motorcycle as symbol of American freedom',
    desc: 'Dennis Hopper\'s film <em>Easy Rider</em> opened on July 14, 1969. Peter Fonda\'s Captain America chopper — a raked, extended-fork Harley-Davidson Panhead — became the definitive symbol of counter-culture freedom. The film grossed <em>$60 million on a $400,000 budget</em>, permanently fusing motorcycle culture with the American spirit of rebellion.',
    pills: ['Peter Fonda', 'Dennis Hopper', 'Captain America Chopper', 'Harley Panhead', 'Hollywood'],
  },
  {
    year: '1969', major: true, era: 'Japanese Revolution',
    title: 'Honda CB750 Four',
    sub: 'The motorcycle that killed British dominance',
    desc: 'Unveiled at the Tokyo Motor Show, the <em>Honda CB750</em> combined a 736cc inline-four engine, hydraulic front disc brake, and electric starter at a price that undercut British bikes. It demolished Triumph, BSA, and Norton — whose factories had dominated world motorcycling for 60 years. The CB750 launched the modern four-cylinder sport-touring era.',
    pills: ['736cc Inline-4', 'Disc Brake', '67 hp', 'Tokyo Motor Show', 'Japan'],
  },
  {
    year: '1984', major: false, era: 'Modern Supersport',
    title: 'Kawasaki GPZ900R — Ninja',
    sub: 'The first true modern sportbike',
    desc: 'The <em>Kawasaki GPZ900R</em> arrived with a water-cooled 908cc inline-four producing 115 hp and weighing just 228 kg — the fastest production motorcycle of its time at 249 km/h. It established the inline-four sportbike template every manufacturer would follow for the next four decades. Fame exploded when <em>Tom Cruise</em> rode one in Top Gun (1986).',
    pills: ['908cc Inline-4', '115 hp', '249 km/h', 'Top Gun', 'Kawasaki'],
  },
  {
    year: '1988', major: false, era: 'Modern Supersport',
    title: 'Ducati 851 — Desmodromic V-Twin',
    sub: 'Italian engineering redefines performance',
    desc: 'The <em>Ducati 851</em> introduced the desmodromic four-valve liquid-cooled L-twin to production motorcycles. The Desmo system — mechanical valve closing rather than spring return — allows higher revs without float. It went on to win <em>World Superbike Championships</em> and cemented Ducati\'s reputation as the engineering pinnacle of motorcycling.',
    pills: ['851cc L-Twin', 'Desmodromic', 'Superbike Racing', 'Bologna Italy'],
  },
  {
    year: '1992', major: false, era: 'Modern Supersport',
    title: 'Honda CBR900RR FireBlade',
    sub: 'Total control — the formula that changed everything',
    desc: 'Designer <em>Tadao Baba</em> set out to deliver 900cc performance in a 400cc-weight package. The FireBlade achieved it: 893cc, 124 hp, 185 kg — <em>0.67 hp per kg</em>. Baba\'s "total control" philosophy prioritised the rider\'s ability to use all available power, not just peak figures. Every supersport made since has chased this template.',
    pills: ['893cc', '124 hp', '185 kg', 'Tadao Baba', 'Total Control'],
  },
  {
    year: '1993', major: false, era: 'New Categories',
    title: 'Ducati Monster',
    sub: 'Miguel Galluzzi creates the naked segment',
    desc: 'Ducati designer <em>Miguel Galluzzi</em> sketched the Monster on a napkin in 1992. Launched in 1993, it deliberately left the trellis frame and L-twin engine exposed — transforming mechanical engineering into sculpture. It became <em>Ducati\'s best-selling motorcycle ever</em> and invented the modern naked/streetfighter category that now encompasses millions of bikes worldwide.',
    pills: ['Miguel Galluzzi', 'Naked Segment', 'Trellis Frame', 'L-Twin', 'Bologna'],
  },
  {
    year: '2006', major: false, era: 'ADV Era',
    title: 'BMW R1200GS — Adventure Benchmark',
    sub: 'The world\'s best-selling motorcycle for 30+ years',
    desc: 'The water-cooled <em>R1200GS</em> consolidated BMW\'s dominance of the adventure touring segment. Building on the original R80GS (1980) that won the Paris-Dakar rally, the GS became the aspirational vehicle for long-distance travellers worldwide. By 2023, <em>over one million GS motorcycles</em> had been sold — an extraordinary figure for a premium-priced product.',
    pills: ['Boxer Twin', '125 hp', 'Paris-Dakar Legacy', 'One Million+ Sold', 'ADV'],
  },
  {
    year: '2014', major: false, era: 'Electronics Revolution',
    title: 'MotoGP Tech Goes Road-Legal',
    sub: 'Traction control, ABS, IMU — available to everyone',
    desc: 'The mid-2010s saw <em>six-axis IMU systems</em> (measuring lean angle, pitch, and yaw) become standard on production sportbikes. Combined with cornering ABS, traction control, wheelie control, and launch control, road bikes gained electronics suites that had been exclusive to factory MotoGP machines. <em>Bosch</em> and <em>Continental</em> supplied systems across all manufacturers.',
    pills: ['IMU Technology', 'Cornering ABS', 'Traction Control', 'MotoGP Trickle-Down'],
  },
  {
    year: '2019', major: true, era: 'Electric Era',
    title: 'Harley-Davidson LiveWire',
    sub: 'The most iconic brand goes electric',
    desc: 'Harley-Davidson\'s <em>LiveWire</em> — its first electric motorcycle — signalled that the industry\'s transformation was complete. With 105 hp, 116 Nm of instant torque, and 0–100 km/h in 3 seconds, it outperformed most H-D combustion bikes. More symbolically: if <em>Harley-Davidson</em> was building electric motorcycles, the age of electrification had arrived.',
    pills: ['105 hp', '116 Nm Torque', '3s 0-100', 'LiveWire Brand', 'Electric'],
  },
  {
    year: '2023', major: false, era: 'Electric Era',
    title: 'The Electric Transition Accelerates',
    sub: 'Zero, Energica, Cake, and the CE 04 reshape the segment',
    desc: 'By 2023, <em>Zero Motorcycles</em> offered a full adventure range with 350+ km range. BMW\'s <em>CE 04</em> maxi-scooter entered mainstream urban transport. KTM\'s Freeride E-XC proved electric motocross viable. Established manufacturers including Honda, Yamaha, and Kawasaki announced joint battery standardisation — signalling that the transition from combustion to electric would accelerate through the 2020s.',
    pills: ['Zero Motorcycles', 'BMW CE 04', 'Battery Standards', 'KTM Freeride E', 'Industry Shift'],
  },
];

function buildHistory() {
  const tl = document.getElementById('history-timeline');
  HISTORY.forEach(item => {
    const pillsHtml = item.pills.map(p => `<span class="tl-pill">${p}</span>`).join('');
    const el = document.createElement('div');
    el.className = 'tl-item';
    el.innerHTML = `
      <div class="tl-year">${item.year}</div>
      <div class="tl-dot${item.major ? ' major' : ''}"></div>
      <div class="tl-card">
        <div class="tl-card-header">
          <span class="tl-era">${item.era}</span>
          <div>
            <div class="tl-title">${item.title}</div>
            <div class="tl-sub">${item.sub}</div>
          </div>
        </div>
        <p class="tl-desc">${item.desc}</p>
        <div class="tl-pills">${pillsHtml}</div>
      </div>`;
    tl.appendChild(el);
  });
}

buildHistory();
</script>
