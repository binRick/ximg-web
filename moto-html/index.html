      --panel:  #100a06;
      --orange: #d45214;
      --amber:  #f09030;
      --steel:  #8090a0;
      --text:   #e8e0d8;
      --muted:  #706058;
      --card:   rgba(20,10,5,.82);
      --border: rgba(200,80,20,.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 120% 50% at 50% 0%, #1c0a04 0%, transparent 60%),
        radial-gradient(ellipse 70% 40% at 90% 100%, #120608 0%, transparent 60%),
        linear-gradient(180deg, #080808 0%, #040404 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,   rgba(200,80,20,.018) 0, rgba(200,80,20,.018) 1px, transparent 1px, transparent 64px),

      padding: .45rem 1.5rem;

      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.05);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .subnav::-webkit-scrollbar { display: none; }
    .subnav-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-right: .6rem;
      flex-shrink: 0;
      font-weight: 600;
    }
    .subnav-item {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .72rem;
      font-weight: 600;
      text-decoration: none;
      padding: .28rem .75rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      color: #807068;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s;
      cursor: pointer;

    .subnav-item:hover { color: #c07840; border-color: rgba(200,120,60,.3); background: rgba(200,80,20,.06); }
    .subnav-item.active { color: var(--amber); border-color: rgba(240,144,48,.4); background: rgba(240,144,48,.09); }

    .wrap {

      padding: 2rem 1.25rem 5rem;
      display: flex; flex-direction: column; gap: 3rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3.2rem; line-height: 1; filter: drop-shadow(0 0 22px rgba(212,82,20,.75)); }
    .hero h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 900; line-height: 1.04;
      background: linear-gradient(135deg, #d45214 0%, #f09030 38%, #b03010 72%, #e04010 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.03em; text-transform: uppercase;
    }
    .hero-sub {
      font-size: .93rem; color: var(--muted); letter-spacing: .02em;
      max-width: 480px; line-height: 1.65;
    }
    .hero-divider {
      width: 100px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }

    /* ── Section ── */
    section { display: flex; flex-direction: column; gap: 1.5rem; scroll-margin-top: 92px; }
    .section-header {
      display: flex; align-items: center; gap: 1rem;
      font-size: .62rem; text-transform: uppercase; letter-spacing: .2em;
      color: var(--orange); font-weight: 700;
    }
    .section-header::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(212,82,20,.4), transparent);
    }

    /* ── Card grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
      gap: 1.5rem;
    }
    @media(max-width: 540px) { .cards-grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .card:hover {
      border-color: rgba(200,80,20,.5);
      box-shadow: 0 8px 40px rgba(200,80,20,.12);
      transform: translateY(-3px);
    }

    /* ── Card image ── */
    .card-img-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--panel);
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      display: block; transition: opacity .4s;
    }
    .card-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
    }
    .card-img-placeholder .ph-icon { font-size: 2.5rem; opacity: .12; }
    .card-badge {
      position: absolute; top: .75rem; left: .75rem;
      background: rgba(0,0,0,.76); border: 1px solid rgba(200,80,20,.55);
      color: var(--orange); font-size: .6rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 99px; letter-spacing: .1em;
      text-transform: uppercase; backdrop-filter: blur(4px);
    }
    .card-origin {
      position: absolute; top: .75rem; right: .75rem;
      background: rgba(80,36,4,.88); border: 1px solid rgba(240,144,48,.3);
      color: #f0c080; font-size: .6rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 99px; letter-spacing: .05em;
      backdrop-filter: blur(4px);
    }

    /* ── Card body ── */
    .card-body { padding: 1.25rem 1.4rem; display: flex; flex-direction: column; gap: 1rem; flex: 1; }
    .card-name    { font-size: 1.15rem; font-weight: 800; line-height: 1.2; color: var(--text); }
    .card-tagline { font-size: .72rem; color: var(--muted); margin-top: .15rem; font-style: italic; }

    /* Stats */
    .card-stats { display: flex; flex-wrap: wrap; gap: .5rem; }
    .stat-chip {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px; padding: .35rem .7rem; min-width: 76px;
    }
    .stat-label { font-size: .52rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .stat-val   { font-size: .82rem; font-weight: 700; color: var(--amber); margin-top: .1rem; }

    /* Pills */
    .pills-label { font-size: .56rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: .35rem; }
    .pills-list  { display: flex; flex-wrap: wrap; gap: .3rem; }
    .pill {
      font-size: .62rem; padding: .18rem .55rem; border-radius: 99px;
      border: 1px solid rgba(200,80,20,.3); background: rgba(200,80,20,.06);
      color: #e08860; white-space: nowrap;
    }

    /* Facts */
    .facts-label { font-size: .56rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: .35rem; }
    .facts-list  { display: flex; flex-direction: column; gap: .5rem; }
    .fact {
      display: flex; gap: .6rem; align-items: flex-start;

    }
    .fact-icon { flex-shrink: 0; font-size: .8rem; margin-top: .05rem; opacity: .75; }

    /* ── History timeline ── */
    .timeline { display: flex; flex-direction: column; gap: 0; position: relative; }
    .timeline::before {
      content: ''; position: absolute; left: 72px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, transparent, rgba(200,80,20,.35) 8%, rgba(200,80,20,.35) 92%, transparent);
    }
    @media(max-width: 520px) { .timeline::before { left: 48px; } }

    .tl-item {
      display: flex; gap: 0; align-items: flex-start;
      padding: 0 0 2.25rem 0;
    }
    .tl-year {
      flex-shrink: 0; width: 72px; text-align: right; padding-right: 1.1rem;
      font-size: .72rem; font-weight: 800; color: var(--orange); line-height: 1;

    @media(max-width: 520px) { .tl-year { width: 48px; padding-right: .7rem; font-size: .62rem; } }

    .tl-dot {
      flex-shrink: 0; width: 12px; height: 12px; border-radius: 50%;

      box-shadow: 0 0 0 2px rgba(200,80,20,.5);

      border-radius: 12px; padding: 1rem 1.2rem;
      display: flex; flex-direction: column; gap: .55rem;

    .tl-card-header { display: flex; align-items: center; gap: .65rem; flex-wrap: wrap; }
    .tl-era {
      font-size: .56rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
      padding: .18rem .55rem; border-radius: 99px;
      border: 1px solid rgba(240,144,48,.3); background: rgba(240,144,48,.07);

      font-size: .95rem; font-weight: 800; color: var(--text); line-height: 1.25;

    .tl-desc {

    .tl-pills { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .1rem; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .hero    { animation: fadeUp .7s ease both 0s; }
    .subnav  { animation: fadeUp .5s ease both .05s; }
    section  { animation: fadeUp .7s ease both .15s; }
  </style>
</head>

function buildHistory() {
  const tl = document.getElementById('history-timeline');
  HISTORY.forEach(item => {
    const pillsHtml = item.pills.map(p => `<span class="tl-pill">${p}</span>`).join('');
    const el = document.createElement('div');
    el.className = 'tl-item';
    el.innerHTML = `
      <div class="tl-year">${item.year}</div>
      <div class="tl-dot${item.major ? ' major' : ''}"></div>
      <div class="tl-card">
        <div class="tl-card-header">
          <span class="tl-era">${item.era}</span>
          <div>
            <div class="tl-title">${item.title}</div>
            <div class="tl-sub">${item.sub}</div>
          </div>
        </div>
        <p class="tl-desc">${item.desc}</p>
        <div class="tl-pills">${pillsHtml}</div>
      </div>`;
    tl.appendChild(el);
  });
}

function fetchWikiThumb(img) {
  const M = {"Adventure_motorcycle":"Adventure_motorcycle.jpg","Chopper_(motorcycle)":"Chopper_(motorcycle).jpg","Cruiser_(motorcycle)":"Cruiser_(motorcycle).jpg","Dual-sport_motorcycle":"Dual-sport_motorcycle.jpg","Ducati_Monster":"Ducati_Monster.jpg","Motor_scooter":"Motor_scooter.jpg","Sport_bike":"Sport_bike.jpg"};
  const f = M[img.dataset.wiki];
  if (f) { img.onload = () => img.style.opacity='1'; img.onerror = () => img.style.display='none'; img.src = 'images/' + f; }
}

function buildCard(item, container) {
  const card = document.createElement('div');
  card.className = 'card';

  const statsHtml = item.stats.map(s =>
    `<div class="stat-chip">
      <div class="stat-label">${s.label}</div>
      <div class="stat-val">${s.val}</div>
    </div>`
  ).join('');

  const pillsHtml = item.pills.map(p => `<span class="pill">${p}</span>`).join('');

  const factsHtml = item.facts.map(f =>
    `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="card-img-wrap">
      <div class="card-img-placeholder">
        <div class="ph-icon">🏍️</div>
      </div>
      <img data-wiki="${item.wiki}" alt="${item.name}" style="opacity:0;position:relative;z-index:1" onload="this.style.opacity='1';this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">
      <div class="card-badge">${item.badge}</div>
      <div class="card-origin">${item.origin}</div>
    </div>
    <div class="card-body">
      <div>
        <div class="card-name">${item.name}</div>
        <div class="card-tagline">${item.tagline}</div>
      </div>
      <div class="card-stats">${statsHtml}</div>
      <div>
        <div class="pills-label">&#9656; ${item.pillsLabel}</div>
        <div class="pills-list">${pillsHtml}</div>
      </div>
      <div>
        <div class="facts-label">&#9881; Key Facts</div>
        <div class="facts-list">${factsHtml}</div>
      </div>
    </div>`;

  container.appendChild(card);
}

function buildAll() {
  const typesGrid = document.getElementById('types-grid');
  TYPES.forEach(t => buildCard(t, typesGrid));
}

// Sub-nav scroll spy
function initSubnav() {
  const sections = document.querySelectorAll('section[id]');
  const navItems = document.querySelectorAll('.subnav-item');

  navItems.forEach(item => {
    item.addEventListener('click', e => {
      e.preventDefault();
      const target = document.querySelector(item.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navItems.forEach(item => {
          item.classList.toggle('active', item.getAttribute('href') === '#' + entry.target.id);
        });
      }
    });
  }, { threshold: 0.25, rootMargin: '-90px 0px -50% 0px' });

  sections.forEach(s => obs.observe(s));
}

buildAll();
buildHistory();
document.querySelectorAll('img[data-wiki]').forEach(fetchWikiThumb);
initSubnav();
</script>
