    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #080808;
      --panel:  #100a06;
      --orange: #d45214;
      --amber:  #f09030;
      --steel:  #8090a0;

    body {

      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {

      background:

    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,   rgba(200,80,20,.018) 0, rgba(200,80,20,.018) 1px, transparent 1px, transparent 64px),

      top: 44px;

      display: flex;
      align-items: center;
      gap: .3rem;
      padding: .45rem 1.5rem;
      background: rgba(8,6,4,.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.05);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .subnav::-webkit-scrollbar { display: none; }
    .subnav-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--muted);
      margin-right: .6rem;
      flex-shrink: 0;
      font-weight: 600;
    }
    .subnav-item {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .72rem;
      font-weight: 600;
      text-decoration: none;

    .hero h1 {

      color: #f0c080; font-size: .6rem; font-weight: 700;
      padding: .2rem .6rem; border-radius: 99px; letter-spacing: .05em;

    .card-name    { font-size: 1.15rem; font-weight: 800; line-height: 1.2; color: var(--text); }
    .card-tagline { font-size: .72rem; color: var(--muted); margin-top: .15rem; font-style: italic; }

    /* Stats */
    .card-stats { display: flex; flex-wrap: wrap; gap: .5rem; }
    .stat-chip {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px; padding: .35rem .7rem; min-width: 76px;

    .stat-val   { font-size: .82rem; font-weight: 700; color: var(--amber); margin-top: .1rem; }

    .pills-list  { display: flex; flex-wrap: wrap; gap: .3rem; }

async function fetchWikiThumb(img) {
  const wiki = img.dataset.wiki;
  try {
    const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(wiki));
    const data = await res.json();
    if (data.thumbnail && data.thumbnail.source) {
      img.src = data.thumbnail.source;
    }
  } catch(e) {}
}

      <div class="stat-val">${s.val}</div>

      <div class="card-origin">${item.origin}</div>
    </div>
    <div class="card-body">
      <div>
        <div class="card-name">${item.name}</div>
        <div class="card-tagline">${item.tagline}</div>
      </div>
      <div class="card-stats">${statsHtml}</div>
      <div>
        <div class="pills-label">&#9656; ${item.pillsLabel}</div>
        <div class="pills-list">${pillsHtml}</div>
      </div>
      <div>
        <div class="facts-label">&#9881; Key Facts</div>
        <div class="facts-list">${factsHtml}</div>
      </div>
    </div>`;

  container.appendChild(card);
}

function buildAll() {
  const typesGrid = document.getElementById('types-grid');
  TYPES.forEach(t => buildCard(t, typesGrid));
}

// Sub-nav scroll spy
function initSubnav() {
  const sections = document.querySelectorAll('section[id]');
  const navItems = document.querySelectorAll('.subnav-item');

  navItems.forEach(item => {
    item.addEventListener('click', e => {
      e.preventDefault();
      const target = document.querySelector(item.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navItems.forEach(item => {
          item.classList.toggle('active', item.getAttribute('href') === '#' + entry.target.id);
        });
      }
    });
  }, { threshold: 0.25, rootMargin: '-90px 0px -50% 0px' });

  sections.forEach(s => obs.observe(s));
}

buildAll();
document.querySelectorAll('img[data-wiki]').forEach(fetchWikiThumb);
initSubnav();
</script>
