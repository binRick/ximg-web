<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f1a0f"/>
  <!-- Piggy bank body -->
  <ellipse cx="16" cy="19" rx="10" ry="8" fill="#22c55e" opacity="0.85"/>
  <!-- Ear -->
  <ellipse cx="24" cy="14" rx="3" ry="2" fill="#22c55e" opacity="0.85"/>
  <!-- Eye -->
  <circle cx="22" cy="16" r="1" fill="#0f1a0f"/>
  <!-- Snout -->
  <ellipse cx="25" cy="19" rx="2.5" ry="1.5" fill="#16a34a"/>
  <!-- Coin slot -->
  <rect x="13" y="11" width="4" height="1.5" rx="0.5" fill="#0f1a0f"/>
  <!-- Legs -->
  <rect x="9" y="25" width="3" height="3" rx="1" fill="#16a34a"/>
  <rect x="13" y="25" width="3" height="3" rx="1" fill="#16a34a"/>
  <rect x="17" y="25" width="3" height="3" rx="1" fill="#16a34a"/>
  <!-- Dollar sign -->
  <text x="13" y="21" font-family="sans-serif" font-size="7" font-weight="bold" fill="#0f1a0f">$</text>
</svg>
