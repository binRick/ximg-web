<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#002395"/>
  <!-- French tricolor -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="white"/>
  <rect x="0" y="0" width="10.7" height="32" rx="0" fill="#002395"/>
  <rect x="21.3" y="0" width="10.7" height="32" fill="#ED2939"/>
  <!-- Left rounded corner fix -->
  <rect x="0" y="0" width="6" height="6" fill="#002395"/>
  <rect x="0" y="26" width="6" height="6" fill="#002395"/>
  <!-- Right rounded corner fix -->
  <rect x="26" y="0" width="6" height="6" fill="#ED2939"/>
  <rect x="26" y="26" width="6" height="6" fill="#ED2939"/>
  <!-- Rounded corners -->
  <rect width="32" height="32" rx="6" fill="none"/>
</svg>
