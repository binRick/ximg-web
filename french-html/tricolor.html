  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #04030a; --blue-dark: #0d1f3a; --blue: #1a3a6a; --blue-light: #2a5aaa;
      --white: #d8dce8; --red: #8b1a1a; --red-bright: #c0392b;
      --gold: #c8a02c; --amber: #e0c050;
      --text: #c8c4d8; --muted: #4a4860; --card: rgba(4,3,10,.94); --border: rgba(200,160,44,.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(26,58,106,.12) 0%, transparent 60%),
                  linear-gradient(180deg, #04030a 0%, #020108 100%); }
    #fr-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.12; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(200,160,44,.4)); }
    .hero h1 { font-size: clamp(1.7rem,4.5vw,3rem); font-weight: 700; color: var(--amber); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(200,160,44,.1); border: 1px solid var(--border); border-radius: 6px; padding: .35rem 1rem; font-size: .85rem; color: var(--gold); letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 1rem; margin-bottom: 1.25rem; justify-items: center; max-width: 820px; margin-left: auto; margin-right: auto; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-icon { font-size: 1.8rem; margin-bottom: .4rem; }
    .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--amber); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 120px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-body.terror { border-left-color: var(--red); }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    .tl-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 4px; margin-top: .65rem; filter: sepia(30%) brightness(.85); transition: filter .3s; display: block; }
    .tl-img:hover { filter: sepia(8%) brightness(1); }
    .card-img { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 6px; margin-bottom: .75rem; filter: sepia(30%) brightness(.82); transition: filter .3s; display: block; }
    .card-img:hover { filter: sepia(8%) brightness(1); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .gallery-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .gallery-img { width: 100%; height: 220px; object-fit: cover; display: block; filter: sepia(25%) brightness(.85); transition: filter .3s; }
    .gallery-img:hover { filter: sepia(5%) brightness(1.05); }
    .gallery-info { padding: .6rem .85rem .8rem; }
    .gallery-title { font-size: .88rem; color: var(--amber); font-weight: 700; margin-bottom: .2rem; }
    .gallery-caption { font-size: .76rem; color: var(--muted); font-style: italic; line-height: 1.4; }
    .ultima-plaque { background: linear-gradient(135deg, #1a0a00, #2e1200, #1a0a00); border: 2px solid var(--gold); border-radius: 10px; padding: 2rem 2.5rem; text-align: center; margin-bottom: 1.5rem; box-shadow: inset 0 0 30px rgba(200,160,44,.08), 0 4px 20px rgba(0,0,0,.6); }
    .ultima-latin { font-size: clamp(1.4rem,3.5vw,2.2rem); font-weight: 700; color: var(--gold); letter-spacing: .18em; font-variant: small-caps; text-shadow: 0 0 22px rgba(200,160,44,.45); margin-bottom: .5rem; }
    .ultima-trans { font-size: .92rem; color: var(--amber); font-style: italic; letter-spacing: .04em; }
    .cannon-specs { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: .85rem; margin-bottom: 1.25rem; }
    .spec-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .9rem 1rem; }
    .spec-label { font-size: .73rem; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; margin-bottom: .25rem; }
    .spec-val { font-size: 1rem; font-weight: 700; color: var(--amber); }
    #flag-canvas { width: 100%; height: 280px; border: 1px solid var(--border); border-radius: 10px; background: rgba(4,3,10,.8); }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(4,3,10,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(200,160,44,.07); }
    .sub-nav a img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; vertical-align: middle; margin-right: 6px; opacity: 0.75; transition: opacity .2s; display: inline-block; }
    .sub-nav a:hover img, .sub-nav a.active img { opacity: 1; }
    @media (max-width:600px) { .tl-item { grid-template-columns: 80px 1fr; } }

<script>
(function(){
  const c = document.getElementById('fr-canvas');
  const ctx = c.getContext('2d');
  let W, H;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const COLORS = ['#1a4a9a', '#1a4a9a', '#e8e8e8', '#c0392b', '#c0392b'];
  const particles = [];
  for(let i = 0; i < 28; i++){
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 2 + Math.random() * 4,
      speed: 0.3 + Math.random() * 0.7,
      drift: (Math.random() - 0.5) * 0.4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: 0.04 + Math.random() * 0.04,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.008 + Math.random() * 0.012
    });
  }

  function frame(){
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.wobble += p.wobbleSpeed;
      p.x += p.drift + Math.sin(p.wobble) * 0.3;
      p.y -= p.speed;
      if(p.y < -10){ p.y = H + 10; p.x = Math.random() * W; }
      if(p.x < -10){ p.x = W + 10; }
      if(p.x > W + 10){ p.x = -10; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>

<script>
(function(){
  const c = document.getElementById('flag-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');

  function resize(){
    c.width = c.offsetWidth;
    c.height = 280;
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  const BLUE = '#002395';
  const WHITE = '#EDEDED';
  const RED = '#ED2939';
  const STRIPES = [BLUE, WHITE, RED];

  function frame(){
    const W = c.width;
    const H = c.height;
    ctx.clearRect(0, 0, W, H);

    // Draw dark background
    ctx.fillStyle = 'rgba(4,3,10,0.85)';
    ctx.fillRect(0, 0, W, H);

    // Flag dimensions — centered
    const flagW = Math.min(W * 0.82, 700);
    const flagH = Math.min(H * 0.75, 200);
    const flagX = (W - flagW) / 2;
    const flagY = (H - flagH) / 2;
    const stripeW = flagW / 3;

    // Amplitude and frequency for the wave
    const amp = flagH * 0.06;
    const freq = 2.2;
    const speed = 1.4;

    // Draw each vertical stripe with wave distortion
    STRIPES.forEach((color, si) => {
      const sx = flagX + si * stripeW;

      ctx.save();
      ctx.beginPath();

      // Number of horizontal scan lines
      const steps = Math.max(2, Math.floor(flagH));

      for(let row = 0; row <= steps; row++){
        const fy = flagY + (row / steps) * flagH;
        // Vertical gradient factor — top and bottom edges have less wave
        const edgeDamp = Math.sin((row / steps) * Math.PI);
        // Horizontal wave offset: increases with x position within stripe
        const xFraction = (si + 0.5) / 3; // center of stripe
        const waveOffset = amp * edgeDamp * Math.sin(freq * Math.PI * xFraction - speed * t);
        const leftX = sx + waveOffset;

        // Left edge of stripe wave
        const leftEdgeWave = (x_norm) => {
          return amp * edgeDamp * Math.sin(freq * Math.PI * x_norm - speed * t);
        };

        if(row === 0){
          ctx.moveTo(sx + leftEdgeWave(si / 3), fy);
        } else {
          ctx.lineTo(sx + leftEdgeWave(si / 3), fy);
        }
      }
      // Right side going back up
      for(let row = steps; row >= 0; row--){
        const fy = flagY + (row / steps) * flagH;
        const edgeDamp = Math.sin((row / steps) * Math.PI);
        const rightX_norm = (si + 1) / 3;
        const waveOffset = amp * edgeDamp * Math.sin(freq * Math.PI * rightX_norm - speed * t);
        ctx.lineTo(sx + stripeW + waveOffset, fy);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    });

    // Flag outline with wave — left and right edges
    // Shadow/depth shading pass over the whole flag
    // Create gradient to simulate 3D wave lighting
    STRIPES.forEach((color, si) => {
      const sx = flagX + si * stripeW;
      const steps = Math.max(2, Math.floor(flagH));

      // Per-stripe wave shading
      for(let row = 0; row <= steps - 1; row++){
        const fy = flagY + (row / steps) * flagH;
        const fyNext = flagY + ((row + 1) / steps) * flagH;
        const edgeDamp = Math.sin((row / steps) * Math.PI);
        const edgeDampNext = Math.sin(((row + 1) / steps) * Math.PI);

        // Use center of stripe for shading wave
        const cx_norm = (si + 0.5) / 3;
        const wave = amp * edgeDamp * Math.sin(freq * Math.PI * cx_norm - speed * t);
        const waveNext = amp * edgeDampNext * Math.sin(freq * Math.PI * cx_norm - speed * t + (freq * Math.PI / steps));
        const slope = waveNext - wave;
        // slope positive = moving right = lit from left
        const shade = Math.max(-1, Math.min(1, slope / (amp * 0.15)));

        const leftW = sx + amp * edgeDamp * Math.sin(freq * Math.PI * (si / 3) - speed * t);
        const rightW = sx + stripeW + amp * edgeDamp * Math.sin(freq * Math.PI * ((si + 1) / 3) - speed * t);

        const leftWNext = sx + amp * edgeDampNext * Math.sin(freq * Math.PI * (si / 3) - speed * t);
        const rightWNext = sx + stripeW + amp * edgeDampNext * Math.sin(freq * Math.PI * ((si + 1) / 3) - speed * t);

        if(shade > 0){
          ctx.fillStyle = `rgba(255,255,255,${shade * 0.12})`;
        } else {
          ctx.fillStyle = `rgba(0,0,0,${-shade * 0.18})`;
        }
        ctx.beginPath();
        ctx.moveTo(leftW, fy);
        ctx.lineTo(rightW, fy);
        ctx.lineTo(rightWNext, fyNext);
        ctx.lineTo(leftWNext, fyNext);
        ctx.closePath();
        ctx.fill();
      }
    });

    // Flagpole
    const poleX = flagX - 6;
    const poleTopY = flagY - 20;
    const poleBottomY = flagY + flagH + 40;
    const poleGrad = ctx.createLinearGradient(poleX - 5, 0, poleX + 5, 0);
    poleGrad.addColorStop(0, '#555');
    poleGrad.addColorStop(0.4, '#ccc');
    poleGrad.addColorStop(1, '#444');
    ctx.fillStyle = poleGrad;
    ctx.fillRect(poleX - 5, poleTopY, 10, poleBottomY - poleTopY);

    // Pole finial (ball on top)
    ctx.beginPath();
    ctx.arc(poleX, poleTopY, 9, 0, Math.PI * 2);
    const finialGrad = ctx.createRadialGradient(poleX - 2, poleTopY - 2, 1, poleX, poleTopY, 9);
    finialGrad.addColorStop(0, '#f0d060');
    finialGrad.addColorStop(1, '#a07010');
    ctx.fillStyle = finialGrad;
    ctx.fill();

    // Labels below
    ctx.font = 'bold 13px Georgia, serif';
    ctx.textAlign = 'center';
    const labels = ['Bleu', 'Blanc', 'Rouge'];
    const labelColors = ['#6699ff', '#e0e0e0', '#ff6666'];
    STRIPES.forEach((_, si) => {
      const lx = flagX + si * stripeW + stripeW / 2;
      const ly = flagY + flagH + 22;
      ctx.fillStyle = labelColors[si];
      ctx.fillText(labels[si], lx, ly);
    });

    t += 0.025;
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
