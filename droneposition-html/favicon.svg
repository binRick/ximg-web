<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#02040a"/>
  <!-- four rotors -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#6ef0ff" stroke-width="2.5"/>
  <circle cx="48" cy="16" r="7" fill="none" stroke="#6ef0ff" stroke-width="2.5"/>
  <circle cx="16" cy="48" r="7" fill="none" stroke="#6ef0ff" stroke-width="2.5"/>
  <circle cx="48" cy="48" r="7" fill="none" stroke="#6ef0ff" stroke-width="2.5"/>
  <!-- arms -->
  <line x1="16" y1="16" x2="48" y2="48" stroke="#6ef0ff" stroke-width="3"/>
  <line x1="48" y1="16" x2="16" y2="48" stroke="#6ef0ff" stroke-width="3"/>
  <!-- core -->
  <circle cx="32" cy="32" r="5" fill="#ffaa2a"/>
</svg>
