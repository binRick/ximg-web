<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="mail.ximg.app — interactive educational app on ximg.app">
  <title>mail.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --panel:   #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --blue:    #388bfd;
      --blue2:   #58a6ff;
      --green:   #3fb950;
      --hover:   #1f2937;
      --unread:  #1c2433;
      --selected:#1d2d3e;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; }

    #app { display: flex; flex-direction: column; height: 100%; }

    .toolbar {
      display: flex; align-items: center; gap: .6rem;
      padding: .5rem 1rem; background: var(--panel);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .toolbar-title { font-size: 1.1rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: .5rem; }
    .toolbar-title span { color: var(--blue2); }
    .unread-badge { background: var(--blue); color: #fff; font-size: .65rem; font-weight: 800; border-radius: 999px; padding: .1rem .45rem; display: none; }
    .toolbar-spacer { flex: 1; }
    .toolbar-btn { background: rgba(56,139,253,.15); border: 1px solid rgba(56,139,253,.3); color: var(--blue2); border-radius: 7px; padding: .35rem .8rem; font-size: .76rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .toolbar-btn:hover { background: rgba(56,139,253,.25); }
    .toolbar-btn.danger { background: rgba(248,81,73,.1); border-color: rgba(248,81,73,.3); color: #f85149; }
    .toolbar-btn.danger:hover { background: rgba(248,81,73,.2); }
    .refresh-btn { font-size: 1rem; background: none; border: none; color: var(--muted); cursor: pointer; padding: .2rem .4rem; border-radius: 5px; transition: color .15s; }
    .refresh-btn:hover { color: var(--text); }

    .main { display: flex; flex: 1; overflow: hidden; }

    .email-list { width: 360px; min-width: 260px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
    .email-list::-webkit-scrollbar { width: 5px; }
    .email-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .email-item { padding: .85rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; position: relative; }
    .email-item:hover  { background: var(--hover); }
    .email-item.active { background: var(--selected); }
    .email-item.unread { background: var(--unread); }
    .email-item.unread .ei-subject { font-weight: 700; color: var(--text); }
    .ei-row1 { display: flex; justify-content: space-between; align-items: baseline; gap: .4rem; margin-bottom: .2rem; }
    .ei-from { font-size: .82rem; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .ei-date { font-size: .7rem; color: var(--muted); flex-shrink: 0; }
    .ei-subject { font-size: .78rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: .15rem; }
    .ei-preview { font-size: .72rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .unread-dot { position: absolute; right: .8rem; top: 50%; transform: translateY(-50%); width: 7px; height: 7px; border-radius: 50%; background: var(--blue2); }

    .empty-list { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: .85rem; gap: .5rem; }
    .empty-list .big { font-size: 2.5rem; }

    .email-detail { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; background: var(--bg); }
    .email-detail::-webkit-scrollbar { width: 5px; }
    .email-detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: .5rem; }
    .detail-empty .big { font-size: 3rem; }

    .detail-subject { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; line-height: 1.3; }
    .detail-meta { display: flex; flex-direction: column; gap: .3rem; margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .meta-row { display: flex; gap: .5rem; font-size: .8rem; }
    .meta-label { color: var(--muted); min-width: 40px; flex-shrink: 0; }
    .meta-val { color: var(--text); }
    .detail-body { font-size: .88rem; line-height: 1.65; color: var(--text); }
    .detail-body-html iframe { width: 100%; min-height: 400px; border: none; background: #fff; border-radius: 8px; }
    .detail-body pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; }
    .attachments { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .att-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: .5rem; }
    .att-chip { display: inline-flex; align-items: center; gap: .4rem; background: var(--panel); border: 1px solid var(--border); border-radius: 7px; padding: .35rem .7rem; font-size: .75rem; color: var(--text); margin: .2rem; }

    .delete-bar { display: none; align-items: center; gap: .7rem; padding: .6rem 1rem; background: rgba(248,81,73,.08); border-bottom: 1px solid rgba(248,81,73,.2); font-size: .8rem; color: #f85149; }

    @media (max-width: 640px) {
      .email-list { width: 100%; border-right: none; }
      .email-detail { display: none; }
      .email-detail.mobile-show { display: block; }
      .email-list.mobile-hide { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <div class="toolbar-title">&#x2709;&#xFE0F; <span>mail</span>.ximg.app <span class="unread-badge" id="unread-badge">0</span></div>
    <div style="font-size:.75rem;color:#8b949e;margin-left:.5rem">Send to <strong style="color:#58a6ff">anything@ximg.app</strong> and it shows up here</div>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn danger" id="delete-btn" style="display:none" onclick="deleteSelected()">&#x1F5D1; Delete</button>
    <button class="refresh-btn" onclick="loadEmails()" title="Refresh">&#x21BB;</button>
  </div>

  <div class="delete-bar" id="delete-bar">
    <span>Delete this email?</span>
    <button class="toolbar-btn danger" onclick="confirmDelete()">Yes, delete</button>
    <button class="toolbar-btn" onclick="cancelDelete()">Cancel</button>
  </div>

  <div class="main">
    <div class="email-list" id="email-list"></div>
    <div class="email-detail" id="email-detail">
      <div class="detail-empty"><div class="big">&#x2709;&#xFE0F;</div><div>Select an email to read</div></div>
    </div>
  </div>
</div>

<script>
  var emails = [];
  var selectedId = null;
  var pendingDelete = null;

  function fmtDate(iso) {
    var d = new Date(iso);
    var now = new Date();
    if (now.toDateString() === d.toDateString()) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if ((now - d) / 86400000 < 7) return d.toLocaleDateString([], {weekday:'short'});
    return d.toLocaleDateString([], {month:'short', day:'numeric'});
  }

  function fmtFrom(from) {
    var m = from.match(/^"?([^"<]+)"?\s*</);
    return m ? m[1].trim() : from.replace(/<.*>/, '').trim() || from;
  }

  function fmtSize(b) {
    if (!b) return '?';
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderList() {
    var el = document.getElementById('email-list');
    if (!emails.length) {
      el.innerHTML = '<div class="empty-list"><div class="big">&#x1F4ED;</div><div>No emails yet</div></div>';
      return;
    }
    el.innerHTML = emails.map(function(e) {
      var cls = 'email-item' + (e.id === selectedId ? ' active' : '') + (!e.read ? ' unread' : '');
      var dot = !e.read ? '<div class="unread-dot"></div>' : '';
      var preview = (e.text || '').replace(/\s+/g, ' ').trim().slice(0, 80);
      return '<div class="' + cls + '" data-id="' + esc(e.id) + '">' +
        '<div class="ei-row1"><div class="ei-from">' + esc(fmtFrom(e.from)) + '</div><div class="ei-date">' + fmtDate(e.date) + '</div></div>' +
        '<div class="ei-subject">' + esc(e.subject) + '</div>' +
        '<div class="ei-preview">' + esc(preview || '(no body)') + '</div>' +
        dot + '</div>';
    }).join('');

    var unread = emails.filter(function(e) { return !e.read; }).length;
    var badge = document.getElementById('unread-badge');
    badge.textContent = unread;
    badge.style.display = unread ? 'inline' : 'none';
    document.title = unread ? '(' + unread + ') mail.ximg.app' : 'mail.ximg.app';
  }

  document.addEventListener('click', function(e) {
    var item = e.target.closest('.email-item');
    if (item) selectEmail(item.dataset.id);
  });

  function selectEmail(id) {
    selectedId = id;
    cancelDelete();
    var email = emails.find(function(e) { return e.id === id; });
    if (!email) return;
    email.read = true;
    fetch('/api/read/' + id, {method: 'POST'});
    renderList();
    document.getElementById('delete-btn').style.display = 'inline';

    var atts = '';
    if (email.attachments && email.attachments.length) {
      atts = '<div class="attachments"><div class="att-title">Attachments</div>' +
        email.attachments.map(function(a) {
          return '<span class="att-chip">&#x1F4CE; ' + esc(a.filename) + ' <span style="color:var(--muted)">(' + fmtSize(a.size) + ')</span></span>';
        }).join('') + '</div>';
    }

    var body = email.html
      ? '<div class="detail-body detail-body-html"><iframe sandbox="allow-same-origin" srcdoc="' + email.html.replace(/&/g,'&amp;').replace(/"/g,'&quot;') + '"></iframe></div>'
      : '<div class="detail-body"><pre>' + esc(email.text || '(empty)') + '</pre></div>';

    document.getElementById('email-detail').innerHTML =
      '<div class="detail-subject">' + esc(email.subject) + '</div>' +
      '<div class="detail-meta">' +
        '<div class="meta-row"><span class="meta-label">From</span><span class="meta-val">' + esc(email.from) + '</span></div>' +
        '<div class="meta-row"><span class="meta-label">To</span><span class="meta-val">' + esc(email.to) + '</span></div>' +
        '<div class="meta-row"><span class="meta-label">Date</span><span class="meta-val">' + new Date(email.date).toLocaleString() + '</span></div>' +
      '</div>' + body + atts;
  }

  function deleteSelected() {
    if (!selectedId) return;
    pendingDelete = selectedId;
    document.getElementById('delete-bar').style.display = 'flex';
  }

  function confirmDelete() {
    if (!pendingDelete) return;
    fetch('/api/delete/' + pendingDelete, {method: 'POST'}).then(function() {
      emails = emails.filter(function(e) { return e.id !== pendingDelete; });
      pendingDelete = null;
      selectedId = null;
      document.getElementById('delete-btn').style.display = 'none';
      document.getElementById('email-detail').innerHTML = '<div class="detail-empty"><div class="big">&#x2709;&#xFE0F;</div><div>Select an email to read</div></div>';
      cancelDelete();
      renderList();
    });
  }

  function cancelDelete() {
    document.getElementById('delete-bar').style.display = 'none';
    pendingDelete = null;
  }

  function loadEmails() {
    fetch('/api/emails').then(function(r) { return r.json(); }).then(function(data) {
      emails = data;
      renderList();
    });
  }

  loadEmails();
  setInterval(loadEmails, 30000);
</script>
  <script src="/shared/nav.js?v=2"></script>
</body>
</html>
