<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#02020f"/>
  <!-- rising bar chart -->
  <rect x="3" y="22" width="5" height="6" rx="1" fill="#22c55e" opacity=".5"/>
  <rect x="10" y="17" width="5" height="11" rx="1" fill="#22c55e" opacity=".7"/>
  <rect x="17" y="11" width="5" height="17" rx="1" fill="#22c55e" opacity=".85"/>
  <rect x="24" y="5" width="5" height="23" rx="1" fill="#22c55e"/>
  <!-- trend line -->
  <polyline points="5.5,21 12.5,16 19.5,10 26.5,4" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- dollar sign -->
  <text x="3" y="10" font-family="monospace" font-size="8" fill="#22c55e" font-weight="bold">$</text>
</svg>
