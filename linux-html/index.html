<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Linux Distributions">
  <title>linux.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="vendor/xterm.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --cyan:  #06b6d4;
      --gold:  #facc15;
      --bg:    #0d1117;
      --card:  #161b22;
      --border:rgba(0,255,65,0.18);
    }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: monospace;
      min-height: 100vh;
      padding-top: 88px; /* 44px nav + 44px subnav */
    }

    body.terminal-mode {
      overflow: hidden;
      justify-content: center;
      padding-bottom: 0;
    }

    body.distros-mode {
      overflow-y: auto;
      justify-content: flex-start;
      padding-bottom: 3rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 6;
    }

    /* ── Sub-nav ── */
    #subnav {
      position: fixed;
      top: 44px;
      left: 0; right: 0;
      height: 44px;
      background: #0d1117;
      border-bottom: 1px solid rgba(0,255,65,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .25rem;
      padding: 0 1rem;
      z-index: 100;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #subnav::-webkit-scrollbar { display: none; }

    .linux-tab {
      background: transparent;
      border: 1px solid transparent;
      color: #6e7681;
      font-family: monospace;
      font-size: .78rem;
      padding: .3rem .9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }

    .linux-tab:hover { color: #c9d1d9; border-color: var(--border); }

    .linux-tab.active {
      color: var(--green);
      border-color: rgba(0,255,65,0.4);
      background: rgba(0,255,65,0.07);
    }

    /* ── Sections ── */
    .section { width: 100%; }
    .section

    /* Info tab sections — center their .info-section child */
    #section-kernel, #section-subsystems, #section-concepts,
    #section-selinux, #section-virtualization,
    #section-containerization, #section-networking, #section-tunnels {
      display: flex;
      justify-content: center;
    }

    /* ── Terminal section ── */
    #section-terminal {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: calc(100vh - 88px);
    }

    #tux {
      position: fixed;
      z-index: 5;
      width: 110px;
      pointer-events: none;
      opacity: 0.75;
      filter: drop-shadow(0 0 14px rgba(0,255,65,0.5));
    }

    .window {
      position: relative;
      z-index: 10;
      width: min(860px, 96vw);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0,255,65,0.25);
      box-shadow: 0 0 60px rgba(0,255,65,0.12), 0 24px 80px rgba(0,0,0,0.6);
    }

    .titlebar {
      background: #1a1f2e;
      border-bottom: 1px solid rgba(0,255,65,0.15);
      padding: 0.55rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      user-select: none;
    }

    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }

    .title {
      flex: 1;
      text-align: center;
      font-size: 0.72rem;
      color: #4a5568;
      margin-right: 33px;
    }

    #terminal {
      background: #0d1117;
      padding: 8px;
    }

    .xterm-viewport { background: transparent !important; }

    /* ── Distros section ── */
    #section-distros {
      width: 100%;
      max-width: 1100px;
      padding: 2rem 1.5rem;
    }

    .distros-hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .distros-hero .hero-icon { font-size: 3rem; line-height: 1; margin-bottom: .5rem; }

    .distros-hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .4rem;
    }

    .distros-hero p {
      color: #6e7681;
      font-size: .9rem;
    }

    .distros-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .distro-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }

    .distro-card:hover {
      border-color: rgba(0,255,65,0.45);
      transform: translateY(-3px);
    }

    .distro-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0d1117;
      overflow: hidden;
    }

    .distro-logo {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 52%;
      height: 52%;
      object-fit: contain;
      filter: drop-shadow(0 0 18px var(--distro-glow, rgba(255,255,255,.15)));
      opacity: 0;
      transition: opacity .4s;
    }

    .distro-logo.loaded { opacity: 1; }

    .distro-year-badge {
      position: absolute;
      top: .55rem;
      right: .55rem;
      background: rgba(13,17,23,.85);
      border: 1px solid rgba(0,255,65,.3);
      color: var(--green);
      font-size: .68rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 4px;
    }

    .distro-body { padding: 1.1rem 1.2rem 1.3rem; }

    .distro-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: .2rem;
    }

    .distro-tagline {
      font-size: .78rem;
      color: #6e7681;
      margin-bottom: .85rem;
    }

    .distro-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-bottom: .9rem;
    }

    .chip {
      font-size: .68rem;
      padding: .2rem .55rem;
      border-radius: 99px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .chip-green  { background: rgba(0,255,65,.1);  border-color: rgba(0,255,65,.3);  color: var(--green); }
    .chip-cyan   { background: rgba(6,182,212,.1); border-color: rgba(6,182,212,.3); color: var(--cyan); }
    .chip-gold   { background: rgba(250,204,21,.1);border-color: rgba(250,204,21,.3);color: var(--gold); }
    .chip-purple { background: rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:#a78bfa; }
    .chip-pink   { background: rgba(244,114,182,.1);border-color:rgba(244,114,182,.3);color:#f472b6; }
    .chip-orange { background: rgba(251,146,60,.1); border-color:rgba(251,146,60,.3); color:#fb923c; }

    .distro-facts {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .38rem;
    }

    .distro-facts li {
      font-size: .78rem;
      color: #8b949e;
      padding-left: 1.1rem;
      position: relative;
      line-height: 1.5;
    }

    .distro-facts li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--green);
      opacity: .7;
    }

    /* ── History section ── */
    #section-history {
      width: 100%;
      max-width: 1100px;
      padding: 2rem 1.5rem 4rem;
    }

    .hist-hero {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 2rem;
      margin-bottom: 3rem;
      align-items: start;
    }

    @media(max-width: 700px) { .hist-hero { grid-template-columns: 1fr; } }

    .hist-photo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
    }

    .hist-photo-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      opacity: 0;
      transition: opacity .4s;
    }

    .hist-photo-card img.loaded { opacity: 1; }

    .hist-photo-caption {
      padding: .6rem 1rem;
      font-size: .7rem;
      color: #6e7681;
      line-height: 1.4;
    }

    .hist-bio h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .35rem;
    }

    .hist-bio .subtitle {
      color: var(--cyan);
      font-size: .82rem;
      margin-bottom: 1.1rem;
    }

    .hist-bio p {
      color: #8b949e;
      font-size: .86rem;
      line-height: 1.8;
      margin-bottom: .8rem;
    }

    .hist-bio p span { color: var(--green); font-weight: 600; }

    .hist-section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--green);
      border-bottom: 1px solid rgba(0,255,65,.2);
      padding-bottom: .5rem;
      margin-bottom: 1.5rem;
    }

    .hist-img-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    .hist-img-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
    }

    .hist-img-card:hover {
      border-color: rgba(0,255,65,.45);
      transform: translateY(-3px);
    }

    .hist-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      background: #0d1117;
      overflow: hidden;
    }

    .hist-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .4s;
    }

    .hist-img-wrap img.loaded { opacity: 1; }

    .hist-img-body { padding: .85rem 1rem 1rem; }

    .hist-img-title {
      font-size: .88rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: .3rem;
    }

    .hist-img-desc {
      font-size: .74rem;
      color: #6e7681;
      line-height: 1.5;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 2rem;
      margin-bottom: 3rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--green), var(--cyan));
    }

    .tl-item {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .tl-item::before {
      content: '';
      position: absolute;
      left: -2.4rem;
      top: .4rem;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(0,255,65,.6);
    }

    .tl-year {
      font-size: .7rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: .1em;
      margin-bottom: .2rem;
    }

    .tl-title {
      font-size: .9rem;
      font-weight: 700;
      color: #f0f6fc;
      margin-bottom: .25rem;
    }

    .tl-desc {
      font-size: .79rem;
      color: #8b949e;
      line-height: 1.65;
    }

    /* Kernel version grid */
    .kernel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1rem;
    }

    .kernel-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem 1.1rem;
      transition: border-color .2s;
    }

    .kernel-card:hover { border-color: rgba(0,255,65,.4); }

    .kernel-version {
      font-size: 1rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: .1rem;
    }

    .kernel-date {
      font-size: .7rem;
      color: var(--cyan);
      margin-bottom: .65rem;
    }

    .kernel-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .28rem;
    }

    .kernel-features li {
      font-size: .76rem;
      color: #8b949e;
      padding-left: 1rem;
      position: relative;
      line-height: 1.5;
    }

    .kernel-features li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--green);
      opacity: .6;
    }

    /* ── Shared info-section layout ── */
    .info-section {
      width: 100%;
      max-width: 1100px;
      padding: 2rem 1.5rem 3rem;
      margin: 0 auto;
    }

    .info-hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .info-hero .hero-icon { font-size: 3rem; line-height: 1; margin-bottom: .5rem; }

    .info-hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .4rem;
    }

    .info-hero p { color: #6e7681; font-size: .9rem; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.3rem 1.4rem;
      transition: border-color .2s, transform .2s;
    }

    .info-card:hover { border-color: rgba(0,255,65,.4); transform: translateY(-3px); }

    .info-card-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: .35rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .info-card-sub {
      font-size: .72rem;
      color: var(--cyan);
      margin-bottom: .7rem;
      font-weight: 600;
    }

    .info-card p {
      font-size: .78rem;
      color: #8b949e;
      line-height: 1.65;
      margin-bottom: .55rem;
    }

    .info-card p:last-child { margin-bottom: 0; }

    .info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }

    .info-list li {
      font-size: .76rem;
      color: #8b949e;
      padding-left: 1rem;
      position: relative;
      line-height: 1.5;
    }

    .info-list li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--green);
      opacity: .6;
    }

    .info-table-wrap {
      overflow-x: auto;
      margin-bottom: 2rem;
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .8rem;
    }

    .info-table th {
      background: rgba(0,255,65,.07);
      color: var(--green);
      font-weight: 700;
      padding: .6rem 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(0,255,65,.2);
      white-space: nowrap;
    }

    .info-table td {
      padding: .55rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
      color: #8b949e;
      vertical-align: top;
    }

    .info-table tr:last-child td { border-bottom: none; }
    .info-table td:first-child { color: #c9d1d9; font-weight: 600; }

    .info-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #c9d1d9;
      margin: 2rem 0 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid rgba(0,255,65,.2);
    }

    code.il {
      background: rgba(0,255,65,.08);
      color: var(--green);
      border-radius: 4px;
      padding: .1rem .4rem;
      font-size: .85em;
      font-family: monospace;
    }
  </style>
</head>

<script>
(function () {
    var SUBNAV_H = 44;
    function adjustLayout() {
      var nav = document.querySelector('nav');
      if (!nav) return;
      var navH = nav.offsetHeight;
      var total = navH + SUBNAV_H;
      document.body.style.paddingTop = total + 'px';
      var subnav = document.getElementById('subnav');
      if (subnav) subnav.style.top = navH + 'px';
      var terminal = document.getElementById('section-terminal');
      if (terminal) terminal.style.height = 'calc(100vh - ' + total + 'px)';
    }
    requestAnimationFrame(function () {
      adjustLayout();
      var ro = new ResizeObserver(adjustLayout);
      var nav = document.querySelector('nav');
      if (nav) ro.observe(nav);
    });
  })();
</script>
<script>
const term = new Terminal({
    theme: {
      background:  '#0d1117',
      foreground:  '#c9d1d9',
      cursor:      '#00ff41',
      cursorAccent:'#0d1117',
      black:       '#0d1117',
      green:       '#00ff41',
      brightGreen: '#00c832',
      cyan:        '#79c0ff',
      brightBlack: '#484f58',
      white:       '#c9d1d9',
      brightWhite: '#f0f6fc',
      yellow:      '#f0c040',
      red:         '#ff7b72',
    },
    fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", Menlo, monospace',
    fontSize: 14,
    lineHeight: 1.4,
    cursorBlink: true,
    cursorStyle: 'block',
    scrollback: 1000,
    convertEol: true,
  });

  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(document.getElementById('terminal'));
  fit.fit();
  window.addEventListener('resize', () => fit.fit());
// ── Filesystem ──────────────────────────────────────────────────────────────
  const fs = {
    '/': ['home', 'etc', 'var', 'proc', 'usr', 'root'],
    '/root': ['projects', '.bashrc', '.bash_history', 'tux.txt'],
    '/root/projects': ['ximg-web'],
    '/root/projects/ximg-web': ['compose.yaml', 'nginx', 'public-html', 'linux-html', 'logs', 'README.md'],
    '/root/projects/ximg-web/nginx': ['nginx.conf'],
    '/root/projects/ximg-web/public-html': ['index.html'],
    '/root/projects/ximg-web/linux-html': ['index.html'],
    '/etc': ['hostname', 'os-release', 'passwd', 'hosts'],
    '/var': ['log'],
    '/var/log': ['nginx'],
    '/var/log/nginx': ['access.log', 'error.log'],
    '/proc': ['cpuinfo', 'meminfo', 'version'],
    '/usr': ['bin', 'local'],
  };

  const fileContents = {
    '/root/.bashrc': `# .bashrc\nexport PS1='\\[\\e[38;5;196m\\]⚡ root\\[\\e[0m\\]@\\[\\e[38;5;39m\\]\\h\\[\\e[0m\\] \\[\\e[38;5;183m\\]\\w\\[\\e[0m\\] ❯ '\nexport PATH="$HOME/.local/bin:$PATH"\nalias ll='ls -la'\nalias gs='git status'`,
    '/root/tux.txt': `    .--.
   |o_o |
   |:_/ |
  //   \\ \\
 (|     | )
/'\\_   _/\`\\
\\___)=(___/\n\nTux — The Linux Penguin`,
    '/etc/hostname': 'linux.ximg.app',
    '/etc/os-release': `NAME="AlmaLinux"\nVERSION="10"\nID=almalinux\nPRETTY_NAME="AlmaLinux 10"\nHOME_URL="https://almalinux.org/"`,
    '/etc/hosts': `127.0.0.1   localhost\n::1         localhost\n172.238.205.61  linux.ximg.app ximg.app`,
    '/proc/version': 'Linux version 6.12.0-134.el10.x86_64 (gcc version 14.2.1) #1 SMP PREEMPT_DYNAMIC',
    '/proc/cpuinfo': `processor\t: 0\nvendor_id\t: GenuineIntel\nmodel name\t: Intel(R) Xeon(R) CPU E5-2670 @ 2.60GHz\ncpu MHz\t\t: 2600.000\ncache size\t: 20480 KB\ncpu cores\t: 1`,
    '/proc/meminfo': `MemTotal:        2048000 kB\nMemFree:          614400 kB\nMemAvailable:     921600 kB\nBuffers:           48128 kB\nCached:           409600 kB`,
    '/root/.bash_history': `uname -a\ndocker ps\ncertbot renew --dry-run\nnginx -s reload\ngit log --oneline\nls -la /etc/letsencrypt/live/\ntail -f /var/log/nginx/access.log`,
    '/root/projects/ximg-web/README.md': `# ximg-web\nProduction web stack for ximg.app\nnginx + Apache + Docker + Let's Encrypt`,
    '/etc/passwd': `root:x:0:0:root:/root:/bin/bash\ndaemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\nwww-data:x:33:33:www-data:/var/www:/usr/sbin/nologin`,
    '/var/log/nginx/access.log': `172.68.42.1 - - [28/Mar/2026:10:14:01 +0000] "GET / HTTP/2.0" 200 4321 "-" "Mozilla/5.0"\n172.68.42.2 - - [28/Mar/2026:10:14:45 +0000] "GET / HTTP/2.0" 200 4321 "-" "curl/7.88.1"\n172.68.42.3 - - [28/Mar/2026:11:37:02 +0000] "GET / HTTP/2.0" 200 2048 "-" "Mozilla/5.0"`,
    '/var/log/nginx/error.log': '',
    '/root/projects/ximg-web/compose.yaml': `services:\n  web:\n    image: httpd:2.4-alpine\n    restart: unless-stopped\n    volumes:\n      - ./public-html:/usr/local/apache2/htdocs\n\n  linux:\n    image: httpd:2.4-alpine\n    restart: unless-stopped\n    volumes:\n      - ./linux-html:/usr/local/apache2/htdocs\n\n  nginx:\n    image: nginx:alpine\n    restart: unless-stopped\n    ports:\n      - "80:80"\n      - "443:443"`,
  };
// ── State ────────────────────────────────────────────────────────────────────
  let cwd = '/root';
  let inputBuffer = '';
  let historyList = [];
  let historyIdx = -1;
  let savedInput = '';
// ── Helpers ──────────────────────────────────────────────────────────────────
  const g  = s => `\x1b[32m${s}\x1b[0m`;
  const b  = s => `\x1b[94m${s}\x1b[0m`;
  const y  = s => `\x1b[33m${s}\x1b[0m`;
  const r  = s => `\x1b[31m${s}\x1b[0m`;
  const d  = s => `\x1b[90m${s}\x1b[0m`;
  const w  = s => `\x1b[97m${s}\x1b[0m`;
  const bo = s => `\x1b[1m${s}\x1b[0m`;

  function resolvePath(p) {
    if (!p || p === '~') return '/root';
    if (p.startsWith('~/')) p = '/root/' + p.slice(2);
    if (!p.startsWith('/')) p = cwd.replace(/\/$/, '') + '/' + p;
    const parts = p.split('/').filter(Boolean);
    const resolved = [];
    for (const part of parts) {
      if (part === '.') continue;
      if (part === '..') resolved.pop();
      else resolved.push(part);
    }
    return '/' + resolved.join('/');
  }

  function isDir(p)  { return fs[p] !== undefined; }
  function isFile(p) { return fileContents[p] !== undefined; }
  function exists(p) { return isDir(p) || isFile(p); }

  function displayPath(p) { return p.startsWith('/root') ? p.replace('/root', '~') : p; }

  function prompt() {
    return `${g('root')}${d('@')}${b('ximg')}${d(':')}${b(displayPath(cwd))}${d('$')} `;
  }

  function println(s = '') { term.writeln(s); }
  function writePrompt()   { term.write('\r\n' + prompt()); }
// ── Commands ─────────────────────────────────────────────────────────────────
  const commands = {

    help() {
      println(`\r\n${bo(g('Available commands:'))}`);
      const cmds = [
        ['ls','list directory contents'],   ['cd','change directory'],
        ['pwd','print working directory'],  ['cat','print file contents'],
        ['echo','print text'],              ['clear','clear screen'],
        ['uname','system information'],     ['whoami','current user'],
        ['hostname','show hostname'],       ['date','current date/time'],
        ['uptime','system uptime'],         ['free','memory usage'],
        ['df','disk usage'],                ['ps','running processes'],
        ['docker','container management'],  ['curl','transfer data'],
        ['history','command history'],      ['env','environment variables'],
        ['neofetch','system info + logo'],  ['exit','close terminal'],
      ];
      const col = 22;
      cmds.forEach(([c, d]) => println(`  ${y(c.padEnd(col))}${d}`));
    },

    rm(args) {
      const msgs = [
        `\r\n${r('rm: Permission denied')} 🚫\r\n${y('Nice try, hackerman.')} This is a read-only universe. Your elite deletion skills are wasted here.`,
        `\r\n${r('rm: cannot remove: Operation not permitted')} 🔒\r\n${y('Whoa there, cyber ninja.')} The files are safe. You are not, in fact, a super hacker.`,
        `\r\n${r('rm: refusing to obliterate filesystem')} 💀\r\n${y('Bold strategy, chief.')} Unfortunately your 1337 h4x0r powers have been blocked by the ancient firewall of "no."`,
        `\r\n${r('CRITICAL ERROR: hacker.exe has stopped working')} 🧢\r\n${y('The NSA has been notified.')} Just kidding. But the files are still there and you are still not a super hacker.`,
        `\r\n${r('rm: Access denied — try sudo (jk, that won\'t work either)')} 😈\r\n${y('Error 403: Insufficient hacker energy detected.')} Please consume more Mountain Dew and try again.`,
      ];
      println(msgs[Math.floor(Math.random() * msgs.length)]);
    },

    ls(args) {
      const showHidden = args.includes('-a') || args.includes('-la') || args.includes('-al');
      const longFmt    = args.includes('-l') || args.includes('-la') || args.includes('-al') || args.includes('-lh');
      const target     = args.filter(a => !a.startsWith('-'))[0];
      const path       = target ? resolvePath(target) : cwd;

      if (!isDir(path)) { println(r(`ls: cannot access '${target}': No such file or directory`)); return; }

      let entries = [...(fs[path] || [])];
      if (showHidden) entries = ['.', '..', ...entries.filter(e => !e.startsWith('.')), ...entries.filter(e => e.startsWith('.'))];
      else entries = entries.filter(e => !e.startsWith('.'));

      if (!longFmt) {
        println('\r\n' + entries.map(e => {
          const full = path.replace(/\/$/, '') + '/' + e;
          return isDir(full) ? b(e) + '/' : (e.endsWith('.sh') ? g(e) : e);
        }).join('  '));
        return;
      }

      println('');
      const now = new Date();
      entries.forEach(e => {
        const full = path.replace(/\/$/, '') + '/' + e;
        const dir  = isDir(full);
        const perms = dir ? 'drwxr-xr-x' : '-rw-r--r--';
        const size  = dir ? '4096' : String(Math.floor(Math.random()*4000+200));
        const mo    = now.toLocaleString('en',{month:'short'}).padStart(3);
        const day   = String(now.getDate()).padStart(2);
        const time  = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const name  = dir ? b(e)+'/' : e;
        println(`${perms}  1 root root ${size.padStart(6)} ${mo} ${day} ${time} ${name}`);
      });
    },

    cd(args) {
      const target = args[0] || '/root';
      const path = resolvePath(target);
      if (!isDir(path)) { println(r(`bash: cd: ${target}: No such file or directory`)); return; }
      cwd = path;
    },

    pwd() { println('\r\n' + cwd); },

    cat(args) {
      if (!args.length) { println(r('cat: missing operand')); return; }
      args.forEach(a => {
        const path = resolvePath(a);
        if (isDir(path)) { println(r(`cat: ${a}: Is a directory`)); return; }
        if (!isFile(path)) { println(r(`cat: ${a}: No such file or directory`)); return; }
        println('\r\n' + fileContents[path]);
      });
    },

    echo(args) { println('\r\n' + args.join(' ').replace(/\$USER/g,'root').replace(/\$HOME/g,'/root').replace(/\$PWD/g,cwd)); },

    uname(args) {
      if (args.includes('-a')) println('\r\nLinux linux.ximg.app 6.12.0-134.el10.x86_64 #1 SMP PREEMPT_DYNAMIC x86_64 GNU/Linux');
      else if (args.includes('-r')) println('\r\n6.12.0-134.el10.x86_64');
      else if (args.includes('-m')) println('\r\nx86_64');
      else println('\r\nLinux');
    },

    whoami()   { println('\r\nroot'); },
    hostname() { println('\r\nlinux.ximg.app'); },

    date() { println('\r\n' + new Date().toString()); },

    uptime() {
      const u = Math.floor(Math.random()*30+5);
      println(`\r\n ${new Date().toTimeString().slice(0,8)} up ${u} days,  3:42,  1 user,  load average: 0.08, 0.04, 0.01`);
    },

    free(args) {
      const h = args.includes('-h');
      const fmt = (n) => h ? (n/1024).toFixed(1)+'G' : String(n*1024).padStart(10);
      println('\r\n              total        used        free      shared  buff/cache   available');
      println(`Mem:    ${fmt(2)}    ${fmt(0.5)}    ${fmt(0.9)}    ${fmt(0.01)}    ${fmt(0.6)}    ${fmt(1.2)}`);
      println(`Swap:   ${fmt(0)}    ${fmt(0)}    ${fmt(0)}`);
    },

    df(args) {
      println('\r\nFilesystem      Size  Used Avail Use% Mounted on');
      println('/dev/sda1        40G   12G   26G  32% /');
      println('tmpfs           1.0G     0  1.0G   0% /dev/shm');
      println('overlay          40G   12G   26G  32% /var/lib/docker');
    },

    ps(args) {
      println('\r\n    PID TTY          TIME CMD');
      println(`      1 ?        00:00:01 ${g('bash')}`);
      println(`     42 ?        00:00:00 ${g('ps')}`);
    },

    history() {
      const all = [...historyList].reverse().slice(0, 20).reverse();
      println('');
      all.forEach((cmd, i) => println(`  ${String(i+1).padStart(4)}  ${cmd}`));
    },

    env() {
      println('');
      [
        `USER=root`, `HOME=/root`, `PWD=${cwd}`, `SHELL=/bin/bash`,
        `TERM=xterm-256color`, `LANG=en_US.UTF-8`, `PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin`,
        `HOSTNAME=linux.ximg.app`,
      ].forEach(e => println(e));
    },

    curl(args) {
      const url = args.find(a => !a.startsWith('-'));
      if (!url) { println(r('curl: no URL specified')); return; }
      if (url.includes('ximg.app')) { println(`\r\n${g('<!DOCTYPE html>')}\n<html>...</html>\n${d('# 200 OK')}`); return; }
      if (url.includes('ifconfig.me') || url.includes('icanhazip')) { println('\r\n172.238.205.61'); return; }
      println(`\r\n${r(`curl: (6) Could not resolve host: ${url}`)}`);
    },

    docker(args) {
      const sub = args[0];
      if (sub === 'ps') {
        println(`\r\n${bo('CONTAINER ID   IMAGE              COMMAND              STATUS          NAMES')}`);
        println(`d4aa21416eaf   ${b('nginx:alpine')}       "/docker-entry..."   ${g('Up 3 days')}       ximg-web-nginx-1`);
        println(`efcee97740fd   ${b('httpd:2.4-alpine')}   "httpd-foregrou..."  ${g('Up 3 days')}       ximg-web-web-1`);
        println(`1279bed64327   ${b('httpd:2.4-alpine')}   "httpd-foregrou..."  ${g('Up 3 days')}       ximg-web-linux-1`);
        return;
      }
      if (sub === 'images') {
        println(`\r\n${bo('REPOSITORY   TAG       IMAGE ID       CREATED       SIZE')}`);
        println(`nginx        alpine    3f8a4339aadd   2 weeks ago   43.2MB`);
        println(`httpd        2.4-alpine  8f26f33a7002   3 weeks ago   59.3MB`);
        return;
      }
      if (sub === 'stats' && args.includes('--no-stream')) {
        println(`\r\n${bo('NAME                     CPU %   MEM USAGE / LIMIT   MEM %')}`);
        println(`ximg-web-nginx-1         0.01%   12.4MiB / 2GiB      0.6%`);
        println(`ximg-web-web-1           0.00%   8.1MiB  / 2GiB      0.4%`);
        println(`ximg-web-linux-1         0.00%   7.9MiB  / 2GiB      0.4%`);
        return;
      }
      println(r(`docker: '${sub}' is not a recognized command. Try 'docker ps' or 'docker images'.`));
    },

    neofetch() {
      println('');
      const tux = [
        `    ${d('.--.') }`,
        `   ${d('|o_o |')}`,
        `   ${d('|:_/ |')}`,
        `  ${d('//   \\ \\')}`,
        ` ${d('(|     | )')}`,
        `${d("/'\\_   _/`\\")}`,
        `${d('\\___)=(___/')}`,
      ];
      const info = [
        `${g('root')}${d('@')}${b('linux.ximg.app')}`,
        d('─────────────────────────────'),
        `${y('OS:')}      AlmaLinux 10 x86_64`,
        `${y('Kernel:')} 6.12.0-134.el10.x86_64`,
        `${y('Shell:')}  bash 5.2.26`,
        `${y('CPU:')}    Intel Xeon E5-2670 (1 core)`,
        `${y('Memory:')} 614MiB / 2000MiB`,
        `${y('Uptime:')} 3 days, 3:42`,
        '',
        ['#000','#f00','#0f0','#ff0','#00f','#f0f','#0ff','#fff'].map(
          c => `\x1b[48;2;${hexToRgb(c)}m   \x1b[0m`
        ).join(''),
      ];
      const rows = Math.max(tux.length, info.length);
      for (let i = 0; i < rows; i++) {
        const l = (tux[i] || '').padEnd(28);
        const ri = info[i] || '';
        println(l + ri);
      }
    },

    clear() { term.clear(); },

    exit() {
      println(`\r\n${d('logout')}\r\n`);
      setTimeout(() => {
        term.clear();
        printBanner();
        writePrompt();
      }, 800);
    },
  };

  function hexToRgb(hex) {
    const map = {'#000':'0;0;0','#f00':'255;0;0','#0f0':'0;255;0','#ff0':'255;255;0','#00f':'0;0;255','#f0f':'255;0;255','#0ff':'0;255;255','#fff':'255;255;255'};
    return map[hex] || '128;128;128';
  }
// ── Banner ───────────────────────────────────────────────────────────────────
  function printBanner() {
    const lines = [
      '',
      `  ${g('██╗     ██╗███╗  ██╗██╗   ██╗██╗  ██╗')}`,
      `  ${g('██║     ██║████╗ ██║██║   ██║╚██╗██╔╝')}`,
      `  ${g('██║     ██║██╔██╗██║██║   ██║ ╚███╔╝ ')}`,
      `  ${g('██║     ██║██║╚████║██║   ██║ ██╔██╗ ')}`,
      `  ${g('███████╗██║██║ ╚███║╚██████╔╝██╔╝╚██╗')}`,
      `  ${g('╚══════╝╚═╝╚═╝  ╚══╝ ╚═════╝ ╚═╝  ╚═╝')}`,
      '',
      `  ${d('Welcome to')} ${b('linux.ximg.app')} ${d('— AlmaLinux 10 — Kernel 6.12.0')}`,
      `  ${d('Type')} ${y('help')} ${d('to see available commands.')}`,
      '',
    ];
    lines.forEach(l => println(l));
  }
// ── Input handling ───────────────────────────────────────────────────────────
  function runCommand(line) {
    const trimmed = line.trim();
    if (!trimmed) return;

    historyList.push(trimmed);
    historyIdx = -1;

    const [cmd, ...args] = trimmed.split(/\s+/);

    if (commands[cmd]) {
      commands[cmd](args);
    } else {
      println(r(`\r\nbash: ${cmd}: command not found`));
    }
  }

  term.onKey(({ key, domEvent }) => {
    const code = domEvent.keyCode;

    if (code === 13) {
      const line = inputBuffer;
      inputBuffer = '';
      historyIdx  = -1;
      term.write('\r\n');
      runCommand(line);
      writePrompt();
      return;
    }

    if (code === 8) {
      if (inputBuffer.length > 0) {
        inputBuffer = inputBuffer.slice(0, -1);
        term.write('\b \b');
      }
      return;
    }

    if (code === 38) {
      if (!historyList.length) return;
      if (historyIdx === -1) { savedInput = inputBuffer; historyIdx = historyList.length - 1; }
      else if (historyIdx > 0) historyIdx--;
      const entry = historyList[historyIdx];
      term.write('\r' + prompt() + entry + ' '.repeat(Math.max(0, inputBuffer.length - entry.length)));
      inputBuffer = entry;
      return;
    }

    if (code === 40) {
      if (historyIdx === -1) return;
      historyIdx++;
      let entry;
      if (historyIdx >= historyList.length) { historyIdx = -1; entry = savedInput; }
      else entry = historyList[historyIdx];
      term.write('\r' + prompt() + entry + ' '.repeat(Math.max(0, inputBuffer.length - entry.length)));
      inputBuffer = entry;
      return;
    }

    if (domEvent.ctrlKey && domEvent.key === 'c') {
      inputBuffer = '';
      term.write('^C');
      writePrompt();
      return;
    }

    if (domEvent.ctrlKey && domEvent.key === 'l') {
      term.clear();
      term.write(prompt());
      return;
    }

    if (code === 9) {
      const parts = inputBuffer.split(/\s+/);
      const completing = parts[parts.length - 1];
      const isCmd = parts.length === 1;

      let candidates = [];
      if (isCmd) {
        candidates = Object.keys(commands).filter(c => c.startsWith(completing));
      } else {
        const prefix = resolvePath(completing);
        const dir    = completing.endsWith('/') ? prefix : resolvePath(completing.split('/').slice(0,-1).join('/') || '.');
        const partial = completing.split('/').pop();
        candidates = (fs[dir] || []).filter(e => e.startsWith(partial));
      }

      if (candidates.length === 1) {
        const completion = candidates[0].slice(completing.split('/').pop().length);
        inputBuffer += completion;
        term.write(completion);
      } else if (candidates.length > 1) {
        term.write('\r\n' + candidates.join('  '));
        term.write('\r\n' + prompt() + inputBuffer);
      }
      return;
    }

    if (key.length === 1 && !domEvent.ctrlKey && !domEvent.metaKey) {
      inputBuffer += key;
      term.write(key);
    }
  });

  printBanner();
  writePrompt();
  term.focus();
</script>
