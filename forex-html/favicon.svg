<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0f1a"/>
  <!-- Currency symbols -->
  <text x="2" y="14" font-family="sans-serif" font-size="10" font-weight="bold" fill="#3b82f6">$</text>
  <text x="12" y="14" font-family="sans-serif" font-size="10" font-weight="bold" fill="#22c55e">€</text>
  <text x="22" y="14" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f59e0b">¥</text>
  <!-- Exchange arrows -->
  <path d="M4 20 L28 20" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,2"/>
