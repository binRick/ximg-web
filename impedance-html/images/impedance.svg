<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="background:#040d20">
  <!-- Z = R + jX title -->
  <text x="200" y="30" text-anchor="middle" fill="#22d3ee" font-size="18" font-family="monospace">Z = R + jX</text>
  <!-- Impedance phasor diagram -->
  <line x1="60" y1="240" x2="340" y2="240" stroke="#334155" stroke-width="2"/>
  <line x1="60" y1="240" x2="60" y2="40" stroke="#334155" stroke-width="2"/>
  <!-- Resistance (R) on x-axis -->
  <line x1="60" y1="240" x2="250" y2="240" stroke="#f59e0b" stroke-width="3"/>
  <text x="155" y="260" text-anchor="middle" fill="#f59e0b" font-size="14" font-family="monospace">R (Resistance)</text>
  <!-- Reactance (jX) on y-axis -->
  <line x1="250" y1="240" x2="250" y2="100" stroke="#22c55e" stroke-width="3"/>
  <text x="290" y="170" fill="#22c55e" font-size="13" font-family="monospace">jX</text>
  <!-- Impedance hypotenuse -->
  <line x1="60" y1="240" x2="250" y2="100" stroke="#22d3ee" stroke-width="3"/>
  <text x="130" y="155" fill="#22d3ee" font-size="14" font-family="monospace">|Z|</text>
  <!-- Angle arc -->
  <path d="M 100,240 A 40,40 0 0,0 87,208" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="108" y="220" fill="#a78bfa" font-size="12" font-family="monospace">θ</text>
  <!-- Labels -->
  <text x="355" y="244" fill="#94a3b8" font-size="12" font-family="monospace">R</text>
  <text x="64" y="38" fill="#94a3b8" font-size="12" font-family="monospace">jX</text>
</svg>
