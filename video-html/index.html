<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ximg.app — The Interactive Internet">
  <title>ximg.app — The Video</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --accent: #7c3aed;
      --accent2: #2563eb;
      --glow: rgba(124, 58, 237, 0.4);
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 3rem 1rem 1.5rem;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .video-wrapper {
      width: min(960px, 95vw);
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px var(--glow), 0 0 120px rgba(37, 99, 235, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.3);
      margin: 1.5rem 0 2rem;
    }

    video {
      width: 100%;
      display: block;
      background: #000;
    }

    .scenes {
      width: min(960px, 95vw);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .scene-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .scene-card:hover, .scene-card.active {
      border-color: var(--accent);
      background: rgba(124, 58, 237, 0.1);
    }

    .scene-card .num {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .scene-card .title {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 600;
    }

    .scene-card .desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
      line-height: 1.4;
    }

    footer {
      color: var(--muted);
      font-size: 0.75rem;
      padding: 1rem;
      text-align: center;
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <header>
    <h1>ximg.app — The Interactive Internet</h1>
    <p>200+ apps &nbsp;·&nbsp; one universe &nbsp;·&nbsp; 40 seconds</p>
  </header>

  <div class="video-wrapper">
    <video id="vid" controls autoplay loop playsinline preload="auto">
      <source src="/ximg.mp4" type="video/mp4">
    </video>
  </div>

  <div class="scenes" id="scenes"></div>

  <footer>
    <a href="https://ximg.app">ximg.app</a> &nbsp;—&nbsp; explore 200+ interactive apps
  </footer>

  <script>
    const SCENES = [
      { title: "Digital Universe",    desc: "Cinematic flythrough of a glowing app universe" },
      { title: "The Grid",            desc: "Infinite grid of animated app panels" },
      { title: "Terminal Vibes",      desc: "Futuristic terminal, code scrolling in real time" },
      { title: "Internet Visualized", desc: "Data packets traversing a glowing world map" },
      { title: "AI & Embeddings",     desc: "Neural networks firing, 3D embedding clusters" },
      { title: "Food & Culture",      desc: "Sushi, ramen, tacos — cinematic slow motion" },
      { title: "Everything Connected",desc: "All categories linked in a rotating network sphere" },
      { title: "Outro",               desc: "ximg.app — the interactive internet" },
    ];

    // Scene timestamps (each scene is 5.04s)
    const SCENE_DURATION = 5.04;
    const vid = document.getElementById('vid');
    const container = document.getElementById('scenes');

    SCENES.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'scene-card' + (i === 0 ? ' active' : '');
      card.innerHTML = `<div class="num">Scene ${i + 1}</div><div class="title">${s.title}</div><div class="desc">${s.desc}</div>`;
      card.addEventListener('click', () => {
        vid.currentTime = i * SCENE_DURATION;
        vid.play();
      });
      container.appendChild(card);
    });

    vid.addEventListener('timeupdate', () => {
      const idx = Math.min(Math.floor(vid.currentTime / SCENE_DURATION), SCENES.length - 1);
      document.querySelectorAll('.scene-card').forEach((c, i) => {
        c.classList.toggle('active', i === idx);
      });
    });
  </script>

<script src="/shared/nav.js?v=4"></script>
</body>
</html>
