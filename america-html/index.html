<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #06080f;
      --card:   rgba(10,14,28,.9);
      --red:    #B22234;
      --dkred:  #8b1a27;
      --blue:   #3C3B6E;
      --ltblue: #6062a8;
      --gold:   #d4a017;
      --amber:  #f0b429;
      --cream:  #f0ecdf;
      --text:   #d8e0f0;
      --muted:  #6b7a9a;
      --border: rgba(60,59,110,.28);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 110% 55% at 50% 0%, #1a1030 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 85% 100%, #1a0810 0%, transparent 60%),
        linear-gradient(180deg, #06080f 0%, #040508 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(60,59,110,.018) 0, rgba(60,59,110,.018) 1px, transparent 1px, transparent 56px),
        repeating-linear-gradient(90deg, rgba(178,34,52,.012) 0, rgba(178,34,52,.012) 1px, transparent 1px, transparent 72px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 24px rgba(178,34,52,.6)); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.6rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #B22234 0%, #f0b429 40%, #3C3B6E 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic; letter-spacing: .04em;
      max-width: 620px; line-height: 1.65;
    }
    .hero-divider {
      width: 160px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--red), var(--blue), transparent);
    }

    /* ── Tabs ── */
    .tabs { display: flex; justify-content: center; gap: .4rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,.07); padding-bottom: .65rem; }
    .tab {
      font-size: .78rem; padding: .35rem .9rem; border-radius: 6px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.08); background: transparent; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; transition: all .2s;
    }
    .tab.active { color: var(--amber); border-color: rgba(212,160,23,.45); background: rgba(212,160,23,.08); }
    .tab:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,.18); }
    .section { display: flex; flex-direction: column; gap: 1.5rem; }
    .section.hidden { display: none; }

    /* ── Grid ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 1.5rem; }
    @media(max-width: 520px) { .cards { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .card:hover {
      border-color: rgba(60,59,110,.55);
      box-shadow: 0 8px 40px rgba(60,59,110,.14);
      transform: translateY(-3px);
    }

    .card-img-wrap {
      position: relative; aspect-ratio: 16/9;
      background: #080a18; overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      display: block; position: relative; z-index: 1;
      opacity: 0; transition: opacity .4s;
    }
    .card-img-wrap img.loaded { opacity: 1; }
    .card-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
    }
    .ph-num  { font-size: 3.5rem; font-weight: 900; color: rgba(60,59,110,.14); line-height: 1; }
    .ph-icon { font-size: 2.2rem; opacity: .15; }

    .badge-rank {
      position: absolute; top: .75rem; left: .75rem; z-index: 2;
      background: rgba(0,0,0,.72); border: 1px solid rgba(178,34,52,.5);
      color: var(--amber); font-size: .65rem; font-weight: 700;
      padding: .2rem .55rem; border-radius: 5px; letter-spacing: .06em;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .badge-meta {
      position: absolute; bottom: .75rem; right: .75rem; z-index: 2;
      background: rgba(0,0,0,.65); color: rgba(255,255,255,.7);
      font-size: .65rem; padding: .18rem .5rem; border-radius: 4px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card-body { padding: 1.1rem 1.2rem 1.25rem; display: flex; flex-direction: column; gap: .85rem; flex: 1; }
    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--cream); letter-spacing: -.01em; }
    .card-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; line-height: 1.45; }

    .card-stats { display: flex; gap: .5rem; flex-wrap: wrap; }
    .stat-chip {
      background: rgba(60,59,110,.1); border: 1px solid rgba(60,59,110,.22);
      border-radius: 7px; padding: .3rem .65rem; display: flex; flex-direction: column; gap: .1rem;
    }
    .stat-label { font-size: .6rem; color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-val   { font-size: .82rem; color: var(--amber); font-weight: 700; font-family: 'Segoe UI', system-ui, sans-serif; }

    .card-tags { display: flex; gap: .4rem; flex-wrap: wrap; }
    .tag {
      font-size: .68rem; padding: .2rem .55rem; border-radius: 12px;
      background: rgba(178,34,52,.07); border: 1px solid rgba(178,34,52,.2);
      color: rgba(220,130,140,.9); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600;
    }

    .facts-label { font-size: .7rem; font-weight: 700; color: var(--ltblue); font-family: 'Segoe UI', system-ui, sans-serif; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    .facts-list { display: flex; flex-direction: column; gap: .55rem; }
    .fact { display: flex; gap: .55rem; align-items: flex-start; font-size: .8rem; line-height: 1.55; color: rgba(216,224,240,.82); }
    .fact-icon { font-size: .95rem; flex-shrink: 0; margin-top: .05rem; }

    /* ── History Timeline ── */
    .tl-wrap {
      position: relative;
      padding: .5rem 0 2rem;
    }
    .tl-wrap::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--red), var(--blue), transparent);
    }
    .tl-item {
      display: flex;
      justify-content: flex-end;
      padding-right: calc(50% + 2.5rem);
      margin-bottom: 2.5rem;
      position: relative;
    }
    .tl-item:nth-child(even) {
      justify-content: flex-start;
      padding-right: 0;
      padding-left: calc(50% + 2.5rem);
    }
    .tl-dot {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 1rem;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--amber);
      border: 2px solid var(--bg);
      box-shadow: 0 0 12px rgba(240,180,41,.55);
      z-index: 2;
    }
    .tl-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .tl-card:hover {
      border-color: rgba(60,59,110,.55);
      box-shadow: 0 6px 28px rgba(60,59,110,.18);
      transform: translateY(-2px);
    }
    .tl-year-badge {
      font-size: .68rem;
      font-weight: 700;
      font-family: 'Segoe UI', system-ui, sans-serif;
      letter-spacing: .1em;
      color: var(--amber);
      margin-bottom: .3rem;
    }
    .tl-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: .35rem;
      line-height: 1.3;
    }
    .tl-cat {
      display: inline-block;
      font-size: .62rem;
      font-weight: 700;
      font-family: 'Segoe UI', system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: .15rem .5rem;
      border-radius: 5px;
      margin-bottom: .5rem;
    }
    .cat-founding  { background: rgba(178,34,52,.15); border: 1px solid rgba(178,34,52,.35); color: #e87a88; }
    .cat-war       { background: rgba(60,59,110,.2);  border: 1px solid rgba(60,59,110,.45); color: #9a9de0; }
    .cat-rights    { background: rgba(212,160,23,.12); border: 1px solid rgba(212,160,23,.35); color: var(--amber); }
    .cat-politics  { background: rgba(100,160,80,.1);  border: 1px solid rgba(100,160,80,.3); color: #8ecc78; }
    .cat-science   { background: rgba(60,150,200,.1);  border: 1px solid rgba(60,150,200,.3); color: #6bbfe0; }
    .cat-economy   { background: rgba(180,120,60,.1);  border: 1px solid rgba(180,120,60,.3); color: #d4915a; }
    .cat-tragedy   { background: rgba(80,80,80,.15);   border: 1px solid rgba(120,120,120,.3); color: #aaa; }
    .tl-body {
      font-size: .82rem;
      color: rgba(216,224,240,.82);
      line-height: 1.65;
    }

    @media(max-width: 700px) {
      .tl-wrap::before { left: 1rem; transform: none; }
      .tl-item, .tl-item:nth-child(even) {
        justify-content: flex-start;
        padding-left: 3rem;
        padding-right: 0;
      }
      .tl-dot { left: 1rem; transform: translateX(-50%); }
      .tl-card { max-width: 100%; }
    }
  </style>
</head>

function buildCards(data, containerId, label, icon) {

  el.innerHTML = data.map(function(d) {
    return '<div class="card">' +
      '<div class="card-img-wrap">' +
        '<div class="card-img-placeholder">' +
          '<div class="ph-num">' + d.rank + '</div>' +
          '<div class="ph-icon">' + icon + '</div>' +
        '</div>' +
        '<img data-wiki="' + d.wiki + '" alt="' + d.name + '" onload="this.classList.add(\'loaded\');this.previousElementSibling.style.display=\'none\'" onerror="this.style.display=\'none\'" loading="lazy" decoding="async">' +
        '<div class="badge-rank">' + label + ' #' + d.rank + '</div>' +
        '<div class="badge-meta">' + d.meta + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div>' +
          '<div class="card-title">' + d.name + '</div>' +
          '<div class="card-sub">' + d.sub + '</div>' +
        '</div>' +
        '<div class="card-stats">' +
          d.stats.map(function(s) {
            return '<div class="stat-chip"><div class="stat-label">' + s.label + '</div><div class="stat-val">' + s.val + '</div></div>';
          }).join('') +
        '</div>' +
        '<div class="card-tags">' +
          d.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') +
        '</div>' +
        '<div>' +
          '<div class="facts-label">Why It Matters</div>' +
          '<div class="facts-list">' +
            d.facts.map(function(f) {
              return '<div class="fact"><span class="fact-icon">' + f.icon + '</span><span>' + f.text + '</span></div>';
            }).join('') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
  el.querySelectorAll('img[data-wiki]').forEach(loadWikiImage);
}

function switchTab(name) {
  history.pushState(null, '', '#' + name);
  var tabs = ['science','tech','medicine','economy','military','energy','culture','history'];
  if (!tabs.includes(name)) name = 'science';
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', tabs[i] === name);
  });
  tabs.forEach(function(t) {
    document.getElementById('section-' + t).classList.toggle('hidden', t !== name);
  });
  localStorage.setItem('america_tab', name);
}
window.addEventListener('hashchange', function() { var h = location.hash.slice(1); if (h) switchTab(h); });

    body: 'Neil Armstrong steps onto the lunar surface on July 20th. "One small step for man, one giant leap for mankind." Eight years earlier, Kennedy had promised the Moon. America delivered — watched by 600 million people worldwide.' },
  { year: '1974', title: 'Nixon Resigns — Watergate', cat: 'politics',
    body: 'Richard Nixon becomes the only US president to resign from office, undone by the Watergate break-in and cover-up. The free press and independent judiciary function as the Founders designed. The system holds.' },
  { year: '1989', title: 'The Berlin Wall Falls', cat: 'politics',
    body: 'On November 9th, East Germans pour through the Berlin Wall. The Cold War — America\'s 40-year struggle against Soviet communism — is won. President Reagan\'s "Mr. Gorbachev, tear down this wall!" becomes prophecy fulfilled.' },
  { year: '1991', title: 'The Soviet Union Collapses', cat: 'politics',
    body: 'The USSR dissolves on Christmas Day. 15 independent republics emerge. The United States stands as the world\'s sole superpower — a position of unrivaled global influence no nation in history had ever occupied.' },
  { year: '2001', title: '9/11 — America Under Attack', cat: 'tragedy',
    body: 'Al-Qaeda terrorists hijack four commercial aircraft. The Twin Towers fall. 2,977 people are killed in the deadliest attack on American soil since Pearl Harbor. America responds with a global war on terror that reshapes the 21st century.' },
  { year: '2008', title: 'Barack Obama — First Black President', cat: 'rights',
    body: 'Barack Obama is elected the 44th President and first African American to hold the office. On a night in November, America demonstrates once more its capacity to surprise the world and itself.' },
  { year: '2020', title: 'COVID-19 Pandemic', cat: 'tragedy',
    body: 'A novel coronavirus paralyzes the globe. America loses over a million lives. But American scientists — at Moderna and Pfizer/BioNTech — develop the world\'s first mRNA vaccines in under a year, a scientific miracle that saved millions of lives worldwide.' },
  { year: '2025', title: 'Donald Trump Returns — 47th President', cat: 'politics',
    body: 'Donald J. Trump wins the 2024 presidential election and is inaugurated on January 20, 2025 — completing the most remarkable political comeback in American history. America\'s story, as always, continues.' },
];

function buildTimeline(items, containerId) {
  var c = document.getElementById(containerId);
  c.innerHTML = items.map(function(e, i) {
    return '<div class="tl-item">'
      + '<div class="tl-dot"></div>'
      + '<div class="tl-card">'
      + '<div class="tl-year-badge">' + e.year + '</div>'
      + '<div class="tl-title">' + e.title + '</div>'
      + '<span class="tl-cat cat-' + e.cat + '">' + e.cat + '</span>'
      + '<div class="tl-body">' + e.body + '</div>'
      + '</div></div>';
  }).join('');
}

buildCards(SCIENCE,  'science-grid',  'Entry', '🚀');
buildCards(TECH,     'tech-grid',     'Entry', '💻');
buildCards(MEDICINE, 'medicine-grid', 'Entry', '🏥');
buildCards(ECONOMY,  'economy-grid',  'Entry', '📈');
buildCards(MILITARY, 'military-grid', 'Entry', '🛡️');
buildCards(ENERGY,   'energy-grid',   'Entry', '⚡');
buildCards(CULTURE,  'culture-grid',  'Entry', '🎸');
buildTimeline(HISTORY, 'history-tl');
switchTab(localStorage.getItem('america_tab') || 'science');
