<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ascii.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#020402;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px)}
    .stage{flex:1;position:relative;overflow:hidden}
    canvas{display:block;width:100%;height:100%}
    .controls{display:flex;align-items:center;gap:.5rem;padding:.65rem 1.5rem;
      background:#020402;border-top:1px solid rgba(0,255,65,.1);
      flex-shrink:0;z-index:50;font-family:'Courier New',monospace}
    .demo-btn{font-family:'Courier New',monospace;font-size:.82rem;font-weight:600;
      padding:.35rem .9rem;border-radius:4px;cursor:pointer;
      border:1px solid rgba(0,255,65,.2);background:transparent;
      color:#394939;transition:all .2s}
    .demo-btn.active{color:#00ff41;border-color:rgba(0,255,65,.55);
      background:rgba(0,255,65,.07);text-shadow:0 0 8px rgba(0,255,65,.7)}
    .demo-btn:hover:not(.active){color:#888;border-color:rgba(0,255,65,.35)}
    .hint{margin-left:auto;font-size:.7rem;color:#253025;font-family:'Courier New',monospace}
  </style>
</head>
<body>
  <script src="/shared/nav.js?v=2"></script>

  <div class="stage"><canvas id="c"></canvas></div>

  <div class="controls">
    <button class="demo-btn"        data-demo="donut">[ donut ]</button>
    <button class="demo-btn active" data-demo="matrix">[ matrix ]</button>
    <button class="demo-btn"        data-demo="plasma">[ plasma ]</button>
    <button class="demo-btn"        data-demo="warp">[ warp ]</button>
    <button class="demo-btn"        data-demo="fire">[ fire ]</button>
    <button class="demo-btn"        data-demo="tunnel">[ tunnel ]</button>
    <span class="hint">keys 1 – 6 to switch</span>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const FS = 14, CW = 8, CH = 16;
    let W, H, COLS, ROWS;

    function resize() {
      const s = canvas.parentElement;
      W = canvas.width  = s.offsetWidth;
      H = canvas.height = s.offsetHeight;
      COLS = Math.floor(W / CW);
      ROWS = Math.floor(H / CH);
      initDemo(currentDemo);
    }
    window.addEventListener('resize', resize);

    // ── Donut ─────────────────────────────────────────────────────────────────
    const DONUT_CHARS = '.,-~:;=!*#$@';
    let dA = 0, dB = 0;
    function donutFrame() {
      const z = new Float32Array(COLS * ROWS);
      const b = new Uint8Array(COLS * ROWS);
      const sinA = Math.sin(dA), cosA = Math.cos(dA);
      const sinB = Math.sin(dB), cosB = Math.cos(dB);
      const pxS  = Math.min(W, H) * 0.38;

      for (let j = 0; j < 6.2832; j += 0.05) {
        const sinJ = Math.sin(j), cosJ = Math.cos(j);
        const h = cosJ + 2;
        for (let i = 0; i < 6.2832; i += 0.015) {
          const sinI = Math.sin(i), cosI = Math.cos(i);
          const D  = 1 / (sinI * h * sinA + sinJ * cosA + 5);
          const t  = sinI * h * cosA - sinJ * sinA;
          const xp = Math.floor(COLS / 2 + (pxS / CW) * D * (cosI * h * cosB - t * sinB));
          const yp = Math.floor(ROWS / 2 + (pxS / CH) * D * (cosI * h * sinB + t * cosB));
          const ix = xp + COLS * yp;
          const N  = Math.floor(8 * ((sinJ * sinA - sinI * cosJ * cosA) * cosB
                                    - sinI * cosJ * sinA - sinJ * cosA
                                    - cosI * cosJ * sinB));
          if (yp >= 0 && yp < ROWS && xp >= 0 && xp < COLS && D > z[ix]) {
            z[ix] = D;
            b[ix] = N > 0 ? (N % DONUT_CHARS.length) + 1 : 1;
          }
        }
      }

      ctx.clearRect(0, 0, W, H);
      ctx.font        = FS + 'px "Courier New",monospace';
      ctx.fillStyle   = '#00ff41';
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur  = 4;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const ci = b[c + COLS * r];
          if (ci) ctx.fillText(DONUT_CHARS[ci - 1], c * CW, r * CH + FS);
        }
      ctx.shadowBlur = 0;
      dA += 0.04; dB += 0.02;
    }

    // ── Matrix rain ───────────────────────────────────────────────────────────
    const MAT_CH = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%!?+=-_';
    const TRAIL  = 22;
    let mDrops, mSpeeds, mGrid;
    function initMatrix() {
      mDrops  = Array.from({length: COLS}, () => -(Math.random() * ROWS | 0));
      mSpeeds = Array.from({length: COLS}, () => Math.random() * 0.45 + 0.2);
      mGrid   = Array.from({length: COLS}, () =>
        Array.from({length: ROWS + TRAIL}, () => MAT_CH[Math.random() * MAT_CH.length | 0]));
    }
    function matrixFrame() {
      ctx.fillStyle = 'rgba(2,4,2,0.18)';
      ctx.fillRect(0, 0, W, H);
      ctx.font = FS + 'px "Courier New",monospace';
      for (let col = 0; col < COLS; col++) {
        const head = mDrops[col] | 0;
        for (let row = Math.max(0, head - TRAIL); row <= head && row < ROWS; row++) {
          const dist = head - row;
          if (dist === 0) {
            ctx.fillStyle = '#dfffdf'; ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 8;
          } else {
            const g = ((1 - dist / TRAIL) * 210 + 15) | 0;
            ctx.fillStyle = `rgb(0,${g},${g * 0.2 | 0})`; ctx.shadowBlur = 0;
          }
          if (Math.random() < 0.015)
            mGrid[col][row] = MAT_CH[Math.random() * MAT_CH.length | 0];
          ctx.fillText(mGrid[col][row], col * CW, row * CH + FS);
        }
        ctx.shadowBlur = 0;
        mDrops[col] += mSpeeds[col];
        if (mDrops[col] > ROWS + TRAIL) {
          mDrops[col] = -(Math.random() * ROWS * 0.5 | 0);
          mSpeeds[col] = Math.random() * 0.45 + 0.2;
        }
      }
    }

    // ── Plasma ────────────────────────────────────────────────────────────────
    const PL_CH = " `.-':\"~^=+*!|1IltoO0XH#@MW";
    let plasmaT = 0;
    function plasmaFrame() {
      ctx.clearRect(0, 0, W, H);
      ctx.font = FS + 'px "Courier New",monospace';
      const t = plasmaT * 0.038;
      for (let row = 0; row < ROWS; row++) {
        const y = row / ROWS * 7;
        for (let col = 0; col < COLS; col++) {
          const x = col / COLS * 9;
          const v = (Math.sin(x + t)
                   + Math.sin(y + t * 0.8)
                   + Math.sin((x + y) * 0.55 + t * 1.4)
                   + Math.sin(Math.sqrt(x * x + y * y) * 0.5 - t * 1.1)) * 0.25;
          const ci = Math.floor((v + 1) * 0.5 * (PL_CH.length - 1));
          const ch = PL_CH[ci];
          if (ch === ' ') continue;
          const g = ((v + 1) * 0.5 * 210 + 20) | 0;
          ctx.fillStyle = `rgb(0,${g},${g * 0.25 | 0})`;
          ctx.fillText(ch, col * CW, row * CH + FS);
        }
      }
      plasmaT++;
    }

    // ── Warp (hyperspace starfield) ───────────────────────────────────────────
    const WARP_CH = '·.+*#@';
    let warpStars;
    function initWarp() {
      warpStars = Array.from({length: 300}, () => ({
        x: (Math.random() - 0.5) * 2,
        y: (Math.random() - 0.5) * 2,
        z: Math.random()
      }));
    }
    function warpFrame() {
      ctx.fillStyle = 'rgba(2,4,2,0.25)';
      ctx.fillRect(0, 0, W, H);
      ctx.font = FS + 'px "Courier New",monospace';
      for (const s of warpStars) {
        s.z -= 0.016;
        if (s.z <= 0) { s.x = (Math.random()-0.5)*2; s.y = (Math.random()-0.5)*2; s.z = 1; continue; }
        const sx = Math.round((s.x / s.z + 1) * 0.5 * COLS);
        const sy = Math.round((s.y / s.z + 1) * 0.5 * ROWS);
        if (sx < 0 || sx >= COLS || sy < 0 || sy >= ROWS) { s.x=(Math.random()-0.5)*2; s.y=(Math.random()-0.5)*2; s.z=1; continue; }
        const b = 1 - s.z;
        const g = Math.floor(b * 210 + 45) | 0;
        ctx.fillStyle = `rgb(0,${g},${g*0.2|0})`;
        ctx.fillText(WARP_CH[Math.min(WARP_CH.length-1, Math.floor(b*WARP_CH.length))], sx*CW, sy*CH+FS);
      }
    }

    // ── Fire ──────────────────────────────────────────────────────────────────
    const FIRE_CH = " .`'^,:;!i1tjfxnuvcXYUJCL0OZmwqpdbkh*#MW&8%B@$";
    let fireGrid, fireTick = 0;
    function initFire() {
      fireGrid = new Uint8Array((ROWS + 1) * COLS);
      fireTick = 0;
    }
    function fireFrame() {
      // Only simulate every 3rd frame (~20fps)
      if (++fireTick % 7 !== 0) return;
      // Seed bottom row with random heat
      for (let c = 0; c < COLS; c++)
        fireGrid[ROWS * COLS + c] = Math.random() < 0.55 ? 255 : (160 + Math.random() * 95) | 0;
      // Propagate upward with slight spread and cooling
      for (let r = ROWS - 1; r >= 0; r--)
        for (let c = 0; c < COLS; c++) {
          const l = fireGrid[(r+1)*COLS + ((c-1+COLS)%COLS)];
          const m = fireGrid[(r+1)*COLS + c];
          const rr = fireGrid[(r+1)*COLS + ((c+1)%COLS)];
          fireGrid[r*COLS+c] = Math.max(0, ((l+m+rr)/3 - (Math.random()*5|0)) | 0);
        }
      ctx.clearRect(0, 0, W, H);
      ctx.font = FS + 'px "Courier New",monospace';
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const heat = fireGrid[r*COLS+c];
          if (heat < 8) continue;
          const t = heat / 255;
          const ch = FIRE_CH[Math.min(FIRE_CH.length-1, Math.floor(t*FIRE_CH.length))];
          if (ch === ' ') continue;
          // black → dark-red → orange → yellow → white
          let fr, fg, fb;
          if      (t < 0.25) { const s=t*4;        fr=s*180|0;       fg=0;              fb=0; }
          else if (t < 0.5)  { const s=(t-.25)*4;  fr=180+s*75|0;    fg=s*100|0;        fb=0; }
          else if (t < 0.75) { const s=(t-.5)*4;   fr=255;           fg=100+s*155|0;    fb=0; }
          else               { const s=(t-.75)*4;  fr=255;           fg=255;            fb=s*220|0; }
          ctx.fillStyle = `rgb(${fr},${fg},${fb})`;
          ctx.fillText(ch, c*CW, r*CH+FS);
        }
    }

    // ── Tunnel ────────────────────────────────────────────────────────────────
    const TUNNEL_CH = ' .:-=+*#%@';
    let tunnelDepth, tunnelAngle, tunnelT = 0;
    function initTunnel() {
      tunnelDepth = new Float32Array(COLS * ROWS);
      tunnelAngle = new Float32Array(COLS * ROWS);
      const cx = COLS / 2, cy = ROWS / 2;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const dx = (c - cx + 0.5) * CW, dy = (r - cy + 0.5) * CH;
          const d = Math.sqrt(dx*dx + dy*dy);
          tunnelDepth[r*COLS+c] = d < 1 ? 0 : 180 / d;
          tunnelAngle[r*COLS+c] = Math.atan2(dy, dx);
        }
    }
    function tunnelFrame() {
      ctx.clearRect(0, 0, W, H);
      ctx.font = FS + 'px "Courier New",monospace';
      const t = tunnelT * 0.035;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          const depth = tunnelDepth[r*COLS+c];
          if (depth === 0) continue;
          const u = tunnelAngle[r*COLS+c] / Math.PI;          // -1..1
          const v = (depth + t) % 2;
          const check = ((Math.floor(u*4+16) + Math.floor(v*4)) & 1);
          const bright = Math.min(1, depth / 7) * (check ? 0.9 : 0.12);
          if (bright < 0.04) continue;
          const ci = Math.floor(bright * (TUNNEL_CH.length-1));
          const g = Math.floor(bright*210+45)|0;
          ctx.fillStyle = `rgb(0,${g},${g*0.18|0})`;
          ctx.fillText(TUNNEL_CH[ci], c*CW, r*CH+FS);
        }
      tunnelT++;
    }

    // ── Demo runner ───────────────────────────────────────────────────────────
    let currentDemo = localStorage.getItem('ascii_demo') || 'matrix';
    const DEMOS = { donut: donutFrame, matrix: matrixFrame, plasma: plasmaFrame,
                    warp: warpFrame, fire: fireFrame, tunnel: tunnelFrame };

    function initDemo(name) {
      if (!COLS || !ROWS) return;
      ctx.clearRect(0, 0, W, H);
      if (name === 'matrix') initMatrix();
      if (name === 'donut')  { dA = 0; dB = 0; }
      if (name === 'plasma') plasmaT = 0;
      if (name === 'warp')   initWarp();
      if (name === 'fire')   initFire();
      if (name === 'tunnel') { initTunnel(); tunnelT = 0; }
    }
    function setDemo(name) {
      currentDemo = name;
      localStorage.setItem('ascii_demo', name);
      document.querySelectorAll('.demo-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.demo === name));
      initDemo(name);
    }

    document.querySelectorAll('.demo-btn').forEach(btn =>
      btn.addEventListener('click', () => setDemo(btn.dataset.demo)));

    window.addEventListener('keydown', e => {
      if (e.key === '1') setDemo('donut');
      if (e.key === '2') setDemo('matrix');
      if (e.key === '3') setDemo('plasma');
      if (e.key === '4') setDemo('warp');
      if (e.key === '5') setDemo('fire');
      if (e.key === '6') setDemo('tunnel');
    });

    // Sync button highlight to restored demo
    document.querySelectorAll('.demo-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.demo === currentDemo));

    function loop() { DEMOS[currentDemo](); requestAnimationFrame(loop); }
    requestAnimationFrame(() => { resize(); loop(); });
  </script>
</body>
</html>
