<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#050510"/>
  <!-- Connection lines -->
  <line x1="12" y1="12" x2="32" y2="32" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="52" y1="12" x2="32" y2="32" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="52" y1="52" x2="32" y2="32" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="12" y1="52" x2="32" y2="32" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="12" y1="12" x2="52" y2="12" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="52" y1="12" x2="52" y2="52" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="12" y1="52" x2="52" y2="52" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="12" y1="12" x2="12" y2="52" stroke="#1a3a6b" stroke-width="1.5"/>
  <!-- Outer nodes -->
  <circle cx="12" cy="12" r="4" fill="#4488ff" opacity="0.9"/>
  <circle cx="52" cy="12" r="4" fill="#4488ff" opacity="0.9"/>
  <circle cx="52" cy="52" r="4" fill="#4488ff" opacity="0.9"/>
  <circle cx="12" cy="52" r="4" fill="#4488ff" opacity="0.9"/>
  <!-- Glow on outer nodes -->
  <circle cx="12" cy="12" r="7" fill="none" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <circle cx="52" cy="12" r="7" fill="none" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <circle cx="52" cy="52" r="7" fill="none" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <circle cx="12" cy="52" r="7" fill="none" stroke="#4488ff" stroke-width="1" opacity="0.4"/>
  <!-- Center node -->
  <circle cx="32" cy="32" r="5" fill="#00ffff" opacity="0.95"/>
  <circle cx="32" cy="32" r="9" fill="none" stroke="#00ffff" stroke-width="1.2" opacity="0.5"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#00ffff" stroke-width="0.6" opacity="0.25"/>
</svg>
