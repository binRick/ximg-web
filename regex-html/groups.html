<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Regex Tester &amp; Reference — regex.ximg.app — interactive educational app on ximg.app">
  <title>Regex Tester &amp; Reference — regex.ximg.app</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#02020f;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-top:44px}

    /* sub-nav tabs */
    .subnav{position:sticky;top:44px;z-index:100;background:#02020f;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 1rem}
    .tab-btn{padding:.65rem 1.1rem;font-size:.82rem;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
    .tab-btn:hover{color:#c9d1d9}
    .tab-btn.active{color:#22d3ee;border-bottom-color:#22d3ee}

    /* page layout */
    .page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}

    /* heading */
    .page-title{font-size:1.2rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
    .page-sub{font-size:.8rem;color:#475569;margin-bottom:1.25rem}

    /* inputs */
    label.lbl{display:block;font-size:.7rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
    input[type=text],textarea{width:100%;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;font-family:'Courier New',monospace;font-size:.9rem;padding:.55rem .8rem;outline:none;transition:border-color .2s}
    input[type=text]:focus,textarea:focus{border-color:#22d3ee55}
    input[type=text].error,textarea.error{border-color:#f8514988}
    textarea{resize:vertical;line-height:1.6;min-height:130px}

    /* pattern row */
    .pat-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem}
    .slash{font-size:1.3rem;color:#334155;padding:0 .1rem;font-family:monospace}
    #pat-input{flex:1}
    #flags-input{width:90px}

    /* flag buttons */
    .flags-row{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.5rem}
    .flag-btn{background:#070720;border:1px solid #1e293b;border-radius:5px;color:#475569;font-size:.73rem;padding:.22rem .55rem;cursor:pointer;transition:all .15s;font-family:monospace}
    .flag-btn.on{background:rgba(34,211,238,.1);border-color:#22d3ee55;color:#22d3ee}
    .flag-btn:hover{border-color:#334155;color:#94a3b8}
    .err-msg{min-height:1.2em;font-size:.78rem;color:#f85149;margin-bottom:.3rem}

    /* two-panel layout */
    .two-panel{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:.75rem}
    @media(max-width:680px){.two-panel{grid-template-columns:1fr}}

    /* output box */
    .output-box{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.55rem .8rem;min-height:130px;font-family:'Courier New',monospace;font-size:.9rem;line-height:1.6;white-space:pre-wrap;word-break:break-all}

    /* match highlight colors */
    .mh-0{background:rgba(34,211,238,.18);border-radius:2px;outline:1px solid rgba(34,211,238,.45)}
    .mh-1{background:rgba(99,102,241,.22);border-radius:2px;outline:1px solid rgba(99,102,241,.5)}
    .mh-2{background:rgba(234,179,8,.18);border-radius:2px;outline:1px solid rgba(234,179,8,.45)}
    .mh-3{background:rgba(249,115,22,.18);border-radius:2px;outline:1px solid rgba(249,115,22,.45)}
    .mh-4{background:rgba(34,197,94,.18);border-radius:2px;outline:1px solid rgba(34,197,94,.45)}

    /* group colors */
    .gc-0{color:#22d3ee}
    .gc-1{color:#818cf8}
    .gc-2{color:#facc15}
    .gc-3{color:#fb923c}
    .gc-4{color:#4ade80}

    /* stats bar */
    .stats{display:flex;gap:1.25rem;font-size:.78rem;flex-wrap:wrap;margin:.6rem 0}
    .stat{color:#475569}.stat b{color:#c9d1d9}
    .stat.good b{color:#22d3ee}
    .stat.bad b{color:#f85149}

    /* match list */
    .match-list{margin-top:.75rem}
    .match-item{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.45rem .7rem;margin-bottom:.35rem;font-size:.8rem}
    .mi-head{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}
    .mi-num{color:#334155;min-width:1.5rem}
    .mi-val{color:#22d3ee;font-family:monospace}
    .mi-pos{color:#334155;font-size:.72rem}
    .mi-groups{padding-left:.75rem;margin-top:.25rem}
    .mg-item{font-size:.76rem;color:#475569}
    .mg-item b{font-family:monospace}

    /* description bar */
    .desc-bar{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.5rem .75rem;font-size:.8rem;color:#64748b;margin:.5rem 0;min-height:2rem}
    .desc-bar span{color:#94a3b8}

    /* Groups tab — group table */
    .groups-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:.5rem}
    .groups-table th{text-align:left;padding:.4rem .6rem;border-bottom:1px solid #1e293b;color:#475569;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
    .groups-table td{padding:.35rem .6rem;border-bottom:1px solid #0f172a;font-family:monospace;vertical-align:top}
    .groups-table tr:hover td{background:#070720}
    .gt-full{color:#22d3ee}.gt-g1{color:#818cf8}.gt-g2{color:#facc15}.gt-g3{color:#fb923c}.gt-g4{color:#4ade80}

    /* Replace tab */
    .replace-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:.75rem}
    @media(max-width:720px){.replace-grid{grid-template-columns:1fr}}
    .replace-preview{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.55rem .8rem;font-family:monospace;font-size:.85rem;line-height:1.6;white-space:pre-wrap;word-break:break-all;min-height:80px;margin-bottom:.5rem}
    .rp-orig{color:#475569}.rp-match{background:rgba(34,211,238,.15);border-radius:2px;color:#22d3ee}
    .rp-result{color:#c9d1d9}
    .code-block{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.5rem .8rem;font-family:monospace;font-size:.8rem;color:#94a3b8;margin-top:.4rem;white-space:pre-wrap}
    .code-kw{color:#818cf8}.code-str{color:#22d3ee}.code-fn{color:#facc15}

    /* Reference tab */
    .ref-section{margin-bottom:1.75rem}
    .ref-title{font-size:.82rem;font-weight:700;color:#f1f5f9;margin-bottom:.6rem;padding-bottom:.35rem;border-bottom:1px solid #1e293b}
    .ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.35rem}
    .ref-item{display:flex;gap:.6rem;align-items:flex-start;background:#070720;border:1px solid #1e293b;border-radius:5px;padding:.4rem .6rem;cursor:pointer;transition:all .15s}
    .ref-item:hover{border-color:#22d3ee44;background:#070730}
    .ref-sym{color:#22d3ee;font-family:monospace;font-size:.82rem;min-width:70px;flex-shrink:0}
    .ref-desc{font-size:.77rem;color:#64748b}
    .ref-item:hover .ref-desc{color:#94a3b8}

    .patterns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.4rem;margin-top:.5rem}
    .pat-card{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.5rem .7rem;cursor:pointer;transition:all .15s}
    .pat-card:hover{border-color:#22d3ee55;background:#070730}
    .pc-name{font-size:.78rem;font-weight:600;color:#c9d1d9;margin-bottom:.2rem}
    .pc-pat{font-size:.71rem;color:#22d3ee;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pc-desc{font-size:.72rem;color:#475569;margin-top:.15rem}

    /* toast */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0f172a;border:1px solid #22d3ee44;color:#22d3ee;padding:.5rem 1rem;border-radius:6px;font-size:.8rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}

    /* small utility */
    .sec-gap{margin-top:1.25rem}
    .inline-label{display:inline-block;font-size:.68rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
  </style>
</head>
<body>
<div class="subnav">
  <a class="tab-btn " href="index.html">Tester</a>
  <a class="tab-btn" href="groups.html">Groups</a>
  <a class="tab-btn" href="replace.html">Replace</a>
  <a class="tab-btn" href="reference.html">Reference</a>
</div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/regex') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="groups">
<div class="page-title">Capture Groups</div>
    <div class="page-sub">Color-coded group extraction — each group highlighted differently in the text</div>

    <label class="lbl">Pattern</label>
    <div class="pat-row">
      <div class="slash">/</div>
      <input type="text" id="g-pat" placeholder="(\w+)\s(\w+)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="slash">/</div>
      <input type="text" id="g-flags" value="g" style="width:80px" autocomplete="off" spellcheck="false">
    </div>
    <div class="err-msg" id="g-err"></div>

    <div class="two-panel sec-gap">
      <div>
        <label class="lbl">Test String</label>
        <textarea id="g-input" placeholder="Type or paste test text here...">Hello World
Foo Bar
John Doe</textarea>
      </div>
      <div>
        <label class="lbl">Highlighted (color per group)</label>
        <div class="output-box" id="g-output"></div>
      </div>
    </div>

    <div class="sec-gap">
      <label class="lbl">Group Table</label>
      <div id="g-table-wrap" style="overflow-x:auto"></div>
    </div>
  </div>

  <!-- ═══ TAB: REPLACE ═══ -->
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
