<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#02020f"/>
  <!-- Globe outline -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <!-- Vertical center -->
  <ellipse cx="32" cy="32" rx="8" ry="20" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
  <!-- Arrow up-right -->
  <line x1="36" y1="28" x2="44" y2="20" stroke="#8b5cf6" stroke-width="2"/>
  <polyline points="38,20 44,20 44,26" fill="none" stroke="#8b5cf6" stroke-width="2"/>
</svg>
