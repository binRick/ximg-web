<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Global Defense Initiative">
  <title>C&amp;C — cnc.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #050a02;
      --bg2:    #0a1205;
      --gdi:    #4aff2a;
      --nod:    #ff9900;
      --soviet: #dd2200;
      --ally:   #1188ff;
      --scrin:  #bb44ff;
      --emp:    #ff44aa;
      --usa:    #4488ff;
      --china:  #ff3300;
      --gla:    #aa8833;
      --text:   #b8cc88;
      --dim:    #556633;
      --border: rgba(74,255,42,.12);
    }

    html { background: var(--bg); }
    body {
      background: var(--bg);
      font-family: 'Courier New', monospace;
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
      pointer-events: none; z-index: 1;
    }

    /* ── Header ── */
    .cnc-header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(10,30,5,.8) 0%, transparent 100%);
    }
    .cnc-title {
      font-size: clamp(1.8rem,6vw,3.5rem);
      font-weight: 900;
      letter-spacing: .15em;
      color: var(--gdi);
      text-shadow: 0 0 20px rgba(74,255,42,.6), 0 0 60px rgba(74,255,42,.25), 0 0 120px rgba(74,255,42,.1);
      line-height: 1;
    }
    .cnc-subtitle {
      font-size: .7rem;
      color: var(--dim);
      letter-spacing: .28em;
      margin-top: .55rem;
      text-transform: uppercase;
      opacity: .8;
    }

    /* ── Sub-nav ── */
    .sub-nav {
      position: sticky;
      top: 44px; z-index: 100;
      display: flex; align-items: center; justify-content: center; gap: .4rem;
      padding: .4rem .75rem;
      background: rgba(5,10,2,.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .cnc-tab {
      font-family: 'Courier New', monospace;
      font-size: .75rem; font-weight: 700;
      padding: .3rem .9rem;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.07);
      color: var(--dim); cursor: pointer; border-radius: 3px;
      letter-spacing: .12em; transition: all .18s; white-space: nowrap;
    }
    .cnc-tab:hover {
      background: rgba(74,255,42,.1); border-color: rgba(74,255,42,.32);
      color: var(--gdi); text-shadow: 0 0 10px rgba(74,255,42,.35);
    }
    .cnc-tab.active {
      background: rgba(74,255,42,.14); border-color: rgba(74,255,42,.55);
      color: var(--gdi); text-shadow: 0 0 10px rgba(74,255,42,.5);
      box-shadow: 0 0 8px rgba(74,255,42,.1) inset;
    }

    /* ── Sections ── */
    .section { padding: 2rem 1rem 3rem; max-width: 1400px; margin: 0 auto; }

    .section-title {
      font-size: .82rem; font-weight: 700; letter-spacing: .25em;
      color: var(--gdi); text-transform: uppercase;
      margin-bottom: 1.5rem; padding-bottom: .6rem;
      border-bottom: 1px solid var(--border);
      text-shadow: 0 0 16px rgba(74,255,42,.3);
      position: relative;
    }
    .section-title::after {
      content: '';
      position: absolute; left: 0; bottom: -1px; width: 3rem; height: 1px;
      background: var(--gdi); opacity: .7;
    }

    /* ── Card grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    #games .card-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.2rem;
      transition: border-color .25s, box-shadow .25s, transform .2s;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent, var(--gdi)), transparent);
      opacity: .5;
    }
    .card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.015) 0%, transparent 60%);
      pointer-events: none;
    }
    .card:hover {
      border-color: rgba(74,255,42,.35);
      box-shadow: 0 4px 24px rgba(74,255,42,.06), 0 0 0 1px rgba(74,255,42,.08);
      transform: translateY(-1px);
    }

    /* ── Card image ── */
    .card-img-wrap {
      margin: -1.2rem -1.2rem .9rem;
      height: 160px; overflow: hidden;
      border-bottom: 1px solid var(--border);
      background: #020604;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px 6px 0 0;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: contain;
      opacity: 0; transition: opacity .4s;
      padding: .5rem;
    }
    .card-img-wrap img.loaded { opacity: 1; }
    /* Game screenshot variant — cover crop, no padding */
    .card-img-wrap.game-ss {
      height: 150px; position: relative;
    }
    .card-img-wrap.game-ss img {
      object-fit: cover; object-position: center top; padding: 0;
    }
    .card-img-wrap.game-ss::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(5,10,2,.7) 0%, transparent 50%);
      pointer-events: none;
    }
    .card-img-ph {
      position: absolute;
      font-size: 2.5rem; opacity: .08; pointer-events: none;
    }

    .card-name { font-size: .98rem; font-weight: 700; color: #d8f0b0; letter-spacing: .04em; margin-bottom: .5rem; }

    .card-meta { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .7rem; }
    .badge {
      font-size: .65rem; font-weight: 700; letter-spacing: .08em;
      padding: .15rem .5rem; border-radius: 2px; border: 1px solid; white-space: nowrap;
    }
    .bg  { color: var(--gdi);    border-color: rgba(74,255,42,.4);   background: rgba(74,255,42,.08); }
    .bn  { color: var(--nod);    border-color: rgba(255,153,0,.4);   background: rgba(255,153,0,.08); }
    .bs  { color: var(--soviet); border-color: rgba(221,34,0,.4);    background: rgba(221,34,0,.08); }
    .ba  { color: var(--ally);   border-color: rgba(17,136,255,.4);  background: rgba(17,136,255,.08); }
    .bsc { color: var(--scrin);  border-color: rgba(187,68,255,.4);  background: rgba(187,68,255,.08); }
    .be  { color: var(--emp);    border-color: rgba(255,68,170,.4);  background: rgba(255,68,170,.08); }
    .bu  { color: var(--usa);    border-color: rgba(68,136,255,.4);  background: rgba(68,136,255,.08); }
    .bc  { color: var(--china);  border-color: rgba(255,51,0,.4);    background: rgba(255,51,0,.08); }
    .bgl { color: var(--gla);    border-color: rgba(170,136,51,.4);  background: rgba(170,136,51,.08); }
    .bm  { color: #aaa;          border-color: rgba(180,180,180,.3); background: rgba(180,180,180,.05); }
    .by  { color: #88aa66;       border-color: rgba(136,170,102,.3); background: transparent; }
    .br  { color: #7799aa;       border-color: rgba(119,153,170,.3); background: transparent; font-weight: 400; font-style: italic; }
    .bv  { color: #7788aa;       border-color: rgba(119,136,170,.3); background: transparent; font-weight: 400; }

    .card-desc { font-size: .78rem; line-height: 1.65; color: #7a9955; }
    .card-desc p { margin-bottom: .5rem; }
    .card-desc p:last-child { margin-bottom: 0; }

    .card-feats { margin-top: .7rem; padding-top: .7rem; border-top: 1px solid rgba(255,255,255,.05); }
    .card-feats ul { list-style: none; }
    .card-feats li { font-size: .72rem; color: #5a7844; padding: .15rem 0 .15rem .85rem; position: relative; }
    .card-feats li::before { content: '▸'; position: absolute; left: 0; color: var(--gdi); opacity: .4; }

    /* category dividers */
    .cat { grid-column: 1/-1; font-size: .68rem; font-weight: 700; letter-spacing: .2em; color: var(--dim); text-transform: uppercase; padding: .25rem 0; margin-top: .5rem; border-bottom: 1px solid var(--border); }
    .cat:first-child { margin-top: 0; }

    /* ── Lore ── */
    .lore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }

    .u-head {
      grid-column: 1/-1;
      display: flex; align-items: center; gap: 1rem;
      margin-top: 1rem;
    }
    .u-head:first-child { margin-top: 0; }
    .u-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .18em;
      white-space: nowrap; padding: .2rem .7rem; border-radius: 2px;
    }
    .u-line { flex: 1; height: 1px; background: var(--border); }

    .lore-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.4rem;
    }
    .lore-card h2 { font-size: .95rem; font-weight: 700; color: var(--gdi); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .25rem; }
    .lore-card .lsub { font-size: .66rem; color: var(--dim); letter-spacing: .15em; margin-bottom: .9rem; text-transform: uppercase; }
    .lore-card p { font-size: .78rem; line-height: 1.7; color: #7a9955; margin-bottom: .7rem; }
    .lore-card p:last-child { margin-bottom: 0; }
    .lore-card h3 { font-size: .74rem; font-weight: 700; color: #aac888; letter-spacing: .08em; margin: .9rem 0 .3rem; text-transform: uppercase; }
    .hi { color: #c8e898; font-style: italic; }

    /* ── game section ── */
    #game { height: calc(100vh - 88px); padding: 0; max-width: none; overflow: hidden; }
    #g-wrap { width: 100%; height: 100%; }
    #g-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  </style>
</head>
<body>
<div class="sub-nav">
    <a class="cnc-tab " href="index.html">GAMES</a>
    <a class="cnc-tab" href="units.html">UNITS</a>
    <a class="cnc-tab" href="buildings.html">BUILDINGS</a>
    <a class="cnc-tab" href="lore.html">LORE</a>
    <a class="cnc-tab" href="game.html">PLAY</a>
    <a class="cnc-tab" href="history.html">HISTORY</a>
  </div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/cnc') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="game">
<div id="g-wrap">
      <canvas id="g-canvas"></canvas>
    </div>
  </section>

  <!-- HISTORY SECTION -->
</section>
<script src="/shared/nav.js"></script>
</body>
</html>
