<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Solar System Orbits">
<title>Orbital Mechanics Simulator — gravity.ximg.app</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#02020f;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;padding-top:44px;min-height:100vh}
.sub-nav{position:sticky;top:44px;z-index:100;background:#070720;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 1rem;justify-content:center}
.tab-btn{background:none;border:none;color:#94a3b8;padding:.75rem 1.25rem;cursor:pointer;font-size:.9rem;font-family:inherit;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab-btn.active{color:#eab308;border-bottom-color:#eab308}
.tab-btn:hover:not(.active){color:#e2e8f0}
canvas{display:block;background:#070720;border:1px solid #1e293b;border-radius:8px;cursor:crosshair}
.controls{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;align-items:center}
.ctrl{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:#94a3b8}
.ctrl label{white-space:nowrap}
input[type=range]{width:120px;accent-color:#eab308}
.btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .9rem;border-radius:5px;cursor:pointer;font-size:.85rem;font-family:inherit;transition:background .2s}
.btn:hover{background:#334155}
.btn.danger{border-color:#f97316;color:#f97316}
.info-box{background:#070720;border:1px solid #1e293b;border-radius:8px;padding:1rem;margin-top:1rem;font-size:.85rem;line-height:1.7;color:#94a3b8}
.info-box h3{color:#eab308;margin-bottom:.5rem;font-size:1rem}
.highlight{color:#f97316}
.canvas-wrap{position:relative}
.tooltip{position:absolute;background:rgba(7,7,32,.92);border:1px solid #334155;border-radius:6px;padding:.4rem .7rem;font-size:.8rem;pointer-events:none;display:none;color:#eab308;white-space:nowrap}
.stat-row{display:flex;gap:2rem;flex-wrap:wrap;margin-top:.5rem}
.stat{font-size:.82rem;color:#64748b}
.stat span{color:#eab308}
.formula{font-family:'Courier New',monospace;color:#f97316;background:#0d0d2e;padding:.3rem .6rem;border-radius:4px;font-size:.85rem}
h2{color:#eab308;margin-bottom:1rem;font-size:1.2rem}
</style>
</head>
<body>
<nav class="sub-nav">
  <a class="tab-btn " href="index.html">Solar System</a>
  <a class="tab-btn" href="nbody.html">N-Body Gravity</a>
  <a class="tab-btn" href="lagrange.html">Lagrange Points</a>
  <a class="tab-btn" href="escape.html">Escape Velocity</a>
</nav>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/gravity') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="lagrange">
<h2>Earth-Moon Lagrange Points</h2>
  <div class="controls">
    <div class="ctrl"><label>Animate</label><input type="range" id="lagrangeSpeed" min="0.1" max="5" step="0.1" value="1"></div>
    <div class="ctrl"><button class="btn" id="lagrangePlace">Place Test Particle</button></div>
  </div>
  <canvas id="lagrangeCanvas"></canvas>
  <div class="info-box" id="lagrangeInfo">
    <h3>Lagrange Points</h3>
    Hover over each labeled point for a description. There are 5 Lagrange points where a small body can maintain a stable position relative to two large bodies (Earth and Moon).
  </div>
</div>

<!-- TAB 4: Escape Velocity -->
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
