<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A hand of Texas Hold'em moves through four distinct betting rounds. Each round adds information and pressure — and demands a decision. Every player at the table is trying to extract maximum value from">
  <title>poker.ximg.app — Hand Evaluator</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a1a0e;--gold:#f0c040;--red:#d42020;
      --white:#f5f0e8;--dim:#5a7060;--green:#00cc55;
    }
    body{
      background:var(--bg);color:var(--white);
      font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;
    }
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 80% 50% at 50% 20%,#0d2b14 0%,var(--bg) 70%)}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0,rgba(255,255,255,.012) 1px,transparent 1px,transparent 5px),
        repeating-linear-gradient(90deg,rgba(255,255,255,.012) 0,rgba(255,255,255,.012) 1px,transparent 1px,transparent 5px)}

    .wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;width:100%;
      padding:1.5rem 1rem 3rem;display:flex;flex-direction:column;gap:1.4rem}

    h1{font-size:1.55rem;font-weight:800;
      background:linear-gradient(135deg,var(--gold),#fff 50%,#c8962a);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .subtitle{font-size:.78rem;color:var(--dim);margin-top:.2rem;letter-spacing:.04em}

    /* ── Selection area ── */
    .selection-area{display:flex;gap:2rem;flex-wrap:wrap;align-items:flex-start}
    .group{display:flex;flex-direction:column;gap:.45rem}
    .group-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
    .slots{display:flex;gap:.45rem}

    /* ── Slots ── */
    .slot{
      width:56px;height:78px;border-radius:8px;
      border:1.5px dashed rgba(0,180,80,.22);
      background:rgba(255,255,255,.025);
      cursor:pointer;position:relative;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      transition:border-color .15s,box-shadow .15s,background .15s;
      user-select:none;
    }
    .slot.active{
      border-color:rgba(0,255,100,.65);
      box-shadow:0 0 0 2px rgba(0,255,100,.18),0 0 14px rgba(0,255,100,.12);
      background:rgba(0,255,100,.04);
    }
    .slot.filled{background:var(--white);border:none;box-shadow:0 3px 10px rgba(0,0,0,.55)}
    .slot.filled.active{box-shadow:0 0 0 3px #00ff64,0 4px 14px rgba(0,0,0,.6)}
    .slot-ph{font-size:1.3rem;color:rgba(0,180,80,.2)}
    .slot-lbl{font-size:.52rem;color:var(--dim);position:absolute;bottom:5px;
      letter-spacing:.04em;text-transform:uppercase}
    .slot-rank{font-size:1.05rem;font-weight:800;line-height:1;
      align-self:flex-start;margin-left:5px;margin-top:3px}
    .slot-suit{font-size:1.55rem;line-height:1}

    /* ── Picker ── */
    .picker-hint{font-size:.72rem;color:var(--dim);letter-spacing:.03em}
    .picker{display:grid;grid-template-columns:repeat(13,1fr);gap:3px}
    .pcard{
      aspect-ratio:3/4;border-radius:5px;background:var(--white);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;font-weight:700;border:1.5px solid transparent;
      transition:transform .1s,box-shadow .1s,opacity .12s;
      user-select:none;gap:1px;
    }
    .pcard:hover:not(.used){
      transform:translateY(-2px);
      box-shadow:0 4px 10px rgba(0,0,0,.5);
      border-color:rgba(0,230,80,.6);
    }
    .pcard.used{opacity:.15;cursor:default;pointer-events:none}
    .pcard .pr{font-size:.72rem;font-weight:800;line-height:1}
    .pcard .ps{font-size:.82rem;line-height:1}

    /* ── Controls ── */
    #clear-btn{
      font-size:.76rem;padding:.32rem .85rem;border-radius:6px;
      border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
      color:var(--dim);cursor:pointer;font-family:inherit;transition:all .2s;
    }
    #clear-btn:hover{color:var(--white);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07)}

    /* ── Results ── */
    .results{display:flex;flex-direction:column;gap:.65rem}
    .results-label{font-size:.73rem;color:var(--dim);letter-spacing:.04em}
    .results-hint{font-size:.8rem;color:var(--dim)}
    .bars{display:flex;flex-direction:column;gap:.35rem}
    .bar-row{display:grid;grid-template-columns:148px 1fr 50px;align-items:center;gap:.55rem}
    .bar-name{font-size:.8rem;font-weight:600}
    .bar-track{height:9px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
    .bar-fill{height:100%;border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1)}
    .bar-pct{font-size:.78rem;font-weight:700;color:var(--gold);text-align:right}
    .best-hand{font-size:1.3rem;font-weight:800;
      background:linear-gradient(135deg,var(--gold),#fff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* ── GTO Chart ── */
    .gto-wrap{display:flex;flex-direction:column;gap:.6rem}
    .gto-header{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    .gto-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
    .gto-legend{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
    .gto-leg{display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:var(--dim)}
    .gto-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    .gto-grid{display:grid;grid-template-columns:1.6em repeat(13,1fr);gap:2px}
    .gto-axis{display:flex;align-items:center;justify-content:center;
      font-size:.55rem;font-weight:700;color:var(--dim);letter-spacing:.02em}
    .gto-corner{}
    .gto-cell{
      aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;
      font-size:.42rem;font-weight:700;cursor:default;transition:transform .1s;
      color:rgba(0,0,0,.55);line-height:1;text-align:center;
    }
    .gto-cell:hover{transform:scale(1.15);z-index:2;position:relative}
    .gto-cell.hl{
      outline:2px solid #fff;outline-offset:1px;z-index:3;position:relative;
      transform:scale(1.1);color:rgba(0,0,0,.8);
    }
    .t4{background:#16a34a}.t3{background:#4ade80;color:rgba(0,0,0,.6)}
    .t2{background:#facc15;color:rgba(0,0,0,.65)}.t1{background:#f97316;color:rgba(0,0,0,.6)}
    .t0{background:rgba(255,255,255,.04);color:rgba(255,255,255,.18)}

    /* ── Tabs ── */
    .poker-tabs{display:flex;justify-content:center;gap:.4rem;border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:.6rem}
    .poker-tab{font-size:.8rem;padding:.3rem .9rem;border-radius:6px;cursor:pointer;
      border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--dim);
      font-family:inherit;transition:all .2s}
    .poker-tab.active{color:var(--green);border-color:rgba(0,204,85,.4);background:rgba(0,204,85,.07)}
    .poker-tab:hover:not(.active){color:var(--white);border-color:rgba(255,255,255,.15)}
    .poker-section{display:flex;flex-direction:column;gap:1.4rem}
    .poker-section

    /* ── GTO standalone ── */
    #section-gto .gto-grid{gap:3px}
    #section-gto .gto-cell{font-size:.52rem}
    #section-gto .gto-axis{font-size:.62rem}

    @media(max-width:500px){
      .pcard .pr{font-size:.6rem}.pcard .ps{font-size:.68rem}
      .slot{width:44px;height:62px}.slot-rank{font-size:.85rem}.slot-suit{font-size:1.25rem}
      .bar-row{grid-template-columns:110px 1fr 44px}
    }

    /* ── Players ── */
    .players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
    .player-card{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.07);
      border-radius:14px;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem;
      transition:border-color .2s,box-shadow .2s}
    .player-card:hover{border-color:rgba(240,192,64,.2);box-shadow:0 4px 24px rgba(240,192,64,.07)}

    .player-header{display:flex;align-items:center;gap:1rem}
    .player-avatar{width:72px;height:72px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:1.3rem;font-weight:900;letter-spacing:-.03em;
      color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);
      background-size:cover;background-position:center top;
      border:2px solid rgba(240,192,64,.25);overflow:hidden}
    .player-info{display:flex;flex-direction:column;gap:.2rem;min-width:0}
    .player-name{font-size:1rem;font-weight:800;color:var(--white);line-height:1.1}
    .player-nick{font-size:.72rem;color:var(--gold);font-style:italic;letter-spacing:.02em}
    .player-earnings{font-size:.7rem;color:var(--dim);margin-top:.15rem}
    .player-earnings span{color:#4ade80;font-weight:700}

    .player-bio{font-size:.78rem;color:#94a3b8;line-height:1.6}

    .player-traits{display:flex;flex-direction:column;gap:.4rem}
    .trait-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;
      color:var(--dim);margin-bottom:.1rem}
    .trait-row{display:grid;grid-template-columns:110px 1fr 28px;
      align-items:center;gap:.45rem}
    .trait-name{font-size:.72rem;color:#cbd5e1}
    .trait-track{height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
    .trait-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    .trait-val{font-size:.68rem;font-weight:700;color:var(--gold);text-align:right}

    .player-accolades{display:flex;flex-wrap:wrap;gap:.3rem}
    .badge-pill{font-size:.62rem;padding:.2rem .6rem;border-radius:99px;
      border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
      color:#94a3b8;white-space:nowrap}
    .badge-pill.gold{border-color:rgba(240,192,64,.35);background:rgba(240,192,64,.07);color:var(--gold)}

    /* ── History section ── */
    #section-history{gap:2.25rem}

    .hist-lead{font-size:.88rem;color:#94a3b8;line-height:1.75;max-width:800px}
    .hist-lead strong{color:var(--white)}
    .hist-lead em{color:var(--gold);font-style:normal}

    .hist-stats{display:flex;gap:.65rem;flex-wrap:wrap}
    .hist-stat{background:rgba(240,192,64,.04);border:1px solid rgba(240,192,64,.15);
      border-radius:8px;padding:.55rem .9rem;display:flex;flex-direction:column;gap:.2rem;min-width:108px}
    .hist-stat-label{font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
    .hist-stat-val{font-size:.95rem;color:var(--gold);font-weight:800}

    .hist-section-title{font-size:.68rem;font-weight:700;color:var(--green);text-transform:uppercase;
      letter-spacing:.12em;border-bottom:1px solid rgba(0,204,85,.12);padding-bottom:.4rem;margin-bottom:.1rem}

    /* Timeline */
    .hist-timeline{display:flex;flex-direction:column;gap:0}
    .hist-tl-row{display:grid;grid-template-columns:100px 1fr;gap:1rem;
      position:relative;padding-bottom:1.25rem}
    .hist-tl-row::before{content:'';position:absolute;left:48px;top:22px;bottom:0;
      width:1px;background:rgba(240,192,64,.12)}
    .hist-tl-row:last-child::before{display:none}
    .hist-tl-year{font-size:.75rem;font-weight:800;color:var(--gold);text-align:right;
      padding-top:.18rem;white-space:nowrap;text-shadow:0 0 10px rgba(240,192,64,.35)}
    .hist-tl-dot{position:absolute;left:43px;top:5px;width:11px;height:11px;border-radius:50%;
      background:var(--bg);border:2px solid var(--gold);box-shadow:0 0 7px rgba(240,192,64,.5)}
    .hist-tl-body{font-size:.82rem;color:#94a3b8;line-height:1.65}
    .hist-tl-body strong{color:var(--white);display:block;margin-bottom:.25rem;font-size:.84rem}

    /* Cards grid */
    .hist-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
    .hist-card{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);
      border-radius:12px;padding:1.1rem 1.2rem;display:flex;flex-direction:column;gap:.55rem;
      transition:border-color .2s,box-shadow .2s}
    .hist-card:hover{border-color:rgba(240,192,64,.25);box-shadow:0 4px 24px rgba(240,192,64,.08)}
    .hist-card-head{display:flex;align-items:center;gap:.65rem}
    .hist-card-icon{font-size:1.3rem;line-height:1;flex-shrink:0}
    .hist-card-title{font-size:.82rem;font-weight:700;color:var(--white)}
    .hist-card-body{font-size:.78rem;color:#7a9090;line-height:1.65}
    .hist-card-body strong{color:#94a3b8}

    /* ── Texas Hold'em article ── */
    #section-holdem{gap:2.5rem}

    .holdem-hero{position:relative;border-radius:14px;overflow:hidden;
      border:1px solid rgba(240,192,64,.18);background:rgba(0,0,0,.4)}
    .holdem-hero-img{width:100%;aspect-ratio:21/9;object-fit:cover;display:block;
      opacity:0;transition:opacity .5s}
    .holdem-hero-img.loaded{opacity:1}
    .holdem-hero-overlay{position:absolute;inset:0;
      background:linear-gradient(to top,rgba(10,26,14,.95) 0%,rgba(10,26,14,.3) 55%,transparent 100%);
      display:flex;flex-direction:column;justify-content:flex-end;padding:1.75rem 2rem}
    .holdem-hero-title{font-size:clamp(1.8rem,5vw,3rem);font-weight:900;line-height:1.05;
      background:linear-gradient(135deg,var(--gold),#fff 50%,#c8962a);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      letter-spacing:-.02em}
    .holdem-hero-sub{font-size:.88rem;color:rgba(240,192,64,.75);margin-top:.4rem;
      font-style:italic;letter-spacing:.03em}

    .holdem-section{display:flex;flex-direction:column;gap:1rem}
    .holdem-section-title{font-size:.68rem;font-weight:700;color:var(--green);
      text-transform:uppercase;letter-spacing:.12em;
      border-bottom:1px solid rgba(0,204,85,.12);padding-bottom:.4rem}

    .holdem-body{font-size:.88rem;color:#94a3b8;line-height:1.8;overflow:hidden}
    .holdem-body strong{color:var(--white)}
    .holdem-body em{color:var(--gold);font-style:normal}

    /* Floated article images */
    .holdem-pic{float:right;width:220px;margin:0 0 1rem 1.4rem;
      border-radius:10px;overflow:hidden;border:1px solid rgba(240,192,64,.15);
      background:rgba(0,0,0,.4);flex-shrink:0}
    .holdem-pic.left{float:left;margin:0 1.4rem 1rem 0}
    .holdem-pic img{width:100%;display:block;aspect-ratio:4/3;object-fit:cover;
      opacity:0;transition:opacity .45s}
    .holdem-pic img.loaded{opacity:1}
    .holdem-pic-cap{font-size:.62rem;color:var(--dim);padding:.35rem .6rem;
      font-style:italic;line-height:1.4;background:rgba(0,0,0,.35)}
    .holdem-clearfix::after{content:'';display:table;clear:both}

    /* Wide image (full width, between sections) */
    .holdem-pic-wide{width:100%;border-radius:12px;overflow:hidden;
      border:1px solid rgba(240,192,64,.15);background:rgba(0,0,0,.4)}
    .holdem-pic-wide img{width:100%;display:block;aspect-ratio:16/7;object-fit:cover;
      opacity:0;transition:opacity .5s}
    .holdem-pic-wide img.loaded{opacity:1}
    .holdem-pic-wide-cap{font-size:.65rem;color:var(--dim);padding:.4rem .75rem;
      font-style:italic;background:rgba(0,0,0,.35)}

    /* Image row (side by side) */
    .holdem-pic-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem}
    .holdem-pic-row .holdem-pic{float:none;width:100%;margin:0}
    .holdem-pic-row .holdem-pic img{aspect-ratio:3/2}

    /* Bet round steps */
    .holdem-rounds{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem}
    .holdem-round{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);
      border-radius:10px;padding:.9rem 1rem;display:flex;flex-direction:column;gap:.4rem}
    .holdem-round-num{font-size:.6rem;font-weight:700;color:var(--green);
      text-transform:uppercase;letter-spacing:.1em}
    .holdem-round-name{font-size:.92rem;font-weight:800;color:var(--gold)}
    .holdem-round-body{font-size:.78rem;color:#7a9090;line-height:1.55}

    /* Quote callout */
    .holdem-quote{border-left:3px solid var(--gold);padding:.75rem 1.1rem;
      background:rgba(240,192,64,.04);border-radius:0 8px 8px 0;margin:.25rem 0}
    .holdem-quote-text{font-size:.92rem;font-style:italic;color:var(--white);line-height:1.65}
    .holdem-quote-attr{font-size:.7rem;color:var(--dim);margin-top:.4rem}

    /* Glossary chips */
    .holdem-glossary{display:flex;flex-direction:column;gap:.55rem}
    .holdem-term{display:grid;grid-template-columns:160px 1fr;gap:.75rem;
      align-items:baseline;font-size:.82rem;padding:.5rem .75rem;
      border-radius:7px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.05)}
    .holdem-term:hover{border-color:rgba(240,192,64,.2)}
    .holdem-term-word{color:var(--gold);font-weight:700;font-style:italic}
    .holdem-term-def{color:#7a9090;line-height:1.55}

    @media(max-width:580px){
      .holdem-pic,.holdem-pic.left{float:none;width:100%;margin:0 0 1rem}
    }
  </style>
</head>
<body>
<div class="poker-tabs">
      <a class="poker-tab " href="index.html">Hand Evaluator</a>
      <a class="poker-tab" href="gto.html">GTO Chart</a>
      <a class="poker-tab" href="players.html">Players</a>
      <a class="poker-tab" href="history.html">History</a>
      <a class="poker-tab" href="holdem.html">Texas Hold'em</a>
    </div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/poker') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="players">
<div class="players-grid" id="players-grid"></div>
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
