<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — scumm-game</title>
<link rel="icon" href="screenshot.png">
<style>
  :root { --accent: #f0c040; --bg: #0a0c10; --card: #12151a; --border: rgba(255,255,255,.08); --text: #c9d1d9; --dim: #6a737d; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; color: var(--text); font-family: 'Courier New', monospace; line-height: 1.7; padding-top: 60px; overflow: hidden; }
  #subnav {
    position: sticky; top: 52px; z-index: 150;
    background: rgba(8,11,14,.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,.07);
    display: flex; justify-content: center; flex-wrap: wrap; gap: .2rem; padding: .4rem 1rem;
  }
  #subnav a {
    font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
    color: #5a6070; padding: .3rem .65rem; border-radius: 3px;
    text-decoration: none; transition: color .2s, background .2s;
    font-family: 'Courier New', monospace;
  }
  #subnav a:hover, #subnav a.active { color: var(--accent); background: rgba(255,255,255,.06); }
  .game-wrap {
    display: flex; align-items: center; justify-content: center;
    height: calc(100vh - 110px); background: #000;
  }
  .game-wrap canvas {
    display: block;
    width: min(100%, calc((100vh - 110px) * 960 / 660));
    height: min(100%, calc(100vw * 660 / 960));
    max-width: 960px; max-height: 660px;
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #000; outline: 0;
  }
  .hint {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    font-size: .7rem; color: var(--dim); text-align: center; z-index: 200;
    background: rgba(8,11,14,.9); padding: .4rem 1rem; border-radius: 4px;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<nav id="subnav">
  <a href="index.html">Overview</a>
  <a href="play.html">Play</a>
</nav>
<script>
  document.querySelectorAll('#subnav a').forEach(function(a) {
    var href = a.getAttribute('href');
    var path = location.pathname;
    if (path.endsWith(href) || (href === 'index.html' && (path.endsWith('/') || path.endsWith('/scumm') || path.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
</script>

<div class="game-wrap">
  <canvas id="canvas" width="960" height="660" tabindex="-1"
          oncontextmenu="event.preventDefault()"></canvas>
</div>

<div class="hint">Click to walk &middot; Verbs: Look at / Use / Pick up &middot; D = debug overlay &middot; E = editor</div>

<script>
  var Module = { canvas: document.getElementById("canvas") };
</script>
<script src="game/index.js" async></script>

<script src="/shared/nav.js?v=2"></script>
</body>
</html>
