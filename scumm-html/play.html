<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — scumm-game</title>
<link rel="icon" href="screenshot.png">
<style>
  :root { --accent: #f0c040; --bg: #0a0c10; --card: #12151a; --border: rgba(255,255,255,.08); --text: #c9d1d9; --dim: #6a737d; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; line-height: 1.7; padding-top: 60px; overflow: hidden; }
  #subnav {
    position: sticky; top: 52px; z-index: 150;
    background: rgba(8,11,14,.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,.07);
    display: flex; justify-content: center; flex-wrap: wrap; gap: .2rem; padding: .4rem 1rem;
  }
  #subnav a {
    font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
    color: #5a6070; padding: .3rem .65rem; border-radius: 3px;
    text-decoration: none; transition: color .2s, background .2s;
    font-family: 'Courier New', monospace;
  }
  #subnav a:hover, #subnav a.active { color: var(--accent); background: rgba(255,255,255,.06); }
  .game-wrap {
    display: flex; align-items: center; justify-content: center;
    height: calc(100vh - 110px); background: #000;
  }
  canvas.emscripten { border: 0 none; background-color: #000; }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: var(--accent); font-size: 1rem; font-family: 'Courier New', monospace;
  }
  .hint {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    font-size: .7rem; color: var(--dim); text-align: center; z-index: 200;
    background: rgba(8,11,14,.9); padding: .4rem 1rem; border-radius: 4px;
    border: 1px solid var(--border);
  }
</style>
<script src="game/FileSaver.min.js"></script>
<script>function saveFileFromMEMFSToDisk(e,a){var i,o=FS.readFile(e);i=new Blob([o.buffer],{type:"application/octet-binary"}),saveAs(i,a)}</script>
</head>
<body>

<nav id="subnav">
  <a href="index.html">Overview</a>
  <a href="play.html">Play</a>
</nav>
<script>
  document.querySelectorAll('#subnav a').forEach(function(a) {
    var href = a.getAttribute('href');
    var path = location.pathname;
    if (path.endsWith(href) || (href === 'index.html' && (path.endsWith('/') || path.endsWith('/scumm') || path.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
</script>

<div class="game-wrap">
  <div id="loading">Loading game...</div>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
</div>

<div class="hint">Click to walk &middot; Verbs: Look at / Use / Pick up &middot; D = debug overlay &middot; E = editor</div>

<p id="output" style="display:none"></p>
<script>
var Module = {
  print: (function() {
    var e = document.getElementById('output');
    return function(n) {
      if (arguments.length > 1) n = Array.prototype.slice.call(arguments).join(' ');
      console.log(n);
      if (e) { e.value += n + '\n'; e.scrollTop = e.scrollHeight; }
    }
  })(),
  canvas: document.getElementById('canvas'),
  onRuntimeInitialized: function() {
    document.getElementById('loading').style.display = 'none';
  }
};
</script>
<script src="game/index.js" async></script>

<script src="/shared/nav.js?v=2"></script>
</body>
</html>
