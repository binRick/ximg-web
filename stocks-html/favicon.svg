<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f1a0f"/>
  <!-- Stock chart candlesticks -->
  <!-- Axes -->
  <line x1="4" y1="28" x2="28" y2="28" stroke="#374151" stroke-width="1"/>
  <line x1="4" y1="4" x2="4" y2="28" stroke="#374151" stroke-width="1"/>
  <!-- Green candle -->
  <rect x="8" y="14" width="4" height="10" rx="0.5" fill="#22c55e"/>
  <line x1="10" y1="12" x2="10" y2="14" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="10" y1="24" x2="10" y2="27" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Red candle -->
  <rect x="15" y="10" width="4" height="8" rx="0.5" fill="#ef4444"/>
  <line x1="17" y1="8" x2="17" y2="10" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="17" y1="18" x2="17" y2="22" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Green candle 2 -->
  <rect x="22" y="8" width="4" height="12" rx="0.5" fill="#22c55e"/>
  <line x1="24" y1="6" x2="24" y2="8" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="24" y1="20" x2="24" y2="24" stroke="#22c55e" stroke-width="1.5"/>
</svg>
