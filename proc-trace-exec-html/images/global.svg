<svg xmlns="http://www.w3.org/2000/svg" width="768" height="348" viewBox="0 0 768 348">
  <defs>
    <linearGradient id="tbg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .cur2 { animation: blink2 1.1s step-end infinite; }
      @keyframes blink2 { 0%,100% { opacity:1 } 50% { opacity:0 } }
    </style>
  </defs>

  <!-- shadow -->
  <rect x="4" y="6" width="760" height="338" rx="12" fill="rgba(0,0,0,0.45)"/>
  <!-- window -->
  <rect width="760" height="338" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- titlebar -->
  <rect width="760" height="36" rx="12" fill="url(#tbg2)"/>
  <rect y="24" width="760" height="12" fill="#161b22"/>
  <line x1="0" y1="36" x2="760" y2="36" stroke="#21262d" stroke-width="1"/>
  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="380" y="23" text-anchor="middle" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="12" fill="#484f58">proc-trace-exec — system-wide</text>

  <!-- ── L1: prompt ── -->
  <text xml:space="preserve" x="20" y="65" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#a78bfa">$</tspan><tspan fill="#fbbf24"> sudo </tspan><tspan fill="#4fc3f7">proc-trace-exec</tspan><tspan fill="#e2e8f0"> -u -t</tspan></text>

  <!-- ── L2: sshd top-level ── -->
  <text xml:space="preserve" x="20" y="86" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#fbbf24">95100</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#f87171"> &lt;root&gt;</tspan><tspan fill="#e2e8f0"> sshd: </tspan><tspan fill="#6e7681">rick [priv]</tspan></text>

  <!-- ── L3: sshd child (depth 1) ── -->
  <text xml:space="preserve" x="20" y="107" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">  </tspan><tspan fill="#fbbf24">95101</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#f87171"> &lt;root&gt;</tspan><tspan fill="#e2e8f0"> sshd: </tspan><tspan fill="#6e7681">rick@pts/0</tspan></text>

  <!-- ── L4: bash (depth 2) ── -->
  <text xml:space="preserve" x="20" y="128" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">    </tspan><tspan fill="#fbbf24">95102</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#4ade80"> &lt;rick&gt;</tspan><tspan fill="#e2e8f0"> -bash</tspan></text>

  <!-- ── L5: git pull (depth 3) ── -->
  <text xml:space="preserve" x="20" y="149" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">      </tspan><tspan fill="#fbbf24">95150</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#4ade80"> &lt;rick&gt;</tspan><tspan fill="#e2e8f0"> git pull</tspan></text>

  <!-- ── L6: git fetch (depth 4) ── -->
  <text xml:space="preserve" x="20" y="170" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">        </tspan><tspan fill="#fbbf24">95151</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#4ade80"> &lt;rick&gt;</tspan><tspan fill="#e2e8f0"> git fetch</tspan></text>

  <!-- ── L7: ssh (depth 5) ── -->
  <text xml:space="preserve" x="20" y="191" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">          </tspan><tspan fill="#fbbf24">95152</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#4ade80"> &lt;rick&gt;</tspan><tspan fill="#e2e8f0"> ssh </tspan><tspan fill="#6e7681">-x git@github.com</tspan></text>

  <!-- ── L8: git merge (depth 4) ── -->
  <text xml:space="preserve" x="20" y="212" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">        </tspan><tspan fill="#fbbf24">95153</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#4ade80"> &lt;rick&gt;</tspan><tspan fill="#e2e8f0"> git merge FETCH_HEAD</tspan></text>

  <!-- ── L9: git merge exit ── -->
  <text xml:space="preserve" x="20" y="233" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">        </tspan><tspan fill="#fbbf24">95153</tspan><tspan fill="#f87171">-</tspan><tspan fill="#6e7681"> git exited </tspan><tspan fill="#4ade80">status=0</tspan><tspan fill="#6e7681"> time=</tspan><tspan fill="#4fc3f7">0.421s</tspan></text>

  <!-- ── L10: git pull exit ── -->
  <text xml:space="preserve" x="20" y="254" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">      </tspan><tspan fill="#fbbf24">95150</tspan><tspan fill="#f87171">-</tspan><tspan fill="#6e7681"> git exited </tspan><tspan fill="#4ade80">status=0</tspan><tspan fill="#6e7681"> time=</tspan><tspan fill="#4fc3f7">1.832s</tspan></text>

  <!-- ── L11: nginx worker (unrelated top-level) ── -->
  <text xml:space="preserve" x="20" y="275" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#fbbf24">95200</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#fbbf24"> &lt;www-data&gt;</tspan><tspan fill="#e2e8f0"> nginx: worker process</tspan></text>

  <!-- ── L12: cron ── -->
  <text xml:space="preserve" x="20" y="296" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#fbbf24">95201</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#f87171"> &lt;root&gt;</tspan><tspan fill="#e2e8f0"> cron </tspan><tspan fill="#6e7681">-f -P</tspan><tspan fill="#4fc3f7" class="cur2"> █</tspan></text>
</svg>
