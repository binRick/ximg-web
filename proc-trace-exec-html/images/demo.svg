<svg xmlns="http://www.w3.org/2000/svg" width="728" height="342" viewBox="0 0 728 342">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .cur { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }
    </style>
  </defs>

  <!-- shadow -->
  <rect x="4" y="6" width="720" height="332" rx="12" fill="rgba(0,0,0,0.45)"/>
  <!-- window -->
  <rect width="720" height="332" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- titlebar -->
  <rect width="720" height="36" rx="12" fill="url(#tbg)"/>
  <rect y="24" width="720" height="12" fill="#161b22"/>
  <line x1="0" y1="36" x2="720" y2="36" stroke="#21262d" stroke-width="1"/>
  <!-- traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- title -->
  <text x="360" y="23" text-anchor="middle" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="12" fill="#484f58">proc-trace-exec — bash</text>

  <!-- ── L1: prompt + command ── -->
  <text xml:space="preserve" x="20" y="65" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#a78bfa">$</tspan><tspan fill="#fbbf24"> sudo </tspan><tspan fill="#4fc3f7">proc-trace-exec</tspan><tspan fill="#e2e8f0"> -t sh -c </tspan><tspan fill="#86efac">'find /etc -name "*.conf" | head -3'</tspan></text>

  <!-- ── L2: exec sh ── -->
  <text xml:space="preserve" x="20" y="86" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#fbbf24">32741</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#e2e8f0"> sh </tspan><tspan fill="#6e7681">-c 'find /etc -name "*.conf" | head -3'</tspan></text>

  <!-- ── L3: exec find (depth 1) ── -->
  <text xml:space="preserve" x="20" y="107" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">  </tspan><tspan fill="#fbbf24">32742</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#e2e8f0"> find </tspan><tspan fill="#6e7681">/etc -name '*.conf'</tspan></text>

  <!-- ── L4: exec head (depth 1) ── -->
  <text xml:space="preserve" x="20" y="128" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">  </tspan><tspan fill="#fbbf24">32743</tspan><tspan fill="#4ade80">+</tspan><tspan fill="#e2e8f0"> head </tspan><tspan fill="#6e7681">-3</tspan></text>

  <!-- ── L5–7: program output ── -->
  <text x="20" y="149" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13" fill="#6e7681">/etc/host.conf</text>
  <text x="20" y="170" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13" fill="#6e7681">/etc/nsswitch.conf</text>
  <text x="20" y="191" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13" fill="#6e7681">/etc/resolv.conf</text>

  <!-- ── L8: exit head ── -->
  <text xml:space="preserve" x="20" y="212" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">  </tspan><tspan fill="#fbbf24">32743</tspan><tspan fill="#f87171">-</tspan><tspan fill="#6e7681"> head exited </tspan><tspan fill="#4ade80">status=0</tspan><tspan fill="#6e7681"> time=</tspan><tspan fill="#4fc3f7">0.001s</tspan></text>

  <!-- ── L9: exit find (SIGPIPE from head closing pipe) ── -->
  <text xml:space="preserve" x="20" y="233" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#2d333b">  </tspan><tspan fill="#fbbf24">32742</tspan><tspan fill="#f87171">-</tspan><tspan fill="#6e7681"> find exited </tspan><tspan fill="#f87171">status=141</tspan><tspan fill="#6e7681"> time=</tspan><tspan fill="#4fc3f7">0.003s</tspan></text>

  <!-- ── L10: exit sh ── -->
  <text xml:space="preserve" x="20" y="254" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#fbbf24">32741</tspan><tspan fill="#f87171">-</tspan><tspan fill="#6e7681"> sh exited </tspan><tspan fill="#4ade80">status=0</tspan><tspan fill="#6e7681"> time=</tspan><tspan fill="#4fc3f7">0.006s</tspan></text>

  <!-- ── L12: next prompt + blinking cursor ── -->
  <text xml:space="preserve" x="20" y="296" font-family="'Courier New',Consolas,'Lucida Console',monospace" font-size="13"><tspan fill="#a78bfa">$</tspan><tspan fill="#4ade80" class="cur"> █</tspan></text>
</svg>
