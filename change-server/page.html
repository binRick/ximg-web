<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Log — change.ximg.app</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#030a0d;--green:#00e676;--ltgrn:#69f0ae;--teal:#00acc1;
      --amber:#ffb300;--steel:#607d8b;--text:#cfe8f0;--muted:#3d6070;
      --card:rgba(4,18,28,.9);--border:rgba(0,230,118,.15);
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse 100% 50% at 50% 0%,#001a0a 0%,transparent 60%),
        linear-gradient(180deg,#030a0d 0%,#020508 100%)}
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        repeating-linear-gradient(0deg,rgba(0,230,118,.012) 0,rgba(0,230,118,.012) 1px,transparent 1px,transparent 56px),
        repeating-linear-gradient(90deg,rgba(0,230,118,.008) 0,rgba(0,230,118,.008) 1px,transparent 1px,transparent 72px)}
    .wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;width:100%;
      padding:2rem 1.25rem 4rem;display:flex;flex-direction:column;gap:1.75rem}
    .hero{text-align:center;display:flex;flex-direction:column;align-items:center;gap:.6rem}
    .hero-icon{font-size:2.5rem;filter:drop-shadow(0 0 18px rgba(0,230,118,.6))}
    .hero h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;line-height:1.05;
      background:linear-gradient(135deg,#69f0ae 0%,#fff 45%,#00acc1 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      letter-spacing:-.02em}
    .hero-sub{font-size:.9rem;color:var(--muted);max-width:480px;line-height:1.6}
    .hero-divider{width:120px;height:2px;
      background:linear-gradient(90deg,transparent,var(--green),var(--teal),transparent)}
    .stats{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:8px;
      padding:.6rem 1.1rem;text-align:center}
    .stat-n{font-size:1.4rem;font-weight:900;color:var(--ltgrn);line-height:1}
    .stat-l{font-size:.68rem;color:var(--muted);font-weight:600;
      text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}
    .toolbar{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
    .search-wrap{flex:1;min-width:220px;position:relative}
    .search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);
      color:var(--muted);font-size:.9rem;pointer-events:none}
    #search{width:100%;padding:.55rem .75rem .55rem 2.2rem;
      background:var(--card);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s}
    #search::placeholder{color:var(--muted)}
    #search:focus{border-color:rgba(0,230,118,.4)}
    .count-badge{font-size:.8rem;color:var(--muted);white-space:nowrap;font-weight:600;
      padding:.4rem .8rem;background:var(--card);border:1px solid var(--border);border-radius:6px}
    .count-badge span{color:var(--ltgrn)}
    .timeline{display:flex;flex-direction:column}
    .day-label{font-size:.72rem;font-weight:700;color:var(--amber);
      text-transform:uppercase;letter-spacing:.12em;padding:.5rem 0 .4rem 52px}
    .day-label.hidden,.commit-row.hidden{display:none}
    .commit-row{display:grid;grid-template-columns:52px 1fr;align-items:stretch}
    .spine{display:flex;flex-direction:column;align-items:center;padding-top:.55rem}
    .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;
      background:var(--green);box-shadow:0 0 6px var(--green);transition:transform .15s}
    .commit-row:hover .dot{transform:scale(1.4)}
    .line{flex:1;width:2px;min-height:8px;
      background:linear-gradient(180deg,rgba(0,230,118,.3) 0%,rgba(0,230,118,.08) 100%)}
    .commit-card{margin:0 0 .75rem;background:var(--card);border:1px solid var(--border);
      border-radius:10px;padding:.75rem 1rem;transition:border-color .2s,box-shadow .2s}
    .commit-row:hover .commit-card{border-color:rgba(0,230,118,.35);box-shadow:0 4px 20px rgba(0,230,118,.1)}
    .commit-subject{font-size:.92rem;font-weight:600;color:var(--text);line-height:1.45;word-break:break-word}
    .commit-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.45rem}
    .hash-chip{font-family:'Courier New',monospace;font-size:.72rem;color:var(--teal);
      background:rgba(0,172,193,.12);border:1px solid rgba(0,172,193,.2);
      border-radius:4px;padding:.1rem .45rem;letter-spacing:.03em;text-decoration:none}
    .hash-chip:hover{background:rgba(0,172,193,.25);border-color:rgba(0,172,193,.5);text-decoration:underline}
    .author-chip{font-size:.72rem;color:var(--muted)}
    .time-chip{font-size:.72rem;color:var(--muted);margin-left:auto}
    .diff-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-top:.3rem}
    .files-chip{font-size:.7rem;color:var(--steel);background:rgba(96,125,139,.1);
      border:1px solid rgba(96,125,139,.2);border-radius:4px;padding:.1rem .4rem}
    .lines-chip{font-size:.7rem;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);
      border-radius:4px;padding:.1rem .4rem}
    .lines-chip .add{color:#69f0ae}
    .lines-chip .del{color:#ff5252}
    .chars-chip{font-size:.7rem;color:var(--amber);background:rgba(255,179,0,.08);
      border:1px solid rgba(255,179,0,.15);border-radius:4px;padding:.1rem .4rem}
    .no-results{text-align:center;color:var(--muted);font-size:.9rem;
      padding:3rem 1rem;display:none}
    .no-results.visible{display:block}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-icon">📋</div>
    <h1>Change Log</h1>
    <p class="hero-sub">Every commit to ximg.app — live from git, searchable, with author and timestamp. Click any hash to view the commit on GitHub.</p>
    <div class="hero-divider"></div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="search" placeholder="Search commits, hashes, authors…" autocomplete="off" spellcheck="false">
    </div>
    <div class="count-badge">Showing <span id="vc">0</span> of <span id="tc">0</span></div>
  </div>
  <div class="timeline" id="tl"></div>
  <div class="no-results" id="nr">No commits match your search.</div>
</div>
<script id="data-script">/* DATA_PLACEHOLDER */</script>
<script>
(function() {
  var days = new Set(COMMITS.map(function(c){ return c.date.slice(0,10); }));
  var authors = new Set(COMMITS.map(function(c){ return c.author; }));
  var first = COMMITS.length ? COMMITS[COMMITS.length-1].date.slice(0,10) : '-';
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-n">'+COMMITS.length+'</div><div class="stat-l">Commits</div></div>'+
    '<div class="stat"><div class="stat-n">'+days.size+'</div><div class="stat-l">Active Days</div></div>'+
    '<div class="stat"><div class="stat-n">'+authors.size+'</div><div class="stat-l">Authors</div></div>'+
    '<div class="stat"><div class="stat-n">'+first+'</div><div class="stat-l">First Commit</div></div>';

  document.getElementById('tc').textContent = COMMITS.length;
  document.getElementById('vc').textContent = COMMITS.length;

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmt(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n); }
  function fmtTime(d){ var x=new Date(d); return x.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
  function fmtDay(d){ var x=new Date(d); return x.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}); }
  function hlText(t, q) {
    if (!q) return esc(t);
    var parts = esc(t).split(new RegExp('(' + esc(q).replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&') + ')', 'gi'));
    return parts.map(function(p, i){ return i%2===1 ? '<mark style="background:rgba(0,230,118,.25);color:#69f0ae;border-radius:2px">'+p+'</mark>' : p; }).join('');
  }

  var tl = document.getElementById('tl');
  var groups = {};
  var rows = [];

  COMMITS.forEach(function(c, i) {
    var day = c.date.slice(0, 10);
    if (!groups[day]) {
      var lbl = document.createElement('div');
      lbl.className = 'day-label';
      lbl.textContent = fmtDay(c.date);
      tl.appendChild(lbl);
      groups[day] = { lbl: lbl, items: [] };
    }
    var row = document.createElement('div');
    row.className = 'commit-row';
    row.innerHTML =
      '<div class="spine"><div class="dot"></div>'+(i<COMMITS.length-1?'<div class="line"></div>':'')+'</div>'+
      '<div class="commit-card">'+
        '<div class="commit-subject">'+esc(c.subject)+'</div>'+
        '<div class="commit-meta">'+
          '<a class="hash-chip" href="https://github.com/binRick/ximg-web/commit/'+c.hash+'" target="_blank" rel="noopener">'+c.short+'</a>'+
          '<span class="author-chip">&#128100; '+esc(c.author)+'</span>'+
          '<span class="time-chip">&#128336; '+fmtTime(c.date)+'</span>'+
        '</div>'+
        '<div class="diff-meta">'+
          '<span class="files-chip">'+c.filesChanged+' file'+(c.filesChanged===1?'':'s')+'</span>'+
          '<span class="lines-chip"><span class="add">+'+fmt(c.linesAdded)+'</span> <span class="del">-'+fmt(c.linesDeleted)+'</span></span>'+
          '<span class="chars-chip">~'+fmt(c.charsChanged)+' chars</span>'+
        '</div>'+
      '</div>';
    tl.appendChild(row);
    groups[day].items.push(row);
    rows.push({ row: row, c: c, day: day });
  });

  document.getElementById('search').addEventListener('input', function() {
    var q = this.value.trim();
    var ql = q.toLowerCase();
    var vis = 0;
    rows.forEach(function(r) {
      var m = !q || r.c.subject.toLowerCase().indexOf(ql) >= 0 ||
              r.c.hash.indexOf(ql) >= 0 || r.c.short.indexOf(ql) >= 0 ||
              r.c.author.toLowerCase().indexOf(ql) >= 0;
      r.row.classList.toggle('hidden', !m);
      if (m) { vis++; r.row.querySelector('.commit-subject').innerHTML = hlText(r.c.subject, q); }
    });
    Object.keys(groups).forEach(function(d) {
      var any = groups[d].items.some(function(r){ return !r.classList.contains('hidden'); });
      groups[d].lbl.classList.toggle('hidden', !any);
    });
    document.getElementById('vc').textContent = vis;
    document.getElementById('nr').classList.toggle('visible', vis === 0);
  });
})();
</script>
SHARED_NAV_PLACEHOLDER
</body>
</html>
