var sortCol = 2; // date by default
var sortAsc = true;
var searchVal = '';
var dateFilter = '';

function renderTable() {
  var filtered = APPS.filter(function(a) {
    if (dateFilter && a.date !== dateFilter) return false;
    if (!searchVal) return true;
    var q = searchVal.toLowerCase();
    return (a.name + a.domain + a.date + a.desc).toLowerCase().indexOf(q) !== -1;
  });

  filtered.sort(function(a, b) {
    var keys = ['name','domain','date','desc'];
    var av = a[keys[sortCol]], bv = b[keys[sortCol]];
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  var tbody = document.getElementById('apps-body');
  tbody.innerHTML = filtered.map(function(a) {
    var badges = '';
    if (a.infra) badges += '<span class="badge badge-infra" title="infrastructure / tooling">infra</span> ';
    return '<tr>' +
      '<td class="td-app"><a class="app-link" href="https://' + a.domain + '">' +
        '<span class="app-icon">' + (a.icon || '🔹') + '</span>' + escHtml(a.name) + '</a>' + (badges ? '<br><span style="margin-left:1.6rem">' + badges + '</span>' : '') + '</td>' +
      '<td class="td-domain"><a class="domain-link" href="https://' + a.domain + '">' + escHtml(a.domain) + '</a></td>' +
      '<td class="td-date">' + escHtml(a.date) + '</td>' +
      '<td class="td-desc">' + escHtml(a.desc) + '</td>' +
      '</tr>';
  }).join('');

  document.getElementById('vis-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = APPS.length;
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('apps-table').style.display = filtered.length ? '' : 'none';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Build date filter tabs
(function() {
  var counts = {};
  APPS.forEach(function(a) { counts[a.date] = (counts[a.date] || 0) + 1; });
  var dates = Object.keys(counts).sort();
  var wrap = document.getElementById('date-filter');

  function makeBtn(label, val, count) {
    var b = document.createElement('button');
    b.className = 'date-btn' + (val === dateFilter ? ' active' : '');
    b.innerHTML = label + (count !== undefined ? '<span class="dc">(' + count + ')</span>' : '');
    b.addEventListener('click', function() {
      dateFilter = (dateFilter === val) ? '' : val;
      wrap.querySelectorAll('.date-btn').forEach(function(x) { x.classList.remove('active'); });
      if (dateFilter) b.classList.add('active');
      else wrap.querySelector('.date-btn[data-val=""]').classList.add('active');
      renderTable();
    });
    b.setAttribute('data-val', val);
    return b;
  }

  // "All" button
  wrap.appendChild(makeBtn('all', '', undefined));
  wrap.querySelector('.date-btn[data-val=""]').classList.add('active');

  dates.forEach(function(d) {
    // Format as "Mar 28" style
    var parts = d.split('-');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var label = months[parseInt(parts[1],10)-1] + ' ' + parseInt(parts[2],10);
    wrap.appendChild(makeBtn(label, d, counts[d]));
  });
})();

// Sort headers
document.querySelectorAll('thead th').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = parseInt(th.getAttribute('data-col'));
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('thead th').forEach(function(h) {
      h.classList.toggle('sorted', parseInt(h.getAttribute('data-col')) === sortCol);
      var arrow = h.querySelector('.sort-arrow');
      if (parseInt(h.getAttribute('data-col')) === sortCol) {
        arrow.textContent = sortAsc ? '↑' : '↓';
      } else {
        arrow.textContent = '↕';
      }
    });
    renderTable();
  });
});

// Highlight default sort column
document.querySelector('thead th[data-col="2"]').classList.add('sorted');
document.querySelector('thead th[data-col="2"] .sort-arrow').textContent = '↑';

// Search
document.getElementById('search').addEventListener('input', function() {
  searchVal = this.value.trim();
  renderTable();
});

renderTable();
</script>
