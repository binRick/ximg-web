<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>apps — ximg.app</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #0f1117;
      --border: rgba(255,255,255,.07);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
      --green: #00ff41;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      flex: 1;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.03em;
      margin-bottom: .4rem;
    }
    h1 span { color: var(--green); }

    .subtitle {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 2rem;
    }

    .controls {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 360px;
    }
    .search-wrap svg {
      position: absolute;
      left: .7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: .82rem;
      padding: .5rem .75rem .5rem 2.1rem;
      border-radius: 6px;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: rgba(124,58,237,.5); }
    #search::placeholder { color: var(--muted); }

    .count {
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .count span { color: var(--green); }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }

    thead th {
      background: rgba(124,58,237,.12);
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-size: .7rem;
      padding: .75rem 1rem;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--green); }
    thead th .sort-arrow { margin-left: .3rem; opacity: .5; }
    thead th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody tr.hidden { display: none; }

    td {
      padding: .65rem 1rem;
      vertical-align: middle;
    }

    .td-app {
      white-space: nowrap;
    }

    .app-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-weight: 700;
      font-size: .85rem;
      color: var(--text);
      text-decoration: none;
      transition: color .2s;
    }
    .app-link:hover { color: var(--green); }
    .app-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 4px var(--green);
      flex-shrink: 0;
    }

    .td-domain {
      white-space: nowrap;
    }
    .domain-link {
      color: var(--accent2);
      text-decoration: none;
      font-size: .78rem;
      opacity: .85;
      transition: opacity .2s;
    }
    .domain-link:hover { opacity: 1; }

    .td-date {
      white-space: nowrap;
      color: var(--muted);
      font-size: .78rem;
    }

    .td-desc {
      color: #a0a8b8;
      line-height: 1.5;
      max-width: 500px;
    }

    .badge {
      display: inline-block;
      font-size: .65rem;
      padding: .15rem .45rem;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .badge-new { background: rgba(0,255,65,.12); color: var(--green); border: 1px solid rgba(0,255,65,.25); }
    .badge-infra { background: rgba(6,182,212,.12); color: var(--accent2); border: 1px solid rgba(6,182,212,.25); }

    .no-results {
      padding: 3rem;
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
    }
  </style>
</head>
<body>

<div class="page">
  <h1><span>//</span> ximg.app — all apps</h1>
  <p class="subtitle">Every app in the stack — what it does, where it lives, and when it was added.</p>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="search apps…" autocomplete="off">
    </div>
    <div class="count">showing <span id="vis-count">0</span> of <span id="total-count">0</span> apps</div>
  </div>

  <div class="table-wrap">
    <table id="apps-table">
      <thead>
        <tr>
          <th data-col="0">App <span class="sort-arrow">↕</span></th>
          <th data-col="1">Domain <span class="sort-arrow">↕</span></th>
          <th data-col="2">Added <span class="sort-arrow">↕</span></th>
          <th data-col="3">Description <span class="sort-arrow">↕</span></th>
        </tr>
      </thead>
      <tbody id="apps-body">
        <!-- rows injected by JS -->
      </tbody>
    </table>
    <div id="no-results" class="no-results" style="display:none">No apps match your search.</div>
  </div>
</div>

<script>
var APPS = [
  { name:'ximg.app',          domain:'ximg.app',          date:'2026-03-28', desc:'Landing page — animated grid, floating orbs, frosted-glass app directory card.' },
  { name:'Linux Terminal',    domain:'linux.ximg.app',    date:'2026-03-28', desc:'Browser terminal powered by xterm.js with ~20 mock shell commands and a DVD-bouncing Tux mascot.' },
  { name:'Butterfly',         domain:'butterfly.ximg.app',date:'2026-03-28', desc:'Canvas particle animation driven by the butterfly curve polar equation — hypnotic, mathematical.' },
  { name:'ASCII Art',         domain:'ascii.ximg.app',    date:'2026-03-28', desc:'Three classic ASCII demos: spinning donut (3-D torus), matrix rain, and sine-wave plasma.' },
  { name:'JSON Reference',    domain:'json.ximg.app',     date:'2026-03-28', desc:'JSON type reference card with syntax-highlighted examples for every value type — educational quick-ref.' },
  { name:'Poker',             domain:'poker.ximg.app',    date:'2026-03-28', desc:'Texas Hold\'em hand evaluator — pick hole cards, see hand rank, probability bar chart, and GTO preflop chart.' },
  { name:'Live Logs',         domain:'logs.ximg.app',     date:'2026-03-28', desc:'Real-time nginx access log viewer over WebSocket, one tab per subdomain, plus an SSH honeypot session browser.', infra:true },
  { name:'Mail',              domain:'mail.ximg.app',     date:'2026-03-28', desc:'Webmail inbox for @ximg.app addresses — live SMTP receiver with a Gmail-style email reader UI.', infra:true },
  { name:'Mario',             domain:'mario.ximg.app',    date:'2026-03-29', desc:'Canvas-based Mario platformer game playable in the browser — move, jump, enemies, score.' },
  { name:'Docker',            domain:'docker.ximg.app',   date:'2026-03-29', desc:'Docker command reference (containers, images, volumes, cleanup) plus an annotated Docker Compose guide.' },
  { name:'YAML Reference',    domain:'yaml.ximg.app',     date:'2026-03-29', desc:'YAML type reference card covering scalars, sequences, mappings, anchors, multi-line strings, and gotchas.' },
  { name:'DOOM',              domain:'doom.ximg.app',     date:'2026-03-29', desc:'DOOM lore deep-dive — all classic weapons with real-world photos, enemies, levels, and id Software history.' },
  { name:'Monkey',            domain:'monkey.ximg.app',   date:'2026-03-29', desc:'Monkey-themed app — primate species, facts, and fun content.' },
  { name:'Pizza',             domain:'pizza.ximg.app',    date:'2026-03-29', desc:'Top pizza chains and regional styles across America — history, stats, and fun facts for each.' },
  { name:'Mortal Kombat',     domain:'kombat.ximg.app',   date:'2026-03-29', desc:'Full Mortal Kombat character roster with photos, bios, and fighting stats for every fighter in the franchise.' },
  { name:'WarGames',          domain:'wargames.ximg.app', date:'2026-03-29', desc:'1983 cold-war thriller guide — cast, plot, WOPR terminal Easter egg, and "Shall we play a game?" lore.' },
  { name:'Moto',              domain:'moto.ximg.app',     date:'2026-03-29', desc:'Motorcycle culture — types, iconic brands, notable bikes, and the art of riding.' },
  { name:'India',             domain:'india.ximg.app',    date:'2026-03-29', desc:'India explorer — culture, food, landmarks, history, and the subcontinent\'s incredible diversity.' },
  { name:'Chinese Food',      domain:'chinese.ximg.app',  date:'2026-03-29', desc:'Eight regional Chinese cuisines and their iconic dishes — one of the world\'s oldest and richest food cultures.' },
  { name:'Woodworking',       domain:'wood.ximg.app',     date:'2026-03-29', desc:'Wood species, joinery techniques, hand tools, power tools, and finishing — the full craft of woodworking.' },
  { name:'Firearms',          domain:'guns.ximg.app',     date:'2026-03-29', desc:'Firearm types and the top 10 most popular guns in America — facts, stats, and history.' },
  { name:'Tampa',             domain:'tampa.ximg.app',    date:'2026-03-29', desc:'Tampa Bay guide — best restaurants, an interactive map, and live traffic for the Bay City.' },
  { name:'Florida',           domain:'florida.ximg.app',  date:'2026-03-29', desc:'God\'s Country — beaches, nature, freedom, food, and eternal summer across the Sunshine State.' },
  { name:'America',           domain:'america.ximg.app',  date:'2026-03-29', desc:'Why the USA is the greatest country in history — science, tech, medicine, military, culture, and more.' },
  { name:'Computing History', domain:'computers.ximg.app',date:'2026-03-29', desc:'How America invented the computer — types, timeline, pioneering companies, and the people who changed the world.' },
  { name:'Trump',             domain:'trump.ximg.app',    date:'2026-03-30', desc:'Donald J. Trump — fun facts, full life timeline, presidency achievements, and iconic photo gallery.' },
  { name:'Command & Conquer', domain:'cnc.ximg.app',      date:'2026-03-30', desc:'The legendary RTS franchise — every game, factions, units, buildings, lore, and a browser RTS game tab.' },
  { name:'RxFitt',            domain:'rx.ximg.app',       date:'2026-03-30', desc:'Pharmacy + fitness health coaching platform — GLP-1 tracking, metabolic labs, body composition, and workouts.' },
  { name:'SimCity',           domain:'simcity.ximg.app',  date:'2026-03-30', desc:'Will Wright\'s city-building legacy — every game, the visionary designer, and Cities: Skylines as its heir.' },
  { name:'The Internet',      domain:'internet.ximg.app', date:'2026-03-30', desc:'What the internet is, how America\'s DOD built it, top 20 protocols, and how it connected all of humanity.' },
  { name:'Change Log',        domain:'change.ximg.app',   date:'2026-03-30', desc:'Full git commit history — every change to this project, live from git, searchable by message, hash, or author.' },
  { name:'FidoNet',           domain:'fidonet.ximg.app',  date:'2026-03-30', desc:'The Internet Before the Internet — history, how it worked, BBS culture, and the volunteer network that connected 40,000 nodes worldwide.' },
  { name:'tmux',              domain:'tmux.ximg.app',     date:'2026-03-31', desc:'Terminal multiplexer reference — full cheatsheet, interactive pane simulator, annotated .tmux.conf, and 17-year history.' },
  { name:'Cold War',          domain:'coldwar.ximg.app',  date:'2026-03-31', desc:'The 45-year standoff — nuclear arms race, proxy wars, space race, CIA vs KGB espionage, leaders, and the Soviet collapse.' },
  { name:'Passwords',         domain:'passwords.ximg.app', date:'2026-03-31', desc:'Generate strong random passwords and passphrases, test password strength, see crack times by attack type, and learn best practices.' },
  { name:'Ansible',           domain:'ansible.ximg.app',  date:'2026-03-31', desc:'Agentless automation — playbooks, modules, inventory, variables, roles, Vault, and the full history from 2012 to AI-assisted authoring.' },
  { name:'Chess',             domain:'chess.ximg.app',    date:'2026-03-31', desc:'The game of kings — pieces, openings, tactics, all 16 world champions, and 1,500 years of chess history from Chaturanga to Gukesh.' },
  { name:'apps',              domain:'apps.ximg.app',     date:'2026-03-30', desc:'This page — a complete directory of every app in the ximg.app stack with descriptions and launch dates.' },
];

var sortCol = 2; // date by default
var sortAsc = true;
var searchVal = '';

function renderTable() {
  var filtered = APPS.filter(function(a) {
    if (!searchVal) return true;
    var q = searchVal.toLowerCase();
    return (a.name + a.domain + a.date + a.desc).toLowerCase().indexOf(q) !== -1;
  });

  filtered.sort(function(a, b) {
    var keys = ['name','domain','date','desc'];
    var av = a[keys[sortCol]], bv = b[keys[sortCol]];
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  var tbody = document.getElementById('apps-body');
  tbody.innerHTML = filtered.map(function(a) {
    var badges = '';
    if (a.infra) badges += '<span class="badge badge-infra" title="infrastructure / tooling">infra</span> ';
    return '<tr>' +
      '<td class="td-app"><a class="app-link" href="https://' + a.domain + '">' +
        '<span class="app-dot"></span>' + escHtml(a.name) + '</a>' + (badges ? '<br><span style="margin-left:1.2rem">' + badges + '</span>' : '') + '</td>' +
      '<td class="td-domain"><a class="domain-link" href="https://' + a.domain + '">' + escHtml(a.domain) + '</a></td>' +
      '<td class="td-date">' + escHtml(a.date) + '</td>' +
      '<td class="td-desc">' + escHtml(a.desc) + '</td>' +
      '</tr>';
  }).join('');

  document.getElementById('vis-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = APPS.length;
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('apps-table').style.display = filtered.length ? '' : 'none';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Sort headers
document.querySelectorAll('thead th').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = parseInt(th.getAttribute('data-col'));
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('thead th').forEach(function(h) {
      h.classList.toggle('sorted', parseInt(h.getAttribute('data-col')) === sortCol);
      var arrow = h.querySelector('.sort-arrow');
      if (parseInt(h.getAttribute('data-col')) === sortCol) {
        arrow.textContent = sortAsc ? '↑' : '↓';
      } else {
        arrow.textContent = '↕';
      }
    });
    renderTable();
  });
});

// Highlight default sort column
document.querySelector('thead th[data-col="2"]').classList.add('sorted');
document.querySelector('thead th[data-col="2"] .sort-arrow').textContent = '↑';

// Search
document.getElementById('search').addEventListener('input', function() {
  searchVal = this.value.trim();
  renderTable();
});

renderTable();
</script>

<script src="/shared/nav.js?v=2"></script>
</body>
</html>
