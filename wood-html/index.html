<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #070502;
      --panel:  #120d06;
      --amber:  #b45309;
      --gold:   #d97706;
      --hi:     #f59e0b;
      --text:   #fef3c7;
      --muted:  #92683a;
      --card:   rgba(20,12,4,.88);
      --border: rgba(180,83,9,.22);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 110% 55% at 50% 0%, #2d1400 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 85% 100%, #1a0c00 0%, transparent 60%),
        linear-gradient(180deg, #070502 0%, #040300 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(180,83,9,.02)  0, rgba(180,83,9,.02)  1px, transparent 1px, transparent 56px),
        repeating-linear-gradient(90deg, rgba(217,119,6,.015) 0, rgba(217,119,6,.015) 1px, transparent 1px, transparent 72px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* Hero */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 20px rgba(180,83,9,.8)); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 40%, #92400e 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic; letter-spacing: .04em;
      max-width: 500px; line-height: 1.6;
    }
    .hero-divider {
      width: 120px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }

    /* Tabs */
    .tabs {
      display: flex; justify-content: center; gap: .4rem; flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,.07); padding-bottom: .6rem;
    }
    .tab {
      font-size: .8rem; padding: .35rem 1rem; border-radius: 6px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.08); background: transparent; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; transition: all .2s;
    }
    .tab.active { color: var(--hi); border-color: rgba(245,158,11,.45); background: rgba(245,158,11,.08); }
    .tab:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,.18); }
    .section { display: flex; flex-direction: column; gap: 1.5rem; }
    .section.hidden { display: none; }

    /* Card grid */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 1.5rem; }
    @media(max-width: 520px) { .cards { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .card:hover {
      border-color: rgba(180,83,9,.5);
      box-shadow: 0 8px 40px rgba(180,83,9,.14);
      transform: translateY(-3px);
    }

    /* Card image */
    .card-img-wrap {
      position: relative; aspect-ratio: 16/9;
      background: var(--panel); overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      display: block; position: relative; z-index: 1;
      opacity: 0; transition: opacity .4s;
    }
    .card-img-wrap img.loaded { opacity: 1; }
    .card-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
    }
    .ph-num  { font-size: 3.5rem; font-weight: 900; color: rgba(180,83,9,.15); line-height: 1; }
    .ph-icon { font-size: 2.2rem; opacity: .15; }

    .badge-left {
      position: absolute; top: .75rem; left: .75rem; z-index: 2;
      background: rgba(0,0,0,.72); border: 1px solid rgba(180,83,9,.45);
      color: var(--hi); font-size: .65rem; font-weight: 700;
      padding: .2rem .55rem; border-radius: 5px; letter-spacing: .06em;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .badge-right {
      position: absolute; bottom: .75rem; right: .75rem; z-index: 2;
      background: rgba(0,0,0,.65); color: rgba(255,255,255,.7);
      font-size: .65rem; padding: .18rem .5rem; border-radius: 4px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Card body */
    .card-body { padding: 1.1rem 1.2rem 1.25rem; display: flex; flex-direction: column; gap: .85rem; flex: 1; }
    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
    .card-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; line-height: 1.45; }

    .card-stats { display: flex; gap: .5rem; flex-wrap: wrap; }
    .stat-chip {
      background: rgba(180,83,9,.08); border: 1px solid rgba(180,83,9,.2);
      border-radius: 7px; padding: .3rem .65rem; display: flex; flex-direction: column; gap: .1rem;
    }
    .stat-label { font-size: .6rem; color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-val   { font-size: .82rem; color: var(--gold); font-weight: 700; font-family: 'Segoe UI', system-ui, sans-serif; }

    .card-tags { display: flex; gap: .4rem; flex-wrap: wrap; }
    .tag {
      font-size: .68rem; padding: .2rem .55rem; border-radius: 12px;
      background: rgba(217,119,6,.07); border: 1px solid rgba(217,119,6,.22);
      color: rgba(245,158,11,.9); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600;
    }

    .facts-label { font-size: .7rem; font-weight: 700; color: var(--amber); font-family: 'Segoe UI', system-ui, sans-serif; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    .facts-list { display: flex; flex-direction: column; gap: .55rem; }
    .fact { display: flex; gap: .55rem; align-items: flex-start; font-size: .8rem; line-height: 1.55; color: rgba(254,243,199,.82); }
    .fact-icon { font-size: .95rem; flex-shrink: 0; margin-top: .05rem; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    .hero { animation: fadeUp .7s ease both; }
    .tabs, .section { animation: fadeUp .7s ease both; animation-delay: .12s; }
  </style>
</head>

<script>
/* ── Data ── */
const SPECIES = [
  {
    rank: 1, name: 'White Oak', badge: 'Hardwood',
    sub: 'Quercus alba · The backbone of American furniture, cooperage, and flooring',
    wiki: 'Quercus_alba',
    stats: [
      { label: 'Janka', val: '1,360 lbf' },
      { label: 'Weight', val: '47 lb/ft³' },
      { label: 'Category', val: 'Ring-porous' },
      { label: 'Use', val: 'Furniture & barrels' },
    ],
    tags: ['Hardwood', 'Ring-porous', 'Tannin-rich', 'Tyloses', 'American native', 'Quarter-sawn'],
    facts: [
      { icon: '🍷', text: 'White oak is the wood of choice for whiskey and wine barrels because its pores are sealed by tyloses — waxy outgrowths that make it naturally liquid-tight. The wood imparts vanilla, caramel, and spice compounds into spirits during aging.' },
      { icon: '🌊', text: 'Shipwrights prized white oak for centuries because its tight grain and tyloses resist rot and water penetration. The USS Constitution ("Old Ironsides"), launched in 1797, is framed in white oak that has lasted over 225 years.' },
      { icon: '📐', text: 'Quarter-sawn white oak exposes a striking ray fleck pattern on the face — the signature look of Arts & Crafts and Mission-style furniture. The rays run perpendicular to growth rings, producing a silver-dollar shimmer unique to this species.' },
      { icon: '⚒️', text: 'Working white oak requires sharp tools — its interlocked grain tears easily with dull blades. Despite its hardness, it glues, stains, and finishes exceptionally well, and its consistent grain makes it ideal for bent laminations.' },
    ],
  },
  {
    rank: 2, name: 'Black Walnut', badge: 'Hardwood',
    sub: 'Juglans nigra · The most prized cabinet wood in North America',
    wiki: 'Juglans_nigra',
    stats: [
      { label: 'Janka', val: '1,010 lbf' },
      { label: 'Weight', val: '38 lb/ft³' },
      { label: 'Color', val: 'Chocolate brown' },
      { label: 'Use', val: 'Fine furniture & gunstocks' },
    ],
    tags: ['Hardwood', 'Ring-porous', 'Straight grain', 'Gunstocks', 'Steaming', 'Premium'],
    facts: [
      { icon: '🔫', text: 'Black walnut has been the standard gunstock wood for centuries. Its combination of strength, dimensional stability, shock resistance, and beauty made it the choice for everything from Revolutionary War muskets to modern hunting rifles.' },
      { icon: '🎨', text: 'The rich chocolate-brown heartwood is unique in North American hardwoods and needs no stain to achieve a stunning finish. The contrast between the pale sapwood and dark heartwood is so dramatic that some craftspeople deliberately include both in their work.' },
      { icon: '⚠️', text: 'Walnut contains juglone — a natural herbicide in its roots and husks that is toxic to many plants. Fresh walnut sawdust and shavings can cause contact dermatitis in sensitive individuals, and the fine dust is a known respiratory sensitizer.' },
      { icon: '💰', text: 'High-quality figured walnut — crotch, curly, or quilted — commands $30–60 per board foot at specialty lumber dealers. A single large figured walnut slab can sell for several thousand dollars; its value rivals furniture-grade rosewood at a fraction of the environmental cost.' },
    ],
  },
  {
    rank: 3, name: 'Hard Maple', badge: 'Hardwood',
    sub: 'Acer saccharum · The hardest North American commercial hardwood',
    wiki: 'Acer_saccharum',
    stats: [
      { label: 'Janka', val: '1,450 lbf' },
      { label: 'Weight', val: '44 lb/ft³' },
      { label: 'Category', val: 'Diffuse-porous' },
      { label: 'Use', val: 'Flooring & workbenches' },
    ],
    tags: ['Hardwood', 'Diffuse-porous', 'Bowling alleys', 'Dance floors', 'Figured maple', 'Sugar maple'],
    facts: [
      { icon: '🎳', text: 'Hard maple\'s extreme hardness and wear resistance made it the standard for bowling alley lanes and professional sports flooring for over a century. The NBA mandates hard maple for its courts — every NBA game is played on a floor of this single species.' },
      { icon: '✨', text: 'Hard maple produces some of the most spectacular figure in any temperate-zone hardwood. Bird\'s eye, curly, quilted, and tiger maple are all growth anomalies of hard maple prized by luthiers and furniture makers for their mesmerizing optical depth.' },
      { icon: '🔧', text: 'Maple\'s hardness means it dulls tools faster than softer species and requires slower feed rates on power tools. Sharp blades, carbide tooling, and frequent sharpening sessions are non-negotiable when working this species extensively.' },
      { icon: '🍁', text: 'The same tree that makes the finest woodworking lumber also gives Canada its national symbol and produces maple syrup. A single sugar maple tree can be tapped for 40 years or more, producing 10–20 gallons of sap per season, which boils down to about 1 quart of syrup.' },
    ],
  },
  {
    rank: 4, name: 'Black Cherry', badge: 'Hardwood',
    sub: 'Prunus serotina · The wood that ages like fine wine',
    wiki: 'Prunus_serotina',
    stats: [
      { label: 'Janka', val: '950 lbf' },
      { label: 'Weight', val: '35 lb/ft³' },
      { label: 'Aging', val: 'Darkens over years' },
      { label: 'Use', val: 'Fine furniture & cabinets' },
    ],
    tags: ['Hardwood', 'Diffuse-porous', 'Photosensitive', 'Fine grain', 'Cabinet wood', 'American classic'],
    facts: [
      { icon: '🌅', text: 'Fresh-cut cherry is a pale pinkish-tan, but exposure to UV light transforms it over 6–12 months into the deep, rich red-brown that makes antique cherry furniture so desirable. Finishers often sun-bleach fresh cherry for weeks to accelerate this darkening before applying any finish.' },
      { icon: '✋', text: 'Cherry is one of the most pleasant hardwoods to hand-tool. Its fine, uniform grain planes smoothly without tearout, takes edge tools cleanly, and produces tight, crisp joinery. Many hand-tool woodworkers cite cherry as their favorite everyday wood.' },
      { icon: '🎸', text: 'The warm, clear tone and beautiful figure of cherry make it a prized tone wood for acoustic guitars and mandolins. It sits tonally between mahogany and maple, offering warm mids with good sustain and clear highs — often used for backs and sides.' },
      { icon: '🏛️', text: 'Cherry was the premier American cabinet wood of the 18th century. Philadelphia and New England cabinetmakers favored cherry for its elegant figure, workability, and rich finish. Original Chippendale-era cherry pieces now command six-figure prices at auction.' },
    ],
  },
  {
    rank: 5, name: 'White Ash', badge: 'Hardwood',
    sub: 'Fraxinus americana · The shock-resistant wood of tools, sports, and trades',
    wiki: 'Fraxinus_americana',
    stats: [
      { label: 'Janka', val: '1,320 lbf' },
      { label: 'Weight', val: '41 lb/ft³' },
      { label: 'Category', val: 'Ring-porous' },
      { label: 'Use', val: 'Tool handles & bats' },
    ],
    tags: ['Hardwood', 'Ring-porous', 'Shock-resistant', 'Bent steam', 'Baseball bats', 'Tool handles'],
    facts: [
      { icon: '⚾', text: 'For most of baseball history, ash was the standard bat wood. Babe Ruth, Hank Aaron, and Ted Williams all hit their home runs with white ash bats. Though maple has gained ground since the 1990s, many players still prefer ash for its flex and feel at contact.' },
      { icon: '💪', text: 'Ash\'s combination of high Janka hardness, strength, and shock resistance makes it the go-to for striking tool handles — axes, hammers, sledgehammers, and oars. The wood flexes slightly under impact and returns to shape, absorbing vibration better than most hardwoods.' },
      { icon: '🪑', text: 'White ash bends beautifully with steam, making it a classic choice for Windsor chair backs, bent boat ribs, and curved cabinet doors. Sam Maloof, considered America\'s greatest furniture maker, used ash extensively in his rocker designs.' },
      { icon: '⚠️', text: 'The emerald ash borer, an invasive beetle from Asia first detected in Michigan in 2002, has killed billions of ash trees across North America. The beetle has devastated ash populations so severely that several states now restrict moving ash wood to slow its spread.' },
    ],
  },
  {
    rank: 6, name: 'Eastern White Pine', badge: 'Softwood',
    sub: 'Pinus strobus · The wood that built colonial America',
    wiki: 'Pinus_strobus',
    stats: [
      { label: 'Janka', val: '380 lbf' },
      { label: 'Weight', val: '25 lb/ft³' },
      { label: 'Category', val: 'Softwood' },
      { label: 'Use', val: 'Furniture & millwork' },
    ],
    tags: ['Softwood', 'Conifer', 'Colonial furniture', 'Knotty pine', 'Easy to work', 'American history'],
    facts: [
      { icon: '🏛️', text: 'Eastern white pine built the American colonies. The British Crown marked the tallest, straightest trees with a broad arrow — reserving them for Royal Navy masts. American colonists\' fury at these restrictions, which deprived them of valuable lumber, contributed to revolutionary sentiment.' },
      { icon: '🪚', text: 'Old-growth white pine from colonial-era houses is among the most prized reclaimed lumber available. Boards 18–24 inches wide were once common; today, due to centuries of logging, a 12-inch-wide clear pine board is considered exceptional. The difference in quality is remarkable.' },
      { icon: '🎨', text: 'Pine\'s softness is a feature for paint finishes — it takes paint and milk paint beautifully, with knots adding rustic character. Knotty pine paneling and pine kitchen furniture have had periodic revivals from the 1950s cabin era through modern farmhouse style.' },
      { icon: '🔨', text: 'Its low Janka rating means white pine can dent and scratch easily in high-traffic applications, but it also means it\'s one of the most rewarding hand-tool woods. A sharp hand plane glides through pine effortlessly, making it ideal for beginners learning to use hand tools.' },

const JOINERY = [
  {
    rank: 1, name: 'Dovetail Joint', badge: 'Joinery',
    sub: 'The signature joint of fine case work — interlocking tails and pins cut at 8–14° angles',
    wiki: 'Dovetail_joint',
    stats: [
      { label: 'Strength', val: 'Excellent' },
      { label: 'Difficulty', val: 'Advanced' },
      { label: 'Application', val: 'Drawers & boxes' },
      { label: 'Angle', val: '1:8 to 1:6' },
    ],
    tags: ['Case work', 'Drawers', 'Boxes', 'Hand-cut', 'Interlocking', 'Pull-resistant'],
    facts: [
      { icon: '📜', text: 'Dovetail joints have been found in Egyptian furniture and Chinese coffins from over 4,000 years ago. The joint\'s trapezoidal shape — named for the dove\'s tail it resembles — creates mechanical resistance to being pulled apart that no amount of glue alone can match.' },
      { icon: '🔬', text: 'The ratio of the dovetail angle matters: hardwoods typically use 1:8 (about 7°) while softwoods use 1:6 (about 9.5°). Too shallow an angle and the joint can slip; too steep and short-grain failures weaken the pins. Finding the right ratio is fundamental woodworking knowledge.' },
      { icon: '✋', text: 'Hand-cut dovetails are considered the hallmark skill of a fine hand-tool woodworker. A tight, gap-free half-blind dovetail at the front of a drawer demonstrates mastery of sawing, paring with a chisel, and fitting — all in a single joint visible only when the drawer is pulled out.' },
      { icon: '🤖', text: 'Router jigs can cut dovetails quickly and consistently, but the resulting uniform spacing and appearance is immediately distinguishable from hand-cut work to an experienced eye. Many craftspeople consider hand-cut dovetails an act of respect for the tradition of the craft.' },
    ],
  },
  {
    rank: 2, name: 'Mortise & Tenon', badge: 'Joinery',
    sub: 'The ancient universal joint — a projecting tenon fits precisely into a mortise cavity',
    wiki: 'Mortise_and_tenon',
    stats: [
      { label: 'Strength', val: 'Excellent' },
      { label: 'Age', val: '7,000+ years' },
      { label: 'Application', val: 'Chairs & frames' },
      { label: 'Glue area', val: 'Very large' },
    ],
    tags: ['Chairs', 'Frames', 'Tables', 'Timber framing', 'Ancient', 'Foundation joint'],
    facts: [
      { icon: '🏺', text: 'Mortise and tenon joints have been found in furniture from 3000 BCE and in ancient boat construction from even earlier. Every timber-framed building, every Arts & Crafts table leg, every Windsor chair relies on some variation of this enduring joint.' },
      { icon: '📐', text: 'The standard rule is that tenon thickness should be one-third the thickness of the mortised piece. The tenon should fit snugly — tight enough to require a mallet but loose enough to prevent hydraulic lock when glue is applied. Achieving this fit by hand is a fundamental skill.' },
      { icon: '🏠', text: 'Wedged mortise-and-tenon joints — where the tenon is split and a wooden wedge driven in — can assemble without any glue and be disassembled centuries later. This technique was standard in timber framing for barns and buildings, some of which stand after 500 years.' },
      { icon: '🪑', text: 'Chair making demands the most complex mortise-and-tenon work, because chair legs meet rails at compound angles that are not square in any plane. Accurately laying out and cutting these compound-angle joints is the defining challenge of chairmaking.' },
    ],
  },
  {
    rank: 3, name: 'Box Joint', badge: 'Joinery',
    sub: 'Finger joint with square interlocking pins — strong, fast, and visually distinctive',
    wiki: 'Box_joint',
    stats: [
      { label: 'Strength', val: 'Very good' },
      { label: 'Difficulty', val: 'Beginner–Med.' },
      { label: 'Application', val: 'Boxes & drawers' },
      { label: 'Glue area', val: 'Very large' },
    ],
    tags: ['Box making', 'Drawers', 'Router jig', 'Table saw', 'Decorative', 'Mechanical'],
    facts: [
      { icon: '📦', text: 'Box joints are cut with equal-width square fingers that interlock at corners. The large gluing surface area created by the interlocking fingers makes a box joint stronger in shear than a simple miter or butt joint — even before considering the mechanical interlocking.' },
      { icon: '🔧', text: 'A box joint jig for the table saw is one of the first shopmade jigs most woodworkers build. Once the jig is set, a box joint can be cut consistently and quickly — making box joints faster to produce than dovetails while delivering comparable strength.' },
      { icon: '🎨', text: 'Contrasting wood species in box joints — walnut and maple, cherry and ash — create striking visual patterns. The joint itself becomes a decorative feature, and some craftspeople design boxes specifically to display the interplay of alternating light and dark wood at the corners.' },
      { icon: '📏', text: 'The spacing between fingers must be exactly consistent for the joint to fit. The traditional box joint jig uses a key pin to index each cut — the cut piece is moved by one finger width for each pass through the saw, guaranteeing uniformity across dozens of cuts.' },
    ],
  },
  {
    rank: 4, name: 'Dado Joint', badge: 'Joinery',
    sub: 'A groove cut across the grain to accept a shelf or panel — the backbone of casework',
    wiki: 'Dado_(joinery)',
    stats: [
      { label: 'Strength', val: 'Good' },
      { label: 'Difficulty', val: 'Beginner' },
      { label: 'Application', val: 'Shelves & cabinets' },
      { label: 'Tool', val: 'Dado stack or router' },
    ],
    tags: ['Shelving', 'Casework', 'Dado stack', 'Router', 'Bookshelves', 'Cabinet making'],
    facts: [
      { icon: '📚', text: 'A dado is simply a flat-bottomed channel cut across the grain of a board. When cut precisely to the thickness of the mating board, a dado joint supports a shelf or panel on three sides — the two walls and the floor of the groove — distributing load far better than screws alone.' },
      { icon: '🔨', text: 'A dado stack — multiple saw blades and chippers ganged together on a table saw arbor — is the production tool of choice for cutting dado joints quickly and consistently. Adjusting the set of chippers and shims lets craftspeople dial in the exact width needed.' },
      { icon: '🪵', text: 'The stopped dado — where the groove does not run the full width of the board — hides the joint from the front face of a cabinet. A small notch is cut in the front corner of the mating piece so it can slide into the blind end of the groove.' },
      { icon: '🏠', text: 'In American construction the term "dado" confusingly refers to a router bit that cuts the groove; in British English a dado is the lower portion of a wall. The woodworking joint is called a "housing joint" in British woodworking tradition.' },
    ],

  {
    rank: 5, name: 'Lap Joint', badge: 'Joinery',
    sub: 'Half the material removed from each piece so they overlap flush — simple but surprisingly strong',
    wiki: 'Lap_joint',
    stats: [
      { label: 'Strength', val: 'Moderate–good' },
      { label: 'Difficulty', val: 'Beginner' },
      { label: 'Application', val: 'Frames & grids' },
      { label: 'Glue area', val: 'Large flat faces' },

/* ── Tab switching ── */
function switchTab(id) {
  history.pushState(null, '', '#' + id);
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
  if(typeof event!=='undefined'&&event&&event.currentTarget) event.currentTarget.classList.add('active');
  document.getElementById('section-' + id).classList.remove('hidden');
}
window.addEventListener('hashchange', function() { var h = location.hash.slice(1); if (h) switchTab(h); });
(function() { var h = location.hash.slice(1); if (h) switchTab(h); })();

/* ── Render cards ── */
function buildCards(data, gridId) {
  const grid = document.getElementById(gridId);
  data.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const statsHtml = item.stats.map(s =>
      `<div class="stat-chip"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`
    ).join('');

    const tagsHtml = item.tags.map(t => `<span class="tag">${t}</span>`).join('');

    const factsHtml = item.facts.map(f =>
      `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="card-img-placeholder">
          <div class="ph-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="ph-icon">🪵</div>
        </div>
        <img data-wiki="${item.wiki}" alt="${item.name}" onload="this.classList.add('loaded');this.previousElementSibling.style.display='none'" onerror="this.style.display='none'" loading="lazy" decoding="async">
        <div class="badge-left">${item.badge}</div>
        <div class="badge-right">${item.name}</div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-title">${item.name}</div>
          <div class="card-sub">${item.sub}</div>
        </div>
        <div class="card-stats">${statsHtml}</div>
        <div class="card-tags">${tagsHtml}</div>
        <div>
          <div class="facts-label">&#9775; Notable Facts</div>
          <div class="facts-list">${factsHtml}</div>
        </div>
      </div>`;

    grid.appendChild(card);
  });
}

buildCards(SPECIES,    'species-grid');
buildCards(JOINERY,    'joinery-grid');
buildCards(HANDTOOLS,  'handtools-grid');
buildCards(POWERTOOLS, 'powertools-grid');
buildCards(FINISHING,  'finishing-grid');
document.querySelectorAll('img[data-wiki]').forEach(loadWikiImage);
