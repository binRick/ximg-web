<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Timespan Calculator — timespan.ximg.app — interactive educational app on ximg.app">
  <title>Timespan Calculator — timespan.ximg.app</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#02020f;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-top:44px}

    .subnav{position:sticky;top:44px;z-index:100;background:#02020f;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 1rem;justify-content:center}
    .tab-btn{padding:.65rem 1.1rem;font-size:.82rem;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
    .tab-btn:hover{color:#c9d1d9}
    .tab-btn.active{color:#22d3ee;border-bottom-color:#22d3ee}

    .page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
    .page-title{font-size:1.2rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
    .page-sub{font-size:.8rem;color:#475569;margin-bottom:1.25rem}

    label.lbl{display:block;font-size:.7rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
    input[type=datetime-local],input[type=date],input[type=number],input[type=text],select{
      width:100%;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;
      font-family:'Courier New',monospace;font-size:.9rem;padding:.55rem .8rem;outline:none;transition:border-color .2s;
    }
    input:focus,select:focus{border-color:#22d3ee55}
    select{cursor:pointer}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=checkbox]{width:auto;accent-color:#22d3ee;cursor:pointer}

    .card{background:#070720;border:1px solid #1e293b;border-radius:8px;padding:1rem 1.2rem;margin-bottom:1rem}
    .card-title{font-size:.78rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:600px){.two-col{grid-template-columns:1fr}}

    .btn{background:#0f172a;border:1px solid #22d3ee44;border-radius:6px;color:#22d3ee;font-size:.8rem;font-weight:600;padding:.5rem 1.1rem;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn:hover{background:#22d3ee15;border-color:#22d3ee88}
    .btn:active{transform:scale(.97)}
    .btn-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}

    .btn-sm{background:#070720;border:1px solid #1e293b;border-radius:5px;color:#64748b;font-size:.73rem;padding:.25rem .6rem;cursor:pointer;transition:all .15s}
    .btn-sm:hover{border-color:#22d3ee55;color:#22d3ee}

    .result-box{background:#040418;border:1px solid #1e293b;border-radius:8px;padding:1.2rem;margin-top:1rem}
    .rb-human{font-size:1.4rem;font-weight:700;color:#22d3ee;margin-bottom:.75rem;line-height:1.3}
    .rb-human.error{color:#f85149;font-size:.9rem;font-weight:400}

    .units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.5rem;margin-bottom:.75rem}
    .unit-item{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.5rem .75rem}
    .unit-label{font-size:.68rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
    .unit-value{font-size:1rem;font-weight:600;color:#c9d1d9;font-family:'Courier New',monospace}
    .unit-value.accent{color:#22d3ee}

    .breakdown-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.35rem;flex-wrap:wrap}
    .bd-chunk{background:#070720;border:1px solid #1e293b;border-radius:5px;padding:.2rem .55rem;font-size:.82rem;font-family:'Courier New',monospace}
    .bd-num{color:#22d3ee;font-weight:700}
    .bd-unit{color:#64748b}

    .error-msg{font-size:.8rem;color:#f85149;margin-top:.4rem;min-height:1.2em}

    /* Business days */
    .bday-opts{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-top:.5rem}
    .checkbox-label{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.82rem;color:#94a3b8;user-select:none}

    .bday-result{background:#040418;border:1px solid #1e293b;border-radius:8px;padding:1.2rem;margin-top:1rem}
    .bday-big{font-size:2.5rem;font-weight:700;color:#22d3ee;font-family:'Courier New',monospace;text-align:center;margin-bottom:.3rem}
    .bday-sub{text-align:center;font-size:.82rem;color:#64748b;margin-bottom:.9rem}
    .bday-breakdown{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
    .bday-chip{background:#070720;border:1px solid #1e293b;border-radius:5px;padding:.28rem .7rem;font-size:.78rem}
    .bday-chip-n{color:#c9d1d9;font-family:'Courier New',monospace}
    .bday-chip-l{color:#475569;margin-left:.3rem}

    .reverse-result{background:#040418;border:1px solid #1e293b;border-radius:8px;padding:1rem 1.2rem;margin-top:1rem;font-size:.9rem}
    .rev-date{font-size:1.3rem;font-weight:700;color:#22d3ee;font-family:'Courier New',monospace;margin-bottom:.3rem}
    .rev-info{color:#64748b;font-size:.8rem}

    /* Add/Subtract */
    .ops-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
    .op-row{display:grid;grid-template-columns:auto 80px 100px auto;gap:.4rem;align-items:center;background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.4rem .6rem}
    @media(max-width:540px){.op-row{grid-template-columns:1fr 1fr}}
    .op-sign{display:flex;gap:.3rem}
    .op-sign-btn{background:#0f172a;border:1px solid #1e293b;border-radius:4px;color:#64748b;font-size:.8rem;padding:.18rem .5rem;cursor:pointer;transition:all .15s}
    .op-sign-btn.active{background:rgba(34,211,238,.1);border-color:#22d3ee55;color:#22d3ee}
    .op-remove{background:none;border:1px solid #1e293b;border-radius:4px;color:#475569;font-size:.78rem;padding:.18rem .4rem;cursor:pointer;transition:all .15s;margin-left:.2rem}
    .op-remove:hover{border-color:#f8514944;color:#f85149}
    .op-unit-sel{background:#070720;border:1px solid #1e293b;border-radius:5px;color:#94a3b8;font-size:.8rem;padding:.28rem .55rem;cursor:pointer;font-family:'Courier New',monospace}
    .op-val{background:#070720;border:1px solid #1e293b;border-radius:5px;color:#e2e8f0;font-size:.85rem;padding:.28rem .55rem;font-family:'Courier New',monospace;width:100%;outline:none}
    .op-val:focus{border-color:#22d3ee55}

    .chain-result{background:#040418;border:1px solid #1e293b;border-radius:8px;padding:1.2rem;margin-top:1rem}
    .chain-big{font-size:1.5rem;font-weight:700;color:#22d3ee;font-family:'Courier New',monospace;margin-bottom:.4rem}
    .chain-steps{display:flex;flex-direction:column;gap:.3rem;margin-top:.6rem}
    .chain-step{font-size:.8rem;color:#64748b;font-family:'Courier New',monospace}
    .chain-step b{color:#94a3b8}

    .divider{border:none;border-top:1px solid #1e293b;margin:1.75rem 0}

    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0f172a;border:1px solid #22d3ee44;color:#22d3ee;padding:.5rem 1rem;border-radius:6px;font-size:.8rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="subnav">
  <a class="tab-btn " href="index.html">Duration</a>
  <a class="tab-btn" href="bizdays.html">Business Days</a>
  <a class="tab-btn" href="addsubtract.html">Add / Subtract</a>
</div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/timespan') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="bizdays">
<div class="page-title">Business Days</div>
  <div class="page-sub">Count business days between dates, or find a date N business days away</div>

  <!-- Count mode -->
  <div class="card">
    <div class="card-title">Count business days between two dates</div>
    <div class="two-col">
      <div>
        <label class="lbl">Start date</label>
        <input type="date" id="biz-start" oninput="calcBizDays()">
      </div>
      <div>
        <label class="lbl">End date</label>
        <input type="date" id="biz-end" oninput="calcBizDays()">
      </div>
    </div>
    <div class="bday-opts">
      <label class="checkbox-label">
        <input type="checkbox" id="biz-holidays" onchange="calcBizDays()">
        Exclude US federal holidays
      </label>
    </div>
    <div class="error-msg" id="biz-err"></div>
  </div>

  <div id="biz-result" style="display:none">
    <div class="bday-result">
      <div class="bday-big" id="biz-count">—</div>
      <div class="bday-sub" id="biz-count-sub">business days</div>
      <div class="bday-breakdown" id="biz-breakdown"></div>
    </div>
    <div id="biz-holiday-list" style="margin-top:.75rem"></div>
  </div>

  <hr class="divider">

  <!-- Reverse mode -->
  <div class="card">
    <div class="card-title">Find date N business days from a start</div>
    <div class="two-col">
      <div>
        <label class="lbl">Start date</label>
        <input type="date" id="rev-start" oninput="calcRevBiz()">
      </div>
      <div>
        <label class="lbl">Business days to add (negative to subtract)</label>
        <input type="number" id="rev-n" placeholder="e.g. 10 or -5" oninput="calcRevBiz()">
      </div>
    </div>
    <div class="bday-opts">
      <label class="checkbox-label">
        <input type="checkbox" id="rev-holidays" onchange="calcRevBiz()">
        Skip US federal holidays
      </label>
    </div>
    <div class="error-msg" id="rev-err"></div>
  </div>

  <div id="rev-result" style="display:none">
    <div class="reverse-result">
      <div class="rev-date" id="rev-date">—</div>
      <div class="rev-info" id="rev-info">—</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════ ADD / SUBTRACT ═══════════════════════ -->
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
