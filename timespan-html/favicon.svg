<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#02020f"/>
  <!-- calendar base -->
  <rect x="4" y="8" width="24" height="18" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.8"/>
  <!-- calendar top bar -->
  <rect x="4" y="8" width="24" height="5" rx="2" fill="#22d3ee" opacity=".2"/>
  <line x1="4" y1="13" x2="28" y2="13" stroke="#22d3ee" stroke-width="1.4"/>
  <!-- calendar pins -->
  <line x1="10" y1="5" x2="10" y2="10" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="5" x2="22" y2="10" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <!-- timeline arrow -->
  <line x1="8" y1="21" x2="24" y2="21" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="21,18.5 24,21 21,23.5" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
