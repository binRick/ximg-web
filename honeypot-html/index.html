<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypot Terminal — honeypot.ximg.app</title>
  <meta name="description" content="Live SSH honeypot terminal — watch 9 real auth failures then break in and explore the trapped shell.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at center, #080f08 0%, #020602 55%, #000 100%);
    }

    #nav-spacer { height: 36px; flex-shrink: 0; }

    #wrap {
      flex: 1;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 10px 12px 12px;
      overflow: hidden;
      gap: 10px;
      min-height: 0;
    }

    /* ── CRT monitor ── */
    #monitor {
      flex: 1;
      max-width: 940px;
      display: flex;
      flex-direction: column;
      background: #050a05;
      border: 1px solid #1c311c;
      border-radius: 8px;
      box-shadow:
        0 0 60px rgba(0,255,65,.07),
        0 0 120px rgba(0,255,65,.03),
        inset 0 0 80px rgba(0,0,0,.7);
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    /* scanlines */
    #monitor::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 2px,
        rgba(0,0,0,.13) 2px, rgba(0,0,0,.13) 4px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* vignette */
    #monitor::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.5) 100%);
      pointer-events: none;
      z-index: 49;
    }

    @keyframes flicker {
      0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:.88}
      93%{opacity:1} 95%{opacity:.93} 96%{opacity:1}
    }
    #monitor { animation: flicker 14s infinite; }

    /* ── Title bar ── */
    #titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 12px;
      background: #080e08;
      border-bottom: 1px solid #1c311c;
      flex-shrink: 0;
      position: relative;
      z-index: 60;
    }

    #tb-left {
      display: flex; align-items: center; gap: 10px;
      font-size: 10px; color: #004d14;
    }
    #tb-title { color: #006619; font-weight: bold; }

    #tb-right { display: flex; align-items: center; gap: 8px; }

    #status-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: #005e18;
      padding: 2px 8px;
      border: 1px solid #0d2e0d; border-radius: 12px;
      background: rgba(0,0,0,.3); min-width: 120px;
    }

    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #333; flex-shrink: 0; transition: all .3s;
    }
    .sdot.connecting { background: #ffaa00; animation: pulsedot .7s infinite; }
    .sdot.failed     { background: #ff3333; }
    .sdot.ok         { background: #00ff41; box-shadow: 0 0 7px rgba(0,255,65,.8); }
    @keyframes pulsedot { 0%,100%{opacity:1} 50%{opacity:.2} }

    #slabel { transition: color .3s; }
    #slabel.connecting { color: #ffaa00; }
    #slabel.failed     { color: #ff3333; }
    #slabel.ok         { color: #00ff41; }

    #replay-btn {
      font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: .08em;
      color: #00882b; background: transparent;
      border: 1px solid #00551a; padding: 2px 9px; border-radius: 4px;
      cursor: pointer; transition: all .15s;
    }
    #replay-btn:hover { color: #00ff41; border-color: #00cc33; background: rgba(0,255,65,.05); }
    #replay-btn:disabled { opacity: .3; cursor: default; }

    /* ── xterm container ── */
    #xterm-wrap {
      flex: 1;
      padding: 8px 10px 6px;
      overflow: hidden;
      position: relative;
      z-index: 40;
      min-height: 0;
    }

    #xterm-container {
      width: 100%;
      height: 100%;
    }

    /* Make xterm.js background match */
    .xterm { height: 100% !important; }
    .xterm-viewport { overflow: hidden !important; }
    .xterm-screen canvas { display: block; }

    /* ── Sidebar ── */
    #sidebar {
      width: 155px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
      font-size: 10px; color: #004d14; overflow: hidden;
    }

    .sb-box {
      border: 1px solid #0d2e0d; border-radius: 5px;
      background: rgba(0,255,65,.015); padding: 8px 9px;
    }
    .sb-title {
      font-size: 9px; letter-spacing: .1em; color: #006619;
      border-bottom: 1px solid #0d2e0d;
      padding-bottom: 4px; margin-bottom: 6px;
    }
    .sb-kv { display: flex; justify-content: space-between; gap: 4px; margin-bottom: 3px; line-height: 1.4; }
    .sb-k  { color: #004a12; }
    .sb-v  { color: #008f2a; font-weight: bold; text-align: right; }
    .sb-v.hi   { color: #00ff41; text-shadow: 0 0 4px rgba(0,255,65,.4); }
    .sb-v.warn { color: #ffaa00; }
    .sb-v.err  { color: #ff3333; }

    .attempt-dots { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .adot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid #0d2e0d; background: #050a05; transition: all .3s;
    }
    .adot.fail { background: #ff3333; border-color: #cc0000; box-shadow: 0 0 5px rgba(255,0,0,.4); }
    .adot.ok   { background: #00ff41; border-color: #00cc33; box-shadow: 0 0 6px rgba(0,255,65,.5); }

    @media (max-width: 640px) { #sidebar { display: none; } }
  </style>
</head>
<body>
  <div id="nav-spacer"></div>
  <div id="wrap">

    <div id="monitor">
      <div id="titlebar">
        <div id="tb-left">
          <span id="tb-title">SSH HONEYPOT</span>
          <span style="color:#003d10">honeypot.ximg.app:22</span>
        </div>
        <div id="tb-right">
          <div id="status-pill">
            <div class="sdot" id="sdot"></div>
            <span id="slabel">OFFLINE</span>
          </div>
          <button id="replay-btn" onclick="replay()">&#x27F3; REPLAY</button>
        </div>
      </div>
      <div id="xterm-wrap">
        <div id="xterm-container"></div>
      </div>
    </div>

    <div id="sidebar">
      <div class="sb-box">
        <div class="sb-title">TARGET</div>
        <div class="sb-kv"><span class="sb-k">host</span><span class="sb-v" style="font-size:9px">honeypot.ximg.app</span></div>
        <div class="sb-kv"><span class="sb-k">port</span><span class="sb-v">22</span></div>
        <div class="sb-kv"><span class="sb-k">user</span><span class="sb-v">user</span></div>
        <div class="sb-kv"><span class="sb-k">banner</span><span class="sb-v" style="font-size:8px">OpenSSH_8.9p1</span></div>
        <div class="sb-kv"><span class="sb-k">auth</span><span class="sb-v">password</span></div>
      </div>

      <div class="sb-box">
        <div class="sb-title">SESSION</div>
        <div class="sb-kv"><span class="sb-k">state</span><span class="sb-v" id="sb-state">idle</span></div>
        <div class="sb-kv"><span class="sb-k">attempts</span><span class="sb-v" id="sb-att">0</span></div>
        <div class="sb-kv"><span class="sb-k">threshold</span><span class="sb-v warn">10</span></div>
        <div class="attempt-dots" id="adots"></div>
      </div>

      <div class="sb-box">
        <div class="sb-title">SYSTEM</div>
        <div class="sb-kv"><span class="sb-k">os</span><span class="sb-v" style="font-size:8px">Ubuntu 22.04</span></div>
        <div class="sb-kv"><span class="sb-k">kernel</span><span class="sb-v" style="font-size:8px">5.15.0-91</span></div>
        <div class="sb-kv"><span class="sb-k">arch</span><span class="sb-v">x86_64</span></div>
        <div class="sb-kv"><span class="sb-k">net out</span><span class="sb-v err">BLOCKED</span></div>
      </div>

      <div class="sb-box">
        <div class="sb-title">LIVE SESSION</div>
        <div style="color:#006619;font-size:9px;line-height:1.6">
          Real bash shell.<br>
          Fully logged to<br>
          <span style="color:#00882b">logs.ximg.app</span><br>
          → SSH Sessions
        </div>
      </div>
    </div>

  </div>

  <script src="/xterm.js"></script>
  <script src="/xterm-addon-fit.js"></script>
  <script>
  (function () {
    const sdot    = document.getElementById('sdot');
    const slabel  = document.getElementById('slabel');
    const sbState = document.getElementById('sb-state');
    const sbAtt   = document.getElementById('sb-att');
    const adots   = document.getElementById('adots');
    const replayBtn = document.getElementById('replay-btn');

    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const ri = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

    // ── Attempt dots ──────────────────────────────────────────────────────
    function initDots () {
      adots.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const d = document.createElement('div');
        d.className = 'adot'; d.id = 'adot' + i;
        adots.appendChild(d);
      }
    }
    function setDot (i, cls) {
      const d = document.getElementById('adot' + i);
      if (d) d.className = 'adot ' + cls;
    }

    // ── Status ─────────────────────────────────────────────────────────────
    function setStatus (dotCls, labelText, labelCls) {
      sdot.className   = 'sdot ' + dotCls;
      slabel.textContent = labelText;
      slabel.className   = labelCls || '';
      sbState.textContent = labelText.toLowerCase();
    }

    // ── xterm.js ───────────────────────────────────────────────────────────
    const term = new Terminal({
      theme: {
        background:    '#050905',
        foreground:    '#00ff41',
        cursor:        '#00ff41',
        cursorAccent:  '#050905',
        selectionBackground: 'rgba(0,255,65,.25)',
        black:         '#000000',   brightBlack:   '#004d14',
        red:           '#ff4444',   brightRed:     '#ff6666',
        green:         '#00ff41',   brightGreen:   '#39ff14',
        yellow:        '#ffaa00',   brightYellow:  '#ffcc66',
        blue:          '#4488ff',   brightBlue:    '#66aaff',
        magenta:       '#ff44ff',   brightMagenta: '#ff88ff',
        cyan:          '#44ffcc',   brightCyan:    '#77ffee',
        white:         '#ccffcc',   brightWhite:   '#eeffee',
      },
      fontFamily: '"Courier New", Courier, monospace',
      fontSize:   13,
      lineHeight: 1.2,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback:  2000,
      allowProposedApi: true,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('xterm-container'));
    fitAddon.fit();

    new ResizeObserver(() => fitAddon.fit()).observe(
      document.getElementById('xterm-wrap')
    );

    // ── Session state ──────────────────────────────────────────────────────
    let ws          = null;
    let shellActive = false;
    let ptyBuf      = [];

    // JSON message queue so async handlers run in order
    let msgQueue      = [];
    let queueRunning  = false;

    async function runQueue () {
      if (queueRunning) return;
      queueRunning = true;
      while (msgQueue.length) {
        await handleJSON(msgQueue.shift());
      }
      queueRunning = false;
    }

    // ── xterm.js helpers ──────────────────────────────────────────────────
    async function typeAsterisks (n) {
      for (let i = 0; i < n; i++) {
        term.write('*');
        await sleep(ri(70, 130));
      }
    }

    async function typeText (text) {
      for (const ch of text) {
        term.write(ch === '\n' ? '\r\n' : ch);
        await sleep(ri(80, 150));
      }
    }

    // ── Handle JSON messages from server ──────────────────────────────────
    async function handleJSON (msg) {
      switch (msg.t) {

        case 'banner': {
          term.write('\x1b[32m$ ssh user@honeypot.ximg.app\r\n');
          await sleep(250);
          term.write('\x1b[2m');
          term.write("The authenticity of host 'honeypot.ximg.app (10.13.37.42)' can't be established.\r\n");
          await sleep(100);
          term.write(`RSA key fingerprint is ${msg.fp}.\r\n`);
          await sleep(100);
          term.write('This key is not known by any other names.\r\n');
          await sleep(200);
          term.write("Are you sure you want to continue connecting (yes/no/[fingerprint])? \x1b[0m");
          await sleep(650);
          await typeText('yes');
          term.write('\r\n');
          await sleep(250);
          term.write("\x1b[33mWarning: Permanently added 'honeypot.ximg.app' (RSA) to the list of known hosts.\x1b[0m\r\n");
          await sleep(400);
          setStatus('connecting', 'CONNECTING', 'connecting');
          break;
        }

        case 'auth_fail': {
          const n = msg.n;
          sbAtt.textContent = String(n);
          setStatus('connecting', `ATTEMPT ${n}/10`, 'connecting');
          setDot(n - 1, 'fail');

          term.write("\x1b[2muser@honeypot.ximg.app's password: \x1b[0m");
          await sleep(ri(350, 600));
          await typeAsterisks(ri(6, 14));
          await sleep(ri(180, 320));
          term.write('\r\n\x1b[31mPermission denied, please try again.\x1b[0m\r\n');
          break;
        }

        case 'auth_ok': {
          sbAtt.textContent = '10 ✓';
          setStatus('connecting', 'ATTEMPT 10/10', 'connecting');
          setDot(9, 'ok');

          term.write("\x1b[2muser@honeypot.ximg.app's password: \x1b[0m");
          await sleep(ri(500, 750));
          await typeAsterisks(ri(8, 13));
          await sleep(350);
          term.write('\r\n');

          // Activate live relay
          shellActive = true;
          for (const chunk of ptyBuf) term.write(chunk);
          ptyBuf = [];

          setStatus('ok', 'CONNECTED', 'ok');
          break;
        }

        case 'error': {
          term.write(`\r\n\x1b[31mError: ${msg.msg}\x1b[0m\r\n`);
          setStatus('failed', 'ERROR', 'failed');
          replayBtn.disabled = false;
          break;
        }
      }
    }

    // ── Connect / replay ──────────────────────────────────────────────────
    function connect () {
      if (ws && ws.readyState < 2) ws.close();
      term.reset();
      shellActive = false;
      ptyBuf      = [];
      msgQueue    = [];
      queueRunning = false;
      initDots();
      sbAtt.textContent = '0';
      setStatus('connecting', 'CONNECTING', 'connecting');
      replayBtn.disabled = true;

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        ws.send(JSON.stringify({ t: 'init', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = e => {
        if (e.data instanceof ArrayBuffer) {
          const data = new Uint8Array(e.data);
          if (shellActive) term.write(data);
          else ptyBuf.push(data);
          return;
        }
        try {
          msgQueue.push(JSON.parse(e.data));
          runQueue();
        } catch {}
      };

      ws.onclose = () => {
        if (shellActive) {
          term.write('\r\n\x1b[2m\r\n─────────────────────────────\r\nConnection closed.\x1b[0m\r\n');
        }
        setStatus('', 'DISCONNECTED', '');
        sdot.className = 'sdot';
        replayBtn.disabled = false;
        shellActive = false;
      };

      ws.onerror = () => {
        term.write('\r\n\x1b[31mWebSocket error — cannot reach proxy server.\x1b[0m\r\n');
        setStatus('failed', 'ERROR', 'failed');
        replayBtn.disabled = false;
      };

      // Relay keystrokes
      term.onData(data => {
        if (shellActive && ws.readyState === 1) ws.send(data);
      });
    }

    // Relay terminal resize to server
    term.onResize(({ cols, rows }) => {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ t: 'resize', cols, rows }));
      }
    });

    function replay () {
      connect();
    }

    // Boot
    connect();
  })();
  </script>
  <script src="/shared/nav.js?v=3"></script>
</body>
</html>
