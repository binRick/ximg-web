<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ximg.app</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(48px); }
    }

    /* floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent);  top: -150px; left: -150px; animation-duration: 14s; }
    .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-duration: 10s; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: #f472b6;        top: 40%; left: 60%; animation-duration: 16s; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* main card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 4rem;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      max-width: 640px;
      width: 90%;
      box-shadow: 0 0 80px rgba(124,58,237,0.15);
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      border-radius: 99px;
      padding: 0.25rem 0.9rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .logo {
      font-size: clamp(3.5rem, 10vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    .tagline {
      font-size: 1.15rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.6s;
    }

    .tagline span {
      color: var(--text);
      font-weight: 500;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.8s;
    }

    .chip {
      font-size: 0.8rem;
      padding: 0.35rem 0.9rem;
      border-radius: 99px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      transition: all 0.2s;
      cursor: default;
    }
    .chip:hover {
      background: rgba(124,58,237,0.2);
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-2px);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.75rem 2rem;
      border-radius: 99px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1s;
    }
    .cta:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 32px rgba(124,58,237,0.55);
    }

    /* status bar */
    .status {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.2s;
      white-space: nowrap;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="card">
    <div class="badge">Now Live</div>
    <div class="logo">ximg.app</div>
    <p class="tagline">
      Something <span>fast</span>, something <span>sharp</span>.<br>
      Built on a real stack. Running in production.
    </p>
    <div class="chips">
      <span class="chip">nginx</span>
      <span class="chip">Apache</span>
      <span class="chip">Docker</span>
      <span class="chip">Let's Encrypt</span>
      <span class="chip">Linux</span>
    </div>
    <a class="cta" href="https://ximg.app">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Explore
    </a>
  </div>

  <div class="status">
    <div class="dot"></div>
    All systems operational &nbsp;·&nbsp; ximg.app
  </div>

</body>
</html>
