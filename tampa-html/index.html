<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #040d17;
      --panel:  #071624;
      --teal:   #0ea5e9;
      --sky:    #38bdf8;
      --sun:    #f59e0b;
      --coral:  #fb923c;
      --text:   #dff4ff;
      --muted:  #4d7a8f;
      --card:   rgba(5,22,42,.84);
      --border: rgba(14,165,233,.18);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 130% 50% at 50% 0%, #042040 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 100% 100%, #071830 0%, transparent 60%),
        linear-gradient(180deg, #040d17 0%, #020508 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(14,165,233,.015) 0, rgba(14,165,233,.015) 1px, transparent 1px, transparent 72px),
        repeating-linear-gradient(90deg, rgba(14,165,233,.01)  0, rgba(14,165,233,.01)  1px, transparent 1px, transparent 96px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1080px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 5rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* ── Hero ── */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; animation: fadeUp .7s ease both; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 24px rgba(14,165,233,.65)); }
    .hero h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 900; line-height: 1.04;
      background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 30%, #f59e0b 70%, #fb923c 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.03em;
    }
    .hero-sub { font-size: .9rem; color: var(--muted); letter-spacing: .02em; max-width: 480px; line-height: 1.65; }
    .hero-divider {
      width: 120px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: .5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: .65rem;
      animation: fadeUp .7s ease both .1s;
    }
    .tab-btn {
      font-size: .78rem; padding: .36rem 1.1rem; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      transition: all .2s; font-family: inherit;
    }
    .tab-btn.active { color: var(--teal); border-color: rgba(14,165,233,.5); background: rgba(14,165,233,.08); }
    .tab-btn:hover:not(.active) { color: var(--text); border-color: rgba(14,165,233,.28); }

    .tab-panel { display: flex; flex-direction: column; gap: 1.75rem; animation: fadeUp .6s ease both .15s; }
    .tab-panel.hidden { display: none; }

    /* ── Section header ── */
    .sec-header {
      display: flex; align-items: center; gap: 1rem;
      font-size: .6rem; text-transform: uppercase; letter-spacing: .2em;
      color: var(--teal); font-weight: 700;
    }
    .sec-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(14,165,233,.35), transparent); }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
      gap: 1.4rem;
    }
    @media(max-width:540px){ .cards-grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .card:hover {
      border-color: rgba(14,165,233,.45);
      box-shadow: 0 8px 40px rgba(14,165,233,.1);
      transform: translateY(-3px);
    }

    /* Card image */
    .card-img-wrap {
      position: relative; aspect-ratio: 16/9;
      background: var(--panel); overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      display: block; position: relative; z-index: 1;
      opacity: 0; transition: opacity .4s;
    }
    .card-img-wrap img.loaded { opacity: 1; }
    .card-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; opacity: .13;
    }
    .card-badge {
      position: absolute; top: .75rem; left: .75rem;
      background: rgba(0,0,0,.75); border: 1px solid rgba(14,165,233,.5);
      color: var(--teal); font-size: .58rem; font-weight: 700;
      padding: .18rem .58rem; border-radius: 99px; letter-spacing: .1em;
      text-transform: uppercase; backdrop-filter: blur(4px); z-index: 2;
    }
    .card-tag {
      position: absolute; top: .75rem; right: .75rem;
      background: rgba(20,40,60,.88); border: 1px solid rgba(245,158,11,.35);
      color: #f5c060; font-size: .58rem; font-weight: 700;
      padding: .18rem .58rem; border-radius: 99px; letter-spacing: .05em;
      backdrop-filter: blur(4px); z-index: 2;
    }

    /* Card body */
    .card-body { padding: 1.2rem 1.35rem; display: flex; flex-direction: column; gap: .9rem; flex: 1; }
    .card-name    { font-size: 1.1rem; font-weight: 800; line-height: 1.2; color: var(--text); }
    .card-sub     { font-size: .7rem; color: var(--muted); margin-top: .12rem; font-style: italic; }

    /* Stats */
    .card-stats { display: flex; flex-wrap: wrap; gap: .45rem; }
    .stat-chip {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px; padding: .32rem .65rem; min-width: 72px;
    }
    .stat-label { font-size: .5rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .stat-val   { font-size: .8rem; font-weight: 700; color: var(--sun); margin-top: .08rem; }

    /* Pills */
    .pills-label { font-size: .54rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: .32rem; }
    .pills-list  { display: flex; flex-wrap: wrap; gap: .3rem; }
    .pill {
      font-size: .6rem; padding: .16rem .52rem; border-radius: 99px;
      border: 1px solid rgba(14,165,233,.28); background: rgba(14,165,233,.06);
      color: #7dd3f0; white-space: nowrap;
    }

    /* Facts */
    .facts-label { font-size: .54rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: .32rem; }
    .facts-list  { display: flex; flex-direction: column; gap: .5rem; }
    .fact {
      display: flex; gap: .55rem; align-items: flex-start;
      font-size: .76rem; line-height: 1.55; color: #9ab8ca;
    }
    .fact-icon { flex-shrink: 0; font-size: .78rem; margin-top: .05rem; opacity: .8; }

    /* ── Map tab ── */
    #map-container {
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 40px rgba(14,165,233,.08);
      height: 600px;
    }
    #map { width: 100%; height: 100%; }

    .map-legend {
      display: flex; flex-wrap: wrap; gap: .4rem;
      padding: .75rem 0;
    }
    .legend-item {
      display: flex; align-items: center; gap: .35rem;
      font-size: .68rem; color: var(--muted);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Leaflet popup style */
    .leaflet-popup-content-wrapper {
      background: #0a1e30 !important;
      border: 1px solid rgba(14,165,233,.35) !important;
      color: var(--text) !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,.6) !important;
    }
    .leaflet-popup-tip { background: #0a1e30 !important; }
    .leaflet-popup-content { margin: .7rem .9rem !important; font-family: 'Segoe UI', system-ui, sans-serif; }
    .popup-name { font-size: .85rem; font-weight: 700; color: var(--teal); margin-bottom: .25rem; }
    .popup-desc { font-size: .72rem; color: #9ab8ca; line-height: 1.5; }
    .popup-cat  { font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--sun); margin-top: .3rem; }

    /* ── Traffic tab ── */
    .traffic-info {
      display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
      font-size: .72rem; color: var(--muted);
    }
    .traffic-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .22rem .7rem; border-radius: 99px;
      border: 1px solid rgba(14,165,233,.3); background: rgba(14,165,233,.06);
      color: var(--teal); font-size: .65rem; font-weight: 700; letter-spacing: .06em;
    }
    .traffic-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 6px #22c55e;
      animation: livepulse 2s ease-in-out infinite;
    }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    #traffic-frame-wrap {
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 40px rgba(14,165,233,.08);
      height: 600px;
    }
    #traffic-frame-wrap iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>

const TABS = ['eats','map','traffic'];
let mapInited = false;

function switchTab(name) {
  TABS.forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', TABS[i] === name);
  });
  if (name === 'map' && !mapInited) { initMap(); mapInited = true; }
  localStorage.setItem('tampa_tab', name);
}

const CAT_COLORS = {
  food:       '#f59e0b',
  culture:    '#a78bfa',
  nature:     '#34d399',
  attraction: '#f97316',
  sports:     '#60a5fa',
};
const CAT_LABELS = {
  food:       '🍽️ Food & Drink',
  culture:    '🏛️ Culture & History',
  nature:     '🌿 Nature & Parks',
  attraction: '🎢 Attractions',
  sports:     '⚾ Sports',
};

/* ── Build eats cards ── */
async function loadWikiImage(img) {
  try {
    const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(img.dataset.wiki));
    const data = await res.json();
    if (data.thumbnail && data.thumbnail.source) img.src = data.thumbnail.source;
  } catch(e) {}
}

function buildEatsCard(item) {
  const card = document.createElement('div');
  card.className = 'card';

  const statsHtml = item.stats.map(s =>
    `<div class="stat-chip"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val || '—'}</div></div>`
  ).join('');
  const pillsHtml = item.pills.map(p => `<span class="pill">${p}</span>`).join('');
  const factsHtml = item.facts.map(f =>
    `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="card-img-wrap">
      <div class="card-img-placeholder">${item.ph}</div>
      <img data-wiki="${item.wiki}" alt="${item.name}"
           onload="this.classList.add('loaded');this.previousElementSibling.style.display='none'"
           onerror="this.style.display='none'">
      <div class="card-badge">${item.badge}</div>
      <div class="card-tag">${item.tag}</div>
    </div>
    <div class="card-body">
      <div>
        <div class="card-name">${item.name}</div>
        <div class="card-sub">${item.sub}</div>
      </div>
      <div class="card-stats">${statsHtml}</div>
      <div>
        <div class="pills-label">&#9656; Must Try</div>
        <div class="pills-list">${pillsHtml}</div>
      </div>
      <div>
        <div class="facts-label">&#9881; Facts</div>
        <div class="facts-list">${factsHtml}</div>
      </div>
    </div>`;

  document.getElementById('eats-grid').appendChild(card);
  loadWikiImage(card.querySelector('img'));
}

/* ── Build map ── */
function initMap() {
  const map = L.map('map', { center: [27.9506, -82.4572], zoom: 12 });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  }).addTo(map);

  PLACES.forEach(p => {
    const color = CAT_COLORS[p.cat];
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${color};
        width:32px;height:32px;border-radius:50% 50% 50% 4px;
        display:flex;align-items:center;justify-content:center;
        font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.55);
        border:2px solid rgba(255,255,255,.3);
        transform:rotate(-45deg)">
        <span style="transform:rotate(45deg)">${p.icon}</span>
      </div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 30],
      popupAnchor: [0, -32],
    });

    L.marker([p.lat, p.lng], { icon })
      .addTo(map)
      .bindPopup(`
        <div class="popup-name">${p.icon} ${p.name}</div>
        <div class="popup-desc">${p.desc}</div>
        <div class="popup-cat">${CAT_LABELS[p.cat]}</div>
      `);
  });

  // Legend
  const legend = document.getElementById('map-legend');
  Object.entries(CAT_LABELS).forEach(([key, label]) => {
    legend.innerHTML +=
      `<span class="legend-item">
        <span class="legend-dot" style="background:${CAT_COLORS[key]}"></span>
        ${label}
      </span>`;
  });
}

/* ── Init ── */
EATS.forEach(buildEatsCard);
const saved = localStorage.getItem('tampa_tab');
if (saved && TABS.includes(saved)) switchTab(saved);
</script>
