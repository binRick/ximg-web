    body {

      background: linear-gradient(135deg, #f97316 0%, #fbbf24 45%, #e8391a 100%);

      letter-spacing: -.02em;

      border-radius: 16px;

    .card-sub   {
      font-size: .72rem; color: var(--muted); margin-top: .2rem;

    .stat-chip {
      display: flex; flex-direction: column; align-items: center;

      border-radius: 8px; padding: .35rem .75rem; min-width: 74px;

    .stat-val   { font-size: .85rem; font-weight: 700; color: var(--gold); margin-top: .1rem; }

    .card-tags { display: flex; flex-wrap: wrap; gap: .3rem; }
    .tag {
      font-size: .62rem; padding: .18rem .58rem; border-radius: 99px;

    .pizza-tabs { animation: fadeUp .7s ease both .1s; }
    .pizza-section { animation: fadeUp .7s ease both .2s; }

async function fetchWikiThumb(wiki, imgEl, placeholderEl) {
  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wiki}`);
    const data = await res.json();
    if (data.thumbnail && data.thumbnail.source) {
      const src = data.thumbnail.source.replace(/\/\d+px-/, '/640px-');
      imgEl.src = src;
      imgEl.style.opacity = '0';
      imgEl.onload = () => {
        imgEl.style.transition = 'opacity .4s';
        imgEl.style.opacity = '1';
        placeholderEl.style.display = 'none';
      };
      imgEl.onerror = () => {};
    }
  } catch(e) {}
}

function buildCards(data, containerId, rankLabel, phIcon) {
  const container = document.getElementById(containerId);
  data.forEach(d => {
    const card = document.createElement('div');
    card.className = 'pizza-card';

    const statsHtml = d.stats.map(s =>
      `<div class="stat-chip"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`
    ).join('');
    const tagsHtml = d.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const factsHtml = d.facts.map(f =>
      `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
    ).join('');

    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="card-img-placeholder">
          <div class="ph-num">${d.rank}</div>
          <div class="ph-icon">${phIcon}</div>
        </div>
        <img src="" alt="${d.name}" style="opacity:0;position:relative;z-index:1">
        <div class="badge-rank">${rankLabel} ${d.rank}</div>
        <div class="badge-meta">${d.meta}</div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-title">${d.name}</div>
          <div class="card-sub">${d.sub}</div>
        </div>
        <div class="card-stats">${statsHtml}</div>
        <div class="card-tags">${tagsHtml}</div>
        <div>
          <div class="facts-label">🍕 Fun Facts</div>
          <div class="facts-list">${factsHtml}</div>
        </div>
      </div>`;

    container.appendChild(card);
    const imgEl = card.querySelector('img');
    const placeholderEl = card.querySelector('.card-img-placeholder');
    fetchWikiThumb(d.wiki, imgEl, placeholderEl);
  });
}

function switchTab(name) {
  document.querySelectorAll('.pizza-tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 ? 'companies' : 'styles') === name);
  });
  document.getElementById('section-companies').classList.toggle('hidden', name !== 'companies');
  document.getElementById('section-styles').classList.toggle('hidden', name !== 'styles');
  localStorage.setItem('pizza_tab', name);
}
