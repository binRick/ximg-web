  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050403; --marble: #1a1510; --stone: #2a2018; --gold: #c8902c; --amber: #e0aa50; --azure: #2a60c0; --rose: #a04060; --text: #d0c8b0; --muted: #504030; --card: rgba(5,4,3,.94); --border: rgba(200,144,44,.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,144,44,.08) 0%, transparent 60%), linear-gradient(180deg, #050403 0%, #020200 100%); }
    #renaissance-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(200,144,44,.5)); }
    .hero h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 700; color: var(--amber); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(200,144,44,.1); border: 1px solid var(--border); border-radius: 6px; padding: .35rem 1rem; font-size: .85rem; color: var(--gold); letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .artwork-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 1rem; }
    .artwork-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .artwork-frame { font-size: 3rem; margin-bottom: .5rem; border: 2px solid rgba(200,144,44,.3); border-radius: 4px; padding: .5rem; background: rgba(200,144,44,.04); }
    .artwork-title { font-size: .9rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .artwork-artist { font-size: .78rem; color: var(--gold); font-style: italic; margin-bottom: .3rem; }
    .artwork-desc { font-size: .79rem; color: var(--text); line-height: 1.45; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 110px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .85rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--amber); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    #vitruvian-canvas { width: 100%; height: 250px; border: 1px solid var(--border); border-radius: 10px; background: rgba(5,4,3,.8); cursor: crosshair; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(5,4,3,.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--amber); border-color: var(--border); background: rgba(200,144,44,.07); }
    .sub-nav a img { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; vertical-align: middle; margin-right: 6px; opacity: 0.8; transition: opacity .2s; display: inline-block; }
    .sub-nav a:hover img, .sub-nav a.active img { opacity: 1; }
    @media (max-width:600px) { .tl-item { grid-template-columns: 70px 1fr; } }
  </style>

<div class="wrap">
<section id="vitruvian">
<div class="section-title">The Vitruvian Man — Human Proportion</div>
    <canvas id="vitruvian-canvas"></canvas>
    <div class="canvas-label">Move your cursor to rotate the figure — exploring Leonardo's study of the ideal human proportions</div>
</section>
</div>
<script>
(function(){
  const c = document.getElementById('renaissance-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  function resize(){ W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.005;
    // Golden ratio spirals
    for(let i=0;i<5;i++){
      const s = 0.3+i*0.15; const ang = t*0.2+i;
      ctx.beginPath(); ctx.arc(W/2+Math.cos(ang)*W*0.1, H/2+Math.sin(ang)*H*0.1, 80*s, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(200,144,44,${0.02+i*0.01})`; ctx.lineWidth = 1; ctx.stroke();
    }
    for(let i=0;i<50;i++){
      const sx=(i*137.5%100)/100*W, sy=(i*71.3%50)/100*H*0.5;
      ctx.beginPath(); ctx.arc(sx,sy,0.7,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,180,140,${0.2+0.1*Math.sin(t+i)})`; ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
<script>
(function(){
  const c = document.getElementById('vitruvian-canvas');
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth; c.height = 250;
  const W = c.width, H = c.height;
  let mx = W/2, t = 0, armAngle = 0;
  c.addEventListener('mousemove', e => { const r=c.getBoundingClientRect(); mx=e.clientX-r.left; });
  function drawVitruvianMan(cx, cy, r, armAng){
    // Circle
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(200,144,44,.3)'; ctx.lineWidth=1; ctx.stroke();
    // Square
    const s = r*1.2;
    ctx.strokeStyle='rgba(200,144,44,.2)'; ctx.lineWidth=1;
    ctx.strokeRect(cx-s*0.55,cy-s*0.6,s*1.1,s*1.2);
    // Golden cross lines
    ctx.strokeStyle='rgba(200,144,44,.1)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(cx-r,cy); ctx.lineTo(cx+r,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx,cy+r); ctx.stroke();
    const h = r*1.6; // body height
    // Head
    ctx.beginPath(); ctx.arc(cx, cy-h*0.38, h*0.1, 0, Math.PI*2);
    ctx.strokeStyle='rgba(200,144,44,.5)'; ctx.lineWidth=1.5; ctx.stroke();
    // Body
    ctx.strokeStyle='rgba(200,144,44,.5)';
    ctx.beginPath(); ctx.moveTo(cx, cy-h*0.28); ctx.lineTo(cx, cy+h*0.1); ctx.stroke();
    // Arms (two positions)
    const armLen = h*0.45;
    // Down arms
    ctx.beginPath(); ctx.moveTo(cx, cy-h*0.2); ctx.lineTo(cx-armLen, cy-h*0.05); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy-h*0.2); ctx.lineTo(cx+armLen, cy-h*0.05); ctx.stroke();
    // Up arms (faded)
    const upY = cy - h*0.32;
    ctx.strokeStyle = `rgba(200,144,44,${0.2+0.15*Math.sin(armAng)})`;
    ctx.beginPath(); ctx.moveTo(cx, cy-h*0.2); ctx.lineTo(cx-armLen*0.9, upY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy-h*0.2); ctx.lineTo(cx+armLen*0.9, upY); ctx.stroke();
    // Legs
    ctx.strokeStyle='rgba(200,144,44,.5)';
    ctx.beginPath(); ctx.moveTo(cx,cy+h*0.1); ctx.lineTo(cx-h*0.2,cy+h*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy+h*0.1); ctx.lineTo(cx+h*0.2,cy+h*0.5); ctx.stroke();
    // Spread legs (faded)
    ctx.strokeStyle=`rgba(200,144,44,${0.2+0.15*Math.sin(armAng+1)})`;
    ctx.beginPath(); ctx.moveTo(cx,cy+h*0.1); ctx.lineTo(cx-h*0.35,cy+h*0.45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy+h*0.1); ctx.lineTo(cx+h*0.35,cy+h*0.45); ctx.stroke();
    // Proportion lines
    ctx.strokeStyle='rgba(200,144,44,.1)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(cx-armLen,cy-h*0.05); ctx.lineTo(cx+armLen,cy-h*0.05); ctx.stroke();
  }
  function frame(){
    ctx.clearRect(0,0,W,H); t += 0.02;
    armAngle = t;
    // Parchment background
    const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W/2);
    bg.addColorStop(0,'rgba(30,22,12,.9)'); bg.addColorStop(1,'rgba(5,4,3,.95)');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    // Measurement grid hints
    ctx.strokeStyle='rgba(200,144,44,.03)'; ctx.lineWidth=1;
    for(let x=0;x<W;x+=20){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for(let y=0;y<H;y+=20){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    const cx = W/2 + (mx-W/2)*0.02;
    drawVitruvianMan(cx, H/2, H*0.37, armAngle);
    // Label
    ctx.font='italic 11px Georgia'; ctx.fillStyle='rgba(200,144,44,.4)'; ctx.textAlign='center';
    ctx.fillText('"The human body is the measure of all things" — Leonardo da Vinci', W/2, H-8);
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
