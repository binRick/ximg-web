<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cuban Missile Crisis">
  <title>Cuban Missile Crisis — 13 Days to Nuclear War</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☢️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #030405;
      --olive: #1a1e0a;
      --green: #2a3018;
      --amber: #c8a02c;
      --red: #c0392b;
      --yellow: #e0d050;
      --muted: #506040;
      --text: #c0c090;
      --card: rgba(3,4,5,.95);
      --border: rgba(200,160,44,.2);
      --gold: #c8a02c;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(42,48,24,.18) 0%, transparent 60%), linear-gradient(180deg, #030405 0%, #010203 100%); }
    #cuba-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.12; pointer-events: none; }
    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 5rem; display: flex; flex-direction: column; gap: 2rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
    .hero-icon { font-size: 4rem; line-height: 1; margin-bottom: .75rem; filter: drop-shadow(0 0 20px rgba(200,160,44,.45)); }
    .hero h1 { font-size: clamp(1.8rem,5vw,3rem); font-weight: 700; color: var(--yellow); }
    .hero-sub { font-size: 1rem; color: var(--muted); margin-top: .35rem; font-style: italic; }
    .hero-dates { display: inline-block; margin-top: .75rem; background: rgba(192,57,43,.12); border: 1px solid rgba(192,57,43,.35); border-radius: 6px; padding: .35rem 1.1rem; font-size: .85rem; color: #e05050; letter-spacing: .08em; }
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: .5rem; margin-bottom: 1.25rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 1rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-icon { font-size: 1.8rem; margin-bottom: .4rem; }
    .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--yellow); }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem; transition: border-color .2s, transform .2s; }
    .card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--yellow); margin-bottom: .3rem; }
    .card-sub { font-size: .75rem; color: var(--gold); font-variant: small-caps; margin-bottom: .4rem; }
    .card-desc { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .card.hero-card { border-color: rgba(192,57,43,.4); }
    .card.hero-card .card-title { color: #e06050; }
    .timeline { display: flex; flex-direction: column; gap: .75rem; }
    .tl-item { display: grid; grid-template-columns: 130px 1fr; gap: .75rem; align-items: start; }
    .tl-year { font-size: .83rem; font-weight: 700; color: var(--gold); padding-top: .15rem; text-align: right; }
    .tl-body { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--muted); border-radius: 0 8px 8px 0; padding: .6rem .85rem; }
    .tl-body.critical { border-left-color: var(--red); }
    .tl-title { font-size: .88rem; font-weight: 700; color: var(--yellow); margin-bottom: .2rem; }
    .tl-desc { font-size: .81rem; color: var(--text); line-height: 1.45; }
    .tl-badge { display: inline-block; font-size: .68rem; font-weight: 700; letter-spacing: .06em; background: rgba(192,57,43,.18); border: 1px solid rgba(192,57,43,.4); color: #e05555; border-radius: 4px; padding: .1rem .45rem; margin-bottom: .25rem; }
    #radar-canvas { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: rgba(3,4,5,.9); cursor: crosshair; display: block; }
    .canvas-label { font-size: .8rem; color: var(--muted); text-align: center; margin-top: .5rem; font-family: monospace; }
    .sub-nav-wrap { position: sticky; top: 36px; z-index: 100; background: rgba(3,4,5,.93); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
    .sub-nav { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: .15rem; padding: .45rem .75rem; }
    .sub-nav a { color: var(--muted); text-decoration: none; font-family: 'Georgia', serif; font-size: .78rem; letter-spacing: .06em; padding: .35rem .75rem; border-radius: 5px; border: 1px solid transparent; transition: color .18s, border-color .18s, background .18s; white-space: nowrap; }
    .sub-nav a:hover, .sub-nav a.active { color: var(--yellow); border-color: var(--border); background: rgba(200,160,44,.07); }
    .card-img { width: 100%; height: 200px; object-fit: cover; object-position: top; border-radius: 6px; margin-bottom: .75rem; filter: sepia(25%) brightness(.85); transition: filter .3s; display: block; }
    .card-img:hover { filter: sepia(8%) brightness(1); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .gallery-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .gallery-img { width: 100%; height: 220px; object-fit: cover; display: block; filter: sepia(25%) brightness(.85); transition: filter .3s; }
    .gallery-img:hover { filter: sepia(8%) brightness(1.05); }
    .gallery-info { padding: .6rem .85rem .8rem; }
    .gallery-title { font-size: .88rem; color: var(--amber); font-weight: 700; margin-bottom: .2rem; }
    .gallery-caption { font-size: .76rem; color: var(--muted); font-style: italic; line-height: 1.4; }
    .defcon-badge { display: inline-flex; align-items: center; gap: .4rem; background: rgba(192,57,43,.15); border: 1px solid rgba(192,57,43,.45); border-radius: 6px; padding: .3rem .85rem; font-size: .82rem; color: #e06050; font-weight: 700; letter-spacing: .1em; margin-top: .6rem; }
    @media (max-width:600px) { .tl-item { grid-template-columns: 72px 1fr; } }
  </style>
</head>
<body>
<canvas id="cuba-canvas"></canvas>
<nav class="sub-nav-wrap">
  <div class="sub-nav">
    <a href="index.html">Background</a>
    <a href="thirteen-days.html">The 13 Days</a>
    <a href="players.html">Key Players</a>
    <a href="aftermath.html">Aftermath</a>
    <a href="timeline.html">Timeline</a>
    <a href="radar.html">Radar</a>
    <a href="gallery.html">🖼 Gallery</a>
  </div>
</nav>
<script>
document.querySelectorAll('.sub-nav a').forEach(function(a){
  var h = a.getAttribute('href');
  var p = location.pathname;
  if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/cuba') || p.endsWith('index.html')))) {
    a.classList.add('active');
  }
});
</script>
<section id="radar">
<div class="section-title">NORAD Early Warning Radar</div>
    <canvas id="radar-canvas"></canvas>
    <div class="canvas-label">Click to add missile contacts — rotating sweep detects inbound targets · Range rings: 500 / 1000 / 1500 / 2000 mi</div>
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
