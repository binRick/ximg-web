<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" style="background:#040d20">
  <text x="240" y="25" text-anchor="middle" fill="#22d3ee" font-size="16" font-family="monospace">SPI Bus Signals</text>
  <!-- Signal lines -->
  <!-- SCLK -->
  <text x="10" y="65" fill="#22d3ee" font-size="12" font-family="monospace">SCLK</text>
  <polyline points="80,70 100,70 100,50 120,50 120,70 140,70 140,50 160,50 160,70 180,70 180,50 200,50 200,70 220,70 220,50 240,50 240,70 260,70 260,50 280,50 280,70 300,70 300,50 320,50 320,70 340,70" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <!-- MOSI -->
  <text x="10" y="125" fill="#f59e0b" font-size="12" font-family="monospace">MOSI</text>
  <polyline points="80,130 100,130 100,110 220,110 220,130 280,130 280,110 340,110 340,130" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <!-- MISO -->
  <text x="10" y="185" fill="#22c55e" font-size="12" font-family="monospace">MISO</text>
  <polyline points="80,190 140,190 140,170 200,170 200,190 260,190 260,170 320,170 320,190 340,190" fill="none" stroke="#22c55e" stroke-width="2"/>
  <!-- CS -->
  <text x="10" y="245" fill="#a78bfa" font-size="12" font-family="monospace">CS̄</text>
  <polyline points="80,230 110,230 110,250 330,250 330,230 340,230" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <!-- Byte labels -->
  <text x="155" y="105" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">Byte 1</text>
  <text x="295" y="105" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="monospace">Byte 2</text>
</svg>
