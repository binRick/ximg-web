// Minimal TopoJSON → arcs decoder (no external lib needed)
function topoArcs(topo, geom) {
  function decodeArc(arcIdx) {
    var rev = arcIdx < 0;
    var arc = topo.arcs[rev ? ~arcIdx : arcIdx];
    var pts = [], x = 0, y = 0;
    for (var i = 0; i < arc.length; i++) {
      x += arc[i][0]; y += arc[i][1];
      var lon = x * topo.transform.scale[0] + topo.transform.translate[0];
      var lat = y * topo.transform.scale[1] + topo.transform.translate[1];
      pts.push([lon, lat]);
    }
    if (rev) pts.reverse();
    return pts;
  }
  function decodeRing(ring) {
    var pts = [];
    ring.forEach(function(ai) { pts = pts.concat(decodeArc(ai)); });
    return pts;
  }
  if (geom.type === 'Polygon') return geom.arcs.map(decodeRing);
  if (geom.type === 'MultiPolygon') {
    var out = [];
    geom.arcs.forEach(function(poly) { poly.forEach(function(ring) { out.push(decodeRing(ring)); }); });
    return out;
  }
  return [];
}

function loadGlobal() {
  document.getElementById('global-info').textContent = 'Loading…';
  document.getElementById('gtable-body').innerHTML =
    '<tr><td colspan="5" style="color:#586069;text-align:center;padding:1.5rem">Loading…</td></tr>';

  var topoReady = _worldTopo
    ? Promise.resolve()
    : fetch('/world.json').then(function(r){ return r.json(); }).then(function(d){ _worldTopo = d; });

  topoReady.catch(function(){}).then(function(){
    return fetch('/docker-downloads');
  })
    .then(function(r){ return r.json(); })
    .then(function(entries) {
      var ipCounts = {};
      entries.forEach(function(e){ if (e.ip) ipCounts[e.ip] = (ipCounts[e.ip]||0)+1; });
      var ips = Object.keys(ipCounts);
      if (!ips.length) {
        document.getElementById('global-info').textContent = 'No downloads recorded yet.';
        document.getElementById('gtable-body').innerHTML =
          '<tr><td colspan="5" style="color:#586069;text-align:center;padding:1.5rem">No data yet.</td></tr>';
        return;
      }
      var batches = [];
      for (var i = 0; i < ips.length; i += 50) batches.push(ips.slice(i, i+50));
      Promise.all(batches.map(function(b){
        return fetch('/geo?ips='+b.join(',')).then(function(r){ return r.json(); }).catch(function(){ return {}; });
      })).then(function(results) {
        var geo = {};
        results.forEach(function(r){ Object.assign(geo, r); });
        var counts = {};
        entries.forEach(function(e){
          var code = geo[e.ip];
          if (code) counts[code] = (counts[code]||0)+1;
        });
        _globeData = { counts: counts, ipCounts: ipCounts };
        renderGlobe(counts, entries.length);
        renderGlobeTable(counts, entries.length);
        document.getElementById('global-info').textContent =
          entries.length + ' download' + (entries.length!==1?'s':'') + ' · ' +
          Object.keys(counts).length + ' countr' + (Object.keys(counts).length!==1?'ies':'y') + ' · ' +
          Object.keys(geo).length + ' IPs resolved';
      });
    })
    .catch(function(){
      document.getElementById('global-info').textContent = 'Failed to load data.';
    });
}

function llToXY(lat, lon, W, H) {
  return [(lon+180)/360*W, (90-lat)/180*H];
}

function drawWorld(ctx, topo, W, H, counts, max) {
  var countries = topo.objects.countries;
  countries.geometries.forEach(function(geom) {
    var iso = NUMISO[geom.id];
    var count = iso ? (counts[iso] || 0) : 0;
    var rings = topoArcs(topo, geom);

    if (count > 0) {
      var t = Math.pow(count / max, 0.5);
      var h = Math.round((1-t)*220);
      var l = Math.round(25 + t*30);
      ctx.fillStyle = 'hsl('+h+',90%,'+l+'%)';
    } else {
      ctx.fillStyle = '#1a1f2e';
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.4;

    rings.forEach(function(ring) {
      if (!ring.length) return;
      ctx.beginPath();
      var p0 = llToXY(ring[0][1], ring[0][0], W, H);
      ctx.moveTo(p0[0], p0[1]);
      for (var i = 1; i < ring.length; i++) {
        var p = llToXY(ring[i][1], ring[i][0], W, H);
        ctx.lineTo(p[0], p[1]);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    });
  });
}

function renderGlobe(counts, total) {
  var canvas = document.getElementById('globe-canvas');
  var W = canvas.parentElement.clientWidth || 900;
  var H = Math.round(W * 0.5);
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');

  ctx.fillStyle = '#090d18';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 0.4;
  for (var lat = -90; lat <= 90; lat += 30) {
    var gy = (90-lat)/180*H;
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
  }
  for (var lon2 = -180; lon2 <= 180; lon2 += 30) {
    var gx = (lon2+180)/360*W;
    ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke();
  }

  var vals = Object.values(counts);
  var max = vals.length ? Math.max.apply(null, vals) : 1;

  if (_worldTopo) {
    drawWorld(ctx, _worldTopo, W, H, counts, max);
  }

  var sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
  sorted.reverse().forEach(function(code) {
    var c = CENTROIDS[code]; if (!c) return;
    var pos = llToXY(c[0], c[1], W, H);
    var x = pos[0], y = pos[1];
    var t = Math.pow(counts[code]/max, 0.5);
    var r = (6 + t*28) * (W/900);
    var hue = Math.round((1-t)*220);
    var g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,   'hsla('+hue+',100%,85%,0.9)');
    g.addColorStop(0.5, 'hsla('+hue+',100%,65%,0.4)');
    g.addColorStop(1,   'hsla('+hue+',100%,60%,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  });

  canvas._meta = { counts: counts, max: max, W: W, H: H };
  canvas.onmousemove = function(ev) {
    var rect = canvas.getBoundingClientRect();
    var mx = (ev.clientX - rect.left) * (W / rect.width);
    var my = (ev.clientY - rect.top)  * (H / rect.height);
    var best = null, bestD = Infinity;
    Object.keys(counts).forEach(function(code) {
      var c = CENTROIDS[code]; if (!c) return;
      var pos = llToXY(c[0], c[1], W, H);
      var d = Math.hypot(pos[0]-mx, pos[1]-my);
      if (d < 30*(W/900) && d < bestD) { bestD = d; best = code; }
    });
    var tip = document.getElementById('globe-tip');
    if (best) {
      var pct = (counts[best]/total*100).toFixed(1);
      tip.textContent = (CNAMES[best]||best) + ': ' + counts[best] + ' dl (' + pct + '%)';
      tip.style.display = 'block';
      tip.style.left = Math.min(mx + 10, rect.width - 160) + 'px';
      tip.style.top  = Math.max(my - 28, 4) + 'px';
    } else {
      tip.style.display = 'none';
    }
  };
  canvas.onmouseleave = function() { document.getElementById('globe-tip').style.display='none'; };
}

function renderGlobeTable(counts, total) {
  var tbody = document.getElementById('gtable-body');
  var sorted = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
  var max = counts[sorted[0]] || 1;
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#586069;text-align:center;padding:1.5rem">No geo data resolved.</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map(function(code) {
    var n = counts[code];
    var pct = (n/total*100).toFixed(1);
    var bar = Math.round(n/max*100);
    var flag = countryFlag(code);
    return '<tr>' +
      '<td class="flag">' + flag + '</td>' +
      '<td class="country">' + (CNAMES[code]||code) + '</td>' +
      '<td class="num">' + n + '</td>' +
      '<td class="num" style="color:#586069">' + pct + '%</td>' +
      '<td class="bar-cell"><div class="gtable-bar-bg"><div class="gtable-bar-fill" style="width:'+bar+'%"></div></div></td>' +
    '</tr>';
  }).join('');
}

function countryFlag(code) {
  if (!code || code.length !== 2) return '';
  return String.fromCodePoint(0x1F1E6 + code.charCodeAt(0) - 65) +
         String.fromCodePoint(0x1F1E6 + code.charCodeAt(1) - 65);
}

window.onload = loadGlobal;
</script>
