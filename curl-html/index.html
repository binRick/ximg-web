<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="cURL Builder — curl.ximg.app — interactive educational app on ximg.app">
<title>cURL Builder — curl.ximg.app</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#02020f;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-top:44px}
.subnav{position:sticky;top:44px;z-index:100;background:#02020f;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 1rem;justify-content:center}
.tab-btn{padding:.65rem 1.1rem;font-size:.82rem;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:#c9d1d9}
.tab-btn.active{color:#22d3ee;border-bottom-color:#22d3ee}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
.tab-panel{display:none}
.tab-panel.active{display:block}
.page-title{font-size:1.2rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
.page-sub{font-size:.8rem;color:#475569;margin-bottom:1.25rem}
label.lbl{display:block;font-size:.7rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
input[type=text],input[type=url],input[type=password],textarea,select{width:100%;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;font-size:.9rem;padding:.55rem .8rem;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=url]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:#22d3ee55}
select option{background:#070720}
textarea{resize:vertical;line-height:1.6;font-family:'Courier New',monospace;font-size:.85rem}
.row{display:flex;gap:.75rem;margin-bottom:.75rem}
.row>*{flex:1}
.row>.shrink{flex:0 0 auto}
.card{background:#070720;border:1px solid #1e293b;border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:.78rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.9rem}
.method-select{width:120px;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#22d3ee;font-size:.9rem;font-weight:700;padding:.55rem .8rem;outline:none;cursor:pointer;flex:0 0 120px}
.method-select option{color:#e2e8f0}
.header-row{display:flex;gap:.5rem;margin-bottom:.4rem;align-items:center}
.header-row input{flex:1}
.rm-btn{background:none;border:1px solid #334155;border-radius:4px;color:#64748b;cursor:pointer;padding:.3rem .5rem;font-size:.85rem;flex:0 0 auto;transition:all .15s}
.rm-btn:hover{border-color:#f85149;color:#f85149}
.add-btn{background:none;border:1px solid #334155;border-radius:5px;color:#64748b;cursor:pointer;padding:.35rem .8rem;font-size:.78rem;font-weight:600;transition:all .15s;margin-top:.2rem}
.add-btn:hover{border-color:#22d3ee;color:#22d3ee}
.flags-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem}
.flag-check{display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;background:#0a0a25;border:1px solid #1e293b;border-radius:5px;cursor:pointer;transition:all .15s}
.flag-check:hover{border-color:#334155}
.flag-check input[type=checkbox]{width:auto;accent-color:#22d3ee;cursor:pointer}
.flag-check-label{font-size:.82rem;color:#94a3b8;cursor:pointer;flex:1}
.flag-check-code{font-family:'Courier New',monospace;color:#22d3ee;font-size:.78rem}
.output-box{background:#040416;border:1px solid #1e293b;border-radius:8px;padding:1rem;margin-top:1rem;position:relative}
.output-label{font-size:.7rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem}
.cmd-text{font-family:'Courier New',monospace;font-size:.85rem;color:#22d3ee;word-break:break-all;line-height:1.6;white-space:pre-wrap}
.copy-btn{position:absolute;top:.75rem;right:.75rem;background:#0a0a25;border:1px solid #334155;border-radius:5px;color:#94a3b8;cursor:pointer;padding:.3rem .7rem;font-size:.75rem;font-weight:600;transition:all .15s}
.copy-btn:hover{border-color:#22d3ee;color:#22d3ee}
.copy-btn.copied{border-color:#22c55e;color:#22c55e}
.auth-section{margin-top:.75rem}
.ref-search{width:100%;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;font-size:.9rem;padding:.55rem .8rem;outline:none;margin-bottom:1rem;transition:border-color .2s}
.ref-search:focus{border-color:#22d3ee55}
.ref-group{margin-bottom:1.5rem}
.ref-group-title{font-size:.78rem;font-weight:700;color:#22d3ee;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;padding-bottom:.4rem;border-bottom:1px solid #1e293b}
.ref-table{width:100%;border-collapse:collapse;font-size:.83rem}
.ref-table th{background:#070720;color:#64748b;padding:.45rem .75rem;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #1e293b}
.ref-table td{padding:.45rem .75rem;border-bottom:1px solid #0d1117;vertical-align:top}
.ref-table tr:last-child td{border-bottom:none}
.ref-table tr:hover td{background:#070720}
.flag-code{font-family:'Courier New',monospace;color:#22d3ee;white-space:nowrap}
.flag-desc{color:#94a3b8;line-height:1.5}
.flag-ex{font-family:'Courier New',monospace;color:#475569;font-size:.78rem}
.hidden{display:none}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:680px){.two-col{grid-template-columns:1fr}.row{flex-direction:column}}
</style>
</head>
<body>

<nav class="subnav">
  <button class="tab-btn active" onclick="showTab('builder')">Builder</button>
  <button class="tab-btn" onclick="showTab('reference')">Reference</button>
</nav>

<div class="page">

<!-- BUILDER TAB -->
<div id="builder" class="tab-panel active">
  <div class="page-title">cURL Builder</div>
  <div class="page-sub">Build curl commands interactively with live preview</div>

  <div class="card">
    <div class="card-title">Request</div>
    <div class="row">
      <div style="flex:0 0 120px">
        <label class="lbl">Method</label>
        <select id="method" class="method-select" style="width:100%" onchange="update()">
          <option>GET</option>
          <option>POST</option>
          <option>PUT</option>
          <option>PATCH</option>
          <option>DELETE</option>
          <option>HEAD</option>
          <option>OPTIONS</option>
        </select>
      </div>
      <div style="flex:1">
        <label class="lbl">URL</label>
        <input type="url" id="url" placeholder="https://api.example.com/endpoint" oninput="update()">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Headers</div>
    <div id="headers-list"></div>
    <button class="add-btn" onclick="addHeader()">+ Add Header</button>
  </div>

  <div class="card" id="body-card">
    <div class="card-title">Request Body</div>
    <div class="row">
      <div style="flex:0 0 160px">
        <label class="lbl">Content-Type</label>
        <select id="body-type" onchange="update()">
          <option value="application/json">JSON</option>
          <option value="application/x-www-form-urlencoded">Form URL-encoded</option>
          <option value="text/plain">Plain Text</option>
          <option value="application/xml">XML</option>
          <option value="custom">Custom</option>
        </select>
      </div>
    </div>
    <label class="lbl" style="margin-top:.5rem">Body</label>
    <textarea id="body" rows="5" placeholder='{"key": "value"}' oninput="update()"></textarea>
  </div>

  <div class="card">
    <div class="card-title">Authentication</div>
    <div class="row">
      <div style="flex:0 0 160px">
        <label class="lbl">Type</label>
        <select id="auth-type" onchange="updateAuth()">
          <option value="none">None</option>
          <option value="basic">Basic Auth</option>
          <option value="bearer">Bearer Token</option>
          <option value="apikey">API Key Header</option>
          <option value="digest">Digest Auth</option>
        </select>
      </div>
    </div>
    <div id="auth-basic" class="auth-section hidden">
      <div class="two-col">
        <div><label class="lbl">Username</label><input type="text" id="auth-user" placeholder="username" oninput="update()"></div>
        <div><label class="lbl">Password</label><input type="password" id="auth-pass" placeholder="password" oninput="update()"></div>
      </div>
    </div>
    <div id="auth-bearer" class="auth-section hidden">
      <label class="lbl">Token</label>
      <input type="text" id="auth-token" placeholder="eyJhbGciOiJIUzI1NiIs..." oninput="update()">
    </div>
    <div id="auth-apikey" class="auth-section hidden">
      <div class="two-col">
        <div><label class="lbl">Header Name</label><input type="text" id="apikey-name" placeholder="X-API-Key" oninput="update()"></div>
        <div><label class="lbl">Key Value</label><input type="text" id="apikey-val" placeholder="your-api-key" oninput="update()"></div>
      </div>
    </div>
    <div id="auth-digest" class="auth-section hidden">
      <div class="two-col">
        <div><label class="lbl">Username</label><input type="text" id="digest-user" placeholder="username" oninput="update()"></div>
        <div><label class="lbl">Password</label><input type="password" id="digest-pass" placeholder="password" oninput="update()"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Flags</div>
    <div class="flags-grid">
      <label class="flag-check">
        <input type="checkbox" id="flag-L" onchange="update()">
        <span class="flag-check-code">-L</span>
        <span class="flag-check-label">Follow redirects</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-k" onchange="update()">
        <span class="flag-check-code">-k</span>
        <span class="flag-check-label">Insecure (skip SSL)</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-v" onchange="update()">
        <span class="flag-check-code">-v</span>
        <span class="flag-check-label">Verbose output</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-s" onchange="update()">
        <span class="flag-check-code">-s</span>
        <span class="flag-check-label">Silent mode</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-i" onchange="update()">
        <span class="flag-check-code">-i</span>
        <span class="flag-check-label">Include response headers</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-I" onchange="update()">
        <span class="flag-check-code">-I</span>
        <span class="flag-check-label">HEAD only (headers)</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-c" onchange="update()">
        <span class="flag-check-code">--compressed</span>
        <span class="flag-check-label">Accept compressed</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-max" onchange="update()">
        <span class="flag-check-code">--max-time 30</span>
        <span class="flag-check-label">Timeout 30s</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-retry" onchange="update()">
        <span class="flag-check-code">--retry 3</span>
        <span class="flag-check-label">Retry on failure (3x)</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-o" onchange="update()">
        <span class="flag-check-code">-o output.txt</span>
        <span class="flag-check-label">Write output to file</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-A" onchange="update()">
        <span class="flag-check-code">-A "Mozilla/5.0"</span>
        <span class="flag-check-label">Custom User-Agent</span>
      </label>
      <label class="flag-check">
        <input type="checkbox" id="flag-x" onchange="update()">
        <span class="flag-check-code">-x proxy:port</span>
        <span class="flag-check-label">Use proxy</span>
      </label>
    </div>
  </div>

  <div class="output-box">
    <div class="output-label">Generated Command</div>
    <button class="copy-btn" onclick="copyCmd(this)">Copy</button>
    <pre class="cmd-text" id="cmd-output">curl https://api.example.com/endpoint</pre>
  </div>
</div>

<!-- REFERENCE TAB -->
<div id="reference" class="tab-panel">
  <div class="page-title">cURL Flag Reference</div>
  <div class="page-sub">Common flags grouped by category — click column headers to sort</div>
  <input class="ref-search" id="ref-search" placeholder="Search flags or descriptions..." oninput="filterRef()">
  <div id="ref-content"></div>
</div>

</div><!-- .page -->

<script>
// ── Tab switching ──────────────────────────────────────────────
function showTab(id){
  history.pushState(null, '', '#' + id);
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(event && event.target) event.target.classList.add('active');
}
window.addEventListener('hashchange', function() { var h = location.hash.slice(1); if (h) showTab(h); });
(function() { var h = location.hash.slice(1); if (h) showTab(h); })();

// ── Header rows ───────────────────────────────────────────────
var headerCount = 0;
function addHeader(k, v){
  headerCount++;
  var id = 'hrow-' + headerCount;
  var el = document.createElement('div');
  el.className = 'header-row';
  el.id = id;
  el.innerHTML =
    '<input type="text" placeholder="Header name" value="'+(k||'')+'" oninput="update()" style="flex:0 0 200px">'+
    '<input type="text" placeholder="Value" value="'+(v||'')+'" oninput="update()">'+
    '<button class="rm-btn" onclick="removeHeader(\''+id+'\')">✕</button>';
  document.getElementById('headers-list').appendChild(el);
  update();
}
function removeHeader(id){
  var el = document.getElementById(id);
  if(el) el.remove();
  update();
}
function getHeaders(){
  var rows = document.querySelectorAll('#headers-list .header-row');
  var out = [];
  rows.forEach(function(r){
    var inputs = r.querySelectorAll('input');
    var k = inputs[0].value.trim(), v = inputs[1].value.trim();
    if(k) out.push({k:k, v:v});
  });
  return out;
}

// ── Auth toggle ────────────────────────────────────────────────
function updateAuth(){
  var t = document.getElementById('auth-type').value;
  ['basic','bearer','apikey','digest'].forEach(function(s){
    document.getElementById('auth-'+s).classList.add('hidden');
  });
  if(t !== 'none') document.getElementById('auth-'+t).classList.remove('hidden');
  update();
}

// ── Body card visibility ───────────────────────────────────────
function updateBodyVisibility(){
  var m = document.getElementById('method').value;
  var card = document.getElementById('body-card');
  if(['POST','PUT','PATCH'].includes(m)) card.style.display='block';
  else card.style.display='none';
}

// ── Build command ──────────────────────────────────────────────
function update(){
  updateBodyVisibility();
  var method = document.getElementById('method').value;
  var url = document.getElementById('url').value.trim() || 'https://api.example.com/endpoint';
  var parts = ['curl'];

  // Method
  if(method !== 'GET') parts.push('-X ' + method);

  // Flags
  if(document.getElementById('flag-L').checked) parts.push('-L');
  if(document.getElementById('flag-k').checked) parts.push('-k');
  if(document.getElementById('flag-v').checked) parts.push('-v');
  if(document.getElementById('flag-s').checked) parts.push('-s');
  if(document.getElementById('flag-i').checked) parts.push('-i');
  if(document.getElementById('flag-I').checked) parts.push('-I');
  if(document.getElementById('flag-c').checked) parts.push('--compressed');
  if(document.getElementById('flag-max').checked) parts.push('--max-time 30');
  if(document.getElementById('flag-retry').checked) parts.push('--retry 3');
  if(document.getElementById('flag-o').checked) parts.push('-o output.txt');
  if(document.getElementById('flag-A').checked) parts.push('-A "Mozilla/5.0 (compatible)"');
  if(document.getElementById('flag-x').checked) parts.push('-x http://proxy:8080');

  // Auth
  var authType = document.getElementById('auth-type').value;
  if(authType === 'basic'){
    var u = document.getElementById('auth-user').value || 'user';
    var p = document.getElementById('auth-pass').value || 'pass';
    parts.push('-u "' + u + ':' + p + '"');
  } else if(authType === 'bearer'){
    var tok = document.getElementById('auth-token').value || 'TOKEN';
    parts.push('-H "Authorization: Bearer ' + tok + '"');
  } else if(authType === 'apikey'){
    var hn = document.getElementById('apikey-name').value || 'X-API-Key';
    var hv = document.getElementById('apikey-val').value || 'YOUR_KEY';
    parts.push('-H "' + hn + ': ' + hv + '"');
  } else if(authType === 'digest'){
    var du = document.getElementById('digest-user').value || 'user';
    var dp = document.getElementById('digest-pass').value || 'pass';
    parts.push('--digest -u "' + du + ':' + dp + '"');
  }

  // Headers
  getHeaders().forEach(function(h){
    parts.push('-H "' + h.k + ': ' + h.v + '"');
  });

  // Body
  if(['POST','PUT','PATCH'].includes(method)){
    var btype = document.getElementById('body-type').value;
    var body = document.getElementById('body').value.trim();
    if(btype !== 'custom') parts.push('-H "Content-Type: ' + btype + '"');
    if(body){
      // Escape single quotes
      var escaped = body.replace(/'/g, "'\\''");
      parts.push("--data '" + escaped + "'");
    }
  }

  // URL
  parts.push('"' + url + '"');

  var cmd = parts.join(' \\\n  ');
  document.getElementById('cmd-output').textContent = cmd;
}

function copyCmd(btn){
  var text = document.getElementById('cmd-output').textContent;
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ── Reference data ─────────────────────────────────────────────
var REF_GROUPS = [
  { name: 'Request', rows: [

    ['-d, --data <data>', 'Send POST data (URL-encoded by default)', "-d 'name=John&age=30'"],

    ['-b, --cookie <data>', 'Send cookies', '-b "session=abc123"'],
    ['-c, --cookie-jar <file>', 'Write received cookies to file', '-c cookies.txt'],
    ['-j, --junk-session-cookies', 'Ignore session cookies from file', '-j -b cookies.txt'],
  ]},
  { name: 'Output', rows: [
    ['-o, --output <file>', 'Write output to file', '-o response.json'],
    ['-O, --remote-name', 'Save with remote filename', '-O'],
    ['-s, --silent', 'Silent mode — suppress progress/errors', '-s'],
    ['-S, --show-error', 'Show error message even with -s', '-sS'],
    ['-v, --verbose', 'Verbose — show request + response headers', '-v'],
    ['-i, --include', 'Include response headers in output', '-i'],
    ['-I, --head', 'Fetch headers only (HEAD request)', '-I'],

  ]},
  { name: 'SSL / TLS', rows: [
    ['-k, --insecure', 'Skip SSL certificate verification', '-k'],
    ['--cacert <file>', 'Use specific CA bundle', '--cacert ca.pem'],
    ['--capath <dir>', 'Use CA certs from directory', '--capath /etc/ssl/certs'],
    ['--cert <cert>', 'Use client certificate', '--cert client.pem'],
    ['--key <key>', 'Private key for client cert', '--key client.key'],
    ['--tlsv1.2', 'Force TLS 1.2', '--tlsv1.2'],
    ['--tlsv1.3', 'Force TLS 1.3', '--tlsv1.3'],
    ['--tls-max <version>', 'Set maximum TLS version', '--tls-max 1.3'],
    ['--pinnedpubkey <hash>', 'Pin public key SHA-256', '--pinnedpubkey "sha256//BASE64="'],
  ]},
  { name: 'Connection / Timing', rows: [
    ['--connect-timeout <sec>', 'Max time to connect', '--connect-timeout 5'],
    ['-m, --max-time <sec>', 'Max total time', '--max-time 30'],
    ['--retry <num>', 'Retry on transient errors', '--retry 3'],
    ['--retry-delay <sec>', 'Wait between retries', '--retry-delay 2'],
    ['--retry-max-time <sec>', 'Max total retry time', '--retry-max-time 60'],
    ['--speed-limit <speed>', 'Abort if below speed (bytes/sec)', '--speed-limit 1000'],
    ['--limit-rate <speed>', 'Limit transfer rate', '--limit-rate 100k'],
    ['-x, --proxy <URL>', 'Use HTTP/SOCKS proxy', '-x socks5://127.0.0.1:1080'],
    ['--proxy-user <user:pass>', 'Proxy credentials', '--proxy-user admin:pass'],
    ['-4, --ipv4', 'Resolve to IPv4 only', '-4'],

function buildRefHTML(groups){
  return groups.map(function(g){
    var rows = g.rows.filter(function(r){ return r; }).map(function(r){
      return '<tr><td><span class="flag-code">'+r[0]+'</span></td><td class="flag-desc">'+r[1]+'</td><td class="flag-ex">'+r[2]+'</td></tr>';
    }).join('');
    if(!rows) return '';
    return '<div class="ref-group">'+
      '<div class="ref-group-title">'+g.name+'</div>'+
      '<table class="ref-table"><thead><tr><th>Flag</th><th>Description</th><th>Example</th></tr></thead><tbody>'+rows+'</tbody></table>'+
      '</div>';
  }).join('');
}

document.getElementById('ref-content').innerHTML = buildRefHTML(REF_GROUPS);

function filterRef(){
  var q = document.getElementById('ref-search').value.toLowerCase();
  if(!q){ document.getElementById('ref-content').innerHTML = buildRefHTML(REF_GROUPS); return; }
  var filtered = REF_GROUPS.map(function(g){
    return { name: g.name, rows: g.rows.filter(function(r){
      return r[0].toLowerCase().includes(q) || r[1].toLowerCase().includes(q) || r[2].toLowerCase().includes(q);
    })};
  }).filter(function(g){ return g.rows.length > 0; });
  document.getElementById('ref-content').innerHTML = buildRefHTML(filtered);
}
