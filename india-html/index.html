  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

      --muted:  #9d7040;
      --border: rgba(249,115,22,.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 110% 55% at 50% 0%, #3d1200 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 85% 100%, #1a0800 0%, transparent 60%),

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(249,115,22,.02) 0, rgba(249,115,22,.02) 1px, transparent 1px, transparent 56px),

    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 20px rgba(249,115,22,.7)); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #f97316 0%, #f59e0b 45%, #c2410c 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic; letter-spacing: .04em;

    }
    .hero-divider {
      width: 120px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--saffron), transparent);

    .tabs { display: flex; gap: .5rem; border-bottom: 1px solid rgba(255,255,255,.07); padding-bottom: .6rem; }
    .tab {
      font-size: .8rem; padding: .35rem 1rem; border-radius: 6px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.08); background: transparent; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; transition: all .2s;

    .tab:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,.18); }
    .section { display: flex; flex-direction: column; gap: 1.5rem; }

    @media(max-width: 520px) { .cards { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;

    .card:hover {
      border-color: rgba(249,115,22,.45);

    .card-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
    }

    .ph-icon { font-size: 2.2rem; opacity: .15; }

      position: absolute; top: .75rem; left: .75rem; z-index: 2;
      background: rgba(0,0,0,.72); border: 1px solid rgba(249,115,22,.45);
      color: var(--gold); font-size: .65rem; font-weight: 700;
      padding: .2rem .55rem; border-radius: 5px; letter-spacing: .06em;

    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--cream); letter-spacing: -.01em; }
    .card-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; line-height: 1.45; }

    .card-stats { display: flex; gap: .5rem; flex-wrap: wrap; }
    .stat-chip {
      background: rgba(249,115,22,.08); border: 1px solid rgba(249,115,22,.18);
      border-radius: 7px; padding: .3rem .65rem; display: flex; flex-direction: column; gap: .1rem;

    .stat-label { font-size: .6rem; color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-val   { font-size: .82rem; color: var(--gold); font-weight: 700; font-family: 'Segoe UI', system-ui, sans-serif; }

    .card-tags { display: flex; gap: .4rem; flex-wrap: wrap; }
    .tag {
      font-size: .68rem; padding: .2rem .55rem; border-radius: 12px;
      background: rgba(245,158,11,.07); border: 1px solid rgba(245,158,11,.2);

    .facts-label { font-size: .7rem; font-weight: 700; color: var(--saffron); font-family: 'Segoe UI', system-ui, sans-serif; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    .facts-list { display: flex; flex-direction: column; gap: .55rem; }
    .fact { display: flex; gap: .55rem; align-items: flex-start; font-size: .8rem; line-height: 1.55; color: rgba(253,240,224,.8); }
    .fact-icon { font-size: .95rem; flex-shrink: 0; margin-top: .05rem; }
  </style>
</head>

function buildCards(data, containerId, rankLabel, phIcon) {
  const container = document.getElementById(containerId);
  data.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    const statsHtml = d.stats.map(s =>
      `<div class="stat-chip"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`
    ).join('');
    const tagsHtml = d.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const factsHtml = d.facts.map(f =>
      `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
    ).join('');
    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="card-img-placeholder">
          <div class="ph-num">${d.rank}</div>
          <div class="ph-icon">${phIcon}</div>
        </div>
        <img data-wiki="${d.wiki}" alt="${d.name}" onload="this.classList.add('loaded');this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">
        <div class="badge-rank">${rankLabel} ${d.rank}</div>
        <div class="badge-meta">${d.meta}</div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-title">${d.name}</div>
          <div class="card-sub">${d.sub}</div>
        </div>
        <div class="card-stats">${statsHtml}</div>
        <div class="card-tags">${tagsHtml}</div>
        <div>
          <div class="facts-label">🍛 Fun Facts</div>
          <div class="facts-list">${factsHtml}</div>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function loadWikiImage(img) {
  if (!img.dataset.wiki) return;
  const M = {"Bengali cuisine":"Bengali cuisine.png","Biryani":"Biryani.jpg","Butter chicken":"Butter chicken.jpg","Chicken tikka masala":"Chicken tikka masala.jpg","Chole bhature":"Chole bhature.jpg","Dal makhani":"Dal makhani.jpg","Gujarati cuisine":"Gujarati cuisine.jpg","Kashmiri cuisine":"Kashmiri cuisine.jpg","North Indian cuisine":"North Indian cuisine.png","Palak paneer":"Palak paneer.jpg","Rajasthani cuisine":"Rajasthani cuisine.png","Rogan josh":"Rogan josh.jpg","Samosa":"Samosa.jpg","South Indian cuisine":"South Indian cuisine.jpg","Vada pav":"Vada pav.jpg","Vindaloo":"Vindaloo.jpg"};
  const f = M[img.dataset.wiki];
  if (f) { img.onload = () => img.classList.add('loaded'); img.onerror = () => img.style.display='none'; img.src = 'images/' + f; }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 ? 'cuisines' : 'dishes') === name);
  });
  document.getElementById('section-cuisines').classList.toggle('hidden', name !== 'cuisines');
  document.getElementById('section-dishes').classList.toggle('hidden', name !== 'dishes');
  localStorage.setItem('india_tab', name);
}

buildCards(CUISINES, 'cuisines-grid', 'CUISINE', '🍛');
buildCards(DISHES, 'dishes-grid', 'DISH', '🌶️');
document.querySelectorAll('img[data-wiki]').forEach(loadWikiImage);
switchTab(localStorage.getItem('india_tab') || 'cuisines');
