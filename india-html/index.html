  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #050200;
      --card:   rgba(22,10,3,.88);
      --saffron:#f97316;
      --turmeric:#d97706;
      --gold:   #f59e0b;
      --cream:  #fef3e2;
      --text:   #fdf0e0;
      --muted:  #9d7040;
      --border: rgba(249,115,22,.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 110% 55% at 50% 0%, #3d1200 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 85% 100%, #1a0800 0%, transparent 60%),
        linear-gradient(180deg, #050200 0%, #030100 100%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  rgba(249,115,22,.02) 0, rgba(249,115,22,.02) 1px, transparent 1px, transparent 56px),
        repeating-linear-gradient(90deg, rgba(245,158,11,.015) 0, rgba(245,158,11,.015) 1px, transparent 1px, transparent 72px);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto; width: 100%;
      padding: 2rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
    .hero-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 20px rgba(249,115,22,.7)); }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.4rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg, #f97316 0%, #f59e0b 45%, #c2410c 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -.02em;
    }
    .hero-sub {
      font-size: .92rem; color: var(--muted); font-style: italic; letter-spacing: .04em;
      max-width: 500px; line-height: 1.6;
    }
    .hero-divider {
      width: 120px; height: 2px; margin-top: .25rem;
      background: linear-gradient(90deg, transparent, var(--saffron), transparent);
    }

    .tabs { display: flex; justify-content: center; gap: .3rem; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,.07); padding-bottom: .6rem; }
    .tab {
      font-size: .72rem; padding: .3rem .75rem; border-radius: 6px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.08); background: transparent; color: var(--muted);
      font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; transition: all .2s;
      white-space: nowrap;
    }
    .tab.active { color: var(--saffron); border-color: rgba(249,115,22,.45); background: rgba(249,115,22,.08); }
    .tab:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,.18); }
    .section { display: flex; flex-direction: column; gap: 1.5rem; }
    .section.hidden { display: none; }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 1.5rem; }
    @media(max-width: 520px) { .cards { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .card:hover {
      border-color: rgba(249,115,22,.45);
      box-shadow: 0 8px 40px rgba(249,115,22,.12);
      transform: translateY(-3px);
    }

    .card-img-wrap {
      position: relative; aspect-ratio: 16/9;
      background: #180800; overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      display: block; position: relative; z-index: 1;
      opacity: 0; transition: opacity .4s;
    }
    .card-img-wrap img.loaded { opacity: 1; }
    .card-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: .4rem;
    }
    .ph-num  { font-size: 3.5rem; font-weight: 900; color: rgba(249,115,22,.12); line-height: 1; }
    .ph-icon { font-size: 2.2rem; opacity: .15; }

    .badge-rank {
      position: absolute; top: .75rem; left: .75rem; z-index: 2;
      background: rgba(0,0,0,.72); border: 1px solid rgba(249,115,22,.45);
      color: var(--gold); font-size: .65rem; font-weight: 700;
      padding: .2rem .55rem; border-radius: 5px; letter-spacing: .06em;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .badge-meta {
      position: absolute; bottom: .75rem; right: .75rem; z-index: 2;
      background: rgba(0,0,0,.65); color: rgba(255,255,255,.7);
      font-size: .65rem; padding: .18rem .5rem; border-radius: 4px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card-body { padding: 1.1rem 1.2rem 1.25rem; display: flex; flex-direction: column; gap: .85rem; flex: 1; }
    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--cream); letter-spacing: -.01em; }
    .card-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; line-height: 1.45; }

    .card-stats { display: flex; gap: .5rem; flex-wrap: wrap; }
    .stat-chip {
      background: rgba(249,115,22,.08); border: 1px solid rgba(249,115,22,.18);
      border-radius: 7px; padding: .3rem .65rem; display: flex; flex-direction: column; gap: .1rem;
    }
    .stat-label { font-size: .6rem; color: var(--muted); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-val   { font-size: .82rem; color: var(--gold); font-weight: 700; font-family: 'Segoe UI', system-ui, sans-serif; }

    .card-tags { display: flex; gap: .4rem; flex-wrap: wrap; }
    .tag {
      font-size: .68rem; padding: .2rem .55rem; border-radius: 12px;
      background: rgba(245,158,11,.07); border: 1px solid rgba(245,158,11,.2);
      color: rgba(245,158,11,.9); font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600;
    }

    .facts-label { font-size: .7rem; font-weight: 700; color: var(--saffron); font-family: 'Segoe UI', system-ui, sans-serif; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }
    .facts-list { display: flex; flex-direction: column; gap: .55rem; }
    .fact { display: flex; gap: .55rem; align-items: flex-start; font-size: .8rem; line-height: 1.55; color: rgba(253,240,224,.8); }
    .fact-icon { font-size: .95rem; flex-shrink: 0; margin-top: .05rem; }
  </style>
</head>

<script>
const CUISINES = [
  {
    rank: 1, name: 'North Indian', meta: 'Punjab & Delhi',
    sub: 'Punjab & Uttar Pradesh · The cuisine that defined Indian food for the world',
    wiki: 'North Indian cuisine',
    stats: [
      { label: 'Region', val: 'North India' },
      { label: 'Base', val: 'Wheat & dairy' },
      { label: 'Technique', val: 'Tandoor' },
      { label: 'Known For', val: 'Butter Chicken' },
    ],
    tags: ['Tandoor', 'Naan', 'Butter Chicken', 'Dal Makhani', 'Rich Gravies', 'Mughal'],
    facts: [
      { icon: '🔥', text: "The tandoor — a cylindrical clay oven reaching over 900°F — is the defining tool of North Indian cooking. Naan, tandoori chicken, and seekh kebabs all owe their existence to this ancient Persian-derived technique that has been in use on the subcontinent for 5,000 years." },
      { icon: '🧅', text: "Punjabi cuisine gave the world most of what is understood as 'Indian food' outside India — butter chicken, dal makhani, palak paneer, and naan. The 1947 Partition scattered Punjabi cooks across the subcontinent and diaspora, spreading the cuisine globally almost overnight." },
      { icon: '👑', text: "Mughal cuisine — the cooking of India's Mughal emperors — merged Persian, Central Asian, and Indian traditions over 300 years. The result: dum cooking, biryani, korma, and the use of dried fruits and saffron in savoury dishes that still define North Indian festive cooking." },
      { icon: '🛣️', text: "The dhaba — roadside truck-stop restaurant — is Punjab's great culinary institution. Dhaba cooking is rustic, generous, and cooked over open flames in massive iron pots. The best dhabas on NH1 attract food critics from Delhi and tourists from abroad." },
    ],
  },
  {
    rank: 2, name: 'South Indian', meta: 'Tamil Nadu, Kerala, Karnataka',
    sub: 'Tamil Nadu, Kerala, Karnataka, Andhra Pradesh · Rice, coconut, and the world\'s greatest breakfast',
    wiki: 'South Indian cuisine',
    stats: [
      { label: 'Region', val: 'South India' },
      { label: 'Base', val: 'Rice & coconut' },
      { label: 'Technique', val: 'Steaming & frying' },
      { label: 'Known For', val: 'Dosa & idli' },
    ],
    tags: ['Dosa', 'Idli', 'Sambar', 'Rasam', 'Coconut Chutney', 'Curry Leaves'],
    facts: [
      { icon: '🫓', text: "The dosa — a crisp, fermented rice and lentil crepe — has been made in South India for over 2,000 years. Today it is arguably India's most recognisable and internationally successful dish, with dedicated dosa restaurants across five continents." },
      { icon: '🧫', text: "South Indian cuisine is among the world's most sophisticated fermentation traditions. Idli and dosa batters are fermented overnight; sambars and chutneys are soured with tamarind, kokum, and raw mango in techniques that predate modern food science." },
      { icon: '🍌', text: "Tamil Nadu's banana-leaf thali — dozens of small preparations, rice, and curries, continuously refilled for as long as you eat — is one of the world's great set meals. The tradition of eating on banana leaves goes back to ancient Sangam literature (c. 300 BCE)." },
      { icon: '🥥', text: "Kerala cuisine uses coconut in every form: oil for cooking, fresh grated in chutneys, coconut milk in fish curries. The Malabar Coast's spice trade made Kerala the epicentre of the global spice economy for 2,000 years — the reason Europeans sailed to India." },
    ],
  },
  {
    rank: 3, name: 'Bengali', meta: 'West Bengal & Bangladesh',
    sub: 'West Bengal & Bangladesh · Fish, mustard, and the world\'s finest sweet tradition',
    wiki: 'Bengali cuisine',
    stats: [
      { label: 'Region', val: 'West Bengal' },
      { label: 'Base', val: 'Fish & rice' },
      { label: 'Technique', val: 'Mustard paste' },
      { label: 'Known For', val: 'Mishti & hilsa' },
    ],
    tags: ['Hilsa Fish', 'Mustard Oil', 'Rasgulla', 'Mishti Doi', 'Panch Phoron', 'River Fish'],
    facts: [
      { icon: '🐟', text: "Bengalis are defined by their love of hilsa (ilish) — a silver, bony river fish considered the king of Bengali cuisine. The devotion to hilsa is cultural as much as culinary: it is eaten at festivals, referenced in literature, and sparks fierce annual debates about the best preparation." },
      { icon: '🌿', text: "Panch phoron — a blend of fenugreek, nigella, cumin, mustard, and fennel seeds fried in mustard oil at the start of cooking — is the flavour fingerprint of Bengali cooking, present in almost every savoury dish in a way that no other regional cuisine replicates." },
      { icon: '🏆', text: "Bengal gave the world the rasgulla and sparked a decades-long legal dispute between West Bengal and Odisha over its origin. West Bengal won a Geographical Indication in 2017 — the Bengali sweet is now a nationally protected product." },
      { icon: '🍮', text: "Bengali sweets (mishti) are a civilisation in themselves. The region's dairy-based confectionery — sandesh, rosogolla, mishti doi, chomchom — is considered the finest in India, supported by an entire guild of sweet-makers (moidals) with techniques passed father to son for 300 years." },
    ],
  },
  {
    rank: 4, name: 'Rajasthani', meta: 'Rajasthan',
    sub: 'Rajasthan · Desert cooking that turns scarcity into spectacular flavour',
    wiki: 'Rajasthani cuisine',
    stats: [
      { label: 'Region', val: 'Rajasthan' },
      { label: 'Character', val: 'Spicy & hearty' },
      { label: 'Base', val: 'Wheat & gram' },
      { label: 'Known For', val: 'Dal Baati Churma' },
    ],
    tags: ['Dal Baati Churma', 'Laal Maas', 'Ker Sangri', 'Ghee', 'Desert Cuisine', 'Royal Feast'],
    facts: [
      { icon: '🏜️', text: "Rajasthani cuisine was shaped by scarcity — water was precious, fresh vegetables scarce, the harsh desert climate favoured long-keeping preserved foods. The cuisine developed techniques to make dry, sun-baked ingredients taste extraordinary." },
      { icon: '🔥', text: "Dal Baati Churma is the state dish: hard wheat rolls (baati) baked in a cow-dung fire, served with a rich five-lentil dal, and churma (crushed baati mixed with ghee and sugar). Each element represents the region's landscape and the ingenuity of desert cooking." },
      { icon: '🐑', text: "Laal Maas — fiery red mutton curry made with Mathania chilis and yogurt — is one of India's most intense meat dishes. Originally a hunting preparation cooked by Rajput warriors in the wild, it is now the centrepiece of royal Rajasthani feasts." },
      { icon: '🫙', text: "Ghee is used with extraordinary generosity in Rajasthani cooking — a reflection of the region's cattle culture and Marwari merchant tradition of lavish hospitality. A proper Rajasthani thali arrives with a bowl of ghee and the expectation that you will use all of it." },
    ],
  },
  {
    rank: 5, name: 'Gujarati', meta: 'Gujarat',
    sub: 'Gujarat · The vegetarian thali tradition that perfected the sweet-salty balance',
    wiki: 'Gujarati cuisine',
    stats: [
      { label: 'Region', val: 'Gujarat' },
      { label: 'Style', val: 'Vegetarian' },
      { label: 'Flavour', val: 'Sweet & savory' },
      { label: 'Known For', val: 'Thali' },
    ],
    tags: ['Thali', 'Dhokla', 'Fafda', 'Jalebi', 'Kadhi', 'Undhiyu'],
    facts: [
      { icon: '🌱', text: "Gujarat is almost entirely vegetarian — the influence of Jain and Vaishnava communities made plant-based cooking so deeply embedded that even onion and garlic are avoided in many Jain households. The cuisine proves that vegetarian cooking can reach extraordinary complexity." },
      { icon: '🥗', text: "The Gujarati thali is the benchmark of Indian thali culture: small bowls of kadhi, dal, vegetables, rice, roti, pickles, and dessert, continuously refilled. The sweet kadhi alongside the savoury dishes confounds first-time diners — sweetness in savoury food is a Gujarati signature." },
      { icon: '🫕', text: "Dhokla — a steamed fermented chickpea flour cake with mustard seed and green chili tempering — is Gujarat's most exported snack. It is sold in every Indian city and every Indian grocery store abroad, with a strong claim to being India's most popular fermented food." },
      { icon: '🛳️', text: "Gujarat's trade history shaped its cuisine globally. The Silk Road passed through Gujarat, and the Gujarati diaspora — in East Africa, the UK, and the US — brought their food culture with them. British Indian food leans sweet and mild largely because of Gujarati immigration." },
    ],
  },
  {
    rank: 6, name: 'Maharashtrian', meta: 'Maharashtra',
    sub: 'Maharashtra · Street food capital of India, from Vada Pav to Misal',
    wiki: 'Vada pav',
    stats: [
      { label: 'Region', val: 'Maharashtra' },
      { label: 'Style', val: 'Varied & bold' },
      { label: 'Known For', val: 'Vada Pav' },
      { label: 'Base', val: 'Rice & wheat' },
    ],
    tags: ['Vada Pav', 'Misal Pav', 'Puran Poli', 'Poha', 'Kolhapuri Chicken', 'Street Food'],
    facts: [
      { icon: '🥔', text: "Vada Pav — a battered deep-fried potato dumpling in a bread roll with dry garlic chutney — is Mumbai's most beloved street food. It feeds billionaires and labourers at the same roadside stall for under 20 rupees, making it arguably India's most democratic dish." },
      { icon: '🌊', text: "Maharashtrian cuisine splits between coastal and inland: the Konkan coast brings coconut milk fish curries; inland Maharashtra, especially Vidarbha and Marathwada, produces drier, spicier, red-chili-heavy preparations using jowar (sorghum) as the staple grain." },
      { icon: '🌶️', text: "Misal Pav — sprouted moth bean curry in fiery tomato broth, topped with farsan, onion, and lemon — is Pune's signature breakfast. The 'katkat misal' of Kolhapur, with extra-spicy rassa, is considered so hot it has its own regional warning culture among first-time visitors." },
      { icon: '🔑', text: "Kolhapuri masala — a blend of 16+ spices including stone flower and dry coconut — is among India's most complex spice blends. Most Kolhapuri restaurants keep their specific ratio a trade secret, and the cuisine has a national reputation for heat that even Andhra cooks respect." },
    ],
  },
  {
    rank: 7, name: 'Goan', meta: 'Goa',
    sub: 'Goa · 450 years of Portuguese influence on India\'s most distinctive coastal cuisine',
    wiki: 'Vindaloo',
    stats: [
      { label: 'Region', val: 'Goa' },
      { label: 'Influence', val: 'Portuguese' },
      { label: 'Base', val: 'Seafood & pork' },
      { label: 'Known For', val: 'Vindaloo' },
    ],
    tags: ['Vindaloo', 'Xacuti', 'Fish Curry', 'Sorpotel', 'Bebinca', 'Feni'],
    facts: [
      { icon: '⚓', text: "Goa was a Portuguese colony for 450 years (1510–1961), leaving an indelible mark on its cuisine. Vinegar, pork, and a Portuguese technique of marinating meat in wine and spices produced vindaloo — India's most internationally famous curry." },
      { icon: '🍷', text: "'Vindaloo' derives from the Portuguese 'vinha d'alhos' — wine and garlic. The Portuguese version was pork preserved in vinegar for sea voyages; Goan cooks adapted it with Kashmiri chilis, local vinegar, and spices to create something entirely new and fiercer." },
      { icon: '🐠', text: "Goa's fish curry rice (xit ani uddamethi) is the daily staple: a fragrant coconut milk and kokum curry with mackerel, kingfish, or prawns, served on rice. It is eaten twice a day by most Goans and is the purest expression of Konkan coastal cooking." },
      { icon: '🥃', text: "Feni — Goa's indigenous spirit distilled from cashew fruit — is a Geographical Indication product. The cashew feni season lasts only six weeks and involves traditional foot-pressing of cashew apples, a technique unchanged for 400 years." },
    ],
  },
  {
    rank: 8, name: 'Kashmiri', meta: 'Kashmir',
    sub: 'Kashmir · The Wazwan feast and the cuisine of saffron, walnut, and slow-cooked lamb',
    wiki: 'Kashmiri cuisine',
    stats: [
      { label: 'Region', val: 'Kashmir' },
      { label: 'Style', val: 'Rich & aromatic' },
      { label: 'Base', val: 'Lamb & rice' },
      { label: 'Known For', val: 'Wazwan' },
    ],
    tags: ['Wazwan', 'Rogan Josh', 'Dum Aloo', 'Saffron', 'Kahwa', 'Seekh Kebab'],
    facts: [
      { icon: '🏔️', text: "The Wazwan is Kashmir's grand feast — a 36-course meal prepared by a master cook (waza) for weddings and celebrations, featuring up to 30 lamb dishes served on a copper tramis shared by four guests. It is one of the world's most extraordinary culinary ceremonies." },
      { icon: '🌸', text: "Kashmiri cuisine uses saffron — harvested from the crocus fields of Pampore — more generously than almost any other cuisine in the world. Kashmir produces 90% of India's saffron and it appears in biryanis, sweets, kahwa tea, and meat dishes alike." },

function buildCards(data, containerId, rankLabel, phIcon) {
  const container = document.getElementById(containerId);
  data.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    const statsHtml = d.stats.map(s =>
      `<div class="stat-chip"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`
    ).join('');
    const tagsHtml = d.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const factsHtml = d.facts.map(f =>
      `<div class="fact"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
    ).join('');
    card.innerHTML = `
      <div class="card-img-wrap">
        <div class="card-img-placeholder">
          <div class="ph-num">${d.rank}</div>
          <div class="ph-icon">${phIcon}</div>
        </div>
        <img data-wiki="${d.wiki}" alt="${d.name}" onload="this.classList.add('loaded');this.previousElementSibling.style.display='none'" onerror="this.style.display='none'" loading="lazy" decoding="async">
        <div class="badge-rank">${rankLabel} ${d.rank}</div>
        <div class="badge-meta">${d.meta}</div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-title">${d.name}</div>
          <div class="card-sub">${d.sub}</div>
        </div>
        <div class="card-stats">${statsHtml}</div>
        <div class="card-tags">${tagsHtml}</div>
        <div>
          <div class="facts-label">🍛 Fun Facts</div>
          <div class="facts-list">${factsHtml}</div>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function switchTab(name) {
  history.pushState(null, '', '#' + name);
  document.querySelectorAll('.tab').forEach(function(t, i) {

  localStorage.setItem('india_tab', name);
}
