<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Immune System">
  <title>The Immune System</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #02020f;
      --card: #070720;
      --border: #1e293b;
      --green: #22c55e;
      --teal: #14b8a6;
      --white: #e2e8f0;
      --fg: #94a3b8;
      --fg-dim: #475569;
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding-top: 44px;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .sub-nav {
      position: sticky; top: 44px; z-index: 100;
      background: rgba(2,2,15,0.95); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .sub-nav-inner {
      display: flex; justify-content: center; gap: 0.4rem;
      padding: 0.5rem; flex-wrap: wrap; max-width: 1100px; margin: 0 auto;
    }
    .tab {
      background: none; border: 1px solid var(--border); color: var(--fg-dim);
      padding: 0.3rem 0.9rem; cursor: pointer; font-family: inherit;
      font-size: 0.82rem; border-radius: 4px; transition: all 0.2s;
    }
    .tab:hover { color: var(--teal); border-color: var(--teal); }
    .tab.active { color: var(--teal); border-color: var(--teal); background: rgba(20,184,166,0.08); }
    h1 { color: var(--white); font-size: 2rem; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
    h2 { color: var(--teal); font-size: 1.3rem; margin-bottom: 1rem; }
    h3 { color: var(--white); font-size: 1rem; margin-bottom: 0.5rem; }
    p { line-height: 1.7; color: var(--fg); margin-bottom: 0.8rem; font-size: 0.92rem; }
    .subtitle { color: var(--fg-dim); font-size: 0.9rem; margin-bottom: 1.5rem; }
    canvas { display: block; border-radius: 8px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.2rem; margin-bottom: 1rem;
    }
    .controls {
      display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .btn {
      background: var(--card); border: 1px solid var(--border); color: var(--white);
      padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; transition: all 0.2s;
    }
    .btn:hover { border-color: var(--teal); color: var(--teal); }
    .btn.active { background: rgba(20,184,166,0.15); border-color: var(--teal); color: var(--teal); }
    .step-info { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .step-title { color: var(--green); font-weight: 600; margin-bottom: 0.3rem; font-size: 0.95rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; }
    @media(max-width:800px){ .grid4 { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:500px){ .grid4,.grid2 { grid-template-columns: 1fr; } }
    .cell-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; text-align: center;
    }
    .cell-card .cell-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .cell-card h3 { color: var(--green); font-size: 0.9rem; margin-bottom: 0.3rem; }
    .cell-card .cell-tag { display: inline-block; font-size: 0.72rem; padding: 0.1rem 0.5rem; border-radius: 999px; margin: 0.2rem; }
    .cell-card p { font-size: 0.8rem; color: var(--fg-dim); margin-top: 0.5rem; text-align: left; }
    .vaccine-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem;
    }
    .vaccine-card h3 { color: var(--teal); margin-bottom: 0.5rem; font-size: 0.95rem; }
    .vaccine-card .tag { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 4px; font-size: 0.75rem; margin-bottom: 0.5rem; }
    .ab-class-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1rem; }
    .ab-class { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem; flex: 1; min-width: 120px; }
    .ab-class h4 { color: var(--green); font-size: 0.88rem; margin-bottom: 0.3rem; }
    .ab-class p { font-size: 0.78rem; margin-bottom: 0; color: var(--fg-dim); }
    .timeline-bar { display: flex; margin-top: 1rem; border: 1px solid var(--border); border-radius: 6px; overflow:hidden; }
    .tl-innate { background: rgba(249,115,22,0.2); flex: 4; padding: 0.5rem; border-right: 2px solid var(--border); }
    .tl-adaptive { background: rgba(59,130,246,0.15); flex: 10; padding: 0.5rem; }
    .tl-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.2rem; }
    .tl-sub { font-size: 0.72rem; color: var(--fg-dim); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .gallery-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .gallery-card img { width: 100%; height: 200px; object-fit: cover; display: block; transition: filter .3s; }
    .gallery-card img:hover { filter: brightness(1.1); }
    .gallery-card-body { padding: .75rem 1rem; }
    .gallery-card-title { font-size: .9rem; font-weight: 700; color: var(--green); margin-bottom: .2rem; }
    .gallery-card-desc { font-size: .8rem; color: var(--fg); line-height: 1.5; }
  </style>
</head>
<body>
<div class="sub-nav">
  <div class="sub-nav-inner">
    <a class="tab " href="index.html">Immune Response</a>
    <a class="tab" href="cells.html">Cell Types</a>
    <a class="tab" href="antibodies.html">Antibodies</a>
    <a class="tab" href="vaccines.html">Vaccines</a>
    <a class="tab" href="photos.html">Photos</a>
  </div>
</div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/immune') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="cells">
<h2>Immune Cell Types</h2>
  <p class="subtitle">All immune cells derive from hematopoietic stem cells in the bone marrow.</p>
  <div class="grid4" id="cell-grid"></div>
</div>

<!-- TAB 3: ANTIBODIES -->
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
