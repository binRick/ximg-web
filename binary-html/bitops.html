<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Binary &amp; Number Systems — binary.ximg.app — interactive educational app on ximg.app">
  <title>Binary &amp; Number Systems — binary.ximg.app</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#02020f;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-top:44px}

    /* sub-nav */
    .subnav{position:sticky;top:44px;z-index:100;background:#02020f;border-bottom:1px solid #1e293b;display:flex;gap:0;padding:0 1rem}
    .tab-btn{padding:.65rem 1.1rem;font-size:.82rem;font-weight:600;color:#64748b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
    .tab-btn:hover{color:#c9d1d9}
    .tab-btn.active{color:#22c55e;border-bottom-color:#22c55e}

    /* layout */
    .page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
    .page-title{font-size:1.2rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
    .page-sub{font-size:.8rem;color:#475569;margin-bottom:1.25rem}

    /* inputs */
    label.lbl{display:block;font-size:.7rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem}
    input[type=text],input[type=number]{width:100%;background:#070720;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;font-family:'Courier New',monospace;font-size:.95rem;padding:.55rem .8rem;outline:none;transition:border-color .2s}
    input[type=text]:focus,input[type=number]:focus{border-color:#22c55e55}
    input.error{border-color:#f8514988 !important}

    /* cards */
    .card{background:#070720;border:1px solid #1e293b;border-radius:8px;padding:1rem}
    .card-title{font-size:.78rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.65rem}

    /* converter grid */
    .conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
    @media(max-width:600px){.conv-grid{grid-template-columns:1fr}}

    .base-label{font-size:.68rem;color:#475569;margin-bottom:.25rem;display:flex;justify-content:space-between;align-items:center}
    .base-badge{font-size:.65rem;background:#0f172a;border:1px solid #1e293b;border-radius:4px;padding:.1rem .4rem;color:#64748b}
    .base-bin .base-badge{color:#22c55e;border-color:#22c55e44}
    .base-oct .base-badge{color:#eab308;border-color:#eab30844}
    .base-dec .base-badge{color:#60a5fa;border-color:#60a5fa44}
    .base-hex .base-badge{color:#f472b6;border-color:#f472b644}

    /* bit grid */
    .bit-grid-wrap{margin-top:1rem}
    .bit-size-btns{display:flex;gap:.4rem;margin-bottom:.6rem}
    .bit-size-btn{background:#070720;border:1px solid #1e293b;border-radius:5px;color:#475569;font-size:.73rem;padding:.22rem .55rem;cursor:pointer;transition:all .15s;font-family:monospace}
    .bit-size-btn.on{background:rgba(34,197,94,.1);border-color:#22c55e55;color:#22c55e}
    .bit-grid{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.5rem}
    .bit{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-family:monospace;font-size:.85rem;font-weight:700;cursor:pointer;border:1px solid #1e293b;transition:all .12s;user-select:none}
    .bit.one{background:rgba(34,197,94,.2);border-color:#22c55e66;color:#22c55e}
    .bit.zero{background:#0a0a1e;border-color:#1e293b;color:#334155}
    .bit:hover{border-color:#22c55e44;background:rgba(34,197,94,.08)}
    .bit-pos-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.75rem}
    .bit-pos{width:28px;text-align:center;font-size:.6rem;color:#334155;font-family:monospace}

    /* contexts */
    .context-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.75rem}
    .ctx-item{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.45rem .7rem;font-size:.8rem}
    .ctx-label{font-size:.67rem;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
    .ctx-val{font-family:monospace;color:#e2e8f0}
    .ctx-val.green{color:#22c55e}.ctx-val.yellow{color:#eab308}.ctx-val.blue{color:#60a5fa}.ctx-val.pink{color:#f472b6}

    /* signed/unsigned */
    .signed-row{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem;font-size:.8rem}
    .signed-item{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.4rem .7rem}
    .si-label{font-size:.67rem;color:#475569;margin-bottom:.15rem}
    .si-val{font-family:monospace;color:#c9d1d9}

    /* bit ops */
    .ops-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
    @media(max-width:600px){.ops-row{grid-template-columns:1fr}}
    .ops-results{margin-top:1rem}
    .op-item{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.6rem .8rem;margin-bottom:.5rem}
    .op-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem;flex-wrap:wrap}
    .op-name{font-size:.78rem;font-weight:700;color:#eab308;min-width:80px;font-family:monospace}
    .op-bits-row{display:flex;align-items:baseline;gap:.5rem;font-family:monospace;font-size:.82rem;flex-wrap:wrap}
    .ob-label{color:#475569;min-width:20px;font-size:.72rem}
    .ob-bits{letter-spacing:.15em}
    .ob-a{color:#60a5fa}.ob-b{color:#f472b6}.ob-r{color:#22c55e;font-weight:700}
    .op-dec{font-size:.75rem;color:#64748b;font-family:monospace;margin-left:auto}
    .bit-match{text-decoration:underline;text-underline-offset:2px}

    /* float tab */
    .float-input-row{display:flex;gap:.75rem;align-items:flex-end;margin-bottom:1rem;flex-wrap:wrap}
    .float-input-row > div{flex:1;min-width:180px}
    .special-btns{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
    .sp-btn{background:#070720;border:1px solid #1e293b;border-radius:5px;color:#475569;font-size:.73rem;padding:.25rem .6rem;cursor:pointer;transition:all .15s;font-family:monospace}
    .sp-btn:hover{border-color:#22c55e44;color:#22c55e}

    .fp-vis{display:flex;gap:2px;margin-bottom:.75rem;flex-wrap:wrap}
    .fp-bit{width:24px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-family:monospace;font-size:.75rem;font-weight:700;border:1px solid transparent;transition:background .1s}
    .fp-sign{background:rgba(248,113,113,.2);border-color:rgba(248,113,113,.4);color:#fca5a5}
    .fp-exp{background:rgba(234,179,8,.15);border-color:rgba(234,179,8,.35);color:#fde047}
    .fp-mant{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.3);color:#86efac}

    .fp-legend{display:flex;gap:1rem;margin-bottom:1rem;font-size:.77rem;flex-wrap:wrap}
    .fp-leg-item{display:flex;align-items:center;gap:.4rem}
    .fp-leg-dot{width:10px;height:10px;border-radius:2px}
    .fp-sign-dot{background:rgba(248,113,113,.4)}
    .fp-exp-dot{background:rgba(234,179,8,.35)}
    .fp-mant-dot{background:rgba(34,197,94,.3)}

    .fp-breakdown{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.75rem;font-size:.8rem;margin-bottom:.75rem}
    .fp-row{display:flex;gap:1rem;margin-bottom:.4rem;flex-wrap:wrap}
    .fp-field{min-width:120px}.fp-field-label{color:#475569;font-size:.7rem;margin-bottom:.15rem}
    .fp-field-val{font-family:monospace;color:#e2e8f0}
    .fp-field-val.red{color:#fca5a5}.fp-field-val.yellow{color:#fde047}.fp-field-val.green{color:#86efac}

    .precision-note{background:#0a0a1e;border-left:3px solid #eab308;padding:.5rem .75rem;font-size:.78rem;color:#94a3b8;margin-top:.5rem;border-radius:0 4px 4px 0}

    /* reference tab */
    .ref-section{margin-bottom:1.75rem}
    .ref-title{font-size:.82rem;font-weight:700;color:#f1f5f9;margin-bottom:.6rem;padding-bottom:.35rem;border-bottom:1px solid #1e293b}
    .pow2-table{width:100%;border-collapse:collapse;font-size:.8rem}
    .pow2-table th{text-align:left;padding:.35rem .6rem;border-bottom:1px solid #1e293b;color:#475569;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
    .pow2-table td{padding:.28rem .6rem;border-bottom:1px solid #0f172a;font-family:monospace}
    .pow2-table tr:hover td{background:#070720}
    .td-exp{color:#22c55e}.td-val{color:#c9d1d9}.td-hex{color:#f472b6}.td-note{color:#475569;font-size:.74rem}

    .ascii-search{margin-bottom:.6rem}
    .ascii-search input{max-width:300px}
    .ascii-table{width:100%;border-collapse:collapse;font-size:.78rem}
    .ascii-table th{text-align:left;padding:.35rem .5rem;border-bottom:1px solid #1e293b;color:#475569;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em}
    .ascii-table td{padding:.22rem .5rem;border-bottom:1px solid #0a0a1e;font-family:monospace}
    .ascii-table tr:hover td{background:#070720}
    .td-dec{color:#60a5fa}.td-hex2{color:#f472b6}.td-bin2{color:#22c55e}.td-char{color:#fde047;font-size:.85rem}

    .tricks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.6rem}
    .trick-card{background:#070720;border:1px solid #1e293b;border-radius:6px;padding:.65rem .8rem}
    .trick-title{font-size:.8rem;font-weight:600;color:#c9d1d9;margin-bottom:.35rem}
    .trick-code{font-family:monospace;font-size:.78rem;color:#22c55e;background:#0a0a1e;border-radius:4px;padding:.35rem .5rem;margin:.3rem 0;white-space:pre}
    .trick-desc{font-size:.74rem;color:#475569}

    /* toast */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0f172a;border:1px solid #22c55e44;color:#22c55e;padding:.5rem 1rem;border-radius:6px;font-size:.8rem;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}

    .gap{margin-top:1rem}
    .color-swatch{display:inline-block;width:40px;height:20px;border-radius:3px;vertical-align:middle;margin-left:.4rem;border:1px solid #334155}
  </style>
</head>
<body>
<div class="subnav">
  <a class="tab-btn " href="index.html">Converter</a>
  <a class="tab-btn" href="bitops.html">Bit Operations</a>

  <a class="tab-btn" href="reference.html">Reference</a>
</div>

<script>
(function(){
  var p = location.pathname;
  document.querySelectorAll('a[href]').forEach(function(a){
    var h = a.getAttribute('href');
    if (!h || !h.endsWith('.html') && h !== 'index.html') return;
    if (p.endsWith(h) || (h==='index.html' && (p.endsWith('/') || p.endsWith('/binary') || p.endsWith('index.html')))) {
      a.classList.add('active');
    }
  });
})();
</script>
<section id="bitops">
<div class="page-title">Bit Operations</div>
    <div class="page-sub">Enter two numbers and see AND, OR, XOR, NOT, shifts — bit-by-bit visualization</div>

    <div class="ops-row">
      <div>
        <label class="lbl">Input A (decimal)</label>
        <input type="text" id="op-a" value="60" autocomplete="off" spellcheck="false">
      </div>
      <div>
        <label class="lbl">Input B (decimal)</label>
        <input type="text" id="op-b" value="13" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="ops-results" id="ops-results"></div>
  </div>

  <!-- ═══ TAB: FLOATING POINT ═══ -->
</section>
<script src="/shared/nav.js?v=3"></script>
</body>
</html>
